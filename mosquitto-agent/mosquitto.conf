# Dedicated Mosquitto broker for agent runtime traffic
# Uses vanilla eclipse-mosquitto:2 with native file-based auth.
# Credentials are reconciled from target endpoint manifests by the agent.
# Reload auth without restart: send SIGHUP to the container.

listener 1883 0.0.0.0
protocol mqtt

listener 9001 0.0.0.0
protocol websockets

per_listener_settings false
allow_anonymous false

password_file /mosquitto/auth/passwd
acl_file /mosquitto/auth/acl

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
