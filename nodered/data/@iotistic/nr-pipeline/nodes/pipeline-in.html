<script type="text/javascript">
    RED.nodes.registerType('iotistica-pipeline-in', {
        category:    'Iotistica',
        color:       '#3FAED8',
        defaults: {
            name:      { value: '' },
            agentUuid: { value: '' },
            agentName: { value: '' }
        },
        inputs:  0,
        outputs: 1,
        icon:    'arrow-in.svg',
        paletteLabel: 'pipeline in',
        label: function () {
            if (this.agentName) { return this.agentName + ' → pipeline in'; }
            return this.name || 'pipeline in';
        },
        outputLabels: ['transformed payload'],
        oneditprepare: function () {
            const node = this;
            const $sel = $('#node-input-agentUuid');

            $sel.empty().append('<option value="">-- no agent assigned --</option>');

            fetch('/nr-tools/agents')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    const devices = (data && Array.isArray(data.devices)) ? data.devices : [];
                    devices.forEach(function (d) {
                        const status = d.is_online ? 'online' : 'offline';
                        $sel.append(
                            $('<option></option>')
                                .val(d.uuid)
                                .text(d.name + ' (' + status + ')')
                                .attr('data-name', d.name)
                        );
                    });
                    if (node.agentUuid) { $sel.val(node.agentUuid); }
                })
                .catch(function (err) {
                    console.warn('[pipeline-in] Failed to load agents:', err);
                });
        },
        oneditsave: function () {
            const opt = $('#node-input-agentUuid option:selected');
            this.agentUuid = opt.val() || '';
            this.agentName = opt.attr('data-name') || '';
        }
    });
</script>

<script type="text/html" data-template-name="iotistica-pipeline-in">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="pipeline in">
    </div>
    <div class="form-row">
        <label for="node-input-agentUuid"><i class="fa fa-microchip"></i> Agent</label>
        <select id="node-input-agentUuid" style="width:70%">
            <option value="">Loading...</option>
        </select>
    </div>
</script>

<script type="text/html" data-help-name="iotistica-pipeline-in">
    <p>
        <b>Iotistica Pipeline In</b> — entry point for an agent payload transform flow.
    </p>
    <p>
        Place this node at the start of your flow. At runtime the Iotistica agent
        injects each outbound device batch here before it is published to MQTT.
    </p>
    <h3>Output message</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>The raw batch payload: <code>{ sensor, timestamp, messages[] }</code></dd>
        <dt>topic <span class="property-type">string</span></dt>
        <dd>The MQTT topic the batch will be published to.</dd>
        <dt>deviceId <span class="property-type">string</span></dt>
        <dd>Name of the endpoint (e.g. <code>opcua-pipe</code>).</dd>
    </dl>
    <h3>Notes</h3>
    <p>
        Wire the output of your transform logic into an
        <b>iotistica-pipeline-out</b> node to return the (modified) payload
        to the agent. Set <code>msg.drop = true</code> to suppress publishing.
    </p>
    <p>
        This node is inert when viewed in a standalone Node-RED instance —
        it only activates when loaded by the embedded agent runtime.
    </p>
</script>
