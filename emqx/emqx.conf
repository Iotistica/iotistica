## EMQX configuration (HOCON)

# Node configuration
node {
  name = "emqx@iotistic-emqx"
  cookie = "emqxsecret"
  data_dir = "/opt/emqx/data"
}

# Base listeners
listeners.tcp.default {
  bind = "0.0.0.0:1883"
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
}

# Dashboard
dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "${EMQX_DASHBOARD__DEFAULT_USERNAME}"
  default_password = "${EMQX_DASHBOARD__DEFAULT_PASSWORD}"
}

# HTTP authentication against existing API endpoints
authentication = [
  {
    enable = true
    mechanism = "password_based"
    backend = "http"
    method = "post"
    url = "http://api:3002/mosquitto-auth/user"
    headers = {
      "content-type" = "application/json"
    }
    body {
      username = "${username}"
      password = "${password}"
    }
  }
]

# HTTP authorization (ACL) against existing API endpoints
authorization {
  sources = [
    {
      type = "http"
      enable = true
      method = "post"
      url = "http://api:3002/mosquitto-auth/acl"
      headers = {
        "content-type" = "application/json"
      }
      body {
        username = "${username}"
        topic = "${topic}"
        action = "${action}"
      }
    }
  ]
}
