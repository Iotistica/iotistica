# Docker Compose configuration for core integration testing
#
# This stack intentionally runs only the backend core services needed for
# provisioning a systemd-installed edge agent:
#   - PostgreSQL 16 for device state and provisioning data
#   - Redis for API workers and realtime features
#   - API server built from local source
#
# The agent and Mosquitto broker are installed on the host via agent/bin/install.sh.
# They are not part of this Compose stack.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d --build
#   docker compose -f docker-compose.e2e.yml down -v

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: iotistic-postgres-e2e
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-iotistic}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: >
      postgres
      -c shared_preload_libraries=timescaledb
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iotistica-net

  redis:
    image: redis:7-alpine
    container_name: iotistic-redis-e2e
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "${REDIS_PORT_EXT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - iotistica-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: iotistic-api-e2e
    restart: unless-stopped
    tty: true
    stdin_open: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - PORT=${PORT:-3002}
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - JWT_SECRET=${JWT_SECRET:-integration-test-secret}
      - AUTH0_ENABLED=${AUTH0_ENABLED:-false}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-iotistic}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-20}
      - DB_SSL=${DB_SSL:-false}
      - DB_SSL_REJECT_UNAUTHORIZED=${DB_SSL_REJECT_UNAUTHORIZED:-false}
      - FORCE_COLOR=${FORCE_COLOR:-1}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_USERNAME=${REDIS_USERNAME:-}
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-host.docker.internal}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT:-1883}
      - MQTT_BROKER_PROTOCOL=${MQTT_BROKER_PROTOCOL:-mqtt}
      - MQTT_BROKER_USE_TLS=${MQTT_BROKER_USE_TLS:-false}
      - MQTT_USERNAME=${MQTT_USERNAME:-admin}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-iotistic42!}
      - MQTT_PERSIST_TO_DB=${MQTT_PERSIST_TO_DB:-true}
      - MQTT_DB_SYNC_INTERVAL=${MQTT_DB_SYNC_INTERVAL:-10000}
      - MQTT_MONITOR_ENABLED=${MQTT_MONITOR_ENABLED:-true}
      - LOG_COMPRESSION=${LOG_COMPRESSION:-true}
      - LICENSE_PUBLIC_KEY=${LICENSE_PUBLIC_KEY}
      - IOTISTIC_LICENSE_KEY=${IOTISTIC_LICENSE_KEY}
      - VPN_ENABLED=false
      - TAILSCALE_ENABLED=false
    ports:
      - "${API_PORT_EXT:-4002}:3002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iotistica-net

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  iotistica-net:
    driver: bridge
