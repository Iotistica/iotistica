# Docker Compose configuration for E2E Integration Testing
#
# This stack provides a complete testing environment with:
#   - PostgreSQL 16 for device state and MQTT ACLs
#   - Redis for real-time metrics and caching
#   - Mosquitto MQTT broker with PostgreSQL auth
#   - API server with health checks
#   - Dashboard UI
#   - Agent instances for testing
#   - Protocol simulators (Modbus)
#
# Usage:
#   docker-compose -f docker-compose.e2e.yml up -d
#   docker-compose -f docker-compose.e2e.yml down -v

services:
  # Database Services
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: iotistic-postgres-e2e
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-iotistic}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: >
            postgres
            -c shared_preload_libraries=timescaledb
            -c config_file=/etc/postgresql/postgresql.conf
            -c hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5
    networks:
      - iotistic-net

  redis:
    image: redis:7-alpine
    container_name: iotistic-redis-e2e
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "${REDIS_PORT_EXT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - iotistic-net

  # MQTT Broker
  mosquitto:
    image: iegomez/mosquitto-go-auth
    container_name: iotistic-mosquitto-e2e
    restart: unless-stopped
    ports:
      - "${MOSQUITTO_PORT_EXT:-5883}:1883"
      - "${MOSQUITTO_WS_PORT_EXT:-59002}:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/etc/mosquitto/mosquitto.conf
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iotistic-net

  # API Server
  api:
    image: iotistic/api:${API_VERSION:-latest}
    container_name: iotistic-api-e2e
    restart: unless-stopped
    tty: true
    stdin_open: true
    environment:
      - PORT=${PORT:-3002}
      - NODE_ENV=${NODE_ENV:-development}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-iotistic}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-20}
      - FORCE_COLOR=${FORCE_COLOR:-1}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://mosquitto:1883}
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-localhost}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT:-5883}
      - MQTT_BROKER_USE_TLS=${MQTT_BROKER_USE_TLS:-false}
      - MQTT_BROKER_PROTOCOL=${MQTT_BROKER_PROTOCOL:-mqtt}
      - MQTT_USERNAME=${MQTT_USERNAME:-admin}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-iotistic2024}
      - MQTT_PERSIST_TO_DB=${MQTT_PERSIST_TO_DB:-true}
      - MQTT_DB_SYNC_INTERVAL=${MQTT_DB_SYNC_INTERVAL:-10000}
      - MQTT_MONITOR_ENABLED=${MQTT_MONITOR_ENABLED:-true}
      - LOG_COMPRESSION=${LOG_COMPRESSION:-true}
      - LICENSE_PUBLIC_KEY=${LICENSE_PUBLIC_KEY}
      - IOTISTIC_LICENSE_KEY=${IOTISTIC_LICENSE_KEY}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - VPN_ENABLED=false
      
    ports:
      - "${API_PORT_EXT:-4002}:3002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - postgres
      - redis
      - mosquitto
    networks:
      - iotistic-net

  # Dashboard UI
  dashboard:
    image: iotistic/dashboard:${DASHBOARD_VERSION:-latest}
    container_name: iotistic-dashboard-e2e
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT_EXT:-3000}:80"
    environment:
      - VITE_API_URL=http://localhost:${API_PORT_EXT:-4002}
      - NODE_ENV=development
    depends_on:
      - api
    networks:
      - iotistic-net

  # Protocol Simulators for Testing
  modbus-simulator:
        image: iotistic/modbus-simulator:${MODBUS_SIMULATOR_VERSION:-latest}
        container_name: iotistic-modbus-sim
        restart: unless-stopped
        volumes:
            - ./vendors:/app/vendors:ro
        environment:
          - MODBUS_PROFILE=COMAP
        ports:
            - "502:502"
        networks:
            - iotistic-net
        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "2"
  
  # COMAP Generator Controller Simulator
  comap-simulator:
    build: ./sensors/comap-simulator
    container_name: iotistic-comap-simulator
    hostname: comap-simulator
    restart: unless-stopped
    ports:
      - "5502:502"
    environment:
      - MODBUS_PORT=502
      - MODBUS_SLAVES=3
      - MODBUS_SLAVE_START=1
      - GENERATOR_RATED_KW=100
      - GENERATOR_RATED_VOLTAGE=240
      - GENERATOR_FUEL_TANK_L=200
      - AUTO_START=true
      - STATE_CHANGE_INTERVAL=300
      - NOISE_PERCENT=1.0
      - INJECT_OVERSPEED=false
      - INJECT_LOW_OIL=false
      - INJECT_HIGH_TEMP=false
      - INJECT_OVERLOAD=false
    networks:
      - iotistic-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  iotistic-net:
    driver: bridge
