{{- if .Values.provisioning.existingSecret }}
# Using existing Secret: {{ .Values.provisioning.existingSecret }}
# Keys should be in format: PROVISIONING_KEY_0, PROVISIONING_KEY_1, ... PROVISIONING_KEY_N
{{- else }}
# WARNING: You must generate provisioning keys BEFORE deploying this chart!
#
# Generate keys using the provisioning script:
#   ./scripts/generate-provisioning-keys.sh {{ .Values.fleet.replicaCount }} {{ .Values.provisioning.apiUrl }} {{ .Values.provisioning.fleetId }}
#
# Or use PowerShell:
#   .\scripts\generate-provisioning-keys.ps1 -Count {{ .Values.fleet.replicaCount }} -ApiUrl {{ .Values.provisioning.apiUrl }} -FleetId {{ .Values.provisioning.fleetId }}
#
# Then create the secret:
#   kubectl create secret generic {{ include "agent-fleet.fullname" . }}-provisioning-keys \
#     --from-env-file=keys.env -n {{ .Release.Namespace }}
#
# This placeholder secret will cause pods to fail until real keys are provided.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-fleet.fullname" . }}-provisioning-keys
  labels:
    {{- include "agent-fleet.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  README: |
    This is a placeholder secret. Generate real provisioning keys via API:
    
    API: {{ .Values.provisioning.apiUrl }}/api/v1/provisioning-keys/generate
    Fleet ID: {{ .Values.provisioning.fleetId }}
    Count: {{ .Values.fleet.replicaCount }}
    
    Use scripts/generate-provisioning-keys.sh or .ps1 to generate keys.
  {{- range $i := until (int .Values.fleet.replicaCount) }}
  PROVISIONING_KEY_{{ $i }}: "PLACEHOLDER_KEY_{{ $i }}_REPLACE_ME"
  {{- end }}
{{- end }}
