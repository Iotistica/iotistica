# Production values for Iotistic
# Override default development settings for production deployment

# Use specific image versions (not latest)
api:
  image:
    tag: v1.0.0  # Replace with your version
    pullPolicy: Always
  replicas: 2  # Multiple replicas for HA
  serviceType: ClusterIP  # Use ClusterIP with Ingress
  env:
    NODE_ENV: production
    LOG_LEVEL: info

dashboard:
  image:
    tag: v1.0.0  # Replace with your version
    pullPolicy: Always
  replicas: 2  # Multiple replicas for HA
  serviceType: ClusterIP  # Use ClusterIP with Ingress

# Increase database resources
postgres:
  storage:
    size: 50Gi
    storageClass: gp3  # Use fast SSD storage (AWS example)
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  # Use strong password
  password: "CHANGE_ME_STRONG_PASSWORD"

# Increase Redis resources
redis:
  maxMemory: 1gb
  storage:
    size: 10Gi
    storageClass: gp3
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# MQTT production settings
mosquitto:
  serviceType: ClusterIP  # Use ClusterIP with Ingress
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Enable Ingress for production
ingress:
  enabled: true
  className: nginx
  host: iotistic.example.com  # Change to your domain
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  tls:
    enabled: true

# Enable network policies for security
networkPolicy:
  enabled: true

# Enable resource quotas
resourceQuota:
  enabled: true
