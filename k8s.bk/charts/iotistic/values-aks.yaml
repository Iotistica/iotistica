# Azure AKS Production Values for Iotistic
# Optimized for Azure Kubernetes Service deployment

# Use specific image versions (never use 'latest' in production)
api:
  image:
    tag: v1.0.0  # Replace with your actual version
    pullPolicy: Always
  replicas: 2  # Minimum 2 for high availability
  serviceType: ClusterIP  # Use ClusterIP with Azure Application Gateway or NGINX Ingress
  env:
    NODE_ENV: production
    LOG_LEVEL: info
    DB_POOL_SIZE: "50"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

dashboard:
  image:
    tag: v1.0.0  # Replace with your actual version
    pullPolicy: Always
  replicas: 2  # Minimum 2 for high availability
  serviceType: ClusterIP
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# PostgreSQL configuration for Azure
postgres:
  storage:
    size: 100Gi
    # Azure Disk CSI driver storage classes:
    # - managed-csi: Standard HDD (cheapest, slower)
    # - managed-csi-premium: Premium SSD (recommended for databases)
    # - azurefile-csi: Azure Files (for ReadWriteMany if needed)
    storageClass: managed-csi-premium  # Premium SSD for best performance
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  # IMPORTANT: Change this password!
  password: "CHANGE_ME_TO_STRONG_PASSWORD"
  
  # Azure-specific recommendations:
  # Consider using Azure Database for PostgreSQL (PaaS) instead:
  # - Fully managed service
  # - Automatic backups and point-in-time restore
  # - Built-in high availability
  # - No K8s storage management needed
  # See: https://azure.microsoft.com/en-us/services/postgresql/

# Redis configuration for Azure
redis:
  maxMemory: 2gb
  storage:
    size: 20Gi
    storageClass: managed-csi-premium  # Premium SSD
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  # Azure-specific recommendation:
  # Consider using Azure Cache for Redis (PaaS) instead:
  # - Fully managed service
  # - Built-in high availability
  # - Automatic scaling
  # - Enterprise-grade security
  # See: https://azure.microsoft.com/en-us/services/cache/

# Mosquitto MQTT broker
mosquitto:
  serviceType: LoadBalancer  # Azure will provision Azure Load Balancer
  # Alternative: Use ClusterIP with Ingress for MQTT over WebSockets
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  
  # For production MQTT:
  # Consider Azure IoT Hub or Azure Event Hubs with MQTT support:
  # - Fully managed MQTT service
  # - Built-in security and device management
  # - Automatic scaling
  # See: https://docs.microsoft.com/en-us/azure/iot-hub/

# Ingress configuration for Azure
ingress:
  enabled: true
  # Options for Azure:
  # 1. nginx: NGINX Ingress Controller (most common)
  # 2. azure-application-gateway: Azure Application Gateway Ingress Controller (AGIC)
  className: nginx
  host: iotistic.yourdomain.com  # Change to your actual domain
  annotations:
    # SSL/TLS with cert-manager and Let's Encrypt
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # NGINX-specific annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # For Azure Application Gateway (if using AGIC):
    # appgw.ingress.kubernetes.io/ssl-redirect: "true"
    # appgw.ingress.kubernetes.io/backend-protocol: "http"
  tls:
    enabled: true
    # cert-manager will automatically provision certificate

# Network policies for security
networkPolicy:
  enabled: true  # Restrict pod-to-pod communication

# Resource quotas
resourceQuota:
  enabled: true  # Prevent resource exhaustion

# Azure-specific notes:
# 
# 1. CONTAINER REGISTRY
#    - Use Azure Container Registry (ACR) for your images
#    - Enable ACR integration with AKS: az aks update -n myAKS -g myRG --attach-acr myACR
#    - Or use imagePullSecrets if ACR is in different subscription
#
# 2. STORAGE
#    - Default storage class: managed-csi (Standard HDD)
#    - Premium storage: managed-csi-premium (Premium SSD)
#    - For ReadWriteMany: azurefile-csi
#    - Enable CSI drivers: az aks update --enable-disk-driver --enable-file-driver
#
# 3. NETWORKING
#    - Use Azure CNI for better performance (vs kubenet)
#    - Enable Network Policies: az aks create --network-policy azure
#    - Consider Azure Private Link for secure database access
#
# 4. MONITORING
#    - Enable Azure Monitor Container Insights
#    - Configure log analytics workspace
#    - Use Prometheus + Grafana for custom metrics
#
# 5. SECURITY
#    - Enable Azure AD integration for K8s RBAC
#    - Use Azure Key Vault for secrets (via CSI driver)
#    - Enable Pod Security Policies or Pod Security Standards
#    - Use Managed Identity for Azure resource access
#
# 6. HIGH AVAILABILITY
#    - Use availability zones: az aks create --zones 1 2 3
#    - Enable cluster autoscaler: az aks update --enable-cluster-autoscaler
#    - Configure pod anti-affinity for critical services
#
# 7. COST OPTIMIZATION
#    - Use Azure Spot VMs for non-critical workloads
#    - Enable cluster autoscaler with appropriate min/max nodes
#    - Consider Azure Reserved Instances for predictable workloads
#    - Use managed PaaS services (Database, Redis, IoT Hub) when appropriate

