---
# htpasswd secret for nginx basic auth
# Generated using: htpasswd -nbB admin Kubecost2026!
apiVersion: v1
kind: Secret
metadata:
  name: kubecost-nginx-auth
  namespace: kubecost
type: Opaque
stringData:
  # Format: username:bcrypt_hash
  # Password: Kubecost2026!
  htpasswd: |
    admin:$2y$05$wSUeeOqGdqjlRZ3VGBFd9.G3NK/p3TDK1K3D7aa8IQGC33Wk.dOLS

---
# Nginx ConfigMap with auth configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubecost-nginx-config
  namespace: kubecost
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    
    http {
      server {
        listen 8080;
        
        # Basic Authentication
        auth_basic "Kubecost - Authentication Required";
        auth_basic_user_file /etc/nginx/htpasswd/htpasswd;
        
        location / {
          proxy_pass http://kubecost-cost-analyzer:9090;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }

---
# Nginx deployment acting as auth proxy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecost-nginx-proxy
  namespace: kubecost
  labels:
    app: kubecost-nginx-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubecost-nginx-proxy
  template:
    metadata:
      labels:
        app: kubecost-nginx-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: htpasswd
              mountPath: /etc/nginx/htpasswd
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: nginx-config
          configMap:
            name: kubecost-nginx-config
        - name: htpasswd
          secret:
            secretName: kubecost-nginx-auth

---
# Service for nginx proxy
apiVersion: v1
kind: Service
metadata:
  name: kubecost-nginx-proxy
  namespace: kubecost
  labels:
    app: kubecost-nginx-proxy
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: kubecost-nginx-proxy
