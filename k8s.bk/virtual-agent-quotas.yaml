# Virtual Agent Resource Quotas
# Apply with: kubectl apply -f k8s/virtual-agent-quotas.yaml

---
# Production namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: virtual-agents-quota
  namespace: virtual-agents
spec:
  hard:
    # Compute resources
    requests.cpu: "20"           # 20 CPU cores guaranteed
    requests.memory: 40Gi        # 40Gi RAM guaranteed
    limits.cpu: "100"            # 100 CPU cores burst capacity
    limits.memory: 200Gi         # 200Gi RAM burst capacity
    
    # Object counts
    pods: "50"                   # Maximum 50 virtual agent pods
    persistentvolumeclaims: "50" # Maximum 50 PVCs (one per agent)
    secrets: "100"               # Max secrets (2 per agent: provisioning + opcua)
    services: "10"               # Max services (if exposing agent APIs)
    
    # Storage
    requests.storage: 100Gi      # Total storage across all PVCs
    
    # Quality of Service
    # Guaranteed QoS pods get priority
    requests.cpu.guaranteed: "10"
    requests.memory.guaranteed: 20Gi

---
# Development namespace quota (smaller limits)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: virtual-agents-dev-quota
  namespace: virtual-agents-dev
spec:
  hard:
    requests.cpu: "5"
    requests.memory: 10Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "10"
    persistentvolumeclaims: "10"
    secrets: "20"
    requests.storage: 20Gi

---
# LimitRange - default and max resource limits per container
apiVersion: v1
kind: LimitRange
metadata:
  name: virtual-agent-limits
  namespace: virtual-agents
spec:
  limits:
  # Container limits
  - max:
      cpu: "8"         # No single container can exceed 8 CPUs
      memory: 16Gi     # No single container can exceed 16Gi RAM
    min:
      cpu: 50m         # Minimum 50 millicores per container
      memory: 64Mi     # Minimum 64Mi RAM per container
    default:
      cpu: 500m        # Default limit if not specified
      memory: 512Mi
    defaultRequest:
      cpu: 100m        # Default request if not specified
      memory: 128Mi
    type: Container
    
  # PVC limits
  - max:
      storage: 10Gi    # Max PVC size (prevent runaway storage)
    min:
      storage: 100Mi   # Minimum PVC size
    type: PersistentVolumeClaim

---
# Priority Classes - ensure critical agents aren't evicted
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: virtual-agent-critical
value: 1000000
globalDefault: false
description: "High priority for production virtual agents"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: virtual-agent-standard
value: 100000
globalDefault: false
description: "Standard priority for development virtual agents"
