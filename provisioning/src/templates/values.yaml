# Default values for iotistic integration stack
# This is a YAML-formatted file for development and testing

# Global configuration
global:
  namespace: client-{{CLIENT_ID}}
  logTenant: client-{{CLIENT_ID}}
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  serviceType: ClusterIP
  port: 6379
  maxMemory: 1536mb
  maxMemoryPolicy: noeviction
  tls: false
  tlsServerName: ""
  cluster: false
  auth:
    enabled: true
    existingSecret: ""
    password: ""
    passwordKey: password
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 250m
      memory: 2Gi
# Mosquitto MQTT broker
mosquitto:
  enabled: true
  image:
    repository: iegomez/mosquitto-go-auth
    tag: "3.0.0-mosquitto_2.0.18" # Pinned to stable version
    pullPolicy: IfNotPresent # Don't pull on every deployment
  # Service type: LoadBalancer (cloud) or NodePort (local dev)
  # LoadBalancer will automatically get external IP from cloud provider
  # NodePort requires manual externalHost configuration
  serviceType: ClusterIP
  ports:
    mqtt: 1883
    mqtts: 8883
    websocket: 9001
  # External host for device connections
  # - If serviceType is LoadBalancer: leave empty, will use LoadBalancer external IP
  # - If serviceType is NodePort: set to your K8s node IP (e.g., "10.27.27.160")
  # - If empty with NodePort: falls back to internal service name (devices won't connect)
  # TLS configuration
  tlsSecret: mosquitto-tls # Secret created by cert-manager
  tlsCertName: mosquitto-tls
  tlsIssuer: letsencrypt-production
  tlsCommonName: mqtt-client-{{CLIENT_ID}}.{{CLIENT_BASE_DOMAIN}}
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Authentication configuration
  auth:
    allowAnonymous: false
    hasher: bcrypt
    hasherCost: 10
    httpTimeoutSeconds: 10
    logLevel: info
    cache:
      authSeconds: 600
      aclSeconds: 600
      jitterSeconds: 30
  # Persistence for message queues
  persistence:
    enabled: true
# MQTT Broker Configuration
# Choose between local (self-hosted Mosquitto) or cloud (HiveMQ, AWS IoT Core)
mqttBroker:
  protocol: mqtt
  useInternalService: true
  host: ""
  port: 1883
  useTls: false
  verifyCertificate: false
# API service
api:
  enabled: true
  image:
    repository: iotistic/api
    tag: "{{RELEASE_VERSION}}"
    pullPolicy: IfNotPresent # Use local images only (prevents pulling from registry)
  replicas: 1 # Single replica for now
  port: 3002
  serviceType: ClusterIP
  tlsCommonName: api-client-{{CLIENT_ID}}.{{CLIENT_BASE_DOMAIN}}
  cloudApiUrl: "http://client-{{CLIENT_ID}}-iotistic-api.client-{{CLIENT_ID}}.svc.cluster.local:3002"
  # CORS configuration for cross-origin requests from dashboard
  # Use wildcard pattern like "http://*:30000" to allow any IP on NodePort 30000
  corsOrigins: "https://client-{{CLIENT_ID}}.{{CLIENT_BASE_DOMAIN}}"
  resources:
    requests:
      cpu: 100m # Reduced to fit 2-node AKS cluster capacity
      memory: 256Mi # Reduced to fit 2-node AKS cluster capacity
    limits:
      cpu: 500m # Kept for burst capacity
      memory: 1Gi # Kept for burst capacity
  # Horizontal Pod Autoscaling for dynamic fleet scaling
  autoscaling:
    enabled: false # Disabled for now
    minReplicas: 3 # Minimum pods for large fleet (100+ agents)
    maxReplicas: 10 # Scale up to 10 pods under heavy load
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    NODE_ENV: production
    LOG_LEVEL: info
    DB_POOL_SIZE: "20" # Increased for large fleet deployments (100+ agents)
    DB_IDLE_TIMEOUT_MS: "10000"
    DB_CONNECTION_TIMEOUT_MS: "15000"
    DB_STATEMENT_TIMEOUT_MS: "45000"
    DB_APPLICATION_NAME: "iotistic-api-client-{{CLIENT_ID}}"
    DB_SSL: "true"
    DB_SSL_REJECT_UNAUTHORIZED: "false"
    DB_SKIP_MIGRATIONS: "true" # Database schema pre-initialized by provisioning service
    AI_PROVIDER: "openai"
    OPENAI_BASE_URL: "https://iotistic-openai-7307.openai.azure.com"
    OPENAI_MODEL: "gpt-4o-mini"
    AZURE_OPENAI_API_VERSION: "2024-08-01-preview"
    MQTT_PERSIST_TO_DB: "true"
    MQTT_DB_SYNC_INTERVAL: "10000"
    MQTT_AUTH_CACHE_TTL_SECONDS: "300"
    MQTT_AUTH_USER_CACHE_TTL_SECONDS: "300"
    MQTT_AUTH_DENY_CACHE_TTL_SECONDS: "5"
    MQTT_AUTH_CACHE_MAX_ENTRIES: "20000"
    MQTT_AUTH_LOADER_TIMEOUT_MS: "100"
    MQTT_AUTH_USER_LOADER_TIMEOUT_MS: "500"
    MQTT_AUTH_COLD_START_TIMEOUT_MS: "500"
    MQTT_AUTH_USER_COLD_START_TIMEOUT_MS: "500"
    MQTT_AUTH_COLD_START_WINDOW_SECONDS: "30"
    MQTT_AUTH_WARMUP_USER_LIMIT: "100"
    MQTT_AUTH_CACHE_LOG_HITS: "false"
    MQTT_AUTH_SHARED_CACHE_ENABLED: "true"
    MQTT_AUTH_SHARED_CACHE_EPOCH_REFRESH_SECONDS: "2"
    MQTT_AUTH_SHARED_LOCK_ENABLED: "true"
    MQTT_AUTH_SHARED_LOCK_TIMEOUT_MS: "250"
    MQTT_AUTH_SHARED_LOCK_WAIT_TIMEOUT_MS: "125"
    MQTT_AUTH_SHARED_LOCK_POLL_INTERVAL_MS: "15"
    MQTT_MONITOR_ENABLED: "true"
    LOG_COMPRESSION: "true"
    VPN_ENABLED: "false"
    FORCE_COLOR: "1"
    VIRTUAL_AGENT_CPU_REQUEST: "50m"
    JWT_ACCESS_TOKEN_EXPIRY: "15m"
    JWT_REFRESH_TOKEN_EXPIRY: "7d"
    DISK_SPOOL_ENABLED: "true"
    DISK_SPOOL_PATH: "/tmp/iotistic-spool"
    DISK_SPOOL_MAX_SIZE_MB: "1000"
  sql:
    # Reference existing Kubernetes secret (recommended for production)
    SecretName: "sql-credentials-client-{{CLIENT_ID}}"
  dbInit:
    enabled: false
    adminSecretName: "cnpg-admin-credentials"   # billing superuser in this namespace
    pgHost: "iotistica-cnpg-cl01-rw.iotistica-cnpg-cl01.svc.cluster.local"
    pgPort: "5432"
  mqtt:
    # Reference existing Kubernetes secret (recommended for production)
    SecretName: "mqtt-credentials-client-{{CLIENT_ID}}"
  redis:
    SecretName: "redis-credentials-master"
    cluster: false # Set to true if using Redis Cluster
    tls: false # Set to true if Redis requires TLS
  openai:
    SecretName: "openai-credentials-master"
  jwt:
    SecretName: "api-jwt-client-{{CLIENT_ID}}"
  # License configuration (JWT license + public key stored in 1Password)
  license: 
    SecretName: "api-license-credentials-client-{{CLIENT_ID}}" 
  publicKey:
    SecretName: "api-license-public-key-master"
  # Prometheus metrics monitoring
  monitoring:
    enabled: true # Enable ServiceMonitor for Prometheus scraping
    interval: 30s # How often Prometheus scrapes metrics
    scrapeTimeout: 10s
    labels: {} # Additional labels for ServiceMonitor (match your Prometheus selector)
    relabelings: [] # Optional metric relabeling
# Ingestion service
ingestion:
  enabled: true
  image:
    repository: iotistic/ingestion
    tag: "{{RELEASE_VERSION}}"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3003
  serviceType: ClusterIP
  resources:
    requests:
      cpu: 300m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  spoolPersistence:
    enabled: false
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClassName: default
  streamKeyResolver:
    enabled: true
    licenseSecretName: "api-license-credentials-client-{{CLIENT_ID}}"
    licenseSecretKey: "key"
  profile: batch
  profileOverrides: {}
  runtimeEnv:
    NODE_ENV: production
    LOG_LEVEL: info
    DB_IDLE_TIMEOUT_MS: "10000"
    DB_CONNECTION_TIMEOUT_MS: "20000"
    DB_STATEMENT_TIMEOUT_MS: "45000"
    DB_APPLICATION_NAME: "iotistic-ingestion-client-{{CLIENT_ID}}"
    DB_SSL: "true"
    DB_SSL_REJECT_UNAUTHORIZED: "false"
    DISK_SPOOL_ENABLED: "true"
    DISK_SPOOL_PATH: "/var/lib/iotistic/spool"
    DISK_SPOOL_MAX_SIZE_MB: "1000"
    REDIS_PROCESSING_STREAM_MAXLEN: "100000"
  monitoring:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    relabelings: []
# Dashboard UI
dashboard:
  enabled: true
  image:
    repository: iotistic/dashboard
    tag: "{{RELEASE_VERSION}}"
    pullPolicy: IfNotPresent # Use local images only (prevents pulling from registry)
  replicas: 1
  port: 80
  serviceType: ClusterIP
  #  nodePort: 30000
  tlsCommonName: "client-{{CLIENT_ID}}.{{CLIENT_BASE_DOMAIN}}"
  #   - Set to your API ingress URL
  apiUrl: "https://api-client-{{CLIENT_ID}}.{{CLIENT_BASE_DOMAIN}}"
  
  # Auth0 Configuration (set per-customer/environment)
  auth0:
    domain: "auth.iotistica.com"  # Auth0 tenant domain
    clientId: "Q3DgGlIAoTgIhhXC7AhtJPR1ByiLXCkR"  # Auth0 Application ID
    audience: "https://{{BASE_DOMAIN}}"  # Auth0 API Identifier
    callbackUrl: "https://client-{{CLIENT_ID}}.{{CLIENT_BASE_DOMAIN}}/auth/callback"  # Redirect URI after login
    showSocialLogin: "true"  # Show social login options
  
  # Provisioning API URL (billing service for Auth0 token exchange)
  provisioningApiUrl: "https://{{BASE_DOMAIN}}/provisioning"
  
  # Website URL (for signup completion)
  websiteUrl: "https://iotistica.com"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  env:
    NODE_ENV: production

# Node-RED - Visual flow automation
nodered:
  enabled: true
  image:
    repository: iotistic/nodered
    tag: "{{RELEASE_VERSION}}"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 1880
  serviceType: ClusterIP
  # External URL for Node-RED (used for Auth0 callback and bridge token redirect)
  baseUrl: "https://nr-{{CLIENT_ID}}.{{CLIENT_BASE_DOMAIN}}"
  # Storage token for API authentication (flows stored in API database)
  storageToken:
    secretName: "api-jwt-client-{{CLIENT_ID}}"
    secretKey: "token"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    TZ: "UTC"
    NODE_RED_ENABLE_SAFE_MODE: "false"
    NODE_RED_ENABLE_PROJECTS: "false"
    NODE_RED_ENABLE_UI_AUTH: "true"
  # Auth0 Configuration (RS256 JWT validation for nr-auth plugin)
  auth0:
    domain: "auth.iotistica.com"
    audience: "https://{{BASE_DOMAIN}}"
    issuer: "https://auth.iotistica.com/"
  # Ingress configuration
  ingress:
    enabled: true
    gatewayName: "iotistica-gateway"
    gatewayNamespace: "envoy-gateway-system"

# Housekeeper service - Database maintenance and cleanup
housekeeper:
  enabled: true
  image:
    repository: iotistic/housekeeper
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3400
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  env:
    NODE_ENV: development
    LOG_LEVEL: info
    DB_POOL_MAX: "10"
    DB_IDLE_TIMEOUT: "30000"
    DB_CONNECT_TIMEOUT: "10000"
  # Scheduled task configuration
  tasks:
    # Database VACUUM - reclaim storage and update statistics
    vacuum:
      enabled: true
      schedule: "0 2 * * *" # Daily at 2 AM
    # Partition maintenance - create/drop partitions for time-series data
    partitionMaintenance:
      enabled: true
      schedule: "0 3 * * *" # Daily at 3 AM
    # Log cleanup - delete old logs based on retention policy
    logCleanup:
      enabled: true
      schedule: "0 4 * * *" # Daily at 4 AM
      retentionDays: 30
# Postoffice service - Email delivery service
postoffice:
  enabled: true
  image:
    repository: iotistic/postoffice
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3600
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    NODE_ENV: development
    REDIS_DB: "2" # Use separate Redis DB for email queue
  # Email configuration
  email:
    transport: smtp # Options: smtp, ses
    from: "noreply@iotistica.com"
    fromName: "Iotistica Platform"
    # SMTP configuration (if transport=smtp)
    smtp:
      host: "smtp.gmail.com"
      port: "587"
      secure: "false" # Use TLS
      # Credentials should be stored in Kubernetes Secret
      existingSecret: "" # Leave empty to use values below (not recommended for production)
      username: ""
      password: ""
    # AWS SES configuration (if transport=ses)
    ses:
      region: "us-east-1"
      # Credentials should be stored in Kubernetes Secret
      existingSecret: "" # Leave empty to use values below (not recommended for production)
      accessKeyId: ""
      secretAccessKey: ""
  # Queue configuration
  queue:
    concurrency: "5" # Number of concurrent email processing jobs
    maxRetry: "3" # Maximum retry attempts for failed emails
    retryDelay: "60000" # Delay between retries (ms)
  # Bull Board UI (queue monitoring)
  bullBoard:
    enabled: true
    path: "/admin/queues"
# Ingress configuration (optional for local dev)
ingress:
  enabled: false
  className: nginx
  host: iotistic.local
  tls:
    enabled: false
# Network policies
networkPolicy:
  enabled: false # Disabled for easier local development
# Resource quotas
resourceQuota:
  enabled: false # Disabled for local development
# ============================================================================
# Pre-Provisioned Fleet Namespaces
# ============================================================================
# Create fleet namespaces during customer deployment (not dynamically by API)
# This follows least-privilege principle for RBAC hardening
#
# CLUSTER CAPACITY ANALYSIS (2-node AKS):
# - Total allocatable: 3800m CPU, 6470Mi memory
# - Current usage: ~650m CPU (17%), ~4848Mi memory (76%)
# - Available: ~3150m CPU, ~1622Mi memory
#
# VIRTUAL AGENT RESOURCES (per pod with 4 protocol sidecars):
# - Agent container: 250m CPU, 256Mi memory
# - OPC-UA sidecar: 50m CPU, 128Mi memory
# - Modbus TCP sidecar: 50m CPU, 32Mi memory
# - Modbus RTU sidecar: 50m CPU, 32Mi memory
# - SNMP sidecar: 50m CPU, 32Mi memory
# - Total per pod: 450m CPU, 480Mi memory
#
# CAPACITY WITH 4 SIDECARS: 3 agents max (1622Mi / 480Mi = 3.37)
# CONFIGURED: 2 agents per namespace (conservative, leaves headroom)
#
fleetNamespaces:
  enabled: true
  namespaces:
    # Test fleet for development/testing
    - name: test
      maxAgents: 2 # 2 agents with 4 protocol sidecars each
      maxDevices: 32 # 2 agents * 16 devices each (4 protocols * 4 devices)
      fleetType: virtual
      quotaPolicy: strict
      # Calculated: 2 agents @ 500m + 4 sidecars @ 150m = 1600m CPU (+ 400m buffer = 2000m)
      cpuRequest: "600m"
      cpuLimit: "2000m" # Covers 2 agents @ 500m + 4 sidecars @ 150m = 1600m actual
      memoryRequest: "960Mi"
      memoryLimit: "4096Mi" # Covers all containers + overhead
      networkPolicy:
        enabled: true # Restrict traffic for security
    # Production fleet pool 01
    - name: pool-01
      maxAgents: 2 # Same capacity as test
      maxDevices: 32 # 2 agents * 16 devices each
      fleetType: virtual
      quotaPolicy: strict
      # Calculated: 2 agents @ 500m + 4 sidecars @ 150m = 1600m CPU (+ 400m buffer = 2000m)
      cpuRequest: "600m"
      cpuLimit: "2000m" # Covers 2 agents @ 500m + 4 sidecars @ 150m = 1600m actual
      memoryRequest: "960Mi"
      memoryLimit: "4096Mi" # Covers all containers + overhead
      networkPolicy:
        enabled: true