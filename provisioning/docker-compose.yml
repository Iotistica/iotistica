# Provisioning Service - Docker Compose for Local Development
# Supports both GitOps (Argo CD) and legacy Helm deployment modes

version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: provisioning-postgres
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing123
      POSTGRES_DB: billing
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run migrations
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # External port 6380 to avoid conflict
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  provisioning:
    build:
      context: .
      target: provisioning
    container_name: provisioning-api
    ports:
      - "3100:3100"
    environment:
      NODE_ENV: development
      PORT: 3100
      
      # URLs
      BASE_URL: ${BASE_URL:-http://localhost:3100}
      WEBSITE_URL: ${WEBSITE_URL:-http://localhost:3000}
      
      # Database
      DATABASE_URL: postgres://billing:billing123@postgres:5432/billing
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: billing
      DB_PASSWORD: billing123
      DB_NAME: billing
      
      # Redis (for deployment queue)
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_CLUSTER: ${REDIS_CLUSTER:-false}
      REDIS_TLS: ${REDIS_TLS:-false}
      REDIS_USE_TLS: ${REDIS_USE_TLS:-false}
      
      # Stripe (use your test keys)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      # Get this from: docker logs provisioning-stripe-cli (look for "Ready! Your webhook signing secret is whsec_...")
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      
      # Stripe Price IDs (create these in Stripe dashboard)
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER}
      STRIPE_PRICE_PROFESSIONAL: ${STRIPE_PRICE_PROFESSIONAL}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE}
      
      # License keys
      LICENSE_PRIVATE_KEY_PATH: /app/keys/private-key.pem
      LICENSE_PUBLIC_KEY_PATH: /app/keys/public-key.pem
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY}  # For K8s deployment injection

      # Auth0 Configuration (for callback-auth0 endpoint)
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      
      # JWT Configuration for Auth0 users
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY}

      # API Security
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}

      # Trial configuration
      DEFAULT_TRIAL_DAYS: ${DEFAULT_TRIAL_DAYS:-14}
      
      # Base configuration
      BASE_DOMAIN: ${BASE_DOMAIN:-iotistica.com}
      
      # Database Provisioning Provider (tigerdata or postgres)
      PROVISIONING_DB_PROVIDER: ${PROVISIONING_DB_PROVIDER:-tigerdata}

      # TigerData API (TimescaleDB provisioning) – used when PROVISIONING_DB_PROVIDER=tigerdata
      TIGERDATA_API_URL: ${TIGERDATA_API_URL:-https://console.cloud.timescale.com/public/api/v1}
      TIGERDATA_ACCESS_KEY: ${TIGERDATA_ACCESS_KEY}
      TIGERDATA_SECRET_KEY: ${TIGERDATA_SECRET_KEY}
      TIGERDATA_PROJECT_ID: ${TIGERDATA_PROJECT_ID}
      TIGERDATA_DEFAULT_REGION: ${TIGERDATA_DEFAULT_REGION:-us-east-1}
      TIGERDATA_DEFAULT_PLAN: ${TIGERDATA_DEFAULT_PLAN:-dev}
      SIMULATE_TIGERDATA: ${SIMULATE_TIGERDATA:-true}

      # Self-Hosted PostgreSQL Provisioning – used when PROVISIONING_DB_PROVIDER=postgres
      # Admin credentials must have CREATEDB and CREATEROLE privileges.
      # IMPORTANT: For containers, use 'postgres' (service name) and 5432 (internal port).
      # The .env file has 'localhost' and 5433 which are for external host machine access.
      PROVISIONING_PG_HOST: postgres
      PROVISIONING_PG_PORT: 5432
      PROVISIONING_PG_ADMIN_USER: billing
      PROVISIONING_PG_ADMIN_PASSWORD: billing123
      PROVISIONING_PG_ADMIN_DB: billing
      PROVISIONING_PG_TEMPLATE_DB: template_iotistica
      PROVISIONING_PG_SSL: ${PROVISIONING_PG_SSL:-false}
      PROVISIONING_PG_SSL_REJECT_UNAUTHORIZED: ${PROVISIONING_PG_SSL_REJECT_UNAUTHORIZED:-true}
      SIMULATE_POSTGRES_PROVISIONING: ${SIMULATE_POSTGRES_PROVISIONING:-false}
      
      # 1Password Secrets Automation
      ONEPASSWORD_CONNECT_TOKEN: ${ONEPASSWORD_CONNECT_TOKEN}
      ONEPASSWORD_VAULT_ID: ${ONEPASSWORD_VAULT_ID}
      SIMULATE_ONEPASSWORD: ${SIMULATE_ONEPASSWORD:-true}
      
      # GitOps Configuration (NEW)
      GITOPS_ENABLED: ${GITOPS_ENABLED:-true}
      GITOPS_REPO_URL: ${GITOPS_REPO_URL:-https://github.com/Iotistica/iot-k8s.git}
      GITOPS_REPO_DIR: /tmp/iot-k8s-main
      GITOPS_BRANCH: ${GITOPS_BRANCH:-main}
      GITOPS_PAT: ${GITOPS_PAT}  # GitHub Personal Access Token (repo scope)
      GITOPS_AUTHOR_NAME: "Iotistica provisioning Bot"
      GITOPS_AUTHOR_EMAIL: "info@iotistica.com"
      
      # Argo CD Configuration (NEW)
      ARGOCD_BASE_URL: ${ARGOCD_BASE_URL:-https://argocd.iotistica.com}
      ARGOCD_TOKEN: ${ARGOCD_TOKEN}  # Argo CD API token
      ARGOCD_NAMESPACE: ${ARGOCD_NAMESPACE:-argocd}
      ARGOCD_MAX_RETRIES: ${ARGOCD_MAX_RETRIES:-10}
      ARGOCD_RETRY_DELAY: ${ARGOCD_RETRY_DELAY:-5000}
      SKIP_ARGOCD_STATUS_CHECK: ${SKIP_ARGOCD_STATUS_CHECK:-false}
      ARGOCD_TEST_CLIENT_ID: ${ARGOCD_TEST_CLIENT_ID:-}  # For testing: use existing app (e.g., db949acf)
      
    volumes:
      - ./keys:/app/keys
      # Git repository cache (GitOps operations)
      - gitops_repo_cache:/tmp/iot-k8s-main
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Worker - Processes deployment queue jobs
  worker:
    build:
      context: .
      target: worker
    container_name: provisioning-worker
    environment:
      NODE_ENV: development
      
      # Database
      DATABASE_URL: postgres://billing:billing123@postgres:5432/billing
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: billing
      DB_PASSWORD: billing123
      DB_NAME: billing 
      
      # Redis (for deployment queue)
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_CLUSTER: ${REDIS_CLUSTER:-false}
      REDIS_TLS: ${REDIS_TLS:-false}
      REDIS_USE_TLS: ${REDIS_USE_TLS:-false}
      QUEUE_CONCURRENCY: ${QUEUE_CONCURRENCY:-3}
      QUEUE_MAX_RETRIES: ${QUEUE_MAX_RETRIES:-3}
      QUEUE_RETRY_DELAY: ${QUEUE_RETRY_DELAY:-60000}
      
      # Provisioning API URL (for fetching licenses)
      BASE_URL: http://provisioning:3100
      
      # License keys
      LICENSE_PRIVATE_KEY_PATH: /app/keys/private-key.pem
      LICENSE_PUBLIC_KEY_PATH: /app/keys/public-key.pem
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY}
      
      # Auth0 Configuration (for callback-auth0 endpoint)
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      
      # JWT Configuration for Auth0 users
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY}
      
      # API Security
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}
      
      # Base configuration
      BASE_DOMAIN: ${BASE_DOMAIN:-iotistic.com}
      
      # Database Provisioning Provider (tigerdata or postgres)
      PROVISIONING_DB_PROVIDER: ${PROVISIONING_DB_PROVIDER:-tigerdata}

      # TigerData API (TimescaleDB provisioning) – used when PROVISIONING_DB_PROVIDER=tigerdata
      TIGERDATA_API_URL: ${TIGERDATA_API_URL:-https://console.cloud.timescale.com/public/api/v1}
      TIGERDATA_ACCESS_KEY: ${TIGERDATA_ACCESS_KEY}
      TIGERDATA_SECRET_KEY: ${TIGERDATA_SECRET_KEY}
      TIGERDATA_PROJECT_ID: ${TIGERDATA_PROJECT_ID}
      TIGERDATA_DEFAULT_REGION: ${TIGERDATA_DEFAULT_REGION:-us-east-1}
      TIGERDATA_DEFAULT_PLAN: ${TIGERDATA_DEFAULT_PLAN:-dev}
      SIMULATE_TIGERDATA: ${SIMULATE_TIGERDATA:-true}

      # Self-Hosted PostgreSQL Provisioning – used when PROVISIONING_DB_PROVIDER=postgres
      # Admin credentials must have CREATEDB and CREATEROLE privileges.
      # IMPORTANT: For containers, use 'postgres' (service name) and 5432 (internal port).
      # The .env file has 'localhost' and 5433 which are for external host machine access.
      PROVISIONING_PG_HOST: postgres
      PROVISIONING_PG_PORT: 5432
      PROVISIONING_PG_ADMIN_USER: billing
      PROVISIONING_PG_ADMIN_PASSWORD: billing123
      PROVISIONING_PG_ADMIN_DB: billing
      PROVISIONING_PG_TEMPLATE_DB: template_iotistica
      PROVISIONING_PG_SSL: ${PROVISIONING_PG_SSL:-false}
      PROVISIONING_PG_SSL_REJECT_UNAUTHORIZED: ${PROVISIONING_PG_SSL_REJECT_UNAUTHORIZED:-true}
      SIMULATE_POSTGRES_PROVISIONING: ${SIMULATE_POSTGRES_PROVISIONING:-false}
      
      # 1Password Secrets Automation (using SDK)
      ONEPASSWORD_CONNECT_TOKEN: ${ONEPASSWORD_CONNECT_TOKEN}
      ONEPASSWORD_VAULT_ID: ${ONEPASSWORD_VAULT_ID}
      SIMULATE_ONEPASSWORD: ${SIMULATE_ONEPASSWORD:-true}
      
      # GitOps Configuration
      GITOPS_ENABLED: ${GITOPS_ENABLED:-true}
      GITOPS_REPO_URL: ${GITOPS_REPO_URL:-https://github.com/Iotistica/iot-k8s.git}
      GITOPS_REPO_DIR: /tmp/iot-k8s-main
      GITOPS_BRANCH: ${GITOPS_BRANCH:-main}
      GITOPS_PAT: ${GITOPS_PAT}
      GITOPS_AUTHOR_NAME: "IoTistic provisioning Bot"
      GITOPS_AUTHOR_EMAIL: "billing@iotistic.com"
      
      # Argo CD Configuration
      ARGOCD_BASE_URL: ${ARGOCD_BASE_URL:-https://argocd.iotistic.com}
      ARGOCD_TOKEN: ${ARGOCD_TOKEN}
      ARGOCD_NAMESPACE: ${ARGOCD_NAMESPACE:-argocd}
      ARGOCD_MAX_RETRIES: ${ARGOCD_MAX_RETRIES:-10}
      ARGOCD_RETRY_DELAY: ${ARGOCD_RETRY_DELAY:-5000}
      SKIP_ARGOCD_STATUS_CHECK: ${SKIP_ARGOCD_STATUS_CHECK:-false}
      ARGOCD_TEST_CLIENT_ID: ${ARGOCD_TEST_CLIENT_ID:-}  # For testing: use existing app (e.g., db949acf)
      
      # Legacy Helm deployment
      SIMULATE_K8S_DEPLOYMENT: ${SIMULATE_K8S_DEPLOYMENT:-true}
    volumes:
      - ./keys:/app/keys
      # Git repository cache (shared with API)
      - gitops_repo_cache:/tmp/iot-k8s-main
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      provisioning:
        condition: service_started

  # Stripe CLI for webhook testing
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: provisioning-stripe-cli
    command: listen --forward-to http://provisioning:3100/api/webhooks/stripe --skip-verify
    environment:
      # Set your Stripe API key
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      - provisioning
    # Note: On first run, you'll need to get the webhook signing secret
    # Run: docker logs provisioning-stripe-cli
    # Look for: "Ready! Your webhook signing secret is whsec_..." 
    # Update STRIPE_WEBHOOK_SECRET in provisioning service with this value

volumes:
  postgres_data:
  redis_data:
  gitops_repo_cache:  # Shared Git repository cache for GitOps operations
