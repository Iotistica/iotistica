# Mosquitto Secondary Broker with HA Bridge Configuration
# This broker acts as the secondary node and bridges to the primary broker

# Basic Mosquitto settings
# Use different port to avoid conflicts in docker-compose
listener 1883 0.0.0.0
protocol mqtt

listener 9001 0.0.0.0
protocol websockets

# Disable anonymous access
allow_anonymous false

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type debug

# Load Go-Auth plugin
auth_plugin /mosquitto/go-auth.so

# Backend configuration - HTTP authentication
auth_opt_backends http

# HTTP backend settings
auth_opt_http_host api
auth_opt_http_port 3002
auth_opt_http_getuser_uri /mosquitto-auth/user
auth_opt_http_superuser_uri /mosquitto-auth/superuser
auth_opt_http_aclcheck_uri /mosquitto-auth/acl

# HTTP request configuration
auth_opt_http_method POST
auth_opt_http_request_type json
auth_opt_http_response_mode status
auth_opt_http_timeout 5

# Password hashing
auth_opt_hasher bcrypt
auth_opt_hasher_cost 10

# Redis cache configuration
auth_opt_cache true
auth_opt_cache_type redis
auth_opt_cache_host redis
auth_opt_cache_port 6379
# Use DB 2 for secondary auth cache (different from primary)
auth_opt_cache_db 2
auth_opt_auth_cache_seconds 300
auth_opt_acl_cache_seconds 300
auth_opt_auth_jitter_seconds 10
auth_opt_cache_reset true
auth_opt_log_level debug
auth_opt_log_dest stdout

# ==============================================================================
# HA BRIDGE CONFIGURATION - Secondary → Primary
# ==============================================================================

# Bridge to primary broker
connection bridge-to-primary

# Address of primary broker (Docker service name)
address mosquitto:1883

# Bridge protocol version
bridge_protocol_version mqttv50

# Clean session
cleansession false

# Keep alive interval
keepalive_interval 60

# Retry interval
restart_timeout 30

# Automatic reconnection
try_private false

# Bridge authentication (uses nodered credentials to connect to primary)
remote_username nodered
remote_password secret

# Client ID for this bridge connection
remote_clientid secondary-to-primary-bridge

# Quality of Service
bridge_attempt_unsubscribe true

# Topics to bridge (same as primary for bidirectional sync)
# Format: i/{encodedTenant}/a/{encodedAgent}/{type}/...
topic i/+/a/+/endpoints/+ both 1
topic i/+/a/+/state both 1
topic i/+/a/+/agent/+ both 1
topic i/+/a/+/logs/+ both 1
topic i/+/a/+/metrics both 1
topic i/+/a/+/status both 1


# Notification settings
notifications true
notification_topic $SYS/broker/bridge/secondary

# Bridge outgoing messages
bridge_outgoing_retain true

# Don't bridge local bridge status messages (prevent loops)
bridge_max_packet_size 268435455
