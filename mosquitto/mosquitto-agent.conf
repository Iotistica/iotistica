# Dedicated Mosquitto broker for agent runtime traffic
# Keeps cloud broker configuration untouched.

listener 1883 0.0.0.0
protocol mqtt

listener 9001 0.0.0.0
protocol websockets

allow_anonymous false

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

auth_plugin /mosquitto/go-auth.so

# Use agent API for auth/ACL checks against local SQLite.
# Agent API syncs MQTT users/ACLs from target endpoints into device.sqlite.
# This provides offline auth resilience - broker uses local agent API, not cloud.
# 
# Note: Agent runs with network_mode: host, so use host.docker.internal (Docker Desktop)
# or host gateway IP (Linux). Set AGENT_API_HOST env var to override.
auth_opt_backends http
auth_opt_http_host ${AGENT_API_HOST:-host.docker.internal}
auth_opt_http_port 48484
auth_opt_http_getuser_uri /api/mqtt/auth/user
auth_opt_http_aclcheck_uri /api/mqtt/auth/acl

auth_opt_http_method GET
auth_opt_http_response_mode status
auth_opt_http_timeout 5

auth_opt_hasher bcrypt
auth_opt_hasher_cost 12

# Redis auth cache improves auth callback performance under load.
auth_opt_cache true
auth_opt_cache_type redis
auth_opt_cache_host redis
auth_opt_cache_port 6379
auth_opt_cache_db 1
auth_opt_auth_cache_seconds 300
auth_opt_acl_cache_seconds 300
auth_opt_auth_jitter_seconds 10
auth_opt_cache_reset true

auth_opt_log_level info
auth_opt_log_dest stdout
