<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modbus Simulator Control</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Modbus Simulator Control Panel</h1>
            <div class="status-bar">
                <span id="vendor-status">Vendor: {{ current_vendor }}</span>
                <span id="slaves-status">Slaves: -</span>
                <span id="overrides-status">Active Overrides: 0</span>
            </div>
        </header>

        <div class="controls-section">
            <div class="control-group">
                <label for="vendor-select">Vendor:</label>
                <select id="vendor-select">
                    {% for vendor in vendors %}
                    <option value="{{ vendor }}" {% if vendor == current_vendor %}selected{% endif %}>{{ vendor }}</option>
                    {% endfor %}
                </select>
                <button onclick="loadVendorDataPoints()">Load Data Points</button>
            </div>

            <div class="control-group">
                <label>Scenarios:</label>
                <button id="scenario-normal" onclick="applyScenario('normal')">Normal</button>
                <button id="scenario-high_load" onclick="applyScenario('high_load')">High Load</button>
                <button id="scenario-fault" onclick="applyScenario('fault')">Fault Condition</button>
                <button id="scenario-unstable" onclick="applyScenario('unstable')">Unstable</button>
                <button onclick="clearAllOverrides()" class="danger">Clear All</button>
            </div>
        </div>

        <div id="datapoints-container">
            <p class="loading">Loading data points...</p>
        </div>
    </div>

    <script>
        let currentVendor = '{{ current_vendor }}';
        let dataPoints = [];

        // Load status on page load
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const status = await response.json();
                document.getElementById('vendor-status').textContent = `Vendor: ${status.vendor}`;
                document.getElementById('slaves-status').textContent = `Slaves: ${status.slaves}`;
                document.getElementById('overrides-status').textContent = `Active Overrides: ${status.active_overrides}`;
                
                // Update slider values if overrides exist
                Object.keys(status.overrides).forEach(address => {
                    const override = status.overrides[address];
                    const baseSlider = document.getElementById(`base-${address}`);
                    const noiseSlider = document.getElementById(`noise-${address}`);
                    if (baseSlider) baseSlider.value = override.base;
                    if (noiseSlider) noiseSlider.value = (override.noise_pct * 100).toFixed(0);
                    updateDisplay(address);
                });
            } catch (error) {
                console.error('Failed to load status:', error);
            }
        }

        // Load data points for current vendor
        async function loadVendorDataPoints() {
            const vendor = document.getElementById('vendor-select').value;
            currentVendor = vendor;
            
            try {
                // Switch vendor in Modbus simulator
                const switchResponse = await fetch(`/api/vendor/switch/${vendor}`, {method: 'POST'});
                const switchResult = await switchResponse.json();
                
                if (switchResult.success) {
                    console.log(`Switched Modbus server to ${vendor}`);
                    // Show success notification
                    showNotification(`Modbus server now simulating: ${vendor}`, 'success');
                } else {
                    console.error('Failed to switch vendor:', switchResult.error);
                    showNotification(`Failed to switch: ${switchResult.error}`, 'error');
                }
                
                // Load data points for UI
                const response = await fetch(`/api/datapoints/${vendor}`);
                const data = await response.json();
                dataPoints = data.dataPoints;
                renderDataPoints(dataPoints);
                
                loadStatus();
            } catch (error) {
                console.error('Failed to load data points:', error);
                document.getElementById('datapoints-container').innerHTML = '<p class="error">Failed to load data points</p>';
            }
        }

        // Render data points controls
        function renderDataPoints(points) {
            const container = document.getElementById('datapoints-container');
            
            if (points.length === 0) {
                container.innerHTML = '<p class="warning">No data points found for this vendor</p>';
                return;
            }

            const holdingPoints = points.filter(p => p.type === 'holding');
            
            let html = '<div class="datapoints-grid">';
            
            holdingPoints.forEach(point => {
                html += `
                    <div class="datapoint-card">
                        <h3>${point.name}</h3>
                        <p class="address">Address: ${point.address} | Type: ${point.dataType}</p>
                        
                        <div class="slider-group">
                            <label>Base Value: <span id="base-value-${point.address}">100</span></label>
                            <input type="range" id="base-${point.address}" 
                                   min="0" max="500" value="100" step="1"
                                   oninput="updateDisplay(${point.address})"
                                   onchange="setOverride(${point.address})">
                        </div>
                        
                        <div class="slider-group">
                            <label>Noise: <span id="noise-value-${point.address}">5</span>%</label>
                            <input type="range" id="noise-${point.address}" 
                                   min="0" max="100" value="5" step="1"
                                   oninput="updateDisplay(${point.address})"
                                   onchange="setOverride(${point.address})">
                        </div>
                        
                        <div class="actions">
                            <button onclick="resetOverride(${point.address})" class="small">Reset</button>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        // Update display values
        function updateDisplay(address) {
            const baseSlider = document.getElementById(`base-${address}`);
            const noiseSlider = document.getElementById(`noise-${address}`);
            
            if (baseSlider) {
                document.getElementById(`base-value-${address}`).textContent = baseSlider.value;
            }
            if (noiseSlider) {
                document.getElementById(`noise-value-${address}`).textContent = noiseSlider.value;
            }
        }

        // Set override for a register
        async function setOverride(address) {
            const base = parseInt(document.getElementById(`base-${address}`).value);
            const noise_pct = parseInt(document.getElementById(`noise-${address}`).value) / 100;
            
            try {
                await fetch(`/api/overrides/${address}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({base, noise_pct})
                });
                loadStatus();
            } catch (error) {
                console.error('Failed to set override:', error);
            }
        }

        // Reset override for a register
        async function resetOverride(address) {
            try {
                await fetch(`/api/overrides/${address}`, {method: 'DELETE'});
                document.getElementById(`base-${address}`).value = 100;
                document.getElementById(`noise-${address}`).value = 5;
                updateDisplay(address);
                loadStatus();
            } catch (error) {
                console.error('Failed to reset override:', error);
            }
        }

        // Clear all overrides
        async function clearAllOverrides() {
            try {
                await fetch('/api/overrides', {method: 'DELETE'});
                // Reset all sliders
                dataPoints.forEach(point => {
                    const baseSlider = document.getElementById(`base-${point.address}`);
                    const noiseSlider = document.getElementById(`noise-${point.address}`);
                    if (baseSlider) baseSlider.value = 100;
                    if (noiseSlider) noiseSlider.value = 5;
                    updateDisplay(point.address);
                });
                loadStatus();
            } catch (error) {
                console.error('Failed to clear overrides:', error);
            }
        }

        // Apply scenario
        async function applyScenario(scenarioName) {
            try {
                const response = await fetch(`/api/scenario/${scenarioName}`, {method: 'POST'});
                const result = await response.json();
                
                if (result.success) {
                    // Update button states
                    updateScenarioButtons(scenarioName);
                    
                    // Reload to update UI with scenario values
                    loadStatus();
                    
                    showNotification(`Applied scenario: ${scenarioName}`, 'success');
                }
            } catch (error) {
                console.error('Failed to apply scenario:', error);
                showNotification(`Failed to apply scenario: ${error.message}`, 'error');
            }
        }

        // Update scenario button states
        function updateScenarioButtons(activeScenario) {
            // Remove active class from all scenario buttons
            const scenarioButtons = ['normal', 'high_load', 'fault', 'unstable'];
            scenarioButtons.forEach(scenario => {
                const button = document.getElementById(`scenario-${scenario}`);
                if (button) {
                    button.classList.remove('active');
                }
            });
            
            // Add active class to selected button
            const activeButton = document.getElementById(`scenario-${activeScenario}`);
            if (activeButton) {
                activeButton.classList.add('active');
            }
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // Auto-remove after 3 seconds
            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Auto-refresh status every 2 seconds
        setInterval(loadStatus, 2000);

        // Load on page load
        window.addEventListener('load', () => {
            loadVendorDataPoints();
            loadStatus();
        });
    </script>
</body>
</html>
