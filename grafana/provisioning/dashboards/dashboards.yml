# Grafana Dashboard Provisioning
# Auto-loads dashboard JSON files from ./grafana/dashboards directory

apiVersion: 1

providers:
  - name: 'Iotistica Dashboards'
    orgId: 1
    folder: 'Iotistica'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
