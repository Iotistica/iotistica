# Custom PostgreSQL Configuration
# This file contains additional settings for the Iotistic IoT system

# TIMESCALEDB
#------------------------------------------------------------------------------
# Preload TimescaleDB extension (REQUIRED before CREATE EXTENSION)
shared_preload_libraries = 'timescaledb'

# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------
# Listen on all network interfaces to allow external connections
listen_addresses = '*'

# LOGGING
#------------------------------------------------------------------------------
# Log connections for debugging
log_connections = on
log_disconnections = on

# PERFORMANCE
#------------------------------------------------------------------------------
# Optimize for IoT workload
shared_buffers = 128MB
max_connections = 100
