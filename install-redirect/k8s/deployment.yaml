apiVersion: apps/v1
kind: Deployment
metadata:
  name: install-redirect
  namespace: iotistica-utils
  labels:
    app: install-redirect
    component: redirector
    managed-by: iotistic
spec:
  replicas: 1  # High availability - 3 replicas across nodes
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployments
  
  selector:
    matchLabels:
      app: install-redirect
  
  template:
    metadata:
      labels:
        app: install-redirect
        component: redirector
      annotations:
        prometheus.io/scrape: "false"  # Not exposing Prometheus metrics yet
    
    spec:
      serviceAccountName: install-redirect
      
      # Affinity rules for better distribution
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - install-redirect
                topologyKey: kubernetes.io/hostname  # Spread across nodes
      
      containers:
        - name: redirector
          image: iotistic/iotistic-redirect:latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          
          # Environment from ConfigMap and Secret
          envFrom:
            - configMapRef:
                name: install-redirect-config
            - secretRef:
                name: install-redirect-secrets
          
          # Liveness probe - restart if unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe - remove from service if not ready
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          
          # Resource requests/limits
          resources:
            requests:
              cpu: 50m          # 50 millicpu
              memory: 64Mi      # 64 MB
            limits:
              cpu: 200m         # 200 millicpu (0.2 CPU)
              memory: 256Mi     # 256 MB
          
          # Security context
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          # Volume mounts for temp space
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      
      # Pod security context
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
      
      # Pod disruption budget for high availability
      terminationGracePeriodSeconds: 30
