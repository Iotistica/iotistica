apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: install-redirect
  namespace: iotistica-utils
spec:
  parentRefs:
    - name: iotistica-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - get.iotistica.com
  rules:
    - matches:
        - path:
            type: Exact
            value: /agent
        - path:
            type: Exact
            value: /agent.sha256
        - path:
            type: PathPrefix
            value: /agent/
      backendRefs:
        - name: install-redirect
          port: 80
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: X-Forwarded-Proto
                value: https
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: X-Content-Type-Options
                value: nosniff
              - name: X-Frame-Options
                value: DENY
              - name: X-XSS-Protection
                value: "1; mode=block"
              - name: Cache-Control
                value: "public, max-age=3600"