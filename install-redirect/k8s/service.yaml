apiVersion: v1
kind: Service
metadata:
  name: install-redirect
  namespace: iotistica-utils
  labels:
    app: install-redirect
    component: redirector
spec:
  type: ClusterIP  # Internal service only
  selector:
    app: install-redirect
  ports:
    - name: http
      port: 80           # Service port
      targetPort: 3000   # Container port
      protocol: TCP
