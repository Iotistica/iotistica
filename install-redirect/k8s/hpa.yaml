apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: install-redirect
  namespace: iotistic-utils
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: install-redirect
  
  minReplicas: 3    # Always have at least 3 for HA
  maxReplicas: 10   # Scale up to 10 during traffic spikes
  
  metrics:
    # Scale based on CPU usage
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # Scale up if avg CPU > 70%
    
    # Scale based on memory usage
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # Scale up if avg memory > 80%
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60  # Wait 60s before scaling down
      policies:
        - type: Percent
          value: 50                    # Remove max 50% of pods
          periodSeconds: 15
    
    scaleUp:
      stabilizationWindowSeconds: 0   # Scale up immediately
      policies:
        - type: Percent
          value: 100                   # Add up to 100% of current pods
          periodSeconds: 10
        - type: Pods
          value: 2                     # Or add 2 pods per 10s
          periodSeconds: 10
      selectPolicy: Max                # Use whichever scales up more
