# Docker Compose configuration for Cloud API and PostgreSQL backend
# 
# Usage:
#   docker-compose -f docker-compose.cloud.yml up -d
#
# This stack provides:
#   - PostgreSQL 16 database for persistent device state storage
#   - Iotistic API server with Balena-style endpoints
#
# Environment variables (configure in .env):
#   - DB_PASSWORD=<password>    # PostgreSQL password
#   - DB_PORT_EXT=5432          # External PostgreSQL port
#   - API_PORT_EXT=3002         # External API port
#   - GRAFANA_API_TOKEN=<token> # For Grafana integration

services:
    postgres:
        image: timescale/timescaledb:latest-pg16
        container_name: iotistic-postgres
        restart: unless-stopped
        environment:
            - POSTGRES_DB=${POSTGRES_DB:-iotistic}
            - POSTGRES_USER=${POSTGRES_USER:-postgres}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
        ports:
            - "5432:5432"
        volumes:
            - iotistic-pg-data:/var/lib/postgresql/data
            - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
            - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
        command: >
            postgres
            -c shared_preload_libraries=timescaledb
            -c config_file=/etc/postgresql/postgresql.conf
            -c hba_file=/etc/postgresql/pg_hba.conf
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - iotistic-net

    redis:
        image: redis:7-alpine
        container_name: iotistic-redis
        restart: unless-stopped
        command: >
            redis-server
            --maxmemory 512mb
            --maxmemory-policy allkeys-lru
            --save 60 1000
            --appendonly yes
        ports:
            - "${REDIS_PORT_EXT:-6379}:6379"
        volumes:
            - iotistic-redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 5
        networks:
            - iotistic-net
   
    api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: iotistic-api
        restart: always
        tty: true
        stdin_open: true
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        environment:
            - PORT=${PORT:-3002}
            - NODE_ENV=${NODE_ENV:-development}
            - HTTPS_ENABLED=true
            - HTTPS_PORT=3443
            - HTTPS_CERT_PATH=/app/certs/tls.crt
            - HTTPS_KEY_PATH=/app/certs/tls.key
            - HTTPS_CA_CERT_PATH=/app/certs/ca.crt
            - DB_HOST=${DB_HOST:-postgres}
            - DB_PORT=${DB_PORT:-5432}
            - DB_NAME=${DB_NAME:-iotistic}
            - DB_USER=${DB_USER:-postgres}
            - DB_PASSWORD=${DB_PASSWORD:-postgres}
            - DB_POOL_SIZE=${DB_POOL_SIZE:-20}
            - DB_SSL=${DB_SSL:-false}                      
            - DB_SSL_REJECT_UNAUTHORIZED=${DB_SSL_REJECT_UNAUTHORIZED:-false} 
            - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtts://mosquitto:8883}
            - MQTT_TLS_REJECT_UNAUTHORIZED=${MQTT_TLS_REJECT_UNAUTHORIZED:-false}
            - MQTT_USERNAME=${MQTT_USERNAME:-nodered}
            - MQTT_PASSWORD=${MQTT_PASSWORD:-secret}
            - MQTT_PERSIST_TO_DB=${MQTT_PERSIST_TO_DB:-true}
            - MQTT_DB_SYNC_INTERVAL=${MQTT_DB_SYNC_INTERVAL:-10000}
            - MQTT_MONITOR_ENABLED=${MQTT_MONITOR_ENABLED:-true}
            - USE_KEY_COMPACTION_POC=${USE_KEY_COMPACTION_POC:-true}
            - LOG_COMPRESSION=${LOG_COMPRESSION:-true}
            - LICENSE_PUBLIC_KEY=${LICENSE_PUBLIC_KEY}
            - IOTISTIC_LICENSE_KEY=${IOTISTIC_LICENSE_KEY}
            - REDIS_HOST=${REDIS_HOST:-redis}
            - REDIS_PORT=${REDIS_PORT:-6379}
            # Redis OOM Protection (Tier-1: Circuit breaker + disk spool)
            - DISK_SPOOL_ENABLED=${DISK_SPOOL_ENABLED:-false}
            - DISK_SPOOL_PATH=${DISK_SPOOL_PATH:-/var/lib/iotistic/spool}
            - DISK_SPOOL_MAX_SIZE_MB=${DISK_SPOOL_MAX_SIZE_MB:-1000}
            # Redis OOM Protection (Tier-2: Stream MAXLEN limits)
            - REDIS_INGESTION_STREAM_MAXLEN=${REDIS_INGESTION_STREAM_MAXLEN:-10000}
            - REDIS_PROCESSING_STREAM_MAXLEN=${REDIS_PROCESSING_STREAM_MAXLEN:-100000}
            - REDIS_DLQ_MAXLEN=${REDIS_DLQ_MAXLEN:-1000}
            - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
            - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
            - NEO4J_PASSWORD=${NEO4J_PASSWORD:-iotistic123}
            - MODBUS_TCP_HOST=${MODBUS_TCP_HOST:-iotistic-modbus-sim}
            - TAILSCALE_ENABLED=false
            - MQTT_MONITOR_URL=${MQTT_MONITOR_URL:-http://mqtt-monitor:3500}
            - POSTOFFICE_URL=${POSTOFFICE_URL:-http://postoffice:3300}
            # Virtual Agent K8s Configuration (local Docker Desktop)
            - KUBECONFIG=/home/appuser/.kube/config
            - VIRTUAL_AGENT_NAMESPACE=${VIRTUAL_AGENT_NAMESPACE:-virtual-agents}
            - AGENT_IMAGE=${AGENT_IMAGE:-iotistic/agent:latest}
            # Use host.docker.internal for K8s pods to reach Docker Compose services
            - CLOUD_API_URL=${CLOUD_API_URL:-http://host.docker.internal:4002}
            # Note: Agent expects CLOUD_API_ENDPOINT, but deployer reads CLOUD_API_URL and passes as CLOUD_API_ENDPOINT
            - MQTT_BROKER_URL_VIRTUAL=${MQTT_BROKER_URL_VIRTUAL:-mqtt://host.docker.internal:5883}
        ports:
            - "${API_PORT_EXT:-4002}:3002"
            - "3443:3443"
        volumes:
            - ./certs:/app/certs:ro
            - iotistic-api-spool:/var/lib/iotistic/spool  # Persistent disk spool for circuit breaker
            # Mount kubeconfig for local K8s access (accessible by appuser)
            - ${USERPROFILE}/.kube:/home/appuser/.kube:ro
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - iotistic-net
    mosquitto:
        image: iegomez/mosquitto-go-auth
        restart: unless-stopped
        container_name: iotistic-mosquitto
        ports:
          # TLS Ports (enabled - self-signed certificates)
          # Note: Avoiding Windows Hyper-V reserved ranges (8825-9124)
          - "${MOSQUITTO_TLS_PORT_EXT:-58883}:8883"   # MQTTS (TLS) - native MQTT (external: 58883)
          - "${MOSQUITTO_WSS_PORT_EXT:-59002}:9002"   # WebSocket TLS (external: 59002)
          # Non-TLS port for testing
          - "${MOSQUITTO_PORT_EXT:-5883}:1883"        # MQTT (non-TLS)
        volumes:
          - ./mosquitto/mosquitto-tls.conf:/etc/mosquitto/mosquitto.conf
          - ./mosquitto/certs:/mosquitto/certs
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "timeout 5 mosquitto_sub -h localhost -p 1883 -u ${MQTT_USERNAME:-nodered} -P ${MQTT_PASSWORD:-secret} -t '$$SYS/#' -C 1 || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        networks:
            - iotistic-net
    

