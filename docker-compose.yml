    # Protocol Simulators for Testing
    modbus-sim:
        build:
            context: ./sensors/modbus-simulator
            dockerfile: Dockerfile
        container_name: modbus-sim
        restart: unless-stopped
        environment:
          - MODBUS_PROFILE=Generic
          - MODBUS_API_URL=http://api:3002
          - API_TOKEN=${API_TOKEN:-}
          - GUI_PORT=5000
          - GUI_HOST=0.0.0.0
        ports:
            - "502:502"
            - "5001:5000"  # Web GUI: http://localhost:5001
        depends_on:
            api:
                condition: service_healthy
        networks:
            - iotistic-net
        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "2"
 
    opcua-simulator:
        build:
            context: ./sensors/opcua-simulator
            dockerfile: Dockerfile
        container_name: iotistic-opcua-sim
        restart: unless-stopped
        command: sh -c "python web_gui.py & python opcua_simulator.py"
        environment:
            - PROFILE=${PROFILE:-factory}
            - OPCUA_API_URL=http://api:3002
            - WEB_PORT=5002
        ports:
            - "4840:4840"     # OPC UA server
            - "5002:5002"     # Web GUI
        networks:
            - iotistic-net

        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "2"
    bacnet-sim:
        build:
            context: ./sensors/bacnet-simulator
            dockerfile: Dockerfile
        container_name: bacnet-sim
        restart: unless-stopped
        # Bridge network with port mapping - accessible from Windows host IP
        ports:
            - "47808:47808/udp"
        environment:
            - BACPYPES_IFACE=0.0.0.0:47808/24  # Bind to all interfaces on port 47808
        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "2"
        networks:
            - iotistic-net

    mqtt-monitor:
        build:
            context: ./mqtt-monitor
            dockerfile: Dockerfile
        container_name: iotistic-mqtt-monitor
        restart: unless-stopped
        ports:
            - "${MQTT_MONITOR_PORT_EXT:-3500}:3500"  # Exposed for testing
        environment:
            - NODE_ENV=${NODE_ENV:-development}
            - PORT=3500
            - HOST=0.0.0.0
            - LOG_LEVEL=${MQTT_MONITOR_LOG_LEVEL:-info}
            - DB_HOST=${DB_HOST:-postgres}
            - DB_PORT=${DB_PORT:-5432}
            - DB_NAME=${DB_NAME:-iotistic}
            - DB_USER=${DB_USER:-postgres}
            - DB_PASSWORD=${DB_PASSWORD:-postgres}
            - DB_POOL_SIZE=10
            - MQTT_BROKER_URL=mqtt://mosquitto:1883
            - MQTT_TLS_REJECT_UNAUTHORIZED=${MQTT_TLS_REJECT_UNAUTHORIZED:-false}
            - MQTT_USERNAME=${MQTT_USERNAME:-nodered}
            - MQTT_PASSWORD=${MQTT_PASSWORD:-secret}
            - MQTT_PERSIST_DB=${MQTT_PERSIST_DB:-true}
            - MQTT_DB_SYNC_INTERVAL=${MQTT_DB_SYNC_INTERVAL:-30000}
            - MQTT_METRICS_UPDATE_INTERVAL=${MQTT_METRICS_UPDATE_INTERVAL:-5000}
            - MQTT_TOPIC_TREE_UPDATE_INTERVAL=${MQTT_TOPIC_TREE_UPDATE_INTERVAL:-5000}
            - MQTT_MAX_PAYLOAD_BYTES=${MQTT_MAX_PAYLOAD_BYTES:-65536}
        depends_on:
            postgres:
                condition: service_healthy
            mosquitto:
                condition: service_started
        networks:
            - iotistic-net
        healthcheck:
            test: ["CMD", "node", "-e", "require('http').get('http://localhost:3500/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    postoffice:
        build:
            context: ./postoffice
            dockerfile: Dockerfile
        container_name: iotistic-postoffice
        restart: unless-stopped
        expose:
            - "3300"  # Internal only, accessed via API gateway
        environment:
            - NODE_ENV=${NODE_ENV:-development}
            - PORT=3300
            - HOST=0.0.0.0
            - EMAIL_ENABLED=${EMAIL_ENABLED:-true}
            - EMAIL_FROM=${EMAIL_FROM:-"Iotistic Platform <noreply@iotistic.ca>"}
            - EMAIL_DEBUG=${EMAIL_DEBUG:-false}
            - BASE_URL=${BASE_URL:-https://iotistic.ca}
            - SMTP_HOST=${SMTP_HOST}
            - SMTP_PORT=${SMTP_PORT:-587}
            - SMTP_SECURE=${SMTP_SECURE:-false}
            - SMTP_USER=${SMTP_USER}
            - SMTP_PASS=${SMTP_PASS}
            - REDIS_HOST=${REDIS_HOST:-redis}
            - REDIS_PORT=${REDIS_PORT:-6379}
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - DB_HOST=${DB_HOST:-postgres}
            - DB_PORT=${DB_PORT:-5432}
            - DB_NAME=${DB_NAME:-iotistic}
            - DB_USER=${DB_USER:-postgres}
            - DB_PASSWORD=${DB_PASSWORD:-postgres}
            - LOG_LEVEL=${POSTOFFICE_LOG_LEVEL:-info}
        depends_on:
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        networks:
            - iotistic-net
        healthcheck:
            test: ["CMD", "node", "-e", "require('http').get('http://localhost:3300/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
