                condition: service_healthy
            mosquitto:
                condition: service_healthy
        networks:
            - iotistic-net
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:1880"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s
        logging:
