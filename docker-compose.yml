    redis:
        image: redis:7-alpine
        container_name: iotistic-redis
        restart: unless-stopped
        command: >
            redis-server
            --maxmemory 512mb
            --maxmemory-policy allkeys-lru
            --save 60 1000
            --appendonly yes
        ports:
            - "${REDIS_PORT_EXT:-6379}:6379"
        volumes:
            - iotistic-redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 5
        networks:
            - iotistic-net
   
    api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: iotistic-api
        restart: always
        tty: true
        stdin_open: true
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        environment:
            - PORT=${PORT:-3002}
            - NODE_ENV=${NODE_ENV:-development}
            # JWT Authentication (REQUIRED for all authenticated endpoints)
            - JWT_SECRET=${JWT_SECRET:-your-secret-change-this-in-production}
            - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY:-15m}
            - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY:-7d}
            - HTTPS_ENABLED=true
            - HTTPS_PORT=3443
            - HTTPS_CERT_PATH=/app/certs/tls.crt
            - HTTPS_KEY_PATH=/app/certs/tls.key
            - HTTPS_CA_CERT_PATH=/app/certs/ca.crt
            # TigerData Cloud TimescaleDB Configuration
            - DB_HOST=${DB_HOST:-bg4k3yxway.pcwz234dvp.tsdb.cloud.timescale.com}
            - DB_PORT=${DB_PORT:-30692}
            - DB_NAME=${DB_NAME:-tsdb}
            - DB_USER=${DB_USER:-tsdbadmin}
            - DB_PASSWORD=${DB_PASSWORD:-w2qm8tm693xd3b9v}
            - DB_POOL_SIZE=${DB_POOL_SIZE:-20}
            - DB_SSL=${DB_SSL:-true}
            - DB_SSL_REJECT_UNAUTHORIZED=${DB_SSL_REJECT_UNAUTHORIZED:-false} 
            #- MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtts://mosquitto:8883}
            - MQTT_TLS_REJECT_UNAUTHORIZED=${MQTT_TLS_REJECT_UNAUTHORIZED:-false}
            - MQTT_USERNAME=${MQTT_USERNAME:-nodered}
            - MQTT_PASSWORD=${MQTT_PASSWORD:-secret}
            - MQTT_PERSIST_TO_DB=${MQTT_PERSIST_TO_DB:-true}
            - MQTT_DB_SYNC_INTERVAL=${MQTT_DB_SYNC_INTERVAL:-10000}
            - MQTT_MONITOR_ENABLED=${MQTT_MONITOR_ENABLED:-true}
            - USE_KEY_COMPACTION_POC=${USE_KEY_COMPACTION_POC:-true}
            - LOG_COMPRESSION=${LOG_COMPRESSION:-true}
            # AI Assistant configuration
            # Providers: ollama (local, free) | openai (cloud, paid)
            # Azure OpenAI: Set AI_PROVIDER=openai, OPENAI_BASE_URL=https://<resource>.openai.azure.com/openai/deployments/<deployment>
            - AI_PROVIDER=${AI_PROVIDER:-ollama}
            # Ollama settings (local LLM - memory intensive)
            - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
            - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
            # OpenAI/Azure OpenAI settings
            - OPENAI_API_KEY=${OPENAI_API_KEY:-}
            - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}  # For Azure: https://<resource>.openai.azure.com/openai/deployments/<deployment>
            - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}  # For Azure: use deployment name
            - LICENSE_PUBLIC_KEY=${LICENSE_PUBLIC_KEY}
            - IOTISTIC_LICENSE_KEY=${IOTISTIC_LICENSE_KEY}
            - REDIS_HOST=${REDIS_HOST:-redis}
            - REDIS_PORT=${REDIS_PORT:-6379}
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - REDIS_USERNAME=${REDIS_USERNAME}
            - REDIS_CLUSTER=${REDIS_CLUSTER}
            - REDIS_TLS=${REDIS_TLS}
            - REDIS_USE_TLS=${REDIS_USE_TLS}
            - REDIS_TLS_ENABLED=${REDIS_TLS_ENABLED}
            - REDIS_TLS_SERVERNAME=${REDIS_TLS_SERVERNAME}
            # Redis OOM Protection (Tier-1: Circuit breaker + disk spool)
            - DISK_SPOOL_ENABLED=${DISK_SPOOL_ENABLED:-false}
            - DISK_SPOOL_PATH=${DISK_SPOOL_PATH:-/var/lib/iotistic/spool}
            - DISK_SPOOL_MAX_SIZE_MB=${DISK_SPOOL_MAX_SIZE_MB:-1000}
            # Redis OOM Protection (Tier-2: Stream MAXLEN limits)
            - REDIS_INGESTION_STREAM_MAXLEN=${REDIS_INGESTION_STREAM_MAXLEN:-10000}
            - REDIS_PROCESSING_STREAM_MAXLEN=${REDIS_PROCESSING_STREAM_MAXLEN:-100000}
            - REDIS_DLQ_MAXLEN=${REDIS_DLQ_MAXLEN:-1000}
            - MODBUS_TCP_HOST=${MODBUS_TCP_HOST:-iotistic-modbus-sim}
            - TAILSCALE_ENABLED=false
            - MQTT_MONITOR_URL=${MQTT_MONITOR_URL:-http://mqtt-monitor:3500}
            - POSTOFFICE_URL=${POSTOFFICE_URL:-http://postoffice:3300}
            # Virtual Agent K8s Configuration (local Docker Desktop)
            - KUBECONFIG=/home/appuser/.kube/config
            - VIRTUAL_AGENT_NAMESPACE=${VIRTUAL_AGENT_NAMESPACE:-virtual-agents}
            - AGENT_IMAGE=${AGENT_IMAGE:-iotistic/agent:latest}
            # Use host.docker.internal for K8s pods to reach Docker Compose services
            - CLOUD_API_URL=${CLOUD_API_URL:-http://host.docker.internal:4002}
            # Note: Agent expects CLOUD_API_ENDPOINT, but deployer reads CLOUD_API_URL and passes as CLOUD_API_ENDPOINT
            - MQTT_BROKER_URL_VIRTUAL=${MQTT_BROKER_URL_VIRTUAL:-mqtt://host.docker.internal:5883}
        ports:
            - "${API_PORT_EXT:-4002}:3002"
            - "3443:3443"
        volumes:
            - ./certs:/app/certs:ro
            - iotistic-api-spool:/var/lib/iotistic/spool  # Persistent disk spool for circuit breaker
            # Mount kubeconfig for local K8s access (accessible by appuser)
            - ${USERPROFILE}/.kube:/home/appuser/.kube:ro
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        depends_on:
            redis:
                condition: service_healthy
      
        networks:
            - iotistic-net

    housekeeper:
        build:
            context: ./housekeeper
            dockerfile: Dockerfile
        container_name: iotistic-housekeeper
        restart: unless-stopped
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        environment:
            - PORT=${HOUSEKEEPER_PORT:-3400}
            - NODE_ENV=${NODE_ENV:-development}
            - LOG_LEVEL=${LOG_LEVEL:-info}
            # TigerData Cloud TimescaleDB Configuration
            - DB_HOST=${DB_HOST:-bg4k3yxway.pcwz234dvp.tsdb.cloud.timescale.com}
            - DB_PORT=${DB_PORT:-30692}
            - DB_NAME=${DB_NAME:-tsdb}
            - DB_USER=${DB_USER:-tsdbadmin}
            - DB_PASSWORD=${DB_PASSWORD:-w2qm8tm693xd3b9v}
            - DB_POOL_MAX=${DB_POOL_MAX:-10}
            - DB_IDLE_TIMEOUT=${DB_IDLE_TIMEOUT:-30000}
            - DB_CONNECT_TIMEOUT=${DB_CONNECT_TIMEOUT:-10000}
            # Task configuration
            - EVENTS_RETENTION_DAYS=${EVENTS_RETENTION_DAYS:-90}
            - DEVICE_LOGS_RETENTION_DAYS=${DEVICE_LOGS_RETENTION_DAYS:-30}
        ports:
            - "${HOUSEKEEPER_PORT_EXT:-3400}:3400"
        healthcheck:
            test: ["CMD", "node", "-e", "require('http').get('http://localhost:3400/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        networks:
            - iotistic-net

