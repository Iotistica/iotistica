  test-agent-systemd:
    name: Test Systemd Installation (via install.sh)
    needs: [version]
    runs-on: [iotistic-lab-sc]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean build artifacts and installation directories
        run: |
          echo "Cleaning any stale build artifacts from repository..."
          rm -rf agent/dist
          rm -rf agent/node_modules
          
          echo "Cleaning any previous installations..."
          sudo rm -rf /opt/iotistic/agent
          sudo rm -rf /var/lib/iotistic/agent
          sudo rm -rf /etc/iotistic
          
          echo "✓ All artifacts and installations cleaned"

      - name: Make install script executable
        run: chmod +x agent/bin/install.sh

      - name: Run unified installation script (Systemd method)
        env:
          CI: true
          IOTISTIC_INSTALL_METHOD: systemd
          IOTISTIC_AGENT_VERSION: ${{ needs.version.outputs.package_version }}
          IOTISTIC_DEVICE_PORT: 48484
          CLOUD_API_ENDPOINT: ''
          PROVISIONING_KEY: ''
    
        run: |
          echo "Testing unified installation script with Systemd method..."
          sudo -E bash agent/bin/install.sh

      - name: Check systemd service status
        run: |
          echo "Checking systemd service status..."
          sudo systemctl status iotistic-agent --no-pager || true
          
          echo ""
          echo "========================================="
          echo "Agent Startup Logs:"
          echo "========================================="
          sudo journalctl -u iotistic-agent -n 50 --no-pager
          
          if sudo systemctl is-active --quiet iotistic-agent; then
            echo "✓ Agent service is running"
          else
            echo "✗ Agent service is not running"
            echo ""
            echo "========================================="
            echo "Full Error Logs:"
            echo "========================================="
            sudo journalctl -u iotistic-agent -n 200 --no-pager
            exit 1
          fi

      - name: Check agent logs
        run: |
          echo "Agent Logs (journald):"
          sudo journalctl -u iotistic-agent -n 100 --no-pager
          
          echo ""
          echo "Checking for errors in logs..."
          if sudo journalctl -u iotistic-agent -n 100 --no-pager | grep -qi "error"; then
            echo "⚠ Errors found in logs"
          else
            echo "✓ No errors found"
          fi

      - name: Test agent API
        run: |
          echo "Testing agent API..."
          
          if curl -f http://localhost:48484/v1/healthy 2>/dev/null || \
             curl -f http://localhost:48484/ping 2>/dev/null; then
            echo "✓ Agent API is responding"
          else
            echo "⚠ Agent API not responding"
            sudo journalctl -u iotistic-agent -n 50 --no-pager
          fi

      - name: Show agent logs
        if: always()
        run: |
          echo "========================================="
          echo "Agent Logs (journald):"
          echo "========================================="
          sudo journalctl -u iotistic-agent -n 200 --no-pager

      - name: Generate systemd test summary
        if: always()
        run: |
          echo "# Agent Systemd Installation Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Installation" >> $GITHUB_STEP_SUMMARY
          echo "- **Location**: \`/opt/iotistic/agent\`" >> $GITHUB_STEP_SUMMARY
          echo "- **User**: \`iotistic\` (non-root)" >> $GITHUB_STEP_SUMMARY
          echo "- **Process Manager**: systemd" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Add device configuration if available
          if [ -n "${{ env.DEVICE_UUID }}" ]; then
            echo "## Device Configuration" >> $GITHUB_STEP_SUMMARY
            echo "- **Device UUID**: \`${{ env.DEVICE_UUID }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Device Name**: \`${{ env.DEVICE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Device Type**: \`${{ env.DEVICE_TYPE }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Agent Version**: \`${{ env.AGENT_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Provisioned**: \`${{ env.PROVISIONED }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Full Device Configuration (JSON)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            echo '${{ env.DEVICE_CONFIG }}' | jq '.' >> $GITHUB_STEP_SUMMARY || echo '${{ env.DEVICE_CONFIG }}' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "## Tests Performed" >> $GITHUB_STEP_SUMMARY
          echo "1. System dependencies installation (SQLite, Docker, etc.)" >> $GITHUB_STEP_SUMMARY
          echo "2. Agent build and installation" >> $GITHUB_STEP_SUMMARY
          echo "3. Systemd service configuration and hardening" >> $GITHUB_STEP_SUMMARY
          echo "4. Journald log limits configuration" >> $GITHUB_STEP_SUMMARY
          echo "5. Process startup and status check" >> $GITHUB_STEP_SUMMARY
          echo "6. API health verification" >> $GITHUB_STEP_SUMMARY
          echo "7. Configuration file permissions verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Agent running with systemd validated successfully!" >> $GITHUB_STEP_SUMMARY

  upload-install-scripts:
    name: Upload Installation Scripts
    needs: [version,  test-agent-systemd]
    runs-on: [iotistic-lab-sc]
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable blob versioning (if not already enabled)
        run: |
          # Check if versioning is already enabled
          VERSIONING_ENABLED=$(az storage account blob-service-properties show \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --query 'isVersioningEnabled' -o tsv 2>/dev/null || echo "false")
          
          if [ "$VERSIONING_ENABLED" != "true" ]; then
            echo "Enabling blob versioning on storage account..."
            az storage account blob-service-properties update \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
              --enable-versioning true
            echo "✓ Blob versioning enabled"
          else
            echo "✓ Blob versioning already enabled"
          fi

      - name: Prepare versioned scripts
        run: |
          # Create temporary directory for versioned scripts
          mkdir -p /tmp/iotistic-scripts
          
          # Replace version placeholder in install.sh (unified script)
          sed "s/AGENT_VERSION_PLACEHOLDER/${{ needs.version.outputs.package_version }}/g" \
            agent/bin/install.sh > /tmp/iotistic-scripts/install.sh
          
          echo "✓ Prepared unified install.sh with version ${{ needs.version.outputs.package_version }}"

      - name: Prepare agent tarball
        run: |
          echo "Building agent tarball for distribution..."
          cd agent
          
          # Install dependencies and build
          npm ci --legacy-peer-deps
          npm run build
          
          # Create tarball with necessary files
          mkdir -p /tmp/iotistic-artifacts
          tar -czf /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            node_modules/ \
            bin/
          
          # Note: dist/ already contains migrations from npm run build (which runs copy:migrations)
          # So we don't need to include src/db/migrations/ separately
          
          # Also create a 'latest' version
          cp /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}.tar.gz \
             /tmp/iotistic-artifacts/agent-latest.tar.gz
          
          echo "✓ Created agent tarballs:"
          ls -lh /tmp/iotistic-artifacts/

      - name: Generate checksums
        run: |
          # Install script checksums
          cd /tmp/iotistic-scripts
          sha256sum install.sh > install.sh.sha256
          
          echo "✓ Generated install script checksum:"
          cat install.sh.sha256
          
          # Agent tarball checksums
          cd /tmp/iotistic-artifacts
          sha256sum agent-${{ needs.version.outputs.package_version }}.tar.gz > agent-${{ needs.version.outputs.package_version }}.tar.gz.sha256
          sha256sum agent-latest.tar.gz > agent-latest.tar.gz.sha256
          
          echo "✓ Generated tarball checksums:"
          cat agent-${{ needs.version.outputs.package_version }}.tar.gz.sha256
          cat agent-latest.tar.gz.sha256

      - name: Upload install.sh (latest)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/install \
            --file /tmp/iotistic-scripts/install.sh \
            --overwrite true \
            --content-type application/x-sh \
            --content-disposition "attachment; filename=install"
          
          echo "✓ Uploaded agent/install (latest, unified script)"

      - name: Upload install.sh checksum (latest)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/install.sha256 \
            --file /tmp/iotistic-scripts/install.sh.sha256 \
            --overwrite true \
            --content-type text/plain \
            --content-disposition "inline; filename=install.sha256"
          
          echo "✓ Uploaded agent/install.sha256"

      - name: Upload install.sh (versioned)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/versions/install-${{ needs.version.outputs.package_version }}.sh \
            --file /tmp/iotistic-scripts/install.sh \
            --overwrite true \
            --content-type application/x-sh \
            --content-disposition "attachment; filename=install-${{ needs.version.outputs.package_version }}.sh"
          
          echo "✓ Uploaded agent/versions/install-${{ needs.version.outputs.package_version }}.sh"

      - name: Upload install.sh checksum (versioned)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/versions/install-${{ needs.version.outputs.package_version }}.sh.sha256 \
            --file /tmp/iotistic-scripts/install.sh.sha256 \
            --overwrite true \
            --content-type text/plain \
            --content-disposition "inline; filename=install-${{ needs.version.outputs.package_version }}.sh.sha256"
          
          echo "✓ Uploaded agent/versions/install-${{ needs.version.outputs.package_version }}.sh.sha256"

      - name: Upload agent tarball (latest)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest.tar.gz \
            --file /tmp/iotistic-artifacts/agent-latest.tar.gz \
            --overwrite true \
            --content-type application/gzip \
            --content-disposition "attachment; filename=agent-latest.tar.gz"
          
          echo "✓ Uploaded agent/agent-latest.tar.gz"

      - name: Upload agent tarball checksum (latest)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest.tar.gz.sha256 \
            --file /tmp/iotistic-artifacts/agent-latest.tar.gz.sha256 \
            --overwrite true \
            --content-type text/plain \
            --content-disposition "inline; filename=agent-latest.tar.gz.sha256"
          
          echo "✓ Uploaded agent/agent-latest.tar.gz.sha256"

      - name: Upload agent tarball (versioned)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/versions/agent-${{ needs.version.outputs.package_version }}.tar.gz \
            --file /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}.tar.gz \
            --overwrite true \
            --content-type application/gzip \
            --content-disposition "attachment; filename=agent-${{ needs.version.outputs.package_version }}.tar.gz"
          
          echo "✓ Uploaded agent/versions/agent-${{ needs.version.outputs.package_version }}.tar.gz"

      - name: Upload agent tarball checksum (versioned)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/versions/agent-${{ needs.version.outputs.package_version }}.tar.gz.sha256 \
            --file /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}.tar.gz.sha256 \
            --overwrite true \
            --content-type text/plain \
            --content-disposition "inline; filename=agent-${{ needs.version.outputs.package_version }}.tar.gz.sha256"
          
          echo "✓ Uploaded agent/versions/agent-${{ needs.version.outputs.package_version }}.tar.gz.sha256"

      - name: Generate upload summary
        run: |
          echo "# Installation Script Uploaded (Unified)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts Uploaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Agent Tarball" >> $GITHUB_STEP_SUMMARY
          echo "- [agent-latest.tar.gz](https://apps.iotistica.com/agent/agent-latest.tar.gz) - [checksum](https://apps.iotistica.com/agent/agent-latest.tar.gz.sha256)" >> $GITHUB_STEP_SUMMARY
          echo "- [agent-${{ needs.version.outputs.package_version }}.tar.gz](https://apps.iotistica.com/agent/versions/agent-${{ needs.version.outputs.package_version }}.tar.gz) - [checksum](https://apps.iotistica.com/agent/versions/agent-${{ needs.version.outputs.package_version }}.tar.gz.sha256)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Quick Install (Recommended)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Auto-detect Installation Method" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "curl -sfL https://apps.iotistica.com/agent/install | sh" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The script will:" >> $GITHUB_STEP_SUMMARY
          echo "- Auto-detect Docker installation (uses Docker if available)" >> $GITHUB_STEP_SUMMARY
          echo "- Fallback to Systemd if Docker not found" >> $GITHUB_STEP_SUMMARY
          echo "- In interactive mode, prompts user to choose method" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Force Docker Installation" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "curl -sfL https://apps.iotistic.ca/agent/install | IOTISTIC_INSTALL_METHOD=docker sh" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Force Systemd Installation" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "curl -sfL https://apps.iotistic.ca/agent/install | IOTISTIC_INSTALL_METHOD=systemd sh" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Verified Install (with SHA256 checksum)" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Download script and checksum" >> $GITHUB_STEP_SUMMARY
          echo "curl -sfL https://apps.iotistic.ca/agent/install -o install.sh" >> $GITHUB_STEP_SUMMARY
          echo "curl -sfL https://apps.iotistic.ca/agent/install.sha256 -o install.sha256" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Verify checksum" >> $GITHUB_STEP_SUMMARY
          echo "sha256sum -c install.sha256" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Run if verification passes (auto-detect method)" >> $GITHUB_STEP_SUMMARY
          echo "sudo bash install.sh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Or force specific method:" >> $GITHUB_STEP_SUMMARY
          echo "sudo IOTISTIC_INSTALL_METHOD=docker bash install.sh" >> $GITHUB_STEP_SUMMARY
          echo "sudo IOTISTIC_INSTALL_METHOD=systemd bash install.sh" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Version ${{ needs.version.outputs.package_version }} Script" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "curl -sfL https://apps.iotistic.ca/agent/versions/install-${{ needs.version.outputs.package_version }}.sh | sh" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Environment Variables" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The unified script supports:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`IOTISTIC_INSTALL_METHOD\`: 'docker' or 'systemd' (auto-detect if not set)" >> $GITHUB_STEP_SUMMARY
          echo "- \`IOTISTIC_CLOUD_API_ENDPOINT\`: Cloud API URL" >> $GITHUB_STEP_SUMMARY
          echo "- \`IOTISTIC_PROVISIONING_KEY\`: Provisioning API key" >> $GITHUB_STEP_SUMMARY
          echo "- \`IOTISTIC_DEVICE_PORT\`: Device API port (default: 48484)" >> $GITHUB_STEP_SUMMARY
          echo "- \`IOTISTIC_AGENT_VERSION\`: Specific version" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Example:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "export IOTISTIC_INSTALL_METHOD=docker" >> $GITHUB_STEP_SUMMARY
          echo "export IOTISTIC_CLOUD_API_ENDPOINT=https://api.iotistic.ca" >> $GITHUB_STEP_SUMMARY
          echo "export IOTISTIC_PROVISIONING_KEY=your-key" >> $GITHUB_STEP_SUMMARY
          echo "curl -sfL https://apps.iotistic.ca/agent/install | sudo -E sh" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Unified installation script uploaded with SHA256 checksum" >> $GITHUB_STEP_SUMMARY

  report:
    name: Generate Reports
    needs: [version,  test-agent-systemd, upload-install-scripts]
    runs-on: [iotistic-lab-sc]
    if: success() && needs.version.outputs.package_version != ''
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "Generating changelog from $PREV_TAG to HEAD"
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Save to file
          echo "$COMMITS" > changelog.txt
          
          # Save first 20 lines for summary
          echo "$COMMITS" | head -20 > changelog_summary.txt

      - name: Get Docker image size
        id: image_size
        run: |
          # Login to Docker Hub to pull the image
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Pull the image
          docker pull iotistic/agent:${{ needs.version.outputs.package_version }}
          
          # Get image size
          SIZE_BYTES=$(docker image inspect iotistic/agent:${{ needs.version.outputs.package_version }} --format='{{.Size}}')
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1024 / 1024" | bc)
          
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
          
          # Get layer count
          LAYERS=$(docker image inspect iotistic/agent:${{ needs.version.outputs.package_version }} --format='{{len .RootFS.Layers}}')
          echo "layers=$LAYERS" >> $GITHUB_OUTPUT

      - name: Generate Summary Report
        run: |
          echo "# Build & Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Version Information" >> $GITHUB_STEP_SUMMARY
          echo "**$Version:** \`${{ needs.version.outputs.package_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ steps.image_size.outputs.size_mb }} MB" >> $GITHUB_STEP_SUMMARY
          echo "**Layers:** ${{ steps.image_size.outputs.layers }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/agent:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/agent:${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/agent:${{ needs.version.outputs.package_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Changelog" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat changelog_summary.txt >> $GITHUB_STEP_SUMMARY
          
          TOTAL_COMMITS=$(wc -l < changelog.txt)
          SHOWN_COMMITS=$(wc -l < changelog_summary.txt)
          if [ $TOTAL_COMMITS -gt $SHOWN_COMMITS ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_...and $((TOTAL_COMMITS - SHOWN_COMMITS)) more commits_" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Workflow Status" >> $GITHUB_STEP_SUMMARY
          echo "All jobs completed successfully! 🎉" >> $GITHUB_STEP_SUMMARY

  trigger-integration-tests:
    name: Trigger Integration Tests
    needs: [version,  test-agent-systemd, upload-install-scripts]
    runs-on: [iotistic-lab-sc]
    permissions:
      actions: write
      contents: read
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - name: Trigger integration tests
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'integration-tests.yml',
              ref: 'master',
              inputs: {
                agent_version: '${{ needs.version.outputs.package_version }}'
              }
            });
            
            console.log('Integration tests triggered with agent version: ${{ needs.version.outputs.package_version }}');

  cleanup:
      name: Clean up
      runs-on: [iotistic-lab-sc]
      needs: [upload-install-scripts]
      if: always()
      steps:
       - name: Cleanup systemd service
         if: always()
         run: |
            # Stop and disable systemd service (only if it exists)
            if sudo systemctl list-unit-files | grep -q iotistic-agent.service; then
              echo "Stopping and disabling iotistic-agent service..."
              sudo systemctl stop iotistic-agent 2>/dev/null || true
              sudo systemctl disable iotistic-agent 2>/dev/null || true
              sudo rm -f /etc/systemd/system/iotistic-agent.service
              sudo systemctl daemon-reload
              echo "✓ Systemd service stopped and removed"
            else
              echo "ℹ Systemd service not found (already cleaned or not installed)"
            fi
            
            # Remove installation directories
            if [ -d /opt/iotistic ] || [ -d /var/lib/iotistic ] || [ -d /var/log/iotistic ] || [ -d /etc/iotistic ]; then
              echo "Removing installation directories..."
              sudo rm -rf /opt/iotistic/agent
              sudo rm -rf /var/lib/iotistic/agent
              sudo rm -rf /var/log/iotistic
              sudo rm -rf /etc/iotistic
              echo "✓ Installation directories removed"
            else
              echo "ℹ Installation directories not found (already cleaned)"
            fi
       
       - name: Cleanup Docker
         if: always()
         run: |
            docker system prune -af
