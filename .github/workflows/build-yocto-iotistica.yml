name: Build Yocto Linux Image

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'GitHub-hosted runner label'
        required: true
        type: choice
        options:
          - ubuntu-24.04
          - ubuntu-22.04
        default: ubuntu-24.04
      yocto_version:
        description: 'Yocto release (e.g., kirkstone, scarthgap)'
        required: true
        type: choice
        options:
          - scarthgap  # Latest LTS (5.0) - Python 3.12+ compatible - RECOMMENDED
          - kirkstone  # LTS (4.0) - Requires Python 3.10 or older - STABLE
        default: scarthgap
      machine:
        description: 'Target machine (e.g., raspberrypi4-64, qemux86-64)'
        required: true
        type: string
        default: 'raspberrypi4-64'
      agent_version:
        description: 'Agent version to embed (default: latest from package.json)'
        required: false
        type: string
      include_agent:
        description: 'Include iotistica agent in image'
        required: true
        type: boolean
        default: true
      clean_build:
        description: 'Force clean build (slow, use only for troubleshooting)'
        required: true
        type: boolean
        default: false
  schedule:
    # Build weekly on Sunday at 3 AM UTC
    - cron: '0 3 * * 0'

env:
  # Yocto build requires lots of disk space
  BUILD_DIR: /opt/yocto-builds
  DL_DIR: /opt/yocto-downloads
  SSTATE_DIR: /opt/yocto-sstate-cache

jobs:
  build-yocto-image:
    name: Build Yocto Image

    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 720  # 12 hours for full Yocto build (increased for self-hosted runner)

    concurrency:
      group: yocto-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.machine || 'raspberrypi4-64' }}-${{ github.event.inputs.yocto_version || 'scarthgap' }}
      cancel-in-progress: false

    env:
      RUNNER_LABEL: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
      YOCTO_VERSION: ${{ github.event.inputs.yocto_version || 'scarthgap' }}
      MACHINE: ${{ github.event.inputs.machine || 'raspberrypi4-64' }}
      INCLUDE_AGENT: ${{ github.event.inputs.include_agent || 'true' }}
      CLEAN_BUILD: ${{ github.event.inputs.clean_build || 'false' }}
      SSTATE_SYNC_INTERVAL_MINUTES: '10'
      # SAS URL for the Azure Blob container used as sstate mirror.
      # Required secret: YOCTO_SSTATE_AZURE_SAS_URL
      # Format: https://<account>.blob.core.windows.net/<container>?<sas-token>
      # SAS permissions needed: Read, Write, List, Delete (rwdl) on the container.
      AZURE_SSTATE_URL: ${{ secrets.YOCTO_SSTATE_AZURE_SAS_URL }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space on GitHub-hosted runner
        run: |
          echo "=== Disk Space Before Cleanup ==="
          df -h
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/hostedtoolcache || true
          sudo rm -rf /opt/ghc || true
          sudo apt-get clean || true
          echo "=== Disk Space After Cleanup ==="
          df -h

      - name: Enable unprivileged user namespaces for BitBake
        run: |
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo "=== AppArmor User Namespace Setting Before ==="
            cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
            echo "=== AppArmor User Namespace Setting After ==="
            cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          else
            echo "kernel.apparmor_restrict_unprivileged_userns not present on this runner"
          fi

      # DL_DIR: downloaded source tarballs (~2-5 GB, fits in GitHub cache).
      # Uses run_id as key so each run saves a new incremental entry.
      # restore-keys fall back to the most recent matching entry.
      - name: Restore downloads cache (DL_DIR)
        id: dl-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.DL_DIR }}
          key: yocto-dl-${{ runner.os }}-${{ env.YOCTO_VERSION }}-${{ env.MACHINE }}-${{ github.run_id }}
          restore-keys: |
            yocto-dl-${{ runner.os }}-${{ env.YOCTO_VERSION }}-${{ env.MACHINE }}-
            yocto-dl-${{ runner.os }}-${{ env.YOCTO_VERSION }}-

      # SSTATE_DIR: compiled package cache (~15-50 GB for raspberrypi4-64).
      # Too large for GitHub Actions cache (10 GB limit) — stored in Azure Blob Storage.
      # azcopy is pre-installed on GitHub-hosted Ubuntu runners.
      - name: Restore sstate cache from Azure Blob Storage
        run: |
          if [ -z "${AZURE_SSTATE_URL:-}" ]; then
            echo "YOCTO_SSTATE_AZURE_SAS_URL secret not set — skipping sstate restore"
            echo "First run: sstate will be built from scratch and uploaded at the end."
          else
            echo "=== Syncing sstate from Azure Blob Storage ==="
            sudo mkdir -p "$SSTATE_DIR"
            azcopy sync "$AZURE_SSTATE_URL" "$SSTATE_DIR/" \
              --recursive=true \
              --log-level=WARNING \
              --cap-mbps=500
            echo ""
            echo "=== Sstate size after restore ==="
            du -sh "$SSTATE_DIR"
            echo "=== File count ==="
            find "$SSTATE_DIR" -type f | wc -l
          fi

      - name: Report cache restore status
        run: |
          echo "=== Cache Restore Status ==="
          echo "DL cache hit: ${{ steps.dl-cache.outputs.cache-hit }}"
          echo ""
          echo "=== DL_DIR size after restore ==="
          du -sh "$DL_DIR" 2>/dev/null || echo "Empty"
          echo ""
          echo "=== SSTATE_DIR size after restore ==="
          du -sh "$SSTATE_DIR" 2>/dev/null || echo "Empty"

      - name: Check disk space
        run: bash .github/workflows/scripts/check-disk-space.sh 30 50

      - name: Determine agent version
        id: version
        run: bash .github/workflows/scripts/determine-agent-version.sh "${{ github.event.inputs.agent_version }}"

      - name: Fix Python alternatives if broken
        run: bash .github/workflows/scripts/fix-python-alternatives.sh

      - name: Install Yocto dependencies
        run: bash .github/workflows/scripts/install-yocto-dependencies.sh "$YOCTO_VERSION"

      - name: Setup Yocto build directories
        run: bash .github/workflows/scripts/setup-build-directories.sh "$BUILD_DIR" "$DL_DIR" "$SSTATE_DIR"

      - name: Clone Poky (Yocto reference distribution)
        run: bash .github/workflows/scripts/clone-poky.sh "$BUILD_DIR" "$YOCTO_VERSION"

      - name: Clone meta-openembedded layer
        run: bash .github/workflows/scripts/clone-meta-openembedded.sh "$BUILD_DIR" "$YOCTO_VERSION"

      - name: Clone meta-raspberrypi layer
        if: contains(env.MACHINE, 'raspberrypi')
        run: bash .github/workflows/scripts/clone-meta-raspberrypi.sh "$BUILD_DIR" "$YOCTO_VERSION"

      - name: Clone meta-virtualization layer
        run: bash .github/workflows/scripts/clone-meta-virtualization.sh "$BUILD_DIR" "$YOCTO_VERSION"

      - name: Create meta-iotistica layer
        run: bash .github/workflows/scripts/create-meta-iotistica.sh "$BUILD_DIR"

      - name: Create agent recipe
        if: env.INCLUDE_AGENT == 'true'
        run: bash .github/workflows/scripts/create-agent-recipe.sh "$BUILD_DIR" "${{ steps.version.outputs.agent_version }}"

      - name: Initialize build environment
        run: bash .github/workflows/scripts/init-build-env.sh "$BUILD_DIR" "$YOCTO_VERSION"

      - name: Configure build
        run: bash .github/workflows/scripts/configure-build.sh "$BUILD_DIR" "$YOCTO_VERSION" "$MACHINE" "$DL_DIR" "$SSTATE_DIR"

      - name: Validate Yocto metadata
        run: bash .github/workflows/scripts/validate-yocto-metadata.sh "$BUILD_DIR" "$YOCTO_VERSION"

      - name: Prebuild agent recipe
        if: env.INCLUDE_AGENT == 'true'
        run: bash .github/workflows/scripts/run-with-periodic-sstate-sync.sh "$SSTATE_DIR" "$AZURE_SSTATE_URL" "$SSTATE_SYNC_INTERVAL_MINUTES" bash .github/workflows/scripts/prebuild-yocto-target.sh "$BUILD_DIR" "$YOCTO_VERSION" "iotistic-agent"

      - name: Build image
        run: bash .github/workflows/scripts/run-with-periodic-sstate-sync.sh "$SSTATE_DIR" "$AZURE_SSTATE_URL" "$SSTATE_SYNC_INTERVAL_MINUTES" bash .github/workflows/scripts/build-image.sh "$BUILD_DIR" "$YOCTO_VERSION" "$SSTATE_DIR" "$CLEAN_BUILD"

      # Save sstate back to Azure after every build (success or failure).
      # --delete-destination=false ensures previously cached packages are never removed.
      # This means interrupted builds still contribute their partial sstate on the next run.
      - name: Save sstate cache to Azure Blob Storage
        if: always()
        run: |
          if [ -z "${AZURE_SSTATE_URL:-}" ]; then
            echo "YOCTO_SSTATE_AZURE_SAS_URL secret not set — skipping sstate save"
          elif [ ! -d "$SSTATE_DIR" ] || [ -z "$(ls -A $SSTATE_DIR 2>/dev/null)" ]; then
            echo "SSTATE_DIR is empty — nothing to upload"
          else
            echo "=== Syncing sstate to Azure Blob Storage ==="
            echo "Local sstate size: $(du -sh $SSTATE_DIR)"
            azcopy sync "$SSTATE_DIR/" "$AZURE_SSTATE_URL" \
              --recursive=true \
              --delete-destination=false \
              --log-level=WARNING \
              --cap-mbps=500
            echo "=== Upload complete ==="
          fi

      - name: Show build artifacts
        run: bash .github/workflows/scripts/show-artifacts.sh "$BUILD_DIR" "$MACHINE"

      - name: Package artifacts
        run: bash .github/workflows/scripts/package-artifacts.sh "$BUILD_DIR" "${{ github.workspace }}" "$MACHINE" "$YOCTO_VERSION" "${{ steps.version.outputs.agent_version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yocto-image-${{ env.MACHINE }}-${{ steps.version.outputs.agent_version }}
          path: yocto-artifacts/
          retention-days: 30
          compression-level: 0  # Already compressed

      - name: Check disk space after build
        if: always()
        run: |
          echo "=== Disk Space After Build ==="
          df -h
          
          echo ""
          echo "=== Build Directory Size ==="
          du -sh $BUILD_DIR/* 2>/dev/null || true

      - name: Cleanup old builds
        if: always()
        run: bash .github/workflows/scripts/cleanup-old-builds.sh "$BUILD_DIR" "$DL_DIR"

      - name: Generate build summary
        if: always()
        run: |
          {
            echo "## iotistica OS Build Summary"
            echo ""
            echo "### Configuration"
            echo "- **Distribution**: Iotistica OS v1.0.0"
            echo "- **Yocto Version**: $YOCTO_VERSION"
            echo "- **Machine**: $MACHINE"
            echo "- **Agent Version**: ${{ steps.version.outputs.agent_version }}"
            echo ""
            echo "### Architecture Features"
            echo "- ✅ Read-only root filesystem"
            echo "- ✅ Persistent /data partition (4GB)"
            echo "- ✅ Systemd init system"
            echo "- ✅ NetworkManager connectivity"
            echo "- ✅ Container orchestration agent"
            echo "- ✅ OTA update capable"
            echo ""
            echo "### Partition Layout"
            echo "\`\`\`"
            echo "/dev/mmcblk0p1: /boot (64MB FAT32) - Kernel + device tree"
            echo "/dev/mmcblk0p2: /     (2GB ext4)   - Read-only rootfs"
            echo "/dev/mmcblk0p3: /data (4GB ext4)   - Persistent data"
            echo "\`\`\`"
            echo ""
            echo "### Build Status"
            if [ -f "$BUILD_DIR/poky/build/tmp/deploy/images/$MACHINE/iotistica-image-$MACHINE.wic.bz2" ]; then
              echo "✅ Build successful"
              echo ""
              echo "### Artifacts"
              echo "\`\`\`"
              ls -lh $BUILD_DIR/poky/build/tmp/deploy/images/$MACHINE/ | grep -E "iotistica-image.*\.(wic|tar)" || echo "No images found"
              echo "\`\`\`"
              echo ""
              echo "### Flash Instructions"
              echo "\`\`\`bash"
              echo "# Extract and flash to SD card (Linux/macOS)"
              echo "bunzip2 iotistica-image-$MACHINE.wic.bz2"
              echo "sudo dd if=iotistica-image-$MACHINE.wic of=/dev/sdX bs=4M status=progress"
              echo "sync"
              echo ""
              echo "# Or use Etcher for GUI flashing (all platforms)"
              echo "# https://etcher.balena.io/"
              echo "\`\`\`"
            else
              echo "❌ Build failed or image not found"
            fi
          } >> $GITHUB_STEP_SUMMARY