name: Agent Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  actions: read

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install Agent dependencies
        working-directory: ./agent
        run: npm ci

      - name: Run unit tests
        working-directory: ./agent
        run: npm run test:unit
        continue-on-error: true

      - name: Build Agent
        working-directory: ./agent
        run: npm run build

  version:
    name: Bump Version
    needs: [test]
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.bump.outputs.package_version }}
      sha_short: ${{ steps.bump.outputs.sha_short }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version in package.json
        id: bump
        run: |
          cd agent
          CURRENT_VERSION=$(jq -r '.version' package.json)
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

          echo "package_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add agent/package.json
          git commit -m "chore: bump agent version to ${{ steps.bump.outputs.package_version }} [skip ci]"

          for i in {1..5}; do
            git fetch origin master
            git -c rebase.autoStash=true rebase origin/master
            if git push origin HEAD:master; then
              exit 0
            fi
            sleep 2
          done

          echo "Failed to push after 5 attempts"
          exit 1

  build-x86:
    name: Build x86_64 Tarballs
    needs: [version]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build x86_64 artifacts
        run: |
          cd agent
          npm ci --legacy-peer-deps
          npm run build

          mkdir -p /tmp/iotistic-artifacts

          tar -czf /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz \
            dist/ package.json package-lock.json node_modules/ bin/

          cp /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz \
             /tmp/iotistic-artifacts/agent-latest-x86_64.tar.gz

          cp /tmp/iotistic-artifacts/agent-latest-x86_64.tar.gz \
             /tmp/iotistic-artifacts/agent-latest.tar.gz

          cd /tmp/iotistic-artifacts
          sha256sum agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz > agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz.sha256
          sha256sum agent-latest-x86_64.tar.gz > agent-latest-x86_64.tar.gz.sha256
          sha256sum agent-latest.tar.gz > agent-latest.tar.gz.sha256

      - name: Upload x86_64 artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: agent-tarballs-x86_64
          path: /tmp/iotistic-artifacts/*
          if-no-files-found: error

  build-arm64:
    name: Build ARM64 Tarballs
    needs: [version]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ARM64 artifacts
        run: |
          cd agent
          npm ci --legacy-peer-deps
          npm run build

          mkdir -p /tmp/iotistic-artifacts

          tar -czf /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz \
            dist/ package.json package-lock.json node_modules/ bin/

          cp /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz \
             /tmp/iotistic-artifacts/agent-latest-arm64.tar.gz

          cd /tmp/iotistic-artifacts
          sha256sum agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz > agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz.sha256
          sha256sum agent-latest-arm64.tar.gz > agent-latest-arm64.tar.gz.sha256

      - name: Upload ARM64 artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: agent-tarballs-arm64
          path: /tmp/iotistic-artifacts/*
          if-no-files-found: error

  prepare-install-script:
    name: Prepare Latest install.sh
    needs: [version]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare install.sh with current version
        run: |
          mkdir -p /tmp/iotistic-scripts
          sed "s/AGENT_VERSION_PLACEHOLDER/${{ needs.version.outputs.package_version }}/g" \
            agent/bin/install.sh > /tmp/iotistic-scripts/install.sh
          chmod +x /tmp/iotistic-scripts/install.sh

      - name: Generate install.sh checksum
        run: |
          cd /tmp/iotistic-scripts
          sha256sum install.sh > install.sh.sha256

      - name: Upload install.sh bundle
        uses: actions/upload-artifact@v4
        with:
          name: install-script-latest
          path: /tmp/iotistic-scripts/*
          if-no-files-found: error

  verify-systemd-install-x86:
    name: Verify install.sh on x86_64
    needs: [version, build-x86, build-arm64, prepare-install-script]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download install script artifact
        uses: actions/download-artifact@v4
        with:
          name: install-script-latest
          path: /tmp/iotistic-scripts

      - name: Place generated install.sh in repo path
        run: |
          cp /tmp/iotistic-scripts/install.sh ./agent/bin/install.generated.sh
          chmod +x ./agent/bin/install.generated.sh

      - name: Clean previous installation
        run: |
          sudo rm -rf /opt/iotistic/agent /var/lib/iotistic/agent /etc/iotistic /var/log/iotistic

      - name: Run latest install.sh in CI systemd mode
        env:
          CI: true
          IOTISTIC_INSTALL_METHOD: systemd
          IOTISTIC_AGENT_VERSION: ${{ needs.version.outputs.package_version }}
          IOTISTIC_DEVICE_PORT: 48484
          CLOUD_API_ENDPOINT: ''
          PROVISIONING_KEY: ''
        run: |
          sudo -E bash ./agent/bin/install.generated.sh

      - name: Validate service health
        run: |
          sudo systemctl status iotistic-agent --no-pager || true
          sudo journalctl -u iotistic-agent -n 200 --no-pager || true

          if ! sudo systemctl is-active --quiet iotistic-agent; then
            echo "Service is not active"
            exit 1
          fi

          if ! curl -f http://localhost:48484/v1/healthy 2>/dev/null && \
             ! curl -f http://localhost:48484/ping 2>/dev/null; then
            echo "Agent API is not healthy"
            exit 1
          fi

  verify-systemd-install-arm64:
    name: Verify install.sh on arm64
    needs: [version, build-x86, build-arm64, prepare-install-script]
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download install script artifact
        uses: actions/download-artifact@v4
        with:
          name: install-script-latest
          path: /tmp/iotistic-scripts

      - name: Place generated install.sh in repo path
        run: |
          cp /tmp/iotistic-scripts/install.sh ./agent/bin/install.generated.sh
          chmod +x ./agent/bin/install.generated.sh

      - name: Clean previous installation
        run: |
          sudo rm -rf /opt/iotistic/agent /var/lib/iotistic/agent /etc/iotistic /var/log/iotistic

      - name: Run latest install.sh in CI systemd mode
        env:
          CI: true
          IOTISTIC_INSTALL_METHOD: systemd
          IOTISTIC_AGENT_VERSION: ${{ needs.version.outputs.package_version }}
          IOTISTIC_DEVICE_PORT: 48484
          CLOUD_API_ENDPOINT: ''
          PROVISIONING_KEY: ''
        run: |
          sudo -E bash ./agent/bin/install.generated.sh

      - name: Validate service health
        run: |
          sudo systemctl status iotistic-agent --no-pager || true
          sudo journalctl -u iotistic-agent -n 200 --no-pager || true

          if ! sudo systemctl is-active --quiet iotistic-agent; then
            echo "Service is not active"
            exit 1
          fi

          if ! curl -f http://localhost:48484/v1/healthy 2>/dev/null && \
             ! curl -f http://localhost:48484/ping 2>/dev/null; then
            echo "Agent API is not healthy"
            exit 1
          fi

  generate-sbom:
    name: Generate SBOM
    needs: [version, build-x86, build-arm64, prepare-install-script]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-tarballs-x86_64
          path: /tmp/iotistic-artifacts

      - name: Download ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-tarballs-arm64
          path: /tmp/iotistic-artifacts

      - name: Download install script bundle
        uses: actions/download-artifact@v4
        with:
          name: install-script-latest
          path: /tmp/iotistic-scripts

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p /tmp/sbom

          syft dir:/tmp/iotistic-artifacts -o cyclonedx-json=/tmp/sbom/agent-artifacts.cyclonedx.json
          syft dir:/tmp/iotistic-scripts -o cyclonedx-json=/tmp/sbom/install-script.cyclonedx.json
          syft dir:./agent -o cyclonedx-json=/tmp/sbom/agent-source.cyclonedx.json

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype version

      - name: Scan SBOMs and generate SARIF reports
        # continue-on-error so SARIF upload always runs even when CVEs are found
        continue-on-error: true
        run: |
          mkdir -p /tmp/grype-sarif

          grype sbom:/tmp/sbom/agent-source.cyclonedx.json \
            --output sarif > /tmp/grype-sarif/agent-source.sarif

          grype sbom:/tmp/sbom/agent-artifacts.cyclonedx.json \
            --output sarif > /tmp/grype-sarif/agent-artifacts.sarif

          grype sbom:/tmp/sbom/install-script.cyclonedx.json \
            --output sarif > /tmp/grype-sarif/install-script.sarif

      - name: Upload SARIF - agent source
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: /tmp/grype-sarif/agent-source.sarif
          category: grype-agent-source

      - name: Upload SARIF - agent artifacts
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: /tmp/grype-sarif/agent-artifacts.sarif
          category: grype-agent-artifacts

      - name: Upload SARIF - install script
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: /tmp/grype-sarif/install-script.sarif
          category: grype-install-script

      - name: Enforce CVE policy threshold
        # Blocks upload if any Critical severity vulnerabilities are found.
        # Change --fail-on to "high" for a stricter gate.
        run: |
          grype sbom:/tmp/sbom/agent-source.cyclonedx.json --fail-on critical
          grype sbom:/tmp/sbom/agent-artifacts.cyclonedx.json --fail-on critical

      - name: Upload SBOM bundle
        uses: actions/upload-artifact@v4
        with:
          name: agent-sbom
          path: /tmp/sbom/*
          if-no-files-found: error

      - name: Append SBOM summary
        run: |
          echo "# SBOM Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- agent-artifacts.cyclonedx.json" >> $GITHUB_STEP_SUMMARY
          echo "- install-script.cyclonedx.json" >> $GITHUB_STEP_SUMMARY
          echo "- agent-source.cyclonedx.json" >> $GITHUB_STEP_SUMMARY

  upload-artifacts:
    name: Upload to Azure (gated)
    needs: [version, build-x86, build-arm64, verify-systemd-install-x86, verify-systemd-install-arm64, prepare-install-script, generate-sbom]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-tarballs-x86_64
          path: /tmp/iotistic-artifacts

      - name: Download ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-tarballs-arm64
          path: /tmp/iotistic-artifacts

      - name: Download install script bundle
        uses: actions/download-artifact@v4
        with:
          name: install-script-latest
          path: /tmp/iotistic-scripts

      - name: Download SBOM bundle
        uses: actions/download-artifact@v4
        with:
          name: agent-sbom
          path: /tmp/sbom

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload x86_64 tarballs and checksums
        run: |
          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/versions/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz --file /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz --overwrite true --content-type application/gzip
          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/agent-latest-x86_64.tar.gz --file /tmp/iotistic-artifacts/agent-latest-x86_64.tar.gz --overwrite true --content-type application/gzip
          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/agent-latest.tar.gz --file /tmp/iotistic-artifacts/agent-latest.tar.gz --overwrite true --content-type application/gzip

          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/versions/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz.sha256 --file /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz.sha256 --overwrite true --content-type text/plain
          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/agent-latest-x86_64.tar.gz.sha256 --file /tmp/iotistic-artifacts/agent-latest-x86_64.tar.gz.sha256 --overwrite true --content-type text/plain
          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/agent-latest.tar.gz.sha256 --file /tmp/iotistic-artifacts/agent-latest.tar.gz.sha256 --overwrite true --content-type text/plain

      - name: Upload ARM64 tarballs and checksums
        run: |
          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/versions/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz --file /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz --overwrite true --content-type application/gzip
          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/agent-latest-arm64.tar.gz --file /tmp/iotistic-artifacts/agent-latest-arm64.tar.gz --overwrite true --content-type application/gzip

          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/versions/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz.sha256 --file /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz.sha256 --overwrite true --content-type text/plain
          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/agent-latest-arm64.tar.gz.sha256 --file /tmp/iotistic-artifacts/agent-latest-arm64.tar.gz.sha256 --overwrite true --content-type text/plain

      - name: Upload install.sh and checksums
        run: |
          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/install --file /tmp/iotistic-scripts/install.sh --overwrite true --content-type application/x-sh --content-disposition "attachment; filename=install"
          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/install.sha256 --file /tmp/iotistic-scripts/install.sh.sha256 --overwrite true --content-type text/plain --content-disposition "inline; filename=install.sha256"

          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/versions/install-${{ needs.version.outputs.package_version }}.sh --file /tmp/iotistic-scripts/install.sh --overwrite true --content-type application/x-sh --content-disposition "attachment; filename=install-${{ needs.version.outputs.package_version }}.sh"
          az storage blob upload --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --container-name scripts --name agent/versions/install-${{ needs.version.outputs.package_version }}.sh.sha256 --file /tmp/iotistic-scripts/install.sh.sha256 --overwrite true --content-type text/plain --content-disposition "inline; filename=install-${{ needs.version.outputs.package_version }}.sh.sha256"

      - name: Upload SBOM files to Azure
        run: |
          VERSION=${{ needs.version.outputs.package_version }}

          for f in agent-artifacts install-script agent-source; do
            # Versioned copy alongside release tarballs
            az storage blob upload \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
              --container-name scripts \
              --name "agent/versions/${VERSION}/sbom/${f}.cyclonedx.json" \
              --file "/tmp/sbom/${f}.cyclonedx.json" \
              --overwrite true \
              --content-type application/json

            # Latest pointer
            az storage blob upload \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
              --container-name scripts \
              --name "agent/sbom/${f}.cyclonedx.json" \
              --file "/tmp/sbom/${f}.cyclonedx.json" \
              --overwrite true \
              --content-type application/json
          done

  report:
    name: Generate Changelog
    needs: [version, upload-artifacts]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog summary
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          echo "$COMMITS" | head -20 > changelog_summary.txt

          echo "# Integration Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ needs.version.outputs.package_version }}" >> $GITHUB_STEP_SUMMARY
          echo "SHA: ${{ needs.version.outputs.sha_short }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat changelog_summary.txt >> $GITHUB_STEP_SUMMARY

  cleanup:
    name: Clean up
    runs-on: ubuntu-latest
    needs: [report]
    if: always()

    steps:
      - name: Cleanup Docker
        run: docker system prune -af
