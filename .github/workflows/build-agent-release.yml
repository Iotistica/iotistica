name: Agent Release

# Triggered by pushing a version tag: git tag v1.2.3 && git push origin v1.2.3
# Promotes CI-built artifacts from agent/builds/{version}/ — no rebuild.
# Requires: package.json version must match the tag before tagging.

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release — must have CI artifacts in Azure staging'
        required: true
        type: string
        default: '1.0.522'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: agent-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote-artifacts:
    name: Promote Artifacts to Release Paths
    runs-on: [ubuntu-24.04]
    permissions:
      contents: read

    steps:
      - name: Extract version from tag
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          fi
          TAG="v${VERSION}"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Azure login
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify CI artifacts exist
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}

          echo "Verifying agent/builds/${VERSION}/ exists on Azure..."
          for arch in x86_64 arm64; do
            az storage blob show --account-name "$ACCT" --container-name scripts \
              --name "agent/builds/${VERSION}/agent-${VERSION}-${arch}.tar.gz" \
              --auth-mode key --only-show-errors --output none \
              || { echo "ERROR: agent/builds/${VERSION}/agent-${VERSION}-${arch}.tar.gz not found."; \
                   echo "Ensure package.json version is ${VERSION} and CI has completed on master before tagging."; \
                   exit 1; }
            echo "  ✓ agent-${VERSION}-${arch}.tar.gz"
          done
          az storage blob show --account-name "$ACCT" --container-name scripts \
            --name "agent/builds/${VERSION}/install.sh" \
            --auth-mode key --only-show-errors --output none \
            || { echo "ERROR: agent/builds/${VERSION}/install.sh not found."; exit 1; }
          echo "  ✓ install.sh"
          echo "All artifacts verified."

      - name: Download CI artifacts from Azure
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}
          mkdir -p /tmp/artifacts

          for arch in x86_64 arm64; do
            az storage blob download --account-name "$ACCT" --container-name scripts \
              --name "agent/builds/${VERSION}/agent-${VERSION}-${arch}.tar.gz" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz" \
              --auth-mode key --only-show-errors --output none
            az storage blob download --account-name "$ACCT" --container-name scripts \
              --name "agent/builds/${VERSION}/agent-${VERSION}-${arch}.tar.gz.sha256" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz.sha256" \
              --auth-mode key --only-show-errors --output none
          done
          az storage blob download --account-name "$ACCT" --container-name scripts \
            --name "agent/builds/${VERSION}/install.sh" \
            --file "/tmp/artifacts/install.sh" --auth-mode key --only-show-errors --output none
          az storage blob download --account-name "$ACCT" --container-name scripts \
            --name "agent/builds/${VERSION}/install.sh.sha256" \
            --file "/tmp/artifacts/install.sh.sha256" --auth-mode key --only-show-errors --output none

      - name: Verify checksums
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          cd /tmp/artifacts
          sha256sum -c agent-${VERSION}-x86_64.tar.gz.sha256
          sha256sum -c agent-${VERSION}-arm64.tar.gz.sha256
          sha256sum -c install.sh.sha256
          echo "All checksums verified."

      - name: Promote to versioned and latest paths
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}

          for arch in x86_64 arm64; do
            # Versioned permanent path
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/versions/agent-${VERSION}-${arch}.tar.gz" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz" \
              --overwrite true --auth-mode key --only-show-errors --output none --content-type application/gzip
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/versions/agent-${VERSION}-${arch}.tar.gz.sha256" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz.sha256" \
              --overwrite true --auth-mode key --only-show-errors --output none --content-type text/plain
            # Rolling latest pointer
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/agent-latest-${arch}.tar.gz" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz" \
              --overwrite true --auth-mode key --only-show-errors --output none --content-type application/gzip
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/agent-latest-${arch}.tar.gz.sha256" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz.sha256" \
              --overwrite true --auth-mode key --only-show-errors --output none --content-type text/plain
          done

          # Generic x86_64 latest (used by install.sh default)
          az storage blob upload --account-name "$ACCT" --container-name scripts \
            --name "agent/agent-latest.tar.gz" \
            --file "/tmp/artifacts/agent-${VERSION}-x86_64.tar.gz" \
            --overwrite true --auth-mode key --only-show-errors --output none --content-type application/gzip

          # install.sh — current + versioned snapshot
          az storage blob upload --account-name "$ACCT" --container-name scripts \
            --name "agent/install.sh" \
            --file "/tmp/artifacts/install.sh" \
            --overwrite true --auth-mode key --only-show-errors --output none --content-type text/x-shellscript
          az storage blob upload --account-name "$ACCT" --container-name scripts \
            --name "agent/install.sh.sha256" \
            --file "/tmp/artifacts/install.sh.sha256" \
            --overwrite true --auth-mode key --only-show-errors --output none --content-type text/plain
          az storage blob upload --account-name "$ACCT" --container-name scripts \
            --name "agent/versions/install-${VERSION}.sh" \
            --file "/tmp/artifacts/install.sh" \
            --overwrite true --auth-mode key --only-show-errors --output none --content-type text/x-shellscript

  promote-docker:
    name: Promote Docker Image
    runs-on: [ubuntu-24.04]
    permissions:
      contents: read

    steps:
      - name: Extract version from tag
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Azure login
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Read SHA from CI build-meta.json
        id: meta
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}
          az storage blob download --account-name "$ACCT" --container-name scripts \
            --name "agent/builds/${VERSION}/build-meta.json" \
            --file /tmp/build-meta.json --auth-mode key --only-show-errors --output none
          SHA_SHORT=$(jq -r '.sha_short' /tmp/build-meta.json)
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "Docker source image: iotistic/agent:${SHA_SHORT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Re-tag CI image with release version
        run: |
          SHA_SHORT="${{ steps.meta.outputs.sha_short }}"
          VERSION="${{ steps.version.outputs.version }}"
          # Manifest copy — no layer download or rebuild
          docker buildx imagetools create \
            -t iotistic/agent:${VERSION} \
            iotistic/agent:${SHA_SHORT}
          echo "Tagged iotistic/agent:${SHA_SHORT} → iotistic/agent:${VERSION}"

  build-deb:
    name: Build .deb Packages
    needs: [promote-artifacts]
    runs-on: [ubuntu-24.04]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract version from tag
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Azure login
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download promoted tarballs
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}
          mkdir -p /tmp/artifacts
          for arch in x86_64 arm64; do
            az storage blob download --account-name "$ACCT" --container-name scripts \
              --name "agent/versions/agent-${VERSION}-${arch}.tar.gz" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz" \
              --auth-mode key --only-show-errors --output none
          done

      - name: Build .deb packages
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          chmod +x scripts/build-deb.sh
          # x86_64 tarball → amd64 .deb
          ./scripts/build-deb.sh \
            /tmp/artifacts/agent-${VERSION}-x86_64.tar.gz \
            "$VERSION" amd64
          # arm64 tarball → arm64 .deb
          ./scripts/build-deb.sh \
            /tmp/artifacts/agent-${VERSION}-arm64.tar.gz \
            "$VERSION" arm64

      - name: Upload .deb packages to Azure
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}
          for arch in amd64 arm64; do
            DEB="iotistica-agent_${VERSION}_${arch}.deb"
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/versions/${DEB}" \
              --file "/tmp/artifacts/${DEB}" \
              --overwrite true --auth-mode key --only-show-errors --output none \
              --content-type application/vnd.debian.binary-package
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/versions/${DEB}.sha256" \
              --file "/tmp/artifacts/${DEB}.sha256" \
              --overwrite true --auth-mode key --only-show-errors --output none \
              --content-type text/plain
            # Latest pointer
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/iotistica-agent-latest-${arch}.deb" \
              --file "/tmp/artifacts/${DEB}" \
              --overwrite true --auth-mode key --only-show-errors --output none \
              --content-type application/vnd.debian.binary-package
          done

      - name: Upload .deb as GitHub Actions artifact (for publish job)
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: /tmp/artifacts/iotistica-agent_*.deb*
          retention-days: 1

  publish:
    name: SBOM & GitHub Release
    needs: [promote-artifacts, promote-docker, build-deb]
    runs-on: [ubuntu-24.04]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Azure login
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download .deb packages from build job
        uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: /tmp/artifacts

      - name: Download promoted artifacts for SBOM + Release
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}
          mkdir -p /tmp/artifacts

          for arch in x86_64 arm64; do
            az storage blob download --account-name "$ACCT" --container-name scripts \
              --name "agent/versions/agent-${VERSION}-${arch}.tar.gz" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz" --auth-mode key --only-show-errors --output none
            az storage blob download --account-name "$ACCT" --container-name scripts \
              --name "agent/versions/agent-${VERSION}-${arch}.tar.gz.sha256" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz.sha256" --auth-mode key --only-show-errors --output none
          done
          az storage blob download --account-name "$ACCT" --container-name scripts \
            --name "agent/install.sh" \
            --file "/tmp/artifacts/install.sh" --auth-mode key --only-show-errors --output none
          az storage blob download --account-name "$ACCT" --container-name scripts \
            --name "agent/install.sh.sha256" \
            --file "/tmp/artifacts/install.sh.sha256" --auth-mode key --only-show-errors --output none

      - name: Generate SBOM with Syft
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p /tmp/sbom /tmp/extract/x86_64 /tmp/extract/arm64 /tmp/install

          syft dir:./agent -o cyclonedx-json=/tmp/sbom/agent-source.cyclonedx.json

          tar -xzf /tmp/artifacts/agent-${VERSION}-x86_64.tar.gz -C /tmp/extract/x86_64
          tar -xzf /tmp/artifacts/agent-${VERSION}-arm64.tar.gz -C /tmp/extract/arm64
          syft dir:/tmp/extract/x86_64 -o cyclonedx-json=/tmp/sbom/agent-artifacts-x86_64.cyclonedx.json
          syft dir:/tmp/extract/arm64 -o cyclonedx-json=/tmp/sbom/agent-artifacts-arm64.cyclonedx.json

          cp /tmp/artifacts/install.sh /tmp/install/
          syft dir:/tmp/install -o cyclonedx-json=/tmp/sbom/install-script.cyclonedx.json

      - name: Upload SBOMs to Azure
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}
          for f in agent-source agent-artifacts-x86_64 agent-artifacts-arm64 install-script; do
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/versions/${VERSION}/sbom/${f}.cyclonedx.json" \
              --file "/tmp/sbom/${f}.cyclonedx.json" \
              --overwrite true --auth-mode key --only-show-errors --output none --content-type application/json
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/sbom/${f}.cyclonedx.json" \
              --file "/tmp/sbom/${f}.cyclonedx.json" \
              --overwrite true --auth-mode key --only-show-errors --output none --content-type application/json
          done

          # Manifest — lets the docs site show which version the "latest" SBOMs belong to
          cat > /tmp/sbom/sbom-latest.json << EOF
          {
            "version": "${VERSION}",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "baseUrl": "https://get.iotistica.com/agent/sbom",
            "files": [
              { "id": "agent-source",           "label": "Agent — source",      "file": "agent-source.cyclonedx.json",            "description": "All npm dependencies declared in agent/package.json, generated from source." },
              { "id": "agent-artifacts-x86_64", "label": "Agent — x86_64 build","file": "agent-artifacts-x86_64.cyclonedx.json",  "description": "Filesystem scan of the built x86_64 release tarball — includes bundled binaries." },
              { "id": "agent-artifacts-arm64",  "label": "Agent — arm64 build", "file": "agent-artifacts-arm64.cyclonedx.json",   "description": "Filesystem scan of the built arm64 release tarball — includes bundled binaries." },
              { "id": "install-script",         "label": "Install script",       "file": "install-script.cyclonedx.json",          "description": "Scan of install.sh and any bundled tooling." }
            ]
          }
          EOF
          az storage blob upload --account-name "$ACCT" --container-name scripts \
            --name "agent/sbom/sbom-latest.json" \
            --file "/tmp/sbom/sbom-latest.json" \
            --overwrite true --auth-mode key --only-show-errors --output none \
            --content-type application/json \
            --content-cache-control "no-cache"

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges --max-count=30)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges --max-count=30)
          fi

          cat > /tmp/release-notes.md << NOTES
          ## Changes

          ${CHANGELOG}

          ## Install

          curl -sfL https://get.iotistica.com/agent | sudo sh

          ## Docker

          docker pull iotistic/agent:${VERSION}

          ## Install

          ### One-line installer (recommended)
          \`\`\`sh
          curl -sfL https://get.iotistica.com/agent | sudo sh
          \`\`\`

          ### Debian / Ubuntu (.deb)
          \`\`\`sh
          # amd64
          wget https://get.iotistica.com/agent/versions/iotistica-agent_${VERSION}_amd64.deb
          sudo dpkg -i iotistica-agent_${VERSION}_amd64.deb

          # arm64 (Raspberry Pi 4/5)
          wget https://get.iotistica.com/agent/versions/iotistica-agent_${VERSION}_arm64.deb
          sudo dpkg -i iotistica-agent_${VERSION}_arm64.deb
          \`\`\`

          ## Artifacts
          | File | Platform |
          |------|----------|
          | \`iotistica-agent_${VERSION}_amd64.deb\` | Debian/Ubuntu x86_64 |
          | \`iotistica-agent_${VERSION}_arm64.deb\` | Debian/Ubuntu arm64 (Pi 4/5) |
          | \`agent-${VERSION}-x86_64.tar.gz\` | Tarball x86_64 |
          | \`agent-${VERSION}-arm64.tar.gz\` | Tarball arm64 |
          NOTES

          ASSETS=(
            /tmp/artifacts/agent-${VERSION}-x86_64.tar.gz
            /tmp/artifacts/agent-${VERSION}-x86_64.tar.gz.sha256
            /tmp/artifacts/agent-${VERSION}-arm64.tar.gz
            /tmp/artifacts/agent-${VERSION}-arm64.tar.gz.sha256
            /tmp/artifacts/install.sh
            /tmp/artifacts/install.sh.sha256
          )

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — updating notes and re-uploading assets"
            gh release edit "$TAG" \
              --title "Agent v${VERSION}" \
              --notes-file /tmp/release-notes.md
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" \
              --title "Agent v${VERSION}" \
              --notes-file /tmp/release-notes.md \
              "${ASSETS[@]}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Release v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--|" >> $GITHUB_STEP_SUMMARY
          echo "| x86_64 tarball | \`agent/versions/agent-${VERSION}-x86_64.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| arm64 tarball | \`agent/versions/agent-${VERSION}-arm64.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| install.sh | \`agent/install.sh\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | \`iotistic/agent:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM | \`agent/versions/${VERSION}/sbom/\` |" >> $GITHUB_STEP_SUMMARY
