name: Agent Build & Release

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  actions: read

concurrency:
  group: agent-release
  cancel-in-progress: false

jobs:
  publish:
    name: Promote Azure Latest to Version
    runs-on: [arc-runner-set-iotistica-light]
    permissions:
      contents: write
    if: success() && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture release base commit
        id: base
        run: |
          echo "base_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download latest artifacts from Azure
        run: |
          set -euo pipefail
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}
          mkdir -p /tmp/release /tmp/release/sbom

          blob_exists() {
            local name="$1"
            az storage blob exists \
              --account-name "$ACCT" \
              --container-name scripts \
              --name "$name" \
              --auth-mode key \
              --query exists -o tsv
          }

          download_if_exists() {
            local src="$1"
            local dst="$2"
            if [ "$(blob_exists "$src")" = "true" ]; then
              az storage blob download --account-name "$ACCT" --container-name scripts \
                --name "$src" --file "$dst" --auth-mode key --overwrite true
              return 0
            fi
            return 1
          }

          for f in agent-latest-x86_64.tar.gz agent-latest-x86_64.tar.gz.sha256 agent-latest-arm64.tar.gz agent-latest-arm64.tar.gz.sha256 agent-latest.tar.gz agent-latest.tar.gz.sha256; do
            az storage blob download --account-name "$ACCT" --container-name scripts \
              --name "agent/${f}" --file "/tmp/release/${f}" --auth-mode key --overwrite true
          done

          HAS_INSTALL=false
          if download_if_exists "agent/install" "/tmp/release/install.sh"; then
            download_if_exists "agent/install.sha256" "/tmp/release/install.sh.sha256" || {
              echo "install exists but install.sha256 is missing"
              exit 1
            }
            HAS_INSTALL=true
          fi
          echo "HAS_INSTALL=$HAS_INSTALL" >> $GITHUB_ENV

          az storage blob download --account-name "$ACCT" --container-name scripts \
            --name agent/agent-latest-build-meta.json --file /tmp/release/agent-latest-build-meta.json --auth-mode key --overwrite true

          HAS_SBOM=false
          for f in agent-artifacts-x86_64 agent-artifacts-arm64 agent-source-x86_64 agent-source-arm64 install-script; do
            if download_if_exists "agent/sbom/${f}.cyclonedx.json" "/tmp/release/sbom/${f}.cyclonedx.json"; then
              HAS_SBOM=true
            fi
          done
          echo "HAS_SBOM=$HAS_SBOM" >> $GITHUB_ENV

      - name: Verify artifact commit matches release base commit
        id: verify_commit
        run: |
          set -euo pipefail
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}
          RELEASE_BASE_COMMIT=${{ steps.base.outputs.base_commit }}

          blob_exists() {
            local name="$1"
            az storage blob exists \
              --account-name "$ACCT" \
              --container-name scripts \
              --name "$name" \
              --auth-mode key \
              --query exists -o tsv
          }

          download_if_exists() {
            local src="$1"
            local dst="$2"
            if [ "$(blob_exists "$src")" = "true" ]; then
              az storage blob download --account-name "$ACCT" --container-name scripts \
                --name "$src" --file "$dst" --auth-mode key --overwrite true
              return 0
            fi
            return 1
          }

          refresh_artifacts() {
            mkdir -p /tmp/release /tmp/release/sbom
            for f in agent-latest-x86_64.tar.gz agent-latest-x86_64.tar.gz.sha256 agent-latest-arm64.tar.gz agent-latest-arm64.tar.gz.sha256 agent-latest.tar.gz agent-latest.tar.gz.sha256; do
              az storage blob download --account-name "$ACCT" --container-name scripts \
                --name "agent/${f}" --file "/tmp/release/${f}" --auth-mode key --overwrite true
            done

            HAS_INSTALL=false
            if download_if_exists "agent/install" "/tmp/release/install.sh"; then
              download_if_exists "agent/install.sha256" "/tmp/release/install.sh.sha256" || {
                echo "install exists but install.sha256 is missing"
                exit 1
              }
              HAS_INSTALL=true
            fi
            echo "HAS_INSTALL=$HAS_INSTALL" >> $GITHUB_ENV

            az storage blob download --account-name "$ACCT" --container-name scripts \
              --name agent/agent-latest-build-meta.json --file /tmp/release/agent-latest-build-meta.json --auth-mode key --overwrite true

            HAS_SBOM=false
            for f in agent-artifacts-x86_64 agent-artifacts-arm64 agent-source-x86_64 agent-source-arm64 install-script; do
              if download_if_exists "agent/sbom/${f}.cyclonedx.json" "/tmp/release/sbom/${f}.cyclonedx.json"; then
                HAS_SBOM=true
              fi
            done
            echo "HAS_SBOM=$HAS_SBOM" >> $GITHUB_ENV
          }

          ATTEMPTS=20
          SLEEP_SECONDS=30
          for attempt in $(seq 1 "$ATTEMPTS"); do
            ARTIFACT_COMMIT=$(jq -r '.commit' /tmp/release/agent-latest-build-meta.json 2>/dev/null || echo "")
            if [ -n "$ARTIFACT_COMMIT" ] && [ "$ARTIFACT_COMMIT" != "null" ] && [ "$ARTIFACT_COMMIT" = "$RELEASE_BASE_COMMIT" ]; then
              echo "artifact_commit=$ARTIFACT_COMMIT" >> $GITHUB_OUTPUT
              exit 0
            fi

            if [ "$attempt" -lt "$ATTEMPTS" ]; then
              echo "Artifact commit not ready for base commit yet"
              echo "artifact=${ARTIFACT_COMMIT:-<missing>}"
              echo "base_commit=$RELEASE_BASE_COMMIT"
              echo "Waiting ${SLEEP_SECONDS}s and refreshing Azure latest artifacts... (${attempt}/${ATTEMPTS})"
              sleep "$SLEEP_SECONDS"
              refresh_artifacts
            fi
          done

          echo "Artifact commit mismatch"
          echo "artifact=${ARTIFACT_COMMIT:-<missing>}"
          echo "base_commit=$RELEASE_BASE_COMMIT"
          echo "Timed out waiting for CI to publish matching latest artifacts."
          exit 1

      - name: Verify downloaded checksums
        run: |
          set -euo pipefail
          cd /tmp/release
          sha256sum -c agent-latest-x86_64.tar.gz.sha256
          sha256sum -c agent-latest-arm64.tar.gz.sha256
          sha256sum -c agent-latest.tar.gz.sha256
          if [ "${HAS_INSTALL:-false}" = "true" ]; then
            sha256sum -c install.sh.sha256
          fi

      - name: Bump patch version
        id: bump
        run: |
          cd agent
          CURRENT_VERSION=$(jq -r '.version' package.json)
          IFS='.' read -ra V <<< "$CURRENT_VERSION"
          NEW_VERSION="${V[0]}.${V[1]}.$((${V[2]} + 1))"
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "package_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        id: push
        run: |
          set -euo pipefail
          BASE_COMMIT=${{ steps.base.outputs.base_commit }}

          git fetch origin master
          REMOTE_HEAD=$(git rev-parse origin/master)
          if [ "$REMOTE_HEAD" != "$BASE_COMMIT" ]; then
            echo "master moved before release bump"
            echo "base_commit=$BASE_COMMIT"
            echo "origin_master=$REMOTE_HEAD"
            echo "Rerun release after CI completes for the new head."
            exit 1
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add agent/package.json
          git commit -m "chore: bump agent version to ${{ steps.bump.outputs.package_version }} [skip ci]"

          if ! git push origin HEAD:master; then
            git fetch origin master
            echo "Push failed; master changed during release."
            echo "origin_master=$(git rev-parse origin/master)"
            exit 1
          fi

          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Promote artifacts to versioned paths
        run: |
          set -euo pipefail
          VERSION=${{ steps.bump.outputs.package_version }}
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}

          promote_blob() {
            SRC="$1"
            DST="$2"
            az storage blob copy start --account-name "$ACCT" --auth-mode key \
              --destination-container scripts --destination-blob "$DST" \
              --source-account-name "$ACCT" --source-container scripts --source-blob "$SRC" >/dev/null

            for i in {1..30}; do
              STATUS=$(az storage blob show --account-name "$ACCT" --container-name scripts --name "$DST" --auth-mode key --query properties.copy.status -o tsv 2>/dev/null || true)
              if [ "$STATUS" = "success" ]; then
                return 0
              fi
              sleep 2
            done

            echo "Timed out waiting for blob copy: $SRC -> $DST"
            return 1
          }

          promote_blob "agent/agent-latest-x86_64.tar.gz" "agent/versions/agent-${VERSION}-x86_64.tar.gz" || exit 1
          promote_blob "agent/agent-latest-x86_64.tar.gz.sha256" "agent/versions/agent-${VERSION}-x86_64.tar.gz.sha256" || exit 1
          promote_blob "agent/agent-latest-arm64.tar.gz" "agent/versions/agent-${VERSION}-arm64.tar.gz" || exit 1
          promote_blob "agent/agent-latest-arm64.tar.gz.sha256" "agent/versions/agent-${VERSION}-arm64.tar.gz.sha256" || exit 1

          if [ "${HAS_INSTALL:-false}" = "true" ]; then
            promote_blob "agent/install" "agent/versions/install-${VERSION}.sh" || exit 1
            promote_blob "agent/install.sha256" "agent/versions/install-${VERSION}.sh.sha256" || exit 1
          fi
          promote_blob "agent/agent-latest-build-meta.json" "agent/versions/${VERSION}/agent-build-meta.json" || exit 1

          if [ "${HAS_SBOM:-false}" = "true" ]; then
            for f in agent-artifacts-x86_64 agent-artifacts-arm64 agent-source-x86_64 agent-source-arm64 install-script; do
              if [ -f "/tmp/release/sbom/${f}.cyclonedx.json" ]; then
                promote_blob "agent/sbom/${f}.cyclonedx.json" "agent/versions/${VERSION}/sbom/${f}.cyclonedx.json" || exit 1
              fi
            done
          fi

      - name: Write release summary
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi

          echo "# Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.bump.outputs.package_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact Commit:** ${{ steps.verify_commit.outputs.artifact_commit }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Bump Commit:** ${{ steps.push.outputs.sha_short }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Promoted Azure latest artifacts without rebuilding." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Recent commits" >> $GITHUB_STEP_SUMMARY
          echo "$COMMITS" | head -20 >> $GITHUB_STEP_SUMMARY
