name: Agent Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: agent-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Build & Package (${{ matrix.arch }})
    runs-on: [ubuntu-24.04]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: Set up QEMU (ARM64 only)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: linux/arm64

      - name: Stamp version into package.json
        working-directory: ./agent
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json > tmp.json
          mv tmp.json package.json

      - name: Install dependencies
        working-directory: ./agent
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: ./agent
        run: npm run build

      - name: Rebuild native modules for ARM64
        if: matrix.arch == 'arm64'
        run: |
          docker run --rm -v "${{ github.workspace }}/agent":/app -w /app --platform linux/arm64 \
            node:24-slim bash -c "
              apt-get update -qq && apt-get install -y -qq build-essential python3
              npm rebuild node-pty @serialport/bindings-cpp
            "

      - name: Build tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          mkdir -p /tmp/artifacts

          tar -czf /tmp/artifacts/agent-${VERSION}-${ARCH}.tar.gz \
            -C "${{ github.workspace }}/agent" \
            dist/ package.json package-lock.json node_modules/ bin/

          if [ "$ARCH" = "x86_64" ]; then
            cp /tmp/artifacts/agent-${VERSION}-x86_64.tar.gz /tmp/artifacts/agent-${VERSION}.tar.gz
          fi

          cd /tmp/artifacts
          sha256sum agent-${VERSION}-${ARCH}.tar.gz > agent-${VERSION}-${ARCH}.tar.gz.sha256
          if [ "$ARCH" = "x86_64" ]; then
            sha256sum agent-${VERSION}.tar.gz > agent-${VERSION}.tar.gz.sha256
          fi

      - name: Stamp install.sh (x86_64 only)
        if: matrix.arch == 'x86_64'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed "s/AGENT_VERSION_PLACEHOLDER/${VERSION}/g" agent/bin/install.sh > /tmp/artifacts/install.sh
          chmod +x /tmp/artifacts/install.sh
          cd /tmp/artifacts
          sha256sum install.sh > install.sh.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent-${{ matrix.arch }}
          path: /tmp/artifacts/*
          if-no-files-found: error

  docker:
    name: Docker Build & Push
    runs-on: [ubuntu-24.04]
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./agent/Dockerfile
          push: true
          provenance: false
          platforms: linux/amd64
          cache-from: type=registry,ref=iotistic/agent:buildcache
          cache-to: type=registry,ref=iotistic/agent:buildcache,mode=min,ignore-error=true
          tags: |
            iotistic/agent:${{ steps.version.outputs.version }}
            iotistic/agent:latest
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Scan with Trivy
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: 'iotistic/agent:${{ steps.version.outputs.version }}'
          output-file: 'trivy-results.sarif'
          fail-on-critical: 'true'
          ignore-file: 'agent/.trivyignore'

  publish:
    name: Upload to Azure, SBOM & GitHub Release
    needs: [package, docker]
    runs-on: [ubuntu-24.04]
    permissions:
      contents: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: agent-x86_64
          path: /tmp/artifacts

      - name: Download arm64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: agent-arm64
          path: /tmp/artifacts

      - name: Azure login
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload versioned artifacts to Azure
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}

          for arch in x86_64 arm64; do
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/versions/agent-${VERSION}-${arch}.tar.gz" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz" \
              --overwrite true --auth-mode key --content-type application/gzip
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/versions/agent-${VERSION}-${arch}.tar.gz.sha256" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz.sha256" \
              --overwrite true --auth-mode key --content-type text/plain
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/agent-latest-${arch}.tar.gz" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz" \
              --overwrite true --auth-mode key --content-type application/gzip
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/agent-latest-${arch}.tar.gz.sha256" \
              --file "/tmp/artifacts/agent-${VERSION}-${arch}.tar.gz.sha256" \
              --overwrite true --auth-mode key --content-type text/plain
          done

          az storage blob upload --account-name "$ACCT" --container-name scripts \
            --name "agent/versions/agent-${VERSION}.tar.gz" \
            --file "/tmp/artifacts/agent-${VERSION}.tar.gz" \
            --overwrite true --auth-mode key --content-type application/gzip
          az storage blob upload --account-name "$ACCT" --container-name scripts \
            --name "agent/agent-latest.tar.gz" \
            --file "/tmp/artifacts/agent-${VERSION}.tar.gz" \
            --overwrite true --auth-mode key --content-type application/gzip

          az storage blob upload --account-name "$ACCT" --container-name scripts \
            --name "agent/install.sh" \
            --file "/tmp/artifacts/install.sh" \
            --overwrite true --auth-mode key --content-type text/x-shellscript
          az storage blob upload --account-name "$ACCT" --container-name scripts \
            --name "agent/versions/install-${VERSION}.sh" \
            --file "/tmp/artifacts/install.sh" \
            --overwrite true --auth-mode key --content-type text/x-shellscript
          az storage blob upload --account-name "$ACCT" --container-name scripts \
            --name "agent/install.sh.sha256" \
            --file "/tmp/artifacts/install.sh.sha256" \
            --overwrite true --auth-mode key --content-type text/plain

      - name: Generate SBOM with Syft
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p /tmp/sbom /tmp/extract/x86_64 /tmp/extract/arm64 /tmp/install

          syft dir:./agent -o cyclonedx-json=/tmp/sbom/agent-source-x86_64.cyclonedx.json
          cp /tmp/sbom/agent-source-x86_64.cyclonedx.json /tmp/sbom/agent-source-arm64.cyclonedx.json

          tar -xzf /tmp/artifacts/agent-${VERSION}-x86_64.tar.gz -C /tmp/extract/x86_64
          tar -xzf /tmp/artifacts/agent-${VERSION}-arm64.tar.gz -C /tmp/extract/arm64
          syft dir:/tmp/extract/x86_64 -o cyclonedx-json=/tmp/sbom/agent-artifacts-x86_64.cyclonedx.json
          syft dir:/tmp/extract/arm64 -o cyclonedx-json=/tmp/sbom/agent-artifacts-arm64.cyclonedx.json

          cp /tmp/artifacts/install.sh /tmp/install/
          syft dir:/tmp/install -o cyclonedx-json=/tmp/sbom/install-script.cyclonedx.json

      - name: Upload SBOMs to Azure
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ACCT=${{ secrets.AZURE_STORAGE_ACCOUNT }}
          for f in agent-artifacts-x86_64 agent-artifacts-arm64 agent-source-x86_64 agent-source-arm64 install-script; do
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/versions/${VERSION}/sbom/${f}.cyclonedx.json" \
              --file "/tmp/sbom/${f}.cyclonedx.json" \
              --overwrite true --auth-mode key --content-type application/json
            az storage blob upload --account-name "$ACCT" --container-name scripts \
              --name "agent/sbom/${f}.cyclonedx.json" \
              --file "/tmp/sbom/${f}.cyclonedx.json" \
              --overwrite true --auth-mode key --content-type application/json
          done

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges | head -30)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -30)
          fi

          cat > /tmp/release-notes.md << NOTES
          ## Changes

          ${CHANGELOG}

          ## Artifacts
          - [agent-${VERSION}-x86_64.tar.gz](https://apps.iotistica.com/agent/versions/agent-${VERSION}-x86_64.tar.gz)
          - [agent-${VERSION}-arm64.tar.gz](https://apps.iotistica.com/agent/versions/agent-${VERSION}-arm64.tar.gz)
          - [install.sh](https://apps.iotistica.com/agent/install.sh)

          ## Docker
          \`docker pull iotistic/agent:${VERSION}\`
          NOTES

          gh release create "$TAG" \
            --title "Agent v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            /tmp/artifacts/agent-${VERSION}-x86_64.tar.gz \
            /tmp/artifacts/agent-${VERSION}-x86_64.tar.gz.sha256 \
            /tmp/artifacts/agent-${VERSION}-arm64.tar.gz \
            /tmp/artifacts/agent-${VERSION}-arm64.tar.gz.sha256 \
            /tmp/artifacts/install.sh \
            /tmp/artifacts/install.sh.sha256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Release v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Path |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| x86_64 tarball | \`agent/versions/agent-${VERSION}-x86_64.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| arm64 tarball | \`agent/versions/agent-${VERSION}-arm64.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| install.sh | \`agent/versions/install-${VERSION}.sh\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | \`iotistic/agent:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM | \`agent/versions/${VERSION}/sbom/\` |" >> $GITHUB_STEP_SUMMARY
