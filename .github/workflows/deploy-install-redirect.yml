name: Deploy Install Redirect Service

on:
  push:
    branches:
      - master
    paths:
      - 'install-redirect/**'
      - '.github/workflows/deploy-install-redirect.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: iotistic/iotistic-redirect

jobs:
  build-and-deploy:
    name: Build and Deploy Redirect Service
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./install-redirect
          file: ./install-redirect/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
