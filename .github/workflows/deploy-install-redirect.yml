name: Deploy Install Redirect Service

on:
  push:
    branches:
      - master
    paths:
      - 'install-redirect/**'
      - '.github/workflows/deploy-install-redirect.yml'
  workflow_dispatch:

env:
  REGISTRY: myregistry.azurecr.io
  IMAGE_NAME: iotistic-install-redirect

jobs:
  build-and-deploy:
    name: Build and Deploy Redirect Service
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name $(echo $REGISTRY | cut -d'.' -f1)

      - name: Build Docker image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME:latest \
            -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            install-redirect/

      - name: Push to Azure Container Registry
        run: |
          docker push $REGISTRY/$IMAGE_NAME:latest
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          echo "✓ Pushed image to ACR"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        if: success()
        with:
          app-name: iotistic-install-redirector
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          environment-variables: |
            AZURE_STORAGE_ACCOUNT=${{ secrets.AZURE_STORAGE_ACCOUNT }}
            AZURE_STORAGE_CONTAINER=scripts
            NODE_ENV=production
            PORT=3000

      - name: Health check
        run: |
          sleep 10
          curl -f https://iotistic-install-redirector.azurewebsites.net/health || exit 1
          echo "✓ Service is healthy"

      - name: Verify install endpoint
        run: |
          REDIRECT_URL=$(curl -I -s https://iotistic-install-redirector.azurewebsites.net/agent/install | grep -i location | awk '{print $2}')
          echo "Redirect target: $REDIRECT_URL"
          echo "✓ Install endpoint configured correctly"
