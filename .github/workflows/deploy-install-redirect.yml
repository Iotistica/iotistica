name: Deploy Install Redirect Service

on:
  push:
    branches:
      - master
    paths:
      - 'install-redirect/**'
      - '.github/workflows/deploy-install-redirect.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: iotistic/iotistic-redirect
  AZURE_RESOURCE_GROUP: iotistic
  CONTAINER_APP_NAME: iotistica-install-redirect
  CONTAINER_APP_ENV: iotistica-env

jobs:
  build-and-deploy:
    name: Build and Deploy Redirect Service
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./install-redirect
          file: ./install-redirect/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          imageToDeploy: ${{ env.IMAGE_NAME }}:${{ github.sha }}
