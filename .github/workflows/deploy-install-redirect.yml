name: Deploy Install Redirect Service

on:
  push:
    branches:
      - master
    paths:
      - 'install-redirect/**'
      - '.github/workflows/deploy-install-redirect.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: iotistic/iotistic-redirect

jobs:
  build-and-deploy:
    name: Build and Deploy Redirect Service
    runs-on: [arc-runner-set-iotistica-light]
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for Docker daemon
        run: |
          for i in $(seq 1 30); do
            docker info > /dev/null 2>&1 && echo "Docker ready after ${i}s" && break
            echo "Waiting for Docker daemon... ($i/30)"
            sleep 1
          done
          docker info

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./install-redirect
          file: ./install-redirect/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
