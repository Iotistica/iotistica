name: CI Build and Push Dashboard Image

on: 
  push:
    branches:
      - master
    paths:
      - 'dashboard/**' 
      - '.github/workflows/build-dashboard-ci.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (commit SHA, tag, or branch)'
        required: false
        default: master
        type: string

jobs:
  build:
    name: Test, Build, Scan & Push Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: ./dashboard
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright browser
        working-directory: ./dashboard
        run: npx playwright install chromium

      - name: Build dashboard
        working-directory: ./dashboard
        run: npm run build

      - name: Start preview server
        working-directory: ./dashboard
        run: |
          npx serve -s build -l 3000 &
          echo $! > .serve.pid

          # Wait for server to be ready
          timeout 30 bash -c 'until curl -f http://localhost:3000; do sleep 1; done'

      - name: Run Playwright Smoke Tests
        working-directory: ./dashboard
        run: npm run test:e2e:smoke
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

      - name: Stop preview server
        if: always()
        working-directory: ./dashboard
        run: |
          if [ -f .serve.pid ]; then
            kill $(cat .serve.pid) || true
            rm .serve.pid
          fi

      - name: Calculate commit SHA
        id: sha
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT_SHA=${SHA:0:12}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Build for commit: $SHA ($SHORT_SHA)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          provenance: false
          platforms: linux/amd64
          cache-from: type=registry,ref=iotistic/dashboard:buildcache
          cache-to: type=registry,ref=iotistic/dashboard:buildcache,mode=max
          tags: |
            iotistic/dashboard:ci-${{ steps.sha.outputs.short_sha }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            NODE_ENV=production

      - name: Scan Dashboard image with Trivy
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: 'iotistic/dashboard:ci-${{ steps.sha.outputs.short_sha }}'
          output-file: 'trivy-results.sarif'
          fail-on-critical: 'true'

      - name: Generate CI summary
        if: always()
        run: |
          echo "## Dashboard Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Smoke Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- Homepage loads successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Root element exists" >> $GITHUB_STEP_SUMMARY
          echo "- No critical console errors" >> $GITHUB_STEP_SUMMARY
          echo "- Responsive load time" >> $GITHUB_STEP_SUMMARY
          echo "- Valid HTML structure" >> $GITHUB_STEP_SUMMARY
          echo "- CSS styles loaded" >> $GITHUB_STEP_SUMMARY
          echo "- JavaScript executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** iotistic/dashboard:ci-${{ steps.sha.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY

          # Pull image to inspect size locally
          if docker pull "iotistic/dashboard:ci-${{ steps.sha.outputs.short_sha }}" >/dev/null 2>&1; then
            SIZE_BYTES=$(docker image inspect "iotistic/dashboard:ci-${{ steps.sha.outputs.short_sha }}" --format='{{.Size}}')
            SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1024 / 1024" | bc)
            echo "**Size:** ${SIZE_MB} MB" >> $GITHUB_STEP_SUMMARY
          else
            echo "_(Size unavailable)_" >> $GITHUB_STEP_SUMMARY
          fi
