name: CI Build, Test & Push Provisioning

on: 
  push:
    branches:
      - master
    paths:
      - 'provisioning/**' 
      - '.github/workflows/build-provisioning-ci.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: provisioning-ci
  cancel-in-progress: true

jobs:
  version:
    name: Bump Version
    runs-on: [arc-runner-set-iotistica-light]
    permissions:
      contents: write
    outputs:
      package_version: ${{ steps.bump.outputs.package_version }}
      sha_short: ${{ steps.bump.outputs.sha_short }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version in package.json
        id: bump
        run: |
          cd provisioning
          # Get current version
          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "Current version: $CURRENT_VERSION"
          
          # Bump patch version (e.g., 1.0.0 -> 1.0.1)
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "New version: $NEW_VERSION"
          
          # Update package.json
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          
          # Set outputs
          echo "package_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add provisioning/package.json
          git commit -m "chore: bump provisioning version to ${{ steps.bump.outputs.package_version }} [skip ci]"
          
          # Retry push with rebase up to 5 times (handles concurrent workflow runs)
          for i in {1..5}; do
            echo "Push attempt $i of 5..."
            
            # Fetch latest state from remote
            git fetch origin master
            
            # Rebase our commit on top of latest origin/master
            git -c rebase.autoStash=true rebase origin/master
            
            # Try to push
            if git push origin HEAD:master; then
              echo "Successfully pushed version bump!"
              exit 0
            fi
            
            # If push failed, wait before retry
            if [ $i -lt 5 ]; then
              echo "Push failed, retrying in 2 seconds..."
              sleep 2
            fi
          done
          
          echo "Failed to push after 5 attempts"
          exit 1

      - name: Display version info
        run: |
          echo "## Version Bumped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**New Version:** \`${{ steps.bump.outputs.package_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ steps.bump.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY

  buildx-api:
    name: Build & Push Provisioning API
    needs: version
    runs-on:  [arc-runner-set-iotistica-light]
    permissions:
      contents: write
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Display Version Update
        run: |
          echo "## Building Provisioning API Version ${{ needs.version.outputs.package_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.version.outputs.package_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Tags:" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-api:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-api:${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-api:${{ needs.version.outputs.package_version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./provisioning
        run: npm ci --prefer-offline --no-audit

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Provisioning API image
        id: docker_build_api
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: ./provisioning
          file: ./provisioning/Dockerfile
          target: provisioning
          push: true
          provenance: false
          platforms: linux/amd64
          cache-from: type=registry,ref=iotistic/provisioning-api:buildcache
          cache-to: type=registry,ref=iotistic/provisioning-api:buildcache,mode=min,ignore-error=true
          tags: |
            iotistic/provisioning-api:${{ needs.version.outputs.package_version }}
            iotistic/provisioning-api:${{ needs.version.outputs.sha_short }}
            iotistic/provisioning-api:latest
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Scan Provisioning API image with Trivy
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: 'iotistic/provisioning-api:${{ needs.version.outputs.package_version }}'
          output-file: 'trivy-api-results.sarif'
          fail-on-critical: 'true'
          ignore-file: 'provisioning/.trivyignore'

  buildx-worker:
    name: Build & Push Provisioning Worker
    needs: version
    runs-on: [arc-runner-set-iotistica-light]
    permissions:
      contents: write
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Display Version Update
        run: |
          echo "## Building Provisioning Worker Version ${{ needs.version.outputs.package_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.version.outputs.package_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Tags:" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-worker:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-worker:${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-worker:${{ needs.version.outputs.package_version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./provisioning
        run: npm ci --prefer-offline --no-audit

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Provisioning Worker image
        id: docker_build_worker
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: ./provisioning
          file: ./provisioning/Dockerfile
          target: worker
          push: true
          provenance: false
          platforms: linux/amd64
          cache-from: type=registry,ref=iotistic/provisioning-worker:buildcache
          cache-to: type=registry,ref=iotistic/provisioning-worker:buildcache,mode=min,ignore-error=true
          tags: |
            iotistic/provisioning-worker:${{ needs.version.outputs.package_version }}
            iotistic/provisioning-worker:${{ needs.version.outputs.sha_short }}
            iotistic/provisioning-worker:latest
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Scan Provisioning Worker image with Trivy
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: 'iotistic/provisioning-worker:${{ needs.version.outputs.package_version }}'
          output-file: 'trivy-worker-results.sarif'
          fail-on-critical: 'true'
          ignore-file: 'provisioning/.trivyignore'

  report:
    name: Generate Reports
    needs: [version, buildx-api, buildx-worker]
    runs-on:  [arc-runner-set-iotistica-light]
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -- provisioning/)
          else
            echo "Generating changelog from $PREV_TAG to HEAD"
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges -- provisioning/)
          fi
          
          # Save to file
          echo "$COMMITS" > changelog.txt
          
          # Save first 20 lines for summary
          echo "$COMMITS" | head -20 > changelog_summary.txt

      - name: Get Docker image sizes
        id: image_size
        run: |
          # Login to Docker Hub to pull the images
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Pull the API image
          docker pull iotistic/provisioning-api:${{ needs.version.outputs.package_version }}
          SIZE_API_BYTES=$(docker image inspect iotistic/provisioning-api:${{ needs.version.outputs.package_version }} --format='{{.Size}}')
          SIZE_API_MB=$(echo "scale=2; $SIZE_API_BYTES / 1024 / 1024" | bc)
          LAYERS_API=$(docker image inspect iotistic/provisioning-api:${{ needs.version.outputs.package_version }} --format='{{len .RootFS.Layers}}')
          
          # Pull the Worker image
          docker pull iotistic/provisioning-worker:${{ needs.version.outputs.package_version }}
          SIZE_WORKER_BYTES=$(docker image inspect iotistic/provisioning-worker:${{ needs.version.outputs.package_version }} --format='{{.Size}}')
          SIZE_WORKER_MB=$(echo "scale=2; $SIZE_WORKER_BYTES / 1024 / 1024" | bc)
          LAYERS_WORKER=$(docker image inspect iotistic/provisioning-worker:${{ needs.version.outputs.package_version }} --format='{{len .RootFS.Layers}}')
          
          echo "api_size_mb=$SIZE_API_MB" >> $GITHUB_OUTPUT
          echo "api_layers=$LAYERS_API" >> $GITHUB_OUTPUT
          echo "worker_size_mb=$SIZE_WORKER_MB" >> $GITHUB_OUTPUT
          echo "worker_layers=$LAYERS_WORKER" >> $GITHUB_OUTPUT

      - name: Generate Summary Report
        run: |
          echo "# Build & Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Version Information" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.version.outputs.package_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Provisioning API" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ steps.image_size.outputs.api_size_mb }} MB" >> $GITHUB_STEP_SUMMARY
          echo "**Layers:** ${{ steps.image_size.outputs.api_layers }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-api:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-api:${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-api:${{ needs.version.outputs.package_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Provisioning Worker" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ steps.image_size.outputs.worker_size_mb }} MB" >> $GITHUB_STEP_SUMMARY
          echo "**Layers:** ${{ steps.image_size.outputs.worker_layers }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-worker:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-worker:${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/provisioning-worker:${{ needs.version.outputs.package_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Changelog" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -s changelog_summary.txt ]; then
            cat changelog_summary.txt >> $GITHUB_STEP_SUMMARY
            
            TOTAL_COMMITS=$(wc -l < changelog.txt)
            SHOWN_COMMITS=$(wc -l < changelog_summary.txt)
            if [ $TOTAL_COMMITS -gt $SHOWN_COMMITS ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "_...and $((TOTAL_COMMITS - SHOWN_COMMITS)) more commits_" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_No commits found for provisioning service_" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Workflow Status" >> $GITHUB_STEP_SUMMARY
          echo "All jobs completed successfully! 🎉" >> $GITHUB_STEP_SUMMARY
