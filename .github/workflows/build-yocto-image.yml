name: Yocto Build

on:
  workflow_dispatch:
    inputs:
      yocto_version:
        type: choice
        description: "Select Yocto release"
        options:
          - scarthgap
          - kirkstone
          - dunfell
        default: kirkstone
      machine:
        type: string
        description: "MACHINE"
        default: raspberrypi4
      image:
        type: string
        description: "Image recipe"
        default: core-image-minimal

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # ----------------------------------------------------
    # 1. CHECKOUT
    # ----------------------------------------------------
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: true

    # ----------------------------------------------------
    # 2. INSTALL REQUIRED PACKAGES
    # ----------------------------------------------------
    - name: Install Yocto build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gawk wget git-core diffstat unzip texinfo gcc build-essential \
          chrpath socat cpio python3 python3-pip python3-pexpect \
          xz-utils debianutils iputils-ping python3-git python3-jinja2 \
          libacl1 libacl1-dev libattr1 libattr1-dev attr \
          libsdl1.2-dev xterm \
          gcc-multilib g++-multilib \
          locales

        sudo locale-gen en_US.UTF-8

    # ----------------------------------------------------
    # 3. CREATE BUILD DIRECTORY
    # ----------------------------------------------------
    - name: Prepare build folder
      run: |
        mkdir -p yocto
        cd yocto

        # Clone poky
        if [ ! -d "poky" ]; then
          git clone --branch "${{ inputs.yocto_version }}" https://git.yoctoproject.org/poky
        fi

        # Clone raspberrypi layer if requested
        if [[ "${{ inputs.machine }}" == raspberrypi* ]]; then
          if [ ! -d "meta-raspberrypi" ]; then
            git clone --branch "${{ inputs.yocto_version }}" \
              https://github.com/agherzan/meta-raspberrypi.git
          fi
        fi

    # ----------------------------------------------------
    # 4. SET UP THE YOCTO PROJECT
    # ----------------------------------------------------
    - name: Initialize Yocto environment
      run: |
        cd yocto
        source poky/oe-init-build-env build

        # Add layers
        bitbake-layers add-layer ../meta-raspberrypi || true

        # Configure MACHINE & IMAGE
        echo "MACHINE = \"${{ inputs.machine }}\"" >> conf/local.conf
        echo "BB_NUMBER_THREADS = \"$(nproc)\"" >> conf/local.conf
        echo "PARALLEL_MAKE = \"-j $(nproc)\"" >> conf/local.conf

        # Enable sstate cache for huge speed improvement
        mkdir -p $GITHUB_WORKSPACE/sstate-cache
        echo "SSTATE_DIR = \"$GITHUB_WORKSPACE/sstate-cache\"" >> conf/local.conf
        echo "DL_DIR = \"$GITHUB_WORKSPACE/downloads\"" >> conf/local.conf

    # ----------------------------------------------------
    # 5. BUILD IMAGE
    # ----------------------------------------------------
    - name: Build Yocto image
      run: |
        cd yocto
        source poky/oe-init-build-env build

        bitbake ${{ inputs.image }}

    # ----------------------------------------------------
    # 6. UPLOAD ARTIFACTS
    # ----------------------------------------------------
    - name: Upload image artifacts
      uses: actions/upload-artifact@v4
      with:
        name: yocto-image
        path: yocto/build/tmp/deploy/images/${{ inputs.machine }}/
