name: Build Yocto Linux Image

on:
  workflow_dispatch:
    inputs:
      yocto_version:
        description: 'Yocto release (e.g., kirkstone, scarthgap)'
        required: true
        type: choice
        options:
          - scarthgap  # Latest LTS (5.0) - Python 3.12+ compatible - RECOMMENDED
          - kirkstone  # LTS (4.0) - Requires Python 3.10 or older - STABLE
        default: scarthgap
      machine:
        description: 'Target machine (e.g., raspberrypi4-64, qemux86-64)'
        required: true
        type: string
        default: 'raspberrypi4-64'
      agent_version:
        description: 'Agent version to embed (default: latest from package.json)'
        required: false
        type: string
      include_agent:
        description: 'Include Iotistic agent in image'
        required: true
        type: boolean
        default: true
  schedule:
    # Build weekly on Sunday at 3 AM UTC
    - cron: '0 3 * * 0'

env:
  # Yocto build requires lots of disk space
  BUILD_DIR: /opt/yocto-builds
  DL_DIR: /opt/yocto-downloads
  SSTATE_DIR: /opt/yocto-sstate-cache

jobs:
  build-yocto-image:
    name: Build Yocto Image
    
    runs-on: [iotistic-lab-sc]    
    timeout-minutes: 720  # 12 hours for full Yocto build (increased for self-hosted runner)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix AppArmor user namespace restrictions
        run: bash .github/workflows/scripts/fix-apparmor-userns.sh

      - name: Check disk space
        run: bash .github/workflows/scripts/check-disk-space.sh

      - name: Determine agent version
        id: version
        run: bash .github/workflows/scripts/determine-agent-version.sh "${{ inputs.agent_version }}"

      - name: Fix Python alternatives if broken
        run: bash .github/workflows/scripts/fix-python-alternatives.sh

      - name: Install Yocto dependencies
        run: bash .github/workflows/scripts/install-yocto-dependencies.sh

      - name: Setup Yocto build directories
        run: bash .github/workflows/scripts/setup-build-directories.sh "$BUILD_DIR" "$DL_DIR" "$SSTATE_DIR"

      - name: Clone Poky (Yocto reference distribution)
        run: bash .github/workflows/scripts/clone-poky.sh "$BUILD_DIR" "${{ inputs.yocto_version }}"

      - name: Clone meta-openembedded layer
        run: bash .github/workflows/scripts/clone-meta-openembedded.sh "$BUILD_DIR" "${{ inputs.yocto_version }}"

      - name: Clone meta-raspberrypi layer
        if: contains(inputs.machine, 'raspberrypi')
        run: bash .github/workflows/scripts/clone-meta-raspberrypi.sh "$BUILD_DIR" "${{ inputs.yocto_version }}"

      - name: Clone meta-virtualization layer
        run: bash .github/workflows/scripts/clone-meta-virtualization.sh "$BUILD_DIR" "${{ inputs.yocto_version }}"

      - name: Create meta-iotistic layer
        run: bash .github/workflows/scripts/create-meta-iotistic.sh "$BUILD_DIR"

      - name: Create agent recipe
        if: inputs.include_agent == true
        run: bash .github/workflows/scripts/create-agent-recipe.sh "$BUILD_DIR" "${{ steps.version.outputs.agent_version }}"

      - name: Initialize build environment
        run: bash .github/workflows/scripts/init-build-env.sh "$BUILD_DIR" "${{ inputs.yocto_version }}"

      - name: Configure build
        run: bash .github/workflows/scripts/configure-build.sh "$BUILD_DIR" "${{ inputs.yocto_version }}" "$DL_DIR" "$SSTATE_DIR" "${{ inputs.include_agent }}" "${{ steps.version.outputs.agent_version }}"

      - name: Build image
        run: bash .github/workflows/scripts/build-image.sh "$BUILD_DIR" "${{ inputs.yocto_version }}" "$SSTATE_DIR"

      - name: Show build artifacts
        run: bash .github/workflows/scripts/show-artifacts.sh "$BUILD_DIR" "${{ inputs.machine }}"

      - name: Package artifacts
        run: bash .github/workflows/scripts/package-artifacts.sh "$BUILD_DIR" "${{ inputs.machine }}" "${{ inputs.yocto_version }}" "${{ steps.version.outputs.agent_version }}" "${{ github.workspace }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yocto-image-${{ inputs.machine }}-${{ steps.version.outputs.agent_version }}
          path: yocto-artifacts/
          retention-days: 30
          compression-level: 0  # Already compressed

      - name: Check disk space after build
        if: always()
        run: |
          echo "=== Disk Space After Build ==="
          df -h
          
          echo ""
          echo "=== Build Directory Size ==="
          du -sh $BUILD_DIR/* 2>/dev/null || true

      - name: Cleanup old builds
        if: always()
        run: bash .github/workflows/scripts/cleanup-old-builds.sh "$BUILD_DIR" "$DL_DIR"

      - name: Generate build summary
        if: always()
        run: |
          {
            echo "## IotisticOS Build Summary"
            echo ""
            echo "### Configuration"
            echo "- **Distribution**: IotisticOS v1.0.0"
            echo "- **Yocto Version**: ${{ inputs.yocto_version }}"
            echo "- **Machine**: ${{ inputs.machine }}"
            echo "- **Agent Version**: ${{ steps.version.outputs.agent_version }}"
            echo ""
            echo "### Architecture Features"
            echo "- ✅ Read-only root filesystem"
            echo "- ✅ Persistent /data partition (4GB)"
            echo "- ✅ Systemd init system"
            echo "- ✅ NetworkManager connectivity"
            echo "- ✅ Container orchestration agent"
            echo "- ✅ OTA update capable"
            echo ""
            echo "### Partition Layout"
            echo "\`\`\`"
            echo "/dev/mmcblk0p1: /boot (64MB FAT32) - Kernel + device tree"
            echo "/dev/mmcblk0p2: /     (2GB ext4)   - Read-only rootfs"
            echo "/dev/mmcblk0p3: /data (4GB ext4)   - Persistent data"
            echo "\`\`\`"
            echo ""
            echo "### Build Status"
            if [ -f "$BUILD_DIR/poky/build/tmp/deploy/images/${{ inputs.machine }}/iotistic-image-${{ inputs.machine }}.wic.bz2" ]; then
              echo "✅ Build successful"
              echo ""
              echo "### Artifacts"
              echo "\`\`\`"
              ls -lh $BUILD_DIR/poky/build/tmp/deploy/images/${{ inputs.machine }}/ | grep -E "iotistic-image.*\.(wic|tar)" || echo "No images found"
              echo "\`\`\`"
              echo ""
              echo "### Flash Instructions"
              echo "\`\`\`bash"
              echo "# Extract and flash to SD card (Linux/macOS)"
              echo "bunzip2 iotistic-image-${{ inputs.machine }}.wic.bz2"
              echo "sudo dd if=iotistic-image-${{ inputs.machine }}.wic of=/dev/sdX bs=4M status=progress"
              echo "sync"
              echo ""
              echo "# Or use Etcher for GUI flashing (all platforms)"
              echo "# https://etcher.balena.io/"
              echo "\`\`\`"
            else
              echo "❌ Build failed or image not found"
            fi
          } >> $GITHUB_STEP_SUMMARY