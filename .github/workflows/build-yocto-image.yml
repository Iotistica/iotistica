name: Build Yocto Linux Image

on:
  workflow_dispatch:
    inputs:
      yocto_version:
        description: 'Yocto release (e.g., kirkstone, scarthgap)'
        required: true
        type: choice
        options:
          - scarthgap  # Latest LTS (5.0) - Python 3.12+ compatible - RECOMMENDED
          - kirkstone  # LTS (4.0) - Requires Python 3.10 or older - STABLE
        default: scarthgap
      machine:
        description: 'Target machine (e.g., raspberrypi4-64, qemux86-64)'
        required: true
        type: string
        default: 'raspberrypi4-64'
      agent_version:
        description: 'Agent version to embed (default: latest from package.json)'
        required: false
        type: string
      include_agent:
        description: 'Include Iotistic agent in image'
        required: true
        type: boolean
        default: true
  schedule:
    # Build weekly on Sunday at 3 AM UTC
    - cron: '0 3 * * 0'

env:
  # Yocto build requires lots of disk space
  BUILD_DIR: /opt/yocto-builds
  DL_DIR: /opt/yocto-downloads
  SSTATE_DIR: /opt/yocto-sstate-cache

jobs:
  build-yocto-image:
    name: Build Yocto Image
    runs-on: [iotistic-lab-sc]  # Self-hosted runner with lots of disk space
    timeout-minutes: 480  # 8 hours for full build
    
    steps:
      - name: Check disk space
        run: |
          echo "=== Disk Space Before Build ==="
          df -h
          
          # Yocto needs at least 50GB free (minimum), 100GB recommended
          AVAILABLE=$(df -BG /opt | tail -1 | awk '{print $4}' | sed 's/G//')
          if [ "$AVAILABLE" -lt 50 ]; then
            echo "❌ Insufficient disk space: ${AVAILABLE}GB available, 50GB minimum required"
            exit 1
          fi
          
          if [ "$AVAILABLE" -lt 100 ]; then
            echo "⚠️  Limited disk space: ${AVAILABLE}GB available (100GB recommended)"
            echo "Build may succeed but watch for disk space issues"
          else
            echo "✓ Sufficient disk space: ${AVAILABLE}GB available"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine agent version
        id: version
        run: |
          if [ -n "${{ inputs.agent_version }}" ]; then
            AGENT_VERSION="${{ inputs.agent_version }}"
          else
            AGENT_VERSION=$(jq -r '.version' agent/package.json)
          fi
          
          echo "agent_version=$AGENT_VERSION" >> $GITHUB_OUTPUT
          echo "Building with agent version: $AGENT_VERSION"

      - name: Fix Python alternatives if broken
        run: |
          echo "Ensuring system Python is properly configured..."
          
          # Test if apt_pkg module works (more reliable than just python3 --version)
          if ! python3 -c "import apt_pkg" 2>/dev/null; then
            echo "Python apt_pkg module not working, restoring system Python..."
            
            # Find the original system Python (typically 3.12 on Noble)
            SYSTEM_PYTHON=$(ls /usr/bin/python3.* | grep -E 'python3\.[0-9]+$' | grep -v python3.8 | sort -V | tail -n1)
            
            if [ -n "$SYSTEM_PYTHON" ]; then
              echo "Found system Python: $SYSTEM_PYTHON"
              VERSION=$($SYSTEM_PYTHON --version)
              echo "Version: $VERSION"
              
              # Remove all python3 alternatives
              sudo update-alternatives --remove-all python3 2>/dev/null || true
              
              # Set system Python as default with high priority
              sudo update-alternatives --install /usr/bin/python3 python3 $SYSTEM_PYTHON 100
              sudo update-alternatives --set python3 $SYSTEM_PYTHON
              
              # Verify fix
              python3 --version
              python3 -c "import apt_pkg" && echo "✓ Python3 and apt_pkg fixed" || echo "⚠ apt_pkg still broken"
            else
              echo "❌ Could not find system Python"
              exit 1
            fi
          else
            echo "✓ Python3 and apt_pkg are working correctly"
            python3 --version
          fi

      - name: Install Yocto dependencies
        run: |
          echo "Installing Yocto build dependencies..."
          
          # Check if already installed
          if command -v bitbake &> /dev/null; then
            echo "✓ Yocto tools already installed"
          fi
          
          # Install Python 3.8 for older Yocto versions (dunfell, kirkstone)
          echo "Installing Python 3.8 for Yocto compatibility..."
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.8 python3.8-dev python3.8-distutils
          
          # Install dependencies (Ubuntu/Debian)
          sudo apt-get install -y \
            gawk wget git diffstat unzip texinfo gcc build-essential \
            chrpath socat cpio python3-pip python3-pexpect \
            xz-utils debianutils iputils-ping python3-git python3-jinja2 \
            libsdl1.2-dev pylint xterm python3-subunit mesa-common-dev \
            zstd liblz4-tool file locales libacl1
          
          # Set locale
          sudo locale-gen en_US.UTF-8
          
          echo "✓ Dependencies installed"

      - name: Setup Yocto build directories
        run: |
          echo "Setting up Yocto build directories..."
          
          # Create persistent directories (idempotent - safe to run multiple times)
          sudo mkdir -p $BUILD_DIR
          sudo mkdir -p $DL_DIR
          sudo mkdir -p $SSTATE_DIR
          
          # Set ownership to current user (works for both 'runner' and other usernames)
          sudo chown -R $(whoami):$(whoami) $BUILD_DIR
          sudo chown -R $(whoami):$(whoami) $DL_DIR
          sudo chown -R $(whoami):$(whoami) $SSTATE_DIR
          
          # Verify directories and show disk space
          echo ""
          echo "=== Yocto Build Directories ==="
          ls -ld /opt/yocto-* 2>/dev/null || echo "Directories created: $BUILD_DIR, $DL_DIR, $SSTATE_DIR"
          
          echo ""
          echo "=== Disk Space on /opt ==="
          df -h /opt
          
          echo ""
          echo "✓ Build directories ready"

      - name: Clone Poky (Yocto reference distribution)
        run: |
          YOCTO_VERSION="${{ inputs.yocto_version }}"
          
          if [ -d "$BUILD_DIR/poky" ]; then
            echo "Poky exists, checking version..."
            cd $BUILD_DIR/poky
            CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
            
            if [ "$CURRENT_BRANCH" != "$YOCTO_VERSION" ]; then
              echo "Branch mismatch: $CURRENT_BRANCH != $YOCTO_VERSION"
              echo "Removing old poky and cloning fresh..."
              cd $BUILD_DIR
              rm -rf poky
              git clone -b $YOCTO_VERSION git://git.yoctoproject.org/poky.git
            else
              echo "Poky already on correct branch, updating..."
              git fetch origin
              git reset --hard origin/$YOCTO_VERSION
            fi
          else
            echo "Cloning Poky ($YOCTO_VERSION)..."
            cd $BUILD_DIR
            git clone -b $YOCTO_VERSION git://git.yoctoproject.org/poky.git
          fi
          
          echo "✓ Poky ready (branch: $YOCTO_VERSION)"

      - name: Clone meta-raspberrypi layer
        if: contains(inputs.machine, 'raspberrypi')
        run: |
          YOCTO_VERSION="${{ inputs.yocto_version }}"
          
          if [ -d "$BUILD_DIR/meta-raspberrypi" ]; then
            echo "meta-raspberrypi already cloned, updating..."
            cd $BUILD_DIR/meta-raspberrypi
            git fetch origin
            git checkout $YOCTO_VERSION
            git pull origin $YOCTO_VERSION
          else
            echo "Cloning meta-raspberrypi ($YOCTO_VERSION)..."
            cd $BUILD_DIR
            git clone -b $YOCTO_VERSION https://github.com/agherzan/meta-raspberrypi.git
          fi
          
          echo "✓ meta-raspberrypi ready"

      - name: Create meta-iotistic layer
        run: |
          echo "Creating custom meta-iotistic layer..."
          
          LAYER_DIR="$BUILD_DIR/meta-iotistic"
          mkdir -p $LAYER_DIR/conf
          mkdir -p $LAYER_DIR/conf/distro
          mkdir -p $LAYER_DIR/recipes-iotistic/agent
          mkdir -p $LAYER_DIR/recipes-core/images
          mkdir -p $LAYER_DIR/recipes-connectivity/networkmanager
          mkdir -p $LAYER_DIR/recipes-support/resin-init
          
          # Layer configuration
          cat > $LAYER_DIR/conf/layer.conf << 'EOF'
          # We have a conf and classes directory, add to BBPATH
          BBPATH .= ":${LAYERDIR}"
          
          # We have recipes-* directories, add to BBFILES
          BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
                      ${LAYERDIR}/recipes-*/*/*.bbappend"
          
          BBFILE_COLLECTIONS += "meta-iotistic"
          BBFILE_PATTERN_meta-iotistic = "^${LAYERDIR}/"
          BBFILE_PRIORITY_meta-iotistic = "6"
          
          LAYERDEPENDS_meta-iotistic = "core"
          LAYERSERIES_COMPAT_meta-iotistic = "kirkstone scarthgap"
          EOF
          
          # IotisticOS distro configuration
          cat > $LAYER_DIR/conf/distro/iotistic.conf << 'EOF'
          # IotisticOS - IoT distribution with container orchestration
          
          require conf/distro/poky.conf
          
          DISTRO = "iotistic"
          DISTRO_NAME = "IotisticOS"
          DISTRO_VERSION = "1.0.0"
          DISTRO_CODENAME = "iotistic-core"
          
          # Systemd as init system
          DISTRO_FEATURES:append = " systemd"
          DISTRO_FEATURES_BACKFILL_CONSIDERED = "sysvinit"
          VIRTUAL-RUNTIME_init_manager = "systemd"
          VIRTUAL-RUNTIME_initscripts = ""
          VIRTUAL-RUNTIME_login_manager = "shadow-base"
          
          # Use ipk package manager instead of RPM (fixes "No file attributes configured" error in dunfell)
          PACKAGE_CLASSES = "package_ipk"
          
          # Read-only root filesystem for reliability
          IMAGE_FEATURES:append = " read-only-rootfs"
          
          # Networking support with WiFi and Bluetooth
          DISTRO_FEATURES:append = " wifi bluetooth"
          
          # Container support
          DISTRO_FEATURES:append = " virtualization"
          
          # Security features
          DISTRO_FEATURES:append = " pam"
          
          # Remove unnecessary features for embedded
          DISTRO_FEATURES:remove = "x11 wayland vulkan"
          EOF
          
          # Custom image recipe
          cat > $LAYER_DIR/recipes-core/images/iotistic-image.bb << 'EOF'
          SUMMARY = "IotisticOS - IoT platform image with container orchestration"
          DESCRIPTION = "Minimal embedded Linux with agent-based container orchestration"
          LICENSE = "MIT"
          
          inherit core-image
          
          # Base system packages
          IMAGE_INSTALL:append = " \
              packagegroup-core-boot \
              packagegroup-base-wifi \
              ${CORE_IMAGE_EXTRA_INSTALL} \
          "
          
          # Systemd and init (systemd-networkd and systemd-resolved are included in systemd package)
          IMAGE_INSTALL:append = " \
              systemd \
              dbus \
          "
          
          # Basic networking (NetworkManager requires meta-openembedded)
          IMAGE_INSTALL:append = " \
              wpa-supplicant \
              iproute2 \
              iputils \
          "
          
          # Container runtime essentials (simplified for dunfell compatibility)
          IMAGE_INSTALL:append = " \
              curl \
              wget \
              ca-certificates \
          "
          
          # Iotistic agent for container orchestration
          # IMAGE_INSTALL:append = " \
          #     iotistic-agent \
          # "
          
          # Development tools (ssh access only)
          IMAGE_INSTALL:append = " \
              openssh \
              openssh-sftp-server \
          "
          
          # Filesystem utilities
          IMAGE_INSTALL:append = " \
              e2fsprogs \
              e2fsprogs-resize2fs \
              parted \
              dosfstools \
          "
          
          # Persistent data partition initialization
          IMAGE_INSTALL:append = " \
              iotistic-init-datapartition \
          "
          
          # Read-only root with overlay for reliability
          IMAGE_FEATURES:append = " read-only-rootfs"
          
          # Extra space for applications
          IMAGE_ROOTFS_EXTRA_SPACE = "524288"
          
          # Boot partition size
          BOOT_SPACE = "65536"
          
          # WIC image for SD card deployment
          IMAGE_FSTYPES = "wic.bz2 tar.bz2"
          WKS_FILE = "iotistic-raspberrypi.wks"
          EOF
          
          # WIC partition layout (boot + rootfs + data)
          cat > $LAYER_DIR/recipes-core/images/iotistic-raspberrypi.wks << 'EOF'
          # IotisticOS partition layout
          # - boot: FAT32 boot partition (kernel, device tree)
          # - rootfs: ext4 read-only root filesystem
          # - data: ext4 persistent data partition (for containers, configs)
          
          part /boot --source bootimg-partition --ondisk mmcblk0 --fstype=vfat --label boot --active --align 4096 --size 64M
          part / --source rootfs --ondisk mmcblk0 --fstype=ext4 --label rootfs --align 4096 --size 2G
          part /data --ondisk mmcblk0 --fstype=ext4 --label data --align 4096 --size 4G
          EOF
          
          # Data partition init service
          mkdir -p $LAYER_DIR/recipes-support/resin-init/files
          cat > $LAYER_DIR/recipes-support/resin-init/iotistic-init-datapartition.bb << 'EOF'
          SUMMARY = "Initialize persistent data partition"
          LICENSE = "MIT"
          LIC_FILES_CHKSUM = "file://${COMMON_LICENSE_DIR}/MIT;md5=0835ade698e0bcf8506ecda2f7b4f302"
          
          SRC_URI = "file://iotistic-init-data.sh \
                     file://iotistic-init-data.service"
          
          inherit systemd
          
          SYSTEMD_SERVICE:${PN} = "iotistic-init-data.service"
          SYSTEMD_AUTO_ENABLE = "enable"
          
          do_install() {
              install -d ${D}${sbindir}
              install -m 0755 ${WORKDIR}/iotistic-init-data.sh ${D}${sbindir}/
              
              install -d ${D}${systemd_system_unitdir}
              install -m 0644 ${WORKDIR}/iotistic-init-data.service ${D}${systemd_system_unitdir}/
          }
          EOF
          
          cat > $LAYER_DIR/recipes-support/resin-init/files/iotistic-init-data.sh << 'EOF'
          #!/bin/sh
          # Initialize /data partition on first boot
          
          set -e
          
          DATA_PARTITION="/dev/mmcblk0p3"
          MOUNT_POINT="/data"
          
          # Check if data partition exists
          if [ ! -b "$DATA_PARTITION" ]; then
              echo "Data partition not found: $DATA_PARTITION"
              exit 0
          fi
          
          # Create mount point
          mkdir -p "$MOUNT_POINT"
          
          # Check if already formatted
          if ! blkid "$DATA_PARTITION" | grep -q "TYPE="; then
              echo "Formatting data partition..."
              mkfs.ext4 -F -L data "$DATA_PARTITION"
          fi
          
          # Mount data partition
          if ! mountpoint -q "$MOUNT_POINT"; then
              echo "Mounting data partition..."
              mount "$DATA_PARTITION" "$MOUNT_POINT"
          fi
          
          # Create application directories
          mkdir -p /data/iotistic
          mkdir -p /data/docker
          mkdir -p /data/logs
          
          # Link agent data directory
          if [ ! -L /var/lib/iotistic ]; then
              rm -rf /var/lib/iotistic
              ln -s /data/iotistic /var/lib/iotistic
          fi
          
          echo "Data partition initialized"
          EOF
          
          cat > $LAYER_DIR/recipes-support/resin-init/files/iotistic-init-data.service << 'EOF'
          [Unit]
          Description=Initialize IotisticOS data partition
          DefaultDependencies=no
          After=systemd-udev-settle.service
          Before=local-fs.target
          RequiresMountsFor=/data
          
          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/usr/sbin/iotistic-init-data.sh
          StandardOutput=journal+console
          StandardError=journal+console
          
          [Install]
          WantedBy=local-fs.target
          EOF
          
          # Verify layer was created
          echo ""
          echo "=== Verifying meta-iotistic layer creation ==="
          ls -la $LAYER_DIR/conf/
          ls -la $LAYER_DIR/conf/distro/
          echo ""
          echo "iotistic.conf exists:" 
          [ -f "$LAYER_DIR/conf/distro/iotistic.conf" ] && echo "✓ YES" || echo "❌ NO"
          echo ""
          
          echo "✓ meta-iotistic layer created"

      - name: Create agent recipe
        if: inputs.include_agent == true
        run: |
          LAYER_DIR="$BUILD_DIR/meta-iotistic"
          AGENT_VERSION="${{ steps.version.outputs.agent_version }}"
          
          echo "Creating iotistic-agent recipe..."
          
          # Create recipe directory structure
          mkdir -p $LAYER_DIR/recipes-iotistic/agent/files/agent-src
          
          # Copy agent files into the files/agent-src subdirectory
          cp -r agent/* $LAYER_DIR/recipes-iotistic/agent/files/agent-src/
          
          # Create BitBake recipe
          cat > $LAYER_DIR/recipes-iotistic/agent/iotistic-agent_${AGENT_VERSION}.bb << 'EOF'
          SUMMARY = "Iotistic IoT Device Agent"
          DESCRIPTION = "Container orchestrator and cloud sync agent for Iotistic IoT platform"
          LICENSE = "MIT"
          LIC_FILES_CHKSUM = "file://${COMMON_LICENSE_DIR}/MIT;md5=0835ade698e0bcf8506ecda2f7b4f302"
          
          DEPENDS = "nodejs-native"
          RDEPENDS:${PN} = "nodejs pm2 sqlite3"
          
          SRC_URI = "file://agent-src"
          S = "${WORKDIR}/agent-src"
          
          inherit systemd
          
          SYSTEMD_SERVICE:${PN} = "iotistic-agent.service"
          SYSTEMD_AUTO_ENABLE = "enable"
          
          do_install() {
              # Install agent to /opt/iotistic/agent
              install -d ${D}/opt/iotistic/agent
              cp -r ${S}/* ${D}/opt/iotistic/agent/
              
              # Install systemd service
              install -d ${D}${systemd_system_unitdir}
              cat > ${D}${systemd_system_unitdir}/iotistic-agent.service << 'SERVICE'
          [Unit]
          Description=Iotistic Device Agent
          After=network-online.target
          Wants=network-online.target
          
          [Service]
          Type=forking
          User=iotistic
          Group=iotistic
          WorkingDirectory=/opt/iotistic/agent
          EnvironmentFile=/etc/iotistic/agent.env
          ExecStart=/usr/bin/pm2 start /opt/iotistic/agent/dist/index.js --name iotistic-agent --update-env
          ExecStop=/usr/bin/pm2 stop iotistic-agent
          ExecReload=/usr/bin/pm2 reload iotistic-agent
          Restart=always
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=iotistic-agent
          
          [Install]
          WantedBy=multi-user.target
          SERVICE
              
              # Create directories
              install -d ${D}/var/lib/iotistic/agent
              install -d ${D}/var/log/iotistic
              install -d ${D}/etc/iotistic
              
              # Create default environment file
              cat > ${D}/etc/iotistic/agent.env << 'ENVFILE'
          # Iotistic Agent Configuration
          NODE_ENV=production
          LOG_LEVEL=info
          CLOUD_API_ENDPOINT=https://api.iotistic.ca
          IOTISTIC_DEVICE_PORT=48484
          ORCHESTRATOR_INTERVAL=30000
          POLL_INTERVAL_MS=30000
          REPORT_INTERVAL_MS=60000
          ENVFILE
          }
          
          do_compile() {
              # Build agent
              cd ${S}
              npm ci --production
              npm run build
          }
          
          pkg_postinst:${PN}() {
              #!/bin/sh -e
              if [ -z "$D" ]; then
                  # Create iotistic user/group
                  if ! getent group iotistic >/dev/null; then
                      groupadd -r iotistic
                  fi
                  if ! getent passwd iotistic >/dev/null; then
                      useradd -r -g iotistic -d /opt/iotistic/agent -s /sbin/nologin -c "Iotistic Agent" iotistic
                  fi
                  
                  # Set permissions
                  chown -R iotistic:iotistic /opt/iotistic/agent
                  chown -R iotistic:iotistic /var/lib/iotistic
                  chown -R iotistic:iotistic /var/log/iotistic
                  chmod 600 /etc/iotistic/agent.env
              fi
          }
          
          FILES:${PN} += "/opt/iotistic/agent/*"
          FILES:${PN} += "/var/lib/iotistic/*"
          FILES:${PN} += "/var/log/iotistic/*"
          FILES:${PN} += "/etc/iotistic/*"
          FILES:${PN} += "${systemd_system_unitdir}/iotistic-agent.service"
          EOF
          
          echo "✓ Agent recipe created"

      - name: Initialize build environment
        run: |
          cd $BUILD_DIR/poky
          
          # Set Python 3.8 for kirkstone (dunfell removed due to unfixable RPM bug)
          if [ "${{ inputs.yocto_version }}" = "kirkstone" ]; then
            echo "Configuring Python 3.8 for Yocto ${{ inputs.yocto_version }}"
            export PYTHON=/usr/bin/python3.8
            # Create a wrapper to ensure bitbake uses Python 3.8
            mkdir -p $HOME/.local/bin
            echo '#!/bin/bash' > $HOME/.local/bin/python3
            echo 'exec /usr/bin/python3.8 "$@"' >> $HOME/.local/bin/python3
            chmod +x $HOME/.local/bin/python3
            export PATH="$HOME/.local/bin:$PATH"
            python3 --version
          fi
          
          # Source Yocto environment
          source oe-init-build-env build
          
          echo "✓ Build environment initialized"

      - name: Configure build
        run: |
          cd $BUILD_DIR/poky
          
          # Set Python 3.8 for kirkstone (dunfell removed due to unfixable RPM bug)
          if [ "${{ inputs.yocto_version }}" = "kirkstone" ]; then
            export PATH="$HOME/.local/bin:$PATH"
          fi
          
          # Source build environment (specify build dir to avoid creating new one)
          source oe-init-build-env build
          
          # Show current layers
          echo "=== Current layers ==="
          bitbake-layers show-layers || echo "No layers yet"
          
          # Check if layers exist before adding
          echo ""
          echo "=== Checking layer directories ==="
          ls -la ../../ | grep meta || echo "No meta layers found"
          
          # Add meta-raspberrypi if needed
          if [[ "${{ inputs.machine }}" == *"raspberrypi"* ]]; then
            echo ""
            echo "Adding meta-raspberrypi layer..."
            if [ -d "../../meta-raspberrypi" ]; then
              bitbake-layers add-layer ../../meta-raspberrypi
              echo "✓ meta-raspberrypi added"
            else
              echo "❌ meta-raspberrypi directory not found at ../../meta-raspberrypi"
            fi
          fi
          
          # Add meta-iotistic
          echo ""
          echo "Adding meta-iotistic layer..."
          if [ -d "../../meta-iotistic" ]; then
            if [ -f "../../meta-iotistic/conf/layer.conf" ]; then
              bitbake-layers add-layer ../../meta-iotistic
              echo "✓ meta-iotistic added"
            else
              echo "❌ meta-iotistic/conf/layer.conf not found"
            fi
          else
            echo "❌ meta-iotistic directory not found at ../../meta-iotistic"
            echo "BUILD_DIR is: $BUILD_DIR"
            echo "Current directory: $(pwd)"
            echo "Parent directory contents:"
            ls -la ../../
          fi
          
          # Verify layers are added
          echo "=== Layers after adding ==="
          bitbake-layers show-layers
          
          # Check if meta-iotistic distro conf exists
          if [ -f "../../meta-iotistic/conf/distro/iotistic.conf" ]; then
            echo "✓ iotistic.conf found"
          else
            echo "❌ iotistic.conf NOT found at ../../meta-iotistic/conf/distro/iotistic.conf"
            ls -la ../../meta-iotistic/conf/distro/ || echo "distro directory doesn't exist"
          fi
          
          # Set variables for local.conf
          MACHINE_VAR="${{ inputs.machine }}"
          DL_DIR_VAR="${{ env.DL_DIR }}"
          SSTATE_DIR_VAR="${{ env.SSTATE_DIR }}"
          
          # Check if configuration already exists, if not add it
          if ! grep -q "IotisticOS Configuration" conf/local.conf 2>/dev/null; then
            echo "Adding IotisticOS configuration to local.conf..."
            
            # Configure local.conf with proper variable substitution
            cat >> conf/local.conf << EOF
          
          # IotisticOS Configuration
          # ========================
          
          # Use IotisticOS distro
          DISTRO = "iotistic"
          MACHINE = "${MACHINE_VAR}"
          
          # Use shared download directory for build cache
          DL_DIR = "${DL_DIR_VAR}"
          SSTATE_DIR = "${SSTATE_DIR_VAR}"
          
          # Parallel build settings (reduced to prevent OOM)
          BB_NUMBER_THREADS = "4"
          PARALLEL_MAKE = "-j 4"
          
          # Read-only root filesystem
          IMAGE_FEATURES:append = " read-only-rootfs"
          
          # Boot partition configuration
          RPI_USE_U_BOOT = "1"
          ENABLE_UART = "1"
          
          # Package management for OTA updates
          PACKAGE_CLASSES = "package_ipk"
          EXTRA_IMAGE_FEATURES:append = " package-management"
          
          # Development features (remove for production)
          EXTRA_IMAGE_FEATURES:append = " debug-tweaks"
          EXTRA_IMAGE_FEATURES:append = " ssh-server-openssh"
          
          # Reduce image size
          INHERIT += "rm_work"
          
          # License compliance
          LICENSE_FLAGS_ACCEPTED:append = " commercial"
          EOF
          else
            echo "IotisticOS configuration already in local.conf"
          fi
          
          # Show what was written
          echo "=== local.conf DISTRO and MACHINE settings ==="
          grep -E "^DISTRO|^MACHINE|^PACKAGE_CLASSES" conf/local.conf
          
          # Verify distro configuration exists and contains IPK setting
          echo ""
          echo "=== Verifying distro configuration ==="
          if [ -f "../../meta-iotistic/conf/distro/iotistic.conf" ]; then
            echo "✓ iotistic.conf exists"
            echo "PACKAGE_CLASSES setting in distro conf:"
            grep "PACKAGE_CLASSES" ../../meta-iotistic/conf/distro/iotistic.conf
          else
            echo "❌ ERROR: iotistic.conf NOT FOUND!"
            echo "This will cause RPM to be used by default!"
            exit 1
          fi
          
          # Force PACKAGE_CLASSES in local.conf to override everything
          echo ""
          echo "=== Enforcing IPK package manager with HIGHEST priority ==="
          # Remove any existing PACKAGE_CLASSES lines
          sed -i '/^PACKAGE_CLASSES/d' conf/local.conf
          # Add IPK configuration with :forcevariable (highest BitBake priority)
          echo "" >> conf/local.conf
          echo "# FORCE IPK package manager with :forcevariable (highest priority)" >> conf/local.conf
          echo "# This overrides ALL other settings including distro defaults" >> conf/local.conf
          echo "PACKAGE_CLASSES:forcevariable = \"package_ipk\"" >> conf/local.conf
          echo "✓ IPK forced with :forcevariable in local.conf"
          
          # Show final PACKAGE_CLASSES setting
          echo "Final PACKAGE_CLASSES:"
          grep "PACKAGE_CLASSES" conf/local.conf | tail -1
          
          echo "✓ Build configuration complete"

      - name: Build image
        run: |
          cd $BUILD_DIR/poky
          
          # Set Python 3.8 for kirkstone (dunfell removed due to unfixable RPM bug)
          if [ "${{ inputs.yocto_version }}" = "kirkstone" ]; then
            export PATH="$HOME/.local/bin:$PATH"
          fi
          
          # Source build environment (specify build dir to avoid creating new one)
          source oe-init-build-env build
          
          # ULTRA-NUCLEAR OPTION: Remove tmp AND sstate-cache native packages
          echo "=== ULTRA-NUCLEAR: Force completely clean build with IPK ==="
          echo "Problem: sstate-cache contains cached RPM native tools"
          echo "Solution: Remove ALL native sysroots from sstate-cache"
          echo ""
          
          if [ -d tmp ]; then
            echo "Step 1: Removing entire tmp/ directory..."
            rm -rf tmp
            echo "✓ tmp/ removed"
          fi
          
          if [ -d "$SSTATE_DIR" ]; then
            echo ""
            echo "Step 2: Removing native sstate-cache (contains RPM tools)..."
            echo "Before: $(du -sh $SSTATE_DIR 2>/dev/null || echo '0')"
            
            # Remove all x86_64 native packages (rpm, rpm-native, etc)
            find "$SSTATE_DIR" -type d -name "*x86_64-linux*" -exec rm -rf {} + 2>/dev/null || true
            find "$SSTATE_DIR" -type d -name "*allarch*" -exec rm -rf {} + 2>/dev/null || true
            
            echo "After: $(du -sh $SSTATE_DIR 2>/dev/null || echo '0')"
            echo "✓ Native sstate-cache cleared"
          fi
          
          echo ""
          echo "✓ Complete clean - BitBake will build native tools (including opkg-utils) from scratch with IPK"
          
          # Verify IPK configuration before building
          echo ""
          echo "=== CRITICAL: Verifying IPK package manager configuration ==="
          echo "Checking PACKAGE_CLASSES in local.conf..."
          PACKAGE_CLASSES_CONF=$(grep "^PACKAGE_CLASSES" conf/local.conf | tail -1)
          echo "Found: $PACKAGE_CLASSES_CONF"
          
          if echo "$PACKAGE_CLASSES_CONF" | grep -q "package_ipk"; then
            echo "✓ IPK configured in local.conf"
          else
            echo "❌ ERROR: IPK not configured in local.conf!"
            echo "This WILL cause RPM errors!"
            exit 1
          fi
          
          echo ""
          echo "Checking if iotistic distro conf exists and has IPK..."
          # Search from BUILD_DIR (two levels up from build directory)
          IOTISTIC_CONF=$(find $BUILD_DIR -name "iotistic.conf" -path "*/conf/distro/*" 2>/dev/null | head -n1)
          if [ -n "$IOTISTIC_CONF" ]; then
            echo "✓ Found: $IOTISTIC_CONF"
            if grep -q "package_ipk" "$IOTISTIC_CONF"; then
              echo "✓ IPK configured in distro conf"
            else
              echo "⚠ WARNING: IPK not in distro conf (but local.conf will override)"
            fi
          else
            echo "❌ ERROR: iotistic.conf not found!"
            echo "Searching from: $BUILD_DIR"
            echo "Directory structure:"
            ls -la $BUILD_DIR/
            echo ""
            echo "meta-iotistic contents:"
            ls -la $BUILD_DIR/meta-iotistic/ 2>/dev/null || echo "meta-iotistic directory doesn't exist!"
            echo ""
            echo "Looking for distro configs anywhere:"
            find $BUILD_DIR -name "*.conf" -path "*/conf/distro/*" 2>/dev/null || echo "No distro configs found"
            exit 1
          fi
          
          # Verify configuration before building
          echo ""
          echo "=== Verifying build configuration ==="
          echo "Checking layers..."
          bitbake-layers show-layers
          
          echo ""
          echo "Checking DISTRO and MACHINE in local.conf..."
          grep -E "^DISTRO|^MACHINE" conf/local.conf || echo "No DISTRO/MACHINE found in local.conf!"
          
          echo ""
          echo "Checking if iotistic distro conf exists..."
          IOTISTIC_CONF=$(find $BUILD_DIR -name "iotistic.conf" -path "*/conf/distro/*" 2>/dev/null | head -n1)
          if [ -n "$IOTISTIC_CONF" ]; then
            echo "✓ Found: $IOTISTIC_CONF (already verified above)"
          else
            echo "❌ ERROR: This should never happen - already checked above!"
            exit 1
          fi
          
          echo ""
          echo "=== Configuration verification complete ==="
          echo "✓ IPK configured in both local.conf and distro conf"
          echo "✓ Using :forcevariable flag (highest BitBake priority)"
          echo "✓ Ready to build with IPK package manager"
          
          echo ""
          echo "Starting IotisticOS build..."
          echo "Building iotistic-image with:"
          echo "  - Read-only rootfs"
          echo "  - Persistent /data partition"
          echo "  - NetworkManager connectivity"
          echo "  - Iotistic agent pre-installed"
          
          # Build the custom IotisticOS image
          bitbake iotistic-image
          
          echo "✓ IotisticOS image built successfully"

      - name: Show build artifacts
        run: |
          cd $BUILD_DIR/poky/build
          
          echo "=== Build Artifacts ==="
          ls -lh tmp/deploy/images/${{ inputs.machine }}/
          
          # Find the image file
          IMAGE_FILE=$(ls tmp/deploy/images/${{ inputs.machine }}/*.wic.bz2 2>/dev/null || \
                       ls tmp/deploy/images/${{ inputs.machine }}/*.rootfs.ext4 2>/dev/null || \
                       echo "No image found")
          
          if [ "$IMAGE_FILE" != "No image found" ]; then
            IMAGE_SIZE=$(du -h "$IMAGE_FILE" | cut -f1)
            echo "✓ Image: $(basename $IMAGE_FILE) ($IMAGE_SIZE)"
          else
            echo "⚠ No standard image format found"
          fi

      - name: Package artifacts
        run: |
          cd $BUILD_DIR/poky/build
          
          ARTIFACT_DIR="${{ github.workspace }}/yocto-artifacts"
          mkdir -p $ARTIFACT_DIR
          
          # Copy images
          cp tmp/deploy/images/${{ inputs.machine }}/*.wic.bz2 $ARTIFACT_DIR/ 2>/dev/null || true
          cp tmp/deploy/images/${{ inputs.machine }}/*.rootfs.ext4 $ARTIFACT_DIR/ 2>/dev/null || true
          cp tmp/deploy/images/${{ inputs.machine }}/*.rootfs.tar.bz2 $ARTIFACT_DIR/ 2>/dev/null || true
          
          # Create manifest
          cat > $ARTIFACT_DIR/manifest.txt << EOF
          Yocto Build Manifest
          ====================
          Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Yocto Version: ${{ inputs.yocto_version }}
          Machine: ${{ inputs.machine }}
          Agent Version: ${{ steps.version.outputs.agent_version }}
          
          Build Configuration:
          - Systemd init system
          - Node.js runtime
          - PM2 process manager
          - Iotistic agent pre-installed
          
          Images:
          $(ls -lh $ARTIFACT_DIR/)
          EOF
          
          cat $ARTIFACT_DIR/manifest.txt
          
          echo "✓ Artifacts packaged"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yocto-image-${{ inputs.machine }}-${{ steps.version.outputs.agent_version }}
          path: yocto-artifacts/
          retention-days: 30
          compression-level: 0  # Already compressed

      - name: Check disk space after build
        if: always()
        run: |
          echo "=== Disk Space After Build ==="
          df -h
          
          echo ""
          echo "=== Build Directory Size ==="
          du -sh $BUILD_DIR/* 2>/dev/null || true

      - name: Cleanup old builds
        if: always()
        run: |
          echo "Cleaning up old build artifacts..."
          
          # Keep sstate-cache and downloads, remove tmp directory
          if [ -d "$BUILD_DIR/poky/build/tmp" ]; then
            echo "Removing tmp directory..."
            rm -rf $BUILD_DIR/poky/build/tmp
          fi
          
          # Clean old downloads (keep last 30 days)
          find $DL_DIR -type f -mtime +30 -delete 2>/dev/null || true
          
          echo "✓ Cleanup complete"

      - name: Generate build summary
        if: always()
        run: |
          {
            echo "## IotisticOS Build Summary"
            echo ""
            echo "### Configuration"
            echo "- **Distribution**: IotisticOS v1.0.0"
            echo "- **Yocto Version**: ${{ inputs.yocto_version }}"
            echo "- **Machine**: ${{ inputs.machine }}"
            echo "- **Agent Version**: ${{ steps.version.outputs.agent_version }}"
            echo ""
            echo "### Architecture Features"
            echo "- ✅ Read-only root filesystem"
            echo "- ✅ Persistent /data partition (4GB)"
            echo "- ✅ Systemd init system"
            echo "- ✅ NetworkManager connectivity"
            echo "- ✅ Container orchestration agent"
            echo "- ✅ OTA update capable"
            echo ""
            echo "### Partition Layout"
            echo "\`\`\`"
            echo "/dev/mmcblk0p1: /boot (64MB FAT32) - Kernel + device tree"
            echo "/dev/mmcblk0p2: /     (2GB ext4)   - Read-only rootfs"
            echo "/dev/mmcblk0p3: /data (4GB ext4)   - Persistent data"
            echo "\`\`\`"
            echo ""
            echo "### Build Status"
            if [ -f "$BUILD_DIR/poky/build/tmp/deploy/images/${{ inputs.machine }}/iotistic-image-${{ inputs.machine }}.wic.bz2" ]; then
              echo "✅ Build successful"
              echo ""
              echo "### Artifacts"
              echo "\`\`\`"
              ls -lh $BUILD_DIR/poky/build/tmp/deploy/images/${{ inputs.machine }}/ | grep -E "iotistic-image.*\.(wic|tar)" || echo "No images found"
              echo "\`\`\`"
              echo ""
              echo "### Flash Instructions"
              echo "\`\`\`bash"
              echo "# Extract and flash to SD card (Linux/macOS)"
              echo "bunzip2 iotistic-image-${{ inputs.machine }}.wic.bz2"
              echo "sudo dd if=iotistic-image-${{ inputs.machine }}.wic of=/dev/sdX bs=4M status=progress"
              echo "sync"
              echo ""
              echo "# Or use Etcher for GUI flashing (all platforms)"
              echo "# https://etcher.balena.io/"
              echo "\`\`\`"
            else
              echo "❌ Build failed or image not found"
            fi
          } >> $GITHUB_STEP_SUMMARY
