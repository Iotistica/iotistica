name: Test Runner

# Trigger on push to main or manual workflow dispatch
on:
  workflow_dispatch:
    inputs:
      chosen-os:
        required: true
        type: choice
        options:
        - iotistic-lab-sc
        - ephemeral

jobs:
  test-on-tagged-runner:
    runs-on: ["${{ inputs.chosen-os }}"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print runner info
        run: |
          echo "Running on $(hostname)"
          echo "Runner labels: $RUNNER_LABELS"

      - name: Run a test command
        run: |
          echo "Hello from a self-hosted runner with the correct tags!"