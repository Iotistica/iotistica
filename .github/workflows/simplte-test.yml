# .github/workflows/test-runner.yml
name: Test Runner

jobs:
  test-on-tagged-runner:
    runs-on: 
      self-hosted: true
      # Specify your runner tags here
      # Example: linux, gpu, or any custom tag you set in your runner
      tags:
        - iotistic-lab-sc
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print runner info
        run: |
          echo "Running on $(hostname)"
          echo "Runner labels: $RUNNER_LABELS"

      - name: Run a test command
        run: |
          echo "Hello from a self-hosted runner with the correct tags!"