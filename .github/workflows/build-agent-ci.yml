          echo "- \`IOTISTIC_INSTALL_METHOD\`: 'docker' or 'systemd' (auto-detect if not set)" >> $GITHUB_STEP_SUMMARY
          echo "- \`IOTISTIC_CLOUD_API_ENDPOINT\`: Cloud API URL" >> $GITHUB_STEP_SUMMARY
          echo "- \`IOTISTIC_PROVISIONING_KEY\`: Provisioning API key" >> $GITHUB_STEP_SUMMARY
          echo "- \`IOTISTIC_DEVICE_PORT\`: Device API port (default: 48484)" >> $GITHUB_STEP_SUMMARY
