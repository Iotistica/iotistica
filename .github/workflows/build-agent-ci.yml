name: CI Build, Test & Push Agent

on: 
  push:
    branches:
      - master
    paths:
      - 'agent/**' 
      - '.github/workflows/build-agent-ci.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: agent-ci
  cancel-in-progress: true


jobs:
  build:
    name: Build & Test
    runs-on: [arc-runner-set-iotistica-v2]
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      agent_version: ${{ steps.meta.outputs.agent_version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: agent/node_modules
          key: ${{ runner.os }}-node-modules-x86_64-${{ hashFiles('agent/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-x86_64-

      - name: Install Agent dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        working-directory: ./agent
        run: npm ci --prefer-offline --no-audit

      - name: Run unit tests
        working-directory: ./agent
        run: npm run test:unit
        continue-on-error: true

      - name: Build Agent
        working-directory: ./agent
        run: npm run build
      - name: Calculate build metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "agent_version=$(jq -r '.version' agent/package.json)" >> $GITHUB_OUTPUT

      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.meta.outputs.agent_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ steps.meta.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY

  package:
    name: Package Tarballs (${{ matrix.arch }})
    needs: build
    runs-on: [arc-runner-set-iotistica-light]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up QEMU (ARM64 only)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: agent/node_modules
          key: ${{ runner.os }}-node-modules-${{ matrix.arch }}-${{ hashFiles('agent/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ matrix.arch }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        working-directory: ./agent
        run: npm ci --prefer-offline --no-audit --legacy-peer-deps

      - name: Rebuild sqlite3 for ARM64
        if: matrix.arch == 'arm64' && steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm -v "${{ github.workspace }}/agent":/app -w /app --platform linux/arm64 \
            node:20-slim bash -c "
              apt-get update -qq && apt-get install -y -qq build-essential python3 libsqlite3-dev
              npm rebuild sqlite3 --build-from-source
            "

      - name: Build tarball (${{ matrix.arch }})
        run: |
          ARCH="${{ matrix.arch }}"

          cd agent
          npm run build

          mkdir -p /tmp/iotistic-artifacts

          tar -czf /tmp/iotistic-artifacts/agent-latest-${ARCH}.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            node_modules/ \
            bin/

          if [ "$ARCH" = "x86_64" ]; then
            cp /tmp/iotistic-artifacts/agent-latest-x86_64.tar.gz /tmp/iotistic-artifacts/agent-latest.tar.gz
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Generate checksums (${{ matrix.arch }})
        run: |
          ARCH="${{ matrix.arch }}"

          cd /tmp/iotistic-artifacts
          sha256sum agent-latest-${ARCH}.tar.gz > agent-latest-${ARCH}.tar.gz.sha256

          if [ "$ARCH" = "x86_64" ]; then
            sha256sum agent-latest.tar.gz > agent-latest.tar.gz.sha256
          fi

      - name: Upload latest tarball and checksum (${{ matrix.arch }})
        run: |
          ARCH="${{ matrix.arch }}"

          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest-${ARCH}.tar.gz \
            --file /tmp/iotistic-artifacts/agent-latest-${ARCH}.tar.gz \
            --overwrite true \
            --auth-mode login \
            --content-type application/gzip

          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest-${ARCH}.tar.gz.sha256 \
            --file /tmp/iotistic-artifacts/agent-latest-${ARCH}.tar.gz.sha256 \
            --overwrite true \
            --auth-mode login \
            --content-type text/plain

      - name: Upload generic latest tarball and checksum (x86_64 only)
        if: matrix.arch == 'x86_64'
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest.tar.gz \
            --file /tmp/iotistic-artifacts/agent-latest.tar.gz \
            --overwrite true \
            --auth-mode login \
            --content-type application/gzip

          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest.tar.gz.sha256 \
            --file /tmp/iotistic-artifacts/agent-latest.tar.gz.sha256 \
            --overwrite true \
            --auth-mode login \
            --content-type text/plain

  docker:
    name: Docker Build, Scan & Push
    needs: build
    runs-on: [arc-runner-set-iotistica-light]
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agent/Dockerfile
          push: true
          provenance: false
          platforms: linux/amd64
          cache-from: type=registry,ref=iotistic/agent:buildcache
          cache-to: type=registry,ref=iotistic/agent:buildcache,mode=max
          tags: |
            iotistic/agent:${{ needs.build.outputs.sha_short }}
            iotistic/agent:latest
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Scan Agent image with Trivy
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: 'iotistic/agent:${{ needs.build.outputs.sha_short }}'
          output-file: 'trivy-results.sarif'
          fail-on-critical: 'true'
          ignore-file: 'agent/.trivyignore'

      - name: Docker Summary
        if: always()
        run: |
          echo "## Docker Image Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.build.outputs.agent_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ needs.build.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images:" >> $GITHUB_STEP_SUMMARY
          echo "- [\`iotistic/agent:latest\`](https://hub.docker.com/r/iotistic/agent/tags?name=latest)" >> $GITHUB_STEP_SUMMARY
          echo "- [\`iotistic/agent:${{ needs.build.outputs.sha_short }}\`](https://hub.docker.com/r/iotistic/agent/tags?name=${{ needs.build.outputs.sha_short }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation Scripts:" >> $GITHUB_STEP_SUMMARY
          echo "- [install-docker.sh](https://apps.iotistic.ca/agent/install-docker.sh) ([checksum](https://apps.iotistic.ca/agent/install-docker.sh.sha256))" >> $GITHUB_STEP_SUMMARY
          echo "- [install-systemd.sh](https://apps.iotistic.ca/agent/install-systemd.sh) ([checksum](https://apps.iotistic.ca/agent/install-systemd.sh.sha256))" >> $GITHUB_STEP_SUMMARY

