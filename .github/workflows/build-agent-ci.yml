name: CI Build, Test & Push Agent

on: 
  push:
    branches:
      - master
    paths:
      - 'agent/**' 
      - '.github/workflows/build-device-agent-ci.yml'


jobs:
  test:
    name: Run Unit Tests
    runs-on: [ubuntu-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install Agent dependencies
        working-directory: ./agent
        run: npm ci

      - name: Run unit tests
        working-directory: ./agent
        run: npm run test:unit
        continue-on-error: true

      - name: Build Agent
        working-directory: ./agent
        run: npm run build

  version:
    name: Bump Version
    needs: [test]
    runs-on: [ubuntu-latest]
    permissions:
      contents: write
    outputs:
      package_version: ${{ steps.bump.outputs.package_version }}
      sha_short: ${{ steps.bump.outputs.sha_short }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version in package.json
        id: bump
        run: |
          cd agent
          # Get current version1
          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "Current version: $CURRENT_VERSION"
          
          # Bump patch version (e.g., 1.0.0 -> 1.0.1)3
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "New version: $NEW_VERSION"
          
          # Update package.json
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          
          # Set outputs1
          echo "package_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add agent/package.json
          git commit -m "chore: bump agent version to ${{ steps.bump.outputs.package_version }} [skip ci]"
          
          # Retry push with rebase up to 5 times (handles concurrent workflow runs)
          for i in {1..5}; do
            echo "Push attempt $i of 5..."
            
            # Fetch latest state from remote
            git fetch origin master
            
            # Rebase our commit on top of latest origin/master
            git -c rebase.autoStash=true rebase origin/master
            
            # Try to push
            if git push origin HEAD:master; then
              echo "Successfully pushed version bump!"
              exit 0
            fi
            
            # If push failed, wait before retry
            if [ $i -lt 5 ]; then
              echo "Push failed, retrying in 2 seconds..."
              sleep 2
            fi
          done
          
          echo "Failed to push after 5 attempts"
          exit 1

  buildx:
    name: Build & Push to Docker
    needs: version
    runs-on: [ubuntu-latest]
    permissions:
      contents: write
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Display Version Update
        run: |
          echo "## Building Version ${{ needs.version.outputs.package_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.version.outputs.package_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images:" >> $GITHUB_STEP_SUMMARY
          echo "- [\`iotistic/agent:latest\`](https://hub.docker.com/r/iotistic/agent/tags?name=latest)" >> $GITHUB_STEP_SUMMARY
          echo "- [\`iotistic/agent:${{ needs.version.outputs.sha_short }}\`](https://hub.docker.com/r/iotistic/agent/tags?name=${{ needs.version.outputs.sha_short }})" >> $GITHUB_STEP_SUMMARY
          echo "- [\`iotistic/agent:${{ needs.version.outputs.package_version }}\`](https://hub.docker.com/r/iotistic/agent/tags?name=${{ needs.version.outputs.package_version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation Scripts:" >> $GITHUB_STEP_SUMMARY
          echo "- [install-docker.sh](https://apps.iotistic.ca/agent/install-docker.sh) ([checksum](https://apps.iotistic.ca/agent/install-docker.sh.sha256))" >> $GITHUB_STEP_SUMMARY
          echo "- [install-systemd.sh](https://apps.iotistic.ca/agent/install-systemd.sh) ([checksum](https://apps.iotistic.ca/agent/install-systemd.sh.sha256))" >> $GITHUB_STEP_SUMMARY
          echo "- [install-docker-${{ needs.version.outputs.package_version }}.sh](https://apps.iotistic.ca/agent/versions/install-docker-${{ needs.version.outputs.package_version }}.sh) ([checksum](https://apps.iotistic.ca/agent/versions/install-docker-${{ needs.version.outputs.package_version }}.sh.sha256))" >> $GITHUB_STEP_SUMMARY
          echo "- [install-systemd-${{ needs.version.outputs.package_version }}.sh](https://apps.iotistic.ca/agent/versions/install-systemd-${{ needs.version.outputs.package_version }}.sh) ([checksum](https://apps.iotistic.ca/agent/versions/install-systemd-${{ needs.version.outputs.package_version }}.sh.sha256))" >> $GITHUB_STEP_SUMMARY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-agent-${{ hashFiles('agent/package-lock.json', 'agent/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-agent-

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # Build image locally for scanning (no push yet)
      - name: Build image for scanning
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agent/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=registry,ref=iotistic/agent:buildcache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          tags: iotistic/agent:${{ needs.version.outputs.package_version }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      # Security scan with Trivy
      - name: Scan Agent image with Trivy
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: 'iotistic/agent:${{ needs.version.outputs.package_version }}'
          output-file: 'trivy-results.sarif'
          fail-on-critical: 'true'

      # Push scanned image to registry
      - name: Push image to Docker Hub
        if: success()
        run: |
          docker push iotistic/agent:${{ needs.version.outputs.package_version }}
          docker tag iotistic/agent:${{ needs.version.outputs.package_version }} iotistic/agent:latest
          docker tag iotistic/agent:${{ needs.version.outputs.package_version }} iotistic/agent:${{ needs.version.outputs.sha_short }}
          docker push iotistic/agent:latest
          docker push iotistic/agent:${{ needs.version.outputs.sha_short }}

      # Move cache to prevent unlimited growthe
      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

  build-x86:
    name: Build x86_64
    needs: [version, buildx]
    runs-on: [ubuntu-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build agent (x86_64)
        run: |
          echo "Building agent for x86_64..."
          cd agent
          
          # Install dependencies and build
          npm ci --legacy-peer-deps
          npm run build
          
          mkdir -p /tmp/iotistic-artifacts
          
          # Create x86_64 tarball
          echo "Creating x86_64 tarball..."
          tar -czf /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            node_modules/ \
            bin/
          
          # Create 'latest' version
          cp /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz \
             /tmp/iotistic-artifacts/agent-latest-x86_64.tar.gz
          
          # Also create generic 'latest' (for backwards compatibility)
          cp /tmp/iotistic-artifacts/agent-latest-x86_64.tar.gz \
             /tmp/iotistic-artifacts/agent-latest.tar.gz
          
          echo "✓ Created x86_64 tarballs:"
          ls -lh /tmp/iotistic-artifacts/

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Generate checksums
        run: |
          cd /tmp/iotistic-artifacts
          sha256sum agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz > agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz.sha256
          sha256sum agent-latest-x86_64.tar.gz > agent-latest-x86_64.tar.gz.sha256
          sha256sum agent-latest.tar.gz > agent-latest.tar.gz.sha256
          echo "✓ Generated checksums"

      - name: Upload to Azure (versioned)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/versions/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz \
            --file /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz \
            --overwrite true \
            --content-type application/gzip
          echo "✓ Uploaded versioned x86_64 tarball"

      - name: Upload to Azure (latest)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest-x86_64.tar.gz \
            --file /tmp/iotistic-artifacts/agent-latest-x86_64.tar.gz \
            --overwrite true \
            --content-type application/gzip
          
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest.tar.gz \
            --file /tmp/iotistic-artifacts/agent-latest.tar.gz \
            --overwrite true \
            --content-type application/gzip
          echo "✓ Uploaded latest x86_64 tarballs"

      - name: Upload checksums to Azure
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/versions/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz.sha256 \
            --file /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-x86_64.tar.gz.sha256 \
            --overwrite true \
            --content-type text/plain
          
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest-x86_64.tar.gz.sha256 \
            --file /tmp/iotistic-artifacts/agent-latest-x86_64.tar.gz.sha256 \
            --overwrite true \
            --content-type text/plain
          
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest.tar.gz.sha256 \
            --file /tmp/iotistic-artifacts/agent-latest.tar.gz.sha256 \
            --overwrite true \
            --content-type text/plain
          echo "✓ Uploaded x86_64 checksums"

  build-arm64:
    name: Build ARM64
    needs: [version, buildx]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify QEMU installation
        run: |
          echo "Testing ARM64 emulation..."
          docker run --rm --platform linux/arm64 arm64v8/alpine uname -m
          echo "✓ QEMU ARM64 emulation working"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Backup current package files
        run: |
          # Store current package files BEFORE cache restore
          cp agent/package.json /tmp/package.json.current
          cp agent/package-lock.json /tmp/package-lock.json.current
          echo "✓ Backed up current package files"

      - name: Cache ARM64 node_modules
        id: cache-arm64-modules
        uses: actions/cache@v4
        with:
          path: agent/node_modules
          key: ${{ runner.os }}-arm64-node-modules-${{ hashFiles('agent/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-arm64-node-modules-

      - name: Restore current package files
        run: |
          # Always restore current package files after cache (cache may have old versions)
          cp /tmp/package.json.current agent/package.json
          cp /tmp/package-lock.json.current agent/package-lock.json
          echo "✓ Restored current package files"

      - name: Build agent (ARM64)
        run: |
          echo "Building agent for ARM64...."
          cd agent
          
          if [ "${{ steps.cache-arm64-modules.outputs.cache-hit }}" == "true" ]; then
            # Using cached ARM64 node_modules - skip npm ci
            echo "✓ Using cached ARM64 node_modules"
            npm run build
          else
            # No cache - fresh build
            echo "No cache - building from scratch"
            npm ci --legacy-peer-deps
            npm run build
            
            # Rebuild sqlite3 for ARM64 using Docker with QEMU
            echo "Rebuilding native modules for ARM64..."
            docker run --rm -v "$(pwd)":/app -w /app --platform linux/arm64 \
              node:20-slim bash -c "
                apt-get update && apt-get install -y build-essential python3 libsqlite3-dev
                npm rebuild sqlite3 --build-from-source
              "
          fi
          
          mkdir -p /tmp/iotistic-artifacts
          
          # Create ARM64 tarball
          echo "Creating ARM64 tarball..."
          tar -czf /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            node_modules/ \
            bin/
          
          # Create 'latest' version
          cp /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz \
             /tmp/iotistic-artifacts/agent-latest-arm64.tar.gz
          
          echo "✓ Created ARM64 tarballs:"
          ls -lh /tmp/iotistic-artifacts/

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Generate checksums
        run: |
          cd /tmp/iotistic-artifacts
          sha256sum agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz > agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz.sha256
          sha256sum agent-latest-arm64.tar.gz > agent-latest-arm64.tar.gz.sha256
          echo "✓ Generated checksums"

      - name: Upload to Azure (versioned)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/versions/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz \
            --file /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz \
            --overwrite true \
            --content-type application/gzip
          echo "✓ Uploaded versioned ARM64 tarball"

      - name: Upload to Azure (latest)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest-arm64.tar.gz \
            --file /tmp/iotistic-artifacts/agent-latest-arm64.tar.gz \
            --overwrite true \
            --content-type application/gzip
          echo "✓ Uploaded latest ARM64 tarball"

      - name: Upload checksums to Azure
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/versions/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz.sha256 \
            --file /tmp/iotistic-artifacts/agent-${{ needs.version.outputs.package_version }}-arm64.tar.gz.sha256 \
            --overwrite true \
            --content-type text/plain
          
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/agent-latest-arm64.tar.gz.sha256 \
            --file /tmp/iotistic-artifacts/agent-latest-arm64.tar.gz.sha256 \
            --overwrite true \
            --content-type text/plain
          echo "✓ Uploaded ARM64 checksums"

  deploy-to-pi:
    name: Deploy to Raspberry Pi 
    needs: [version, build-x86, build-arm64]
    runs-on: [ubuntu-latest]
    if: github.ref == 'refs/heads/master'  # Only deploy from master branch
    
    steps:
      - name: Check Pi availability
        id: check_pi
        shell: pwsh
        env:
          PI_HOST: ${{ secrets.PI_HOST }}
        run: |
          Write-Host "Checking if Raspberry Pi is reachable..."
          $available = Test-Connection -ComputerName $env:PI_HOST -Count 2 -Quiet -ErrorAction SilentlyContinue
          
          if ($available) {
            Write-Host "✓ Raspberry Pi is reachable at $env:PI_HOST" -ForegroundColor Green
            echo "pi_available=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "⚠ Raspberry Pi is not reachable at $env:PI_HOST - skipping deployment" -ForegroundColor Yellow
            echo "pi_available=false" >> $env:GITHUB_OUTPUT
          }

      - name: Deploy to Pi via SSH (password auth)
        if: steps.check_pi.outputs.pi_available == 'true'
        shell: pwsh
        env:
          PI_HOST: ${{ secrets.PI_HOST }}
          PI_USER: ${{ secrets.PI_USER }}
          PI_PASSWORD: ${{ secrets.PI_PASSWORD }}
          AGENT_VERSION: ${{ needs.version.outputs.package_version }}
        run: |
          Write-Host "Deploying agent $env:AGENT_VERSION to Raspberry Pi..."
          
          # Install Posh-SSH module if not available
          if (-not (Get-Module -ListAvailable -Name Posh-SSH)) {
            Install-Module -Name Posh-SSH -Force -Scope CurrentUser
          }
          Import-Module Posh-SSH
          
          # Create secure password
          $securePassword = ConvertTo-SecureString $env:PI_PASSWORD -AsPlainText -Force
          $credential = New-Object System.Management.Automation.PSCredential ($env:PI_USER, $securePassword)
          
          # Connect and deploy
          $session = New-SSHSession -ComputerName $env:PI_HOST -Credential $credential -AcceptKey
          
          $installCmd = "curl -sfL https://iotistic.blob.core.windows.net/scripts/agent/install | IOTISTIC_AGENT_VERSION=$env:AGENT_VERSION IOTISTIC_NON_INTERACTIVE=true CLOUD_API_ENDPOINT='${{ secrets.CLOUD_API_ENDPOINT }}' PROVISIONING_KEY='${{ secrets.PROVISIONING_KEY }}' sudo -E bash"
          
          $result = Invoke-SSHCommand -SessionId $session.SessionId -Command "echo 'Installing agent on Raspberry Pi...'; $installCmd"
          
          Write-Host $result.Output
          if ($result.ExitStatus -ne 0) {
            Write-Host "Error: $($result.Error)" -ForegroundColor Red
            Remove-SSHSession -SessionId $session.SessionId
            exit 1
          }
          
          Remove-SSHSession -SessionId $session.SessionId
          Write-Host "✓ Agent deployed to Raspberry Pi"
          
      - name: Verify Pi deployment
        if: steps.check_pi.outputs.pi_available == 'true'
        shell: pwsh
        env:
          PI_HOST: ${{ secrets.PI_HOST }}
          PI_USER: ${{ secrets.PI_USER }}
          PI_PASSWORD: ${{ secrets.PI_PASSWORD }}
        run: |
          Write-Host "Verifying deployment..."
          
          Import-Module Posh-SSH
          
          $securePassword = ConvertTo-SecureString $env:PI_PASSWORD -AsPlainText -Force
          $credential = New-Object System.Management.Automation.PSCredential ($env:PI_USER, $securePassword)
          
          $session = New-SSHSession -ComputerName $env:PI_HOST -Credential $credential -AcceptKey
          
          # Check service status
          $verifyCmd = "sudo systemctl status iotistic-agent --no-pager || true; curl -f http://localhost:48484/v1/healthy 2>/dev/null || curl -f http://localhost:48484/ping 2>/dev/null || echo 'Agent API not responding yet'"
          
          $result = Invoke-SSHCommand -SessionId $session.SessionId -Command $verifyCmd
          
          Write-Host $result.Output
          
          Remove-SSHSession -SessionId $session.SessionId
          Write-Host "✓ Deployment verification complete"

      - name: Deployment skipped notice
        if: steps.check_pi.outputs.pi_available != 'true'
        run: |
          echo "## ⚠️ Raspberry Pi Deployment Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The Raspberry Pi at \`${{ secrets.PI_HOST }}\` was not reachable." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action Required:** Ensure the Pi is online and accessible, then manually deploy:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "curl -sfL https://iotistic.blob.core.windows.net/scripts/agent/install | \\" >> $GITHUB_STEP_SUMMARY
          echo "  IOTISTIC_AGENT_VERSION=${{ needs.version.outputs.package_version }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  sudo -E bash" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  test-agent-systemd:
    name: Test Systemd Installation (x86_64)
    needs: [version, build-x86]
    runs-on: [ubuntu-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
  
      - name: Clean build artifacts and installation directories
        run: |
          echo "Cleaning any stale build artifacts from repository..."
          rm -rf agent/dist
          rm -rf agent/node_modules
          
          echo "Cleaning any previous installations..."
          sudo rm -rf /opt/iotistic/agent
          sudo rm -rf /var/lib/iotistic/agent
          sudo rm -rf /etc/iotistic
          
          echo "✓ All artifacts and installations cleaned"
  
      - name: Make install script executable
        run: chmod +x agent/bin/install.sh
  
      - name: Run unified installation script (Systemd method)
        env:
          CI: true
          IOTISTIC_INSTALL_METHOD: systemd
          IOTISTIC_AGENT_VERSION: ${{ needs.version.outputs.package_version }}
          IOTISTIC_DEVICE_PORT: 48484
          CLOUD_API_ENDPOINT: ''
          PROVISIONING_KEY: ''
    
        run: |
          echo "Testing unified installation script with Systemd method..."
          sudo -E bash agent/bin/install.sh
  
      - name: Check systemd service status
        run: |
          echo "Checking systemd service status..."
          sudo systemctl status iotistic-agent --no-pager || true
          
          echo ""
          echo "========================================="
          echo "Agent Startup Logs (last 100 lines):"
          echo "========================================="
          sudo journalctl -u iotistic-agent -n 100 --no-pager
          
          echo ""
          echo "========================================="
          echo "Agent Environment Variables:"
          echo "========================================="
          sudo cat /etc/iotistic/agent.env || echo "No environment file found"
          
          if sudo systemctl is-active --quiet iotistic-agent; then
            echo "✓ Agent service is running"
          else
            echo "✗ Agent service is not running"
            echo ""
            echo "========================================="
            echo "Full Error Logs (last 300 lines):"
            echo "========================================="
            sudo journalctl -u iotistic-agent -n 300 --no-pager
            echo ""
            echo "========================================="
            echo "Service Status Details:"
            echo "========================================="
            sudo systemctl status iotistic-agent --no-pager -l
            exit 1
          fi
  
      - name: Check agent logs
        run: |
          echo "Agent Logs (journald):"
          sudo journalctl -u iotistic-agent -n 100 --no-pager
          
          echo ""
          echo "Checking for errors in logs..."
          if sudo journalctl -u iotistic-agent -n 100 --no-pager | grep -qi "error"; then
            echo "⚠ Errors found in logs"
          else
            echo "✓ No errors found"
          fi
  
      - name: Test agent API
        run: |
          echo "Testing agent API..."
          
          if curl -f http://localhost:48484/v1/healthy 2>/dev/null || \
             curl -f http://localhost:48484/ping 2>/dev/null; then
            echo "✓ Agent API is responding"
          else
            echo "⚠ Agent API not responding"
            sudo journalctl -u iotistic-agent -n 50 --no-pager
          fi
  
      - name: Show agent logs
        if: always()
        run: |
          echo "========================================="
          echo "Agent Logs (journald):"
          echo "========================================="
          sudo journalctl -u iotistic-agent -n 200 --no-pager
  
      - name: Generate systemd test summary
        if: always()
        run: |
          echo "# Agent Systemd Installation Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Installation" >> $GITHUB_STEP_SUMMARY
          echo "- **Location**: \`/opt/iotistic/agent\`" >> $GITHUB_STEP_SUMMARY
          echo "- **User**: \`iotistic\` (non-root)" >> $GITHUB_STEP_SUMMARY
          echo "- **Process Manager**: systemd" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Add device configuration if available
          if [ -n "${{ env.DEVICE_UUID }}" ]; then
            echo "## Device Configuration" >> $GITHUB_STEP_SUMMARY
            echo "- **Device UUID**: \`${{ env.DEVICE_UUID }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Device Name**: \`${{ env.DEVICE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Device Type**: \`${{ env.DEVICE_TYPE }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Agent Version**: \`${{ env.AGENT_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Provisioned**: \`${{ env.PROVISIONED }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Full Device Configuration (JSON)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            echo '${{ env.DEVICE_CONFIG }}' | jq '.' >> $GITHUB_STEP_SUMMARY || echo '${{ env.DEVICE_CONFIG }}' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "## Tests Performed" >> $GITHUB_STEP_SUMMARY
          echo "1. System dependencies installation (SQLite, Docker, etc.)" >> $GITHUB_STEP_SUMMARY
          echo "2. Agent build and installation" >> $GITHUB_STEP_SUMMARY
          echo "3. Systemd service configuration and hardening" >> $GITHUB_STEP_SUMMARY
          echo "4. Journald log limits configuration" >> $GITHUB_STEP_SUMMARY
          echo "5. Process startup and status check" >> $GITHUB_STEP_SUMMARY
          echo "6. API health verification" >> $GITHUB_STEP_SUMMARY
          echo "7. Configuration file permissions verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Agent running with systemd validated successfully!" >> $GITHUB_STEP_SUMMARY

  upload-artifacts:
    name: Upload install scripts to Azure
    needs: [version, buildx, build-x86, build-arm64, deploy-to-pi]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable blob versioning (if not already enabled)
        run: |
          # Check if versioning is already enabled
          VERSIONING_ENABLED=$(az storage account blob-service-properties show \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --query 'isVersioningEnabled' -o tsv 2>/dev/null || echo "false")
          
          if [ "$VERSIONING_ENABLED" != "true" ]; then
            echo "Enabling blob versioning on storage account..."
            az storage account blob-service-properties update \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
              --enable-versioning true
            echo "✓ Blob versioning enabled"
          else
            echo "✓ Blob versioning already enabled"
          fi

      - name: Prepare versioned scripts
        run: |
          # Create temporary directory for versioned scripts
          mkdir -p /tmp/iotistic-scripts
          
          # Replace version placeholder in install.sh (unified script)
          sed "s/AGENT_VERSION_PLACEHOLDER/${{ needs.version.outputs.package_version }}/g" \
            agent/bin/install.sh > /tmp/iotistic-scripts/install.sh
          
          echo "✓ Prepared unified install.sh with version ${{ needs.version.outputs.package_version }}"

      - name: Generate checksums for install script
        run: |
          cd /tmp/iotistic-scripts
          sha256sum install.sh > install.sh.sha256
          
          echo "✓ Generated install script checksum:"
          cat install.sh.sha256

      - name: Upload install.sh (latest)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/install \
            --file /tmp/iotistic-scripts/install.sh \
            --overwrite true \
            --content-type application/x-sh \
            --content-disposition "attachment; filename=install"
          
          echo "✓ Uploaded agent/install (latest, unified script)"

      - name: Upload install.sh checksum (latest)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/install.sha256 \
            --file /tmp/iotistic-scripts/install.sh.sha256 \
            --overwrite true \
            --content-type text/plain \
            --content-disposition "inline; filename=install.sha256"
          
          echo "✓ Uploaded agent/install.sha256"

      - name: Upload install.sh (versioned)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/versions/install-${{ needs.version.outputs.package_version }}.sh \
            --file /tmp/iotistic-scripts/install.sh \
            --overwrite true \
            --content-type application/x-sh \
            --content-disposition "attachment; filename=install-${{ needs.version.outputs.package_version }}.sh"
          
          echo "✓ Uploaded agent/versions/install-${{ needs.version.outputs.package_version }}.sh"

      - name: Upload install.sh checksum (versioned)
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name scripts \
            --name agent/versions/install-${{ needs.version.outputs.package_version }}.sh.sha256 \
            --file /tmp/iotistic-scripts/install.sh.sha256 \
            --overwrite true \
            --content-type text/plain \
            --content-disposition "inline; filename=install-${{ needs.version.outputs.package_version }}.sh.sha256"
          
          echo "✓ Uploaded agent/versions/install-${{ needs.version.outputs.package_version }}.sh.sha256"

      - name: Generate upload summary
        run: |
          echo "# Installation Scripts Uploaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Quick Install (Recommended)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Auto-detect Installation Method" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'curl -sfL https://apps.iotistica.com/agent/install | sh' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The script will:" >> $GITHUB_STEP_SUMMARY
          echo "- Auto-detect Docker installation (uses Docker if available)" >> $GITHUB_STEP_SUMMARY
          echo "- Fallback to Systemd if Docker not found" >> $GITHUB_STEP_SUMMARY
          echo "- In interactive mode, prompts user to choose method" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Force Docker Installation" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'curl -sfL https://apps.iotistica.com/agent/install | IOTISTIC_INSTALL_METHOD=docker sh' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Force Systemd Installation" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'curl -sfL https://apps.iotistica.com/agent/install | IOTISTIC_INSTALL_METHOD=systemd sh' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Verified Install (with SHA256 checksum)" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Download script and checksum" >> $GITHUB_STEP_SUMMARY
          echo 'curl -sfL https://apps.iotistica.com/agent/install -o install.sh' >> $GITHUB_STEP_SUMMARY
          echo 'curl -sfL https://apps.iotistica.com/agent/install.sha256 -o install.sha256' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Verify checksum" >> $GITHUB_STEP_SUMMARY
          echo "sha256sum -c install.sha256" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Run if verification passes (auto-detect method)" >> $GITHUB_STEP_SUMMARY
          echo "sudo bash install.sh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Or force specific method:" >> $GITHUB_STEP_SUMMARY
          echo "sudo IOTISTIC_INSTALL_METHOD=docker bash install.sh" >> $GITHUB_STEP_SUMMARY
          echo "sudo IOTISTIC_INSTALL_METHOD=systemd bash install.sh" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Version ${{ needs.version.outputs.package_version }} Script" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'curl -sfL https://apps.iotistica.com/agent/versions/install-${{ needs.version.outputs.package_version }}.sh | sh' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Environment Variables" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The unified script supports:" >> $GITHUB_STEP_SUMMARY
