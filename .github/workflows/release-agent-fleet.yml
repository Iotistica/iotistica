name: Release Agent Fleet 

on:
  push:
    paths:
      - 'k8s/charts/agent-fleet/**'
  workflow_dispatch:
    inputs:
      deploy_test:
        description: 'Deploy test fleet'
        required: false
        default: false
        type: boolean
      test_fleet_size:
        description: 'Number of agents for test deployment'
        required: false
        default: '5'
        type: string
      clean_before_deploy:
        description: 'If true, delete namespace before deploying'
        required: false
        default: false
        type: boolean
      # Simulator configuration
      modbus_simulator_count:
        description: 'Number of Modbus simulators per agent (0-3)'
        required: false
        default: '1'
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
      opcua_simulator_enabled:
        description: 'Enable OPC-UA simulator (ignored if opcua_simulator_count provided)'
        required: false
        default: true
        type: boolean
      opcua_simulator_count:
        description: 'Number of OPC-UA simulators per agent (0-3)'
        required: false
        default: '1'
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
      sensor_simulator_enabled:
        description: 'Enable sensor simulator'
        required: false
        default: false
        type: boolean
      # Simulator configuration presets
      simulator_preset:
        description: 'Simulator preset (overrides individual settings if not "custom")'
        required: false
        default: 'custom'
        type: choice
        options:
          - 'custom'
          - 'modbus-only'
          - 'opcua-only'
          - 'full-stack'
          - 'minimal'
          - 'heavy-load'

permissions:
  contents: write
  packages: write

env:
  CHART_PATH: ./k8s/charts/agent-fleet
  CHART_NAME: agent-fleet

jobs:
  validate-chart:
    name: Validate Helm chart
    runs-on: [iotistic-lab-sc]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Lint Helm chart
        run: |
          helm lint ${{ env.CHART_PATH }}

      - name: Validate chart templates
        run: |
          helm template test ${{ env.CHART_PATH }} \
            --set fleet.replicaCount=5 \
            --set fleet.cloudApiEndpoint=http://10.27.27.160:30002 \
            --set fleet.fleetId=test-fleet \
            --set agent.env.MQTT_BROKER_URL=mqtt://10.27.27.160:30883 \
            --set agent.env.ENABLE_SENSOR_PUBLISH=false \
            --set agent.env.ANOMALY_DETECTION_ENABLED=false > /tmp/rendered.yaml
          
          echo "Chart templates rendered successfully"
          cat /tmp/rendered.yaml

      - name: Check for required files
        run: |
          required_files=(
            "Chart.yaml"
            "values.yaml"
            "README.md"
            "PROVISIONING.md"
            "templates/statefulset.yaml"
            "templates/service.yaml"
            "templates/secret.yaml"
            "templates/_helpers.tpl"
            "scripts/generate-provisioning-keys.sh"
            "scripts/generate-provisioning-keys.ps1"
          )
          
          for file in "${required_files[@]}"; do
            if [ ! -f "${{ env.CHART_PATH }}/$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
            echo "✅ Found: $file"
          done

  deploy-test-fleet:
    name: Deploy test fleet
    runs-on: [iotistic-lab-sc]
    needs: [validate-chart]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          if [ -f "$HOME/.kube/config" ]; then
            echo "Kubeconfig already exists at $HOME/.kube/config — skipping configuration."
          elif [ -n "${{ secrets.KUBECONFIG }}" ]; then
            mkdir -p "$HOME/.kube"

            # Try base64 decode first, fall back to plain text
            echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config" 2>/dev/null || \
            echo "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"

            echo "Kubeconfig configured successfully."
          else
            echo "KUBECONFIG secret not set — skipping deployment."
            exit 1
          fi

          # Only switch context if config exists
          if [ -f "$HOME/.kube/config" ]; then
            kubectl config use-context k3scl02
            echo "Current context: $(kubectl config current-context)"
            kubectl cluster-info
          fi

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Cleanup previous namespace (before deploy)
        if: ${{ github.event.inputs.clean_before_deploy == 'true' }}
        run: |
          set -e
          NAMESPACE=agent-fleet-test

          echo "Deleting namespace (if exists)..."
          kubectl delete namespace "${NAMESPACE}" --ignore-not-found --wait

          echo "Waiting for namespace finalizers to clear..."
          for i in {1..10}; do
            if ! kubectl get namespace "${NAMESPACE}" >/dev/null 2>&1; then
              echo "Namespace removed."; break
            fi
            echo "Namespace still terminating... waiting"
            sleep 3
          done

      - name: Create test namespace
        run: |
          NAMESPACE="agent-fleet-test"
          
          # Create namespace if it doesn't exist
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          
          echo "Namespace $NAMESPACE ready"

      - name: Deploy test fleet
        env:
          FLEET_SIZE: ${{ github.event.inputs.test_fleet_size }}
          API_URL: ${{ secrets.TEST_API_URL || 'http://10.27.27.160:30002' }}
          FLEET_ID: agent-fleet-test-${{ github.run_number }}
        run: |
          # Apply simulator preset configurations
          PRESET="${{ github.event.inputs.simulator_preset }}"
          
          # Initialize from inputs or apply preset
          case "$PRESET" in
            "modbus-only")
              MODBUS_COUNT=2
              OPCUA_COUNT=0
              OPCUA_ENABLED=false
              SENSOR_ENABLED=false
              echo "📦 Preset: Modbus Only (2 simulators)"
              ;;
            "opcua-only")
              MODBUS_COUNT=0
              OPCUA_COUNT=1
              OPCUA_ENABLED=true
              SENSOR_ENABLED=false
              echo "📦 Preset: OPC-UA Only"
              ;;
            "full-stack")
              MODBUS_COUNT=2
              OPCUA_COUNT=1
              OPCUA_ENABLED=true
              SENSOR_ENABLED=true
              echo "📦 Preset: Full Stack (all simulators)"
              ;;
            "minimal")
              MODBUS_COUNT=0
              OPCUA_COUNT=0
              OPCUA_ENABLED=false
              SENSOR_ENABLED=false
              echo "📦 Preset: Minimal (no simulators)"
              ;;
            "heavy-load")
              MODBUS_COUNT=3
              OPCUA_COUNT=1
              OPCUA_ENABLED=true
              SENSOR_ENABLED=true
              echo "📦 Preset: Heavy Load (max simulators)"
              ;;
            *)
              # Custom configuration from inputs
              MODBUS_COUNT=${{ github.event.inputs.modbus_simulator_count }}
              OPCUA_COUNT_INPUT=${{ github.event.inputs.opcua_simulator_count }}
              OPCUA_ENABLED=${{ github.event.inputs.opcua_simulator_enabled }}
              SENSOR_ENABLED=${{ github.event.inputs.sensor_simulator_enabled }}
              if [ -n "$OPCUA_COUNT_INPUT" ]; then
                OPCUA_COUNT="$OPCUA_COUNT_INPUT"
              else
                if [ "$OPCUA_ENABLED" = "true" ]; then
                  OPCUA_COUNT=1
                else
                  OPCUA_COUNT=0
                fi
              fi
              echo "📦 Custom configuration: Modbus=$MODBUS_COUNT, OPC-UA count=$OPCUA_COUNT (enabled=$OPCUA_ENABLED), Sensor=$SENSOR_ENABLED"
              ;;
          esac
          
          NAMESPACE="agent-fleet-test"
          RELEASE_NAME="agent-fleet-test-${{ github.run_number }}"
          
          echo "🚀 Deploying fleet with:"
          echo "  - Agents: $FLEET_SIZE"
          echo "  - Modbus simulators per agent: $MODBUS_COUNT"
          echo "  - OPC-UA simulators per agent: $OPCUA_COUNT"
          echo "  - OPC-UA enabled: $OPCUA_ENABLED"
          echo "  - Sensor simulator enabled: $SENSOR_ENABLED"
          
          helm upgrade --install "$RELEASE_NAME" ${{ env.CHART_PATH }} \
            --namespace "$NAMESPACE" \
            --set fleet.replicaCount="$FLEET_SIZE" \
            --set fleet.cloudApiEndpoint="$API_URL" \
            --set fleet.fleetId="$FLEET_ID" \
            --set simulator.modbusCount="$MODBUS_COUNT" \
            --set opcuaSimulator.count="$OPCUA_COUNT" \
            --set opcuaSimulator.enabled="$OPCUA_ENABLED" \
            --set sensorSimulator.enabled="$SENSOR_ENABLED" \
            --set agent.env.MQTT_BROKER_URL=mqtt://10.27.27.160:30883 \
            --set agent.env.POLL_INTERVAL_MS=300000 \
            --set agent.env.REPORT_INTERVAL_MS=300000 \
            --set agent.env.METRICS_INTERVAL_MS=600000 \
            --set agent.env.ENABLE_SENSOR_PUBLISH="$SENSOR_ENABLED" \
            --set agent.env.MODBUS_ENABLED="$([ $MODBUS_COUNT -gt 0 ] && echo true || echo false)" \
            --set agent.env.OPCUA_ENABLED="$OPCUA_ENABLED" \
            --set agent.env.ANOMALY_DETECTION_ENABLED=false \
            --set agent.resources.requests.memory=128Mi \
            --set agent.resources.limits.memory=256Mi \
            --set simulator.resources.requests.memory=32Mi \
            --set simulator.resources.limits.memory=64Mi \
            --set persistence.size=100Mi \
            --timeout 60m \
            --wait
          
          echo "✅ Test fleet deployed successfully"
          
          # Debug: Check pod status immediately
          kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE_NAME"
          
          # Debug: Check if init containers are stuck
          for pod in $(kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE_NAME" -o name); do
            echo "=== $pod init container logs ==="
            kubectl logs "$pod" -c init-provisioning -n "$NAMESPACE" --tail=20 || echo "Init container not found or not running"
          done

      - name: Verify test fleet
        run: |
          NAMESPACE="agent-fleet-test"
          RELEASE_NAME="agent-fleet-test-${{ github.run_number }}"
          
          echo "Waiting for pods to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/instance="$RELEASE_NAME" \
            -n "$NAMESPACE" \
            --timeout=600s || true
          
          echo ""
          echo "Pod status:"
          kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE_NAME"
          
          echo ""
          echo "Checking first agent provisioning status..."
          FIRST_POD=$(kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE_NAME" -o jsonpath='{.items[0].metadata.name}')
          
          if [ -n "$FIRST_POD" ]; then
            kubectl exec "$FIRST_POD" -c agent -n "$NAMESPACE" -- \
              curl -s localhost:48484/v2/device | jq '{uuid, status, provisioned}' || echo "Could not check device status"
          fi

      - name: Deployment summary
        run: |
          NAMESPACE="agent-fleet-test"
          RELEASE_NAME="agent-fleet-test-${{ github.run_number }}"
          
          echo "## Test Fleet Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fleet Size:** \`${{ github.event.inputs.test_fleet_size }}\` agents" >> $GITHUB_STEP_SUMMARY
          echo "**Fleet ID:** \`agent-fleet-test-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pod Status" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cleanup Command" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "helm uninstall $RELEASE_NAME -n $NAMESPACE" >> $GITHUB_STEP_SUMMARY
          echo "kubectl delete namespace $NAMESPACE" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
