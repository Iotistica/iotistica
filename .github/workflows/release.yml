name: Release

on:
  push:
    tags:
      # Only trigger on final release tags (not RC tags)
      # RCs should be created via manual workflow_dispatch
      # To include RCs, add: - 'v*.*.*-rc.*'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_mode:
        description: 'Release mode'
        required: true
        type: choice
        default: final
        options:
          - rc
          - final
      deploy:
        description: 'Deploy to Kubernetes after release'
        required: false
        default: true
        type: boolean
      client_name:
        description: 'K8s client name (namespace)'
        required: false
        default: 'demo'
        type: string

permissions:
  contents: write
  packages: write

env:
  DOCKER_ORG: iotistic
  K8S_NAMESPACE: iotistic-nodeport
  CHART_PATH: ./k8s/charts/iotistic
  VALUES_FILE: ./k8s/charts/iotistic/values.yaml

jobs:
  validate-release:
    name: Validate release & check images
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.set_version.outputs.release_version }}
      api_src_tag: ${{ steps.verify.outputs.api_src_tag }}
      dashboard_src_tag: ${{ steps.verify.outputs.dashboard_src_tag }}
    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set release version (auto bump)
        id: set_version
        run: |
          # Fetch all tags from remote
          git fetch origin 'refs/tags/*:refs/tags/*' --force
          
          # Debug: Show top tags (v0.0.2+ only)
          echo "=== DEBUG: Top 10 v0.0.2+ tags ==="
          git tag --list 'v0.0.*' --sort=-version:refname | grep -E 'v0\.0\.[2-9]|v0\.0\.[0-9]{2,}' | head -10
          echo ""
          
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE="${GITHUB_REF#refs/tags/}"
            echo "Tag push detected: $RELEASE"
            echo "release_version=$RELEASE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Manual dispatch
          MODE="${{ github.event.inputs.release_mode || 'final' }}"
          TYPE="${{ github.event.inputs.release_type }}"
          
          # Find latest final (excluding RC tags and old v0.0.1-rc clutter) - start from v0.0.2
          LATEST_FINAL=$(git tag --list 'v0.0.*' --sort=-version:refname | grep -E 'v0\.0\.[2-9]|v0\.0\.[0-9]{2,}' | grep -v -E '\-rc' | head -1)
          echo "Latest final release: $LATEST_FINAL"
          
          if [ -z "$LATEST_FINAL" ]; then
            echo "No v0.0.2+ releases found, starting from v0.0.2"
            LATEST_FINAL="v0.0.2"
            MAJOR=0
            MINOR=0
            PATCH=2
          else
            echo "Latest final release: $LATEST_FINAL"
            # Strip v prefix and parse version
            BASE=${LATEST_FINAL#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            
            # Ensure we have valid numbers (fallback to 0 if parsing fails)
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}
          fi
          
          echo "Parsed version: MAJOR=$MAJOR MINOR=$MINOR PATCH=$PATCH"
          
          # === RC MODE ===
          if [ "$MODE" = "rc" ]; then
            # Step 1: Determine target base version based on release_type
            case "$TYPE" in
              patch)
                TARGET_BASE="v${MAJOR}.${MINOR}.$((PATCH + 1))"
                ;;
              minor)
                TARGET_BASE="v${MAJOR}.$((MINOR + 1)).0"
                ;;
              major)
                TARGET_BASE="v$((MAJOR + 1)).0.0"
                ;;
            esac
            
            echo "Target base version: $TARGET_BASE"
            
            # Step 2: Find latest RC for this target base version
            LATEST_RC=$(git tag -l "${TARGET_BASE}-rc.*" --sort=-version:refname | head -n1)
            
            if [ -n "$LATEST_RC" ]; then
              # Increment RC number for existing RC line
              LAST_RC_NUM=$(echo "$LATEST_RC" | sed -E 's/.*-rc\.([0-9]+)/\1/')
              RC_NUM=$((LAST_RC_NUM + 1))
              echo "Found existing RC: $LATEST_RC → incrementing to rc.${RC_NUM}"
            else
              # Start new RC line
              RC_NUM=1
              echo "Starting new RC line for ${TARGET_BASE}"
            fi
            
            RELEASE="${TARGET_BASE}-rc.${RC_NUM}"
            echo "Auto-generated RC version: $RELEASE"
            echo "release_version=$RELEASE" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # === FINAL MODE ===
          # Check if we're finalizing from an RC line
          RC_CHECK=$(git tag -l "${LATEST_FINAL}-rc.*" | head -n1 || echo "")
          
          if [ -n "$RC_CHECK" ]; then
            # Finalizing from existing RCs - use current final version
            RELEASE="$LATEST_FINAL"
            echo "Finalizing release ${RELEASE} from existing RC line"
            echo "⚠️  This will promote the RC line to final release"
          else
            # Fresh final release - bump version
            case "$TYPE" in
              patch)
                PATCH=$((PATCH + 1))
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
            esac
            RELEASE="v${MAJOR}.${MINOR}.${PATCH}"
            echo "New final release: $RELEASE"
          fi
          
          echo "release_version=$RELEASE" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Verify CI-built images exist (and determine source tags)
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          
          # Fetch all tags from remote
          git fetch origin 'refs/tags/*:refs/tags/*' --force
          
          # Debug: Show available tags
          echo "=== DEBUG: Available tags ==="
          git tag --list 'v*' --sort=-version:refname | head -10
          echo ""
          
          RELEASE="${{ steps.set_version.outputs.release_version }}"
          VERSION="${RELEASE#v}"

          # For RC releases, strip the RC suffix to find CI images
          # CI builds push images as X.Y.Z, but RC tags are X.Y.Z-rc.N
          if [[ "$RELEASE" == *"-rc."* ]]; then
            BASE_VERSION="${VERSION%%-rc.*}"
            echo "RC release detected: ${RELEASE}"
            echo "Looking for CI images with base version: ${BASE_VERSION}"
            VERSION="$BASE_VERSION"
          fi

          # Test for rate limiting first
          echo "Testing Docker Hub connectivity..."
          TEST_OUTPUT=$(docker manifest inspect iotistic/api:latest 2>&1 || true)
          if [[ $? -ne 0 ]]; then
            echo "⚠️ WARNING: Cannot access Docker Hub"
            echo "Error output: $TEST_OUTPUT"
            if echo "$TEST_OUTPUT" | grep -qi "rate limit\|429"; then
              echo "❌ RATE LIMITED by Docker Hub"
            elif echo "$TEST_OUTPUT" | grep -qi "unauthorized\|401\|403"; then
              echo "❌ AUTHENTICATION FAILED - check DOCKERHUB_USERNAME and DOCKERHUB_PASSWORD secrets"
            else
              echo "❌ UNKNOWN ERROR accessing Docker Hub"
            fi
            echo ""
            echo "⚠️ All image checks will return 'skip'"
            echo "⚠️ Release will be created without Docker images"
          else
            echo "✅ Docker Hub connectivity OK"
          fi
          echo ""

          # Helper: check image existence (returns tag to use or "skip")
          check_image() {
            local svc="$1"
            local prefer_tag="$2"
            
            # If no preferred tag provided, return skip
            if [ -z "$prefer_tag" ]; then
              echo "skip"
              return 1
            fi
            
            echo "Checking ${DOCKER_ORG}/${svc}:${prefer_tag}..." >&2
            
            # Try the package.json tag first (exact match)
            if docker manifest inspect "${DOCKER_ORG}/${svc}:${prefer_tag}" >/dev/null 2>&1; then
              echo "  ✅ Found: ${DOCKER_ORG}/${svc}:${prefer_tag}" >&2
              echo "$prefer_tag"
              return 0
            fi
            
            # If prefer_tag doesn't start with v, also try with v prefix
            if [[ "$prefer_tag" != v* ]]; then
              echo "Checking ${DOCKER_ORG}/${svc}:v${prefer_tag}..." >&2
              if docker manifest inspect "${DOCKER_ORG}/${svc}:v${prefer_tag}" >/dev/null 2>&1; then
                echo "  ✅ Found: ${DOCKER_ORG}/${svc}:v${prefer_tag}" >&2
                echo "v${prefer_tag}"
                return 0
              fi
            fi
            
            # Fallback: Use latest image (for cases where CI didn't run for this service)
            echo "  ⚠️ Version not found, attempting fallback to latest..." >&2
            if docker manifest inspect "${DOCKER_ORG}/${svc}:latest" >/dev/null 2>&1; then
              echo "  ✅ Found latest: ${DOCKER_ORG}/${svc}:latest" >&2
              echo "  ℹ️ Will retag latest to ${prefer_tag} (CI did not run for ${svc})" >&2
              echo "latest"
              return 0
            fi
            
            # No image found at all
            echo "  ❌ Result: skip (no images found)" >&2
            echo "skip"
          }
          
          # Check each service (Dashboard & API only)
          API_SRC=$(check_image "api" "$VERSION" || true)
          DASHBOARD_SRC=$(check_image "dashboard" "$VERSION" || true)

          echo "api_src_tag=$API_SRC" >> $GITHUB_OUTPUT
          echo "dashboard_src_tag=$DASHBOARD_SRC" >> $GITHUB_OUTPUT

          echo ""
          echo "Image verification complete:"
          echo "  API  -> $API_SRC"
          echo "  Dashboard -> $DASHBOARD_SRC"

      - name: Summary for step output
        run: |
          MODE="${{ github.event.inputs.release_mode || 'final' }}"
          RELEASE="${{ steps.set_version.outputs.release_version }}"
          MODE_BADGE="🎯 Final Release"
          
          if [ "$MODE" = "rc" ]; then
            # Extract RC number from version tag (e.g., v1.0.134-rc.2 -> 2)
            RC_NUM=$(echo "$RELEASE" | sed -E 's/.*-rc\.([0-9]+)/\1/' || echo "1")
            MODE_BADGE="🧪 Release Candidate (RC ${RC_NUM})"
          fi
          
          echo "## Release validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** \`$RELEASE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** $MODE_BADGE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | selected image tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ steps.verify.outputs.api_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | \`${{ steps.verify.outputs.dashboard_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| MQTT Monitor | \`${{ steps.verify.outputs.mqtt_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Housekeeper | \`${{ steps.verify.outputs.housekeeper_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Postoffice | \`${{ steps.verify.outputs.postoffice_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Determine if retag-and-push will run
          API="${{ steps.verify.outputs.api_src_tag }}"
          DASH="${{ steps.verify.outputs.dashboard_src_tag }}"
          
          echo "### Next Steps Decision" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "$API" != "skip" || "$DASH" != "skip" ]]; then
            echo "✅ **retag-and-push job will RUN** - at least one image found" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ **retag-and-push job will be SKIPPED** - all image tags are 'skip'" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Reason:** No Docker images found matching package.json versions" >> $GITHUB_STEP_SUMMARY
            echo "- This could be due to Docker Hub rate limiting" >> $GITHUB_STEP_SUMMARY
            echo "- Or CI builds haven't pushed images for these versions" >> $GITHUB_STEP_SUMMARY
            echo "- The release will still be created (git tag + GitHub Release)" >> $GITHUB_STEP_SUMMARY
          fi

  retag-and-push:
    name: Retag & push release images
    runs-on: ubuntu-latest
    needs: validate-release
    if: always() && (needs.validate-release.outputs.api_src_tag != 'skip' || needs.validate-release.outputs.dashboard_src_tag != 'skip')
    steps:
      - name: Log execution decision
        run: |
          echo "✅ retag-and-push job is RUNNING"
          echo "At least one Docker image was found in Docker Hub"
          echo ""
          echo "Images found:"
          echo "  API: ${{ needs.validate-release.outputs.api_src_tag }}"
          echo "  Dashboard: ${{ needs.validate-release.outputs.dashboard_src_tag }}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Retag & push images
        shell: bash
        run: |
          set -euo pipefail
          RELEASE="${{ needs.validate-release.outputs.release_version }}"

          retag_and_push() {
            local svc="$1"
            local src_tag="$2"
            
            # If no specific version found, fall back to latest
            if [ -z "$src_tag" ] || [ "$src_tag" = "skip" ]; then
              echo "No specific version found for $svc, attempting fallback to latest..."
              if docker pull "${DOCKER_ORG}/${svc}:latest" 2>/dev/null; then
                src_tag="latest"
                echo "✅ Using latest tag for $svc"
              else
                echo "❌ Cannot find latest tag for $svc either, skipping"
                return 0
              fi
            fi

            echo "Processing $svc: ${DOCKER_ORG}/${svc}:${src_tag} -> ${DOCKER_ORG}/${svc}:${RELEASE}"
            docker pull "${DOCKER_ORG}/${svc}:${src_tag}"
            docker tag "${DOCKER_ORG}/${svc}:${src_tag}" "${DOCKER_ORG}/${svc}:${RELEASE}"
            docker push "${DOCKER_ORG}/${svc}:${RELEASE}"
            echo "Retagged & pushed ${DOCKER_ORG}/${svc}:${RELEASE}"
          }

          retag_and_push "api" "${{ needs.validate-release.outputs.api_src_tag }}"
          retag_and_push "dashboard" "${{ needs.validate-release.outputs.dashboard_src_tag }}"

  create-release:
    name: Create GitHub Release (changelog)
    needs: [validate-release, retag-and-push]
    runs-on: ubuntu-latest
    if: |
      !cancelled() &&
      needs.validate-release.result == 'success' &&
      (needs.retag-and-push.result == 'success' || needs.retag-and-push.result == 'skipped')
    steps:
      - name: Log execution decision
        run: |
          echo "✅ create-release job is RUNNING"
          echo ""
          echo "Job results:"
          echo "  validate-release: ${{ needs.validate-release.result }}"
          echo "  retag-and-push: ${{ needs.retag-and-push.result }}"
          echo ""
          if [[ "${{ needs.retag-and-push.result }}" == "skipped" ]]; then
            echo "⏭️ retag-and-push was SKIPPED (no Docker images found)"
            echo "📝 Creating release anyway (git tag + GitHub Release)"
          else
            echo "✅ retag-and-push completed successfully"
            echo "📝 Creating release with Docker images"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog (simple)
        id: changelog
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          PREV_TAG=$(git tag -l "v*.*.*" --sort=-version:refname | grep -v "^${RELEASE}$" | head -n1 || true)
          if [ -z "$PREV_TAG" ]; then
            echo "First release or no previous tag found"
            git --no-pager log --pretty=format:"- %s (%h)" --no-merges | head -50 > changelog.txt
          else
            git --no-pager log --pretty=format:"- %s (%h)" --no-merges ${PREV_TAG}..HEAD > changelog.txt
          fi

      - name: Create and push git tag
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if tag already exists
          if git rev-parse "$RELEASE" >/dev/null 2>&1; then
            echo "Tag $RELEASE already exists, skipping creation"
          else
            echo "Creating tag $RELEASE"
            git tag -a "$RELEASE" -m "Release $RELEASE"
            git push origin "$RELEASE"
            echo "✅ Tag $RELEASE created and pushed"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate-release.outputs.release_version }}
          name: Release ${{ needs.validate-release.outputs.release_version }}
          body_path: changelog.txt
          draft: false
          prerelease: ${{ github.event.inputs.release_mode == 'rc' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-to-k8s:
    name: Deploy to Kubernetes (ArgoCD)
    needs: [validate-release, create-release]
    runs-on: ubuntu-latest
    if: github.event.inputs.deploy == 'true' && needs.validate-release.result == 'success'
    steps:
      - name: Checkout iotistic repository
        uses: actions/checkout@v4

      - name: Checkout iot-k8s repository
        uses: actions/checkout@v4
        with:
          repository: Iotistica/iot-k8s
          ref: main
          path: iot-k8s
          token: ${{ secrets.K8S_DEPLOY_PAT || secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Update ArgoCD values.yaml
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          CLIENT="${{ github.event.inputs.client_name || 'demo' }}"
          VALUES_FILE="iot-k8s/charts/iotistica-app/values/${CLIENT}/values.yaml"
          
          echo "Updating image tags in ArgoCD values file..."
          echo "  Release: ${RELEASE}"
          echo "  Client: ${CLIENT}"
          echo "  File: ${VALUES_FILE}"
          
          # Check if the values file exists
          if [ ! -f "$VALUES_FILE" ]; then
            echo "❌ Error: Values file not found at $VALUES_FILE"
            echo "Expected path: iot-k8s/charts/iotistica-app/values/{client}/values.yaml"
            echo ""
            echo "Available clients:"
            ls -la "iot-k8s/charts/iotistica-app/values/" 2>/dev/null || echo "  Directory not found"
            exit 1
          fi
          
          # Update image tags using yq (strict, no fallback)
          yq eval ".api.image.tag = \"${RELEASE}\"" -i "$VALUES_FILE"
          yq eval ".dashboard.image.tag = \"${RELEASE}\"" -i "$VALUES_FILE"
          
          echo "✅ Updated image tags to ${RELEASE}"
          echo ""
          echo "Updated fields:"
          yq eval ".api.image.tag" "$VALUES_FILE" | sed 's/^/  api.image.tag: /'
          yq eval ".dashboard.image.tag" "$VALUES_FILE" | sed 's/^/  dashboard.image.tag: /'

      - name: Commit and push changes
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          CLIENT="${{ github.event.inputs.client_name || 'demo' }}"
          VALUES_FILE="iot-k8s/charts/iotistica-app/values/${CLIENT}/values.yaml"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Change to iot-k8s directory
          cd iot-k8s
          
          # Configure git for this repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes
          if git diff --quiet; then
            echo "ℹ️  No changes to commit"
            cd ..
            exit 0
          fi
          
          # Stage, commit, and push changes
          git add "charts/iotistica-app/values/${CLIENT}/values.yaml"
          git commit -m "chore: bump ${CLIENT} version to ${RELEASE}"
          git push origin main
          
          cd ..
          echo "✅ Pushed version update to ${RELEASE}"
          echo ""
          echo "ArgoCD will now automatically sync the changes to the cluster"

      - name: Deployment summary
        if: always()
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          CLIENT="${{ github.event.inputs.client_name || 'demo' }}"
          
          echo "## ArgoCD Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** \`${RELEASE}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Client:** \`${CLIENT}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** Iotistica/iot-k8s" >> $GITHUB_STEP_SUMMARY
          echo "**Values File:** \`charts/iotistica-app/values/${CLIENT}/values.yaml\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Updated Fields:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`api.image.tag\`: \`${RELEASE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`dashboard.image.tag\`: \`${RELEASE}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Successfully updated ArgoCD values and pushed to iot-k8s repository**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will now:" >> $GITHUB_STEP_SUMMARY
          echo "1. Detect the change in the iot-k8s repository" >> $GITHUB_STEP_SUMMARY
          echo "2. Sync the new version to the cluster" >> $GITHUB_STEP_SUMMARY
          echo "3. Roll out the updated application" >> $GITHUB_STEP_SUMMARY