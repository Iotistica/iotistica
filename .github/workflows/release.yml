name: Release API, Dashboard and MQTT Monitor

# Simplified release workflow:
# 1. Push a tag (v1.2.3) to trigger OR use workflow_dispatch with version
# 2. Find existing Docker images by package.json versions
# 3. Retag them with the release version
# 4. Create GitHub release
# 5. Deploy to K8s if versions changed

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch  # 1.0.0 -> 1.0.1
          - minor  # 1.0.0 -> 1.1.0
          - major  # 1.0.0 -> 2.0.0
        default: patch
      custom_version:
        description: 'Or enter custom version (e.g., 1.2.3, overrides bump_type)'
        required: false
        type: string
      deploy:
        description: 'Deploy to Kubernetes after release'
        required: false
        default: true
        type: boolean
      destroy:
        description: 'Destroy the Kubernetes deployment'
        required: false
        default: false
        type: boolean
      clean_before_deploy:
        description: 'Delete Helm release + namespace before deploying'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: [iotistic-lab-sc]
    outputs:
      version: ${{ steps.version.outputs.version }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger - calculate version
            if [ -n "${{ inputs.custom_version }}" ]; then
              # Use custom version
              VERSION="v${{ inputs.custom_version }}"
              echo "Using custom version: $VERSION"
            else
              # Auto-bump based on latest tag
              git fetch --tags --force
              LATEST_TAG=$(git tag -l "v*.*.*" --sort=-version:refname | head -n1)
              
              if [ -z "$LATEST_TAG" ]; then
                LATEST_TAG="v0.0.0"
              fi
              
              echo "Latest tag: $LATEST_TAG"
              
              # Extract version numbers
              LATEST_TAG=${LATEST_TAG#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
              
              # Bump version based on input
              case "${{ inputs.bump_type }}" in
                major)
                  MAJOR=$((MAJOR + 1))
                  MINOR=0
                  PATCH=0
                  ;;
                minor)
                  MINOR=$((MINOR + 1))
                  PATCH=0
                  ;;
                patch)
                  PATCH=$((PATCH + 1))
                  ;;
              esac
              
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
              echo "Auto-bumped version (${{ inputs.bump_type }}): $VERSION"
            fi
          else
            # Tag trigger - extract version from tag
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "Release version: $VERSION"
          fi
          
          # Validate format
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version: $VERSION (expected: v1.2.3)"
            exit 1
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Release version: $VERSION"

      - name: Get package versions
        id: packages
        run: |
          echo "api=$(jq -r .version api/package.json)" >> $GITHUB_OUTPUT
          echo "dashboard=$(jq -r .version dashboard/package.json)" >> $GITHUB_OUTPUT
          echo "mqtt_monitor=$(jq -r .version mqtt-monitor/package.json)" >> $GITHUB_OUTPUT
          echo "housekeeper=$(jq -r .version housekeeper/package.json)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Retag and push images
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Function to retag image (logs to stderr, returns success/fail)
          retag_image() {
            local service=$1
            local source_tag=$2
            
            # Try source tag first, fallback to latest
            for tag in "$source_tag" "latest"; do
              if docker pull iotistic/$service:$tag 2>/dev/null; then
                echo "✅ Pulled iotistic/$service:$tag" >&2
                docker tag iotistic/$service:$tag iotistic/$service:$VERSION
                docker push iotistic/$service:$VERSION
                echo "✅ Released iotistic/$service:$VERSION" >&2
                return 0
              fi
            done
            
            echo "⚠️  Skipped $service (no image found)" >&2
            return 1
          }
          
          # Retag all services
          retag_image "api" "${{ steps.packages.outputs.api }}" || true
          retag_image "dashboard" "${{ steps.packages.outputs.dashboard }}" || true
          retag_image "mqtt-monitor" "${{ steps.packages.outputs.mqtt_monitor }}" || true
          retag_image "housekeeper" "${{ steps.packages.outputs.housekeeper }}" || true

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag -l "v*.*.*" --sort=-version:refname | grep -v "^${{ steps.version.outputs.version }}$" | head -n1)
          
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" --no-merges | head -50 > changelog.txt
          else
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges > changelog.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: changelog.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "# Release ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "- iotistic/api:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- iotistic/dashboard:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- iotistic/mqtt-monitor:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- iotistic/housekeeper:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to Kubernetes
    needs: release
    runs-on: [iotistic-lab-sc]
    if: |
      always() && 
      needs.release.result == 'success' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy == true))
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          if kubectl cluster-info >/dev/null 2>&1; then
            echo "✅ kubectl already configured"
          elif [ -n "${{ secrets.KUBECONFIG }}" ]; then
            mkdir -p $HOME/.kube
            echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
            chmod 600 $HOME/.kube/config
            echo "✅ kubectl configured from secret"
          else
            echo "❌ kubectl not configured"
            exit 1
          fi

      - name: Check if deployment needed
        id: check
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          NAMESPACE="iotistic-nodeport"
          
          # Get current deployed versions
          API_IMG=$(kubectl get deploy iotistic-api -n $NAMESPACE -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
          CURRENT=$(echo "$API_IMG" | grep -oP '(?<=:)v?[0-9]+\.[0-9]+\.[0-9]+' || echo "none")
          
          if [ "$CURRENT" = "$VERSION" ] || [ "$CURRENT" = "${VERSION#v}" ]; then
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️  Already deployed: $VERSION"
          else
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "🚀 Deploy needed: $CURRENT → $VERSION"
          fi

      - name: Clean before deploy
        if: ${{ inputs.clean_before_deploy == true && steps.check.outputs.should_deploy == 'true' }}
        run: |
          NAMESPACE="iotistic-nodeport"
          
          echo "🧹 Cleaning previous deployment..."
          helm uninstall iotistic -n $NAMESPACE || true
          kubectl delete namespace $NAMESPACE --ignore-not-found --wait
          
          echo "⏳ Waiting for namespace cleanup..."
          for i in {1..10}; do
            if ! kubectl get namespace $NAMESPACE >/dev/null 2>&1; then
              echo "✅ Namespace cleaned"
              break
            fi
            sleep 3
          done

      - name: Deploy with Helm
        if: ${{ inputs.destroy != true && steps.check.outputs.should_deploy == 'true' }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          NAMESPACE="iotistic-nodeport"
          
          # Get current Mosquitto tag (preserve it)
          MOSQUITTO_TAG=$(kubectl get deploy iotistic-mosquitto -n $NAMESPACE -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null | cut -d':' -f2 || echo "latest")
          
          helm upgrade --install iotistic ./k8s/charts/iotistic \
            --namespace $NAMESPACE \
            --create-namespace \
            -f ./k8s/charts/iotistic/values.yaml \
            --set api.image.tag="$VERSION" \
            --set dashboard.image.tag="$VERSION" \
            --set mqttMonitor.image.tag="$VERSION" \
            --set housekeeper.image.tag="$VERSION" \
            --set mosquitto.image.tag="$MOSQUITTO_TAG" \
            --timeout 5m \
            --wait
          
          echo "✅ Deployed $VERSION to Kubernetes"

      - name: Destroy deployment
        if: ${{ inputs.destroy == true }}
        run: |
          NAMESPACE="iotistic-nodeport"
          
          echo "🗑️  Destroying deployment..."
          helm uninstall iotistic -n $NAMESPACE || true
          kubectl delete namespace $NAMESPACE --wait --ignore-not-found
          
          echo "✅ Deployment destroyed"

      - name: Verify deployment
        if: ${{ inputs.destroy != true && steps.check.outputs.should_deploy == 'true' }}
        run: |
          kubectl -n iotistic-nodeport get pods
          kubectl -n iotistic-nodeport get svc
          
          echo "## Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl -n iotistic-nodeport get pods -o wide >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY