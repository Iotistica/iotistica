name: Release Core Services

# This workflow creates official releases by retagging the latest CI-built images
# with semantic version tags. CI builds continuously push images with SHA and 
# version tags, and this workflow makes them "official" releases.
#
# Tagging Strategy:
# - CI builds push: <service>:latest, <service>:<sha>, <service>:<version>
# - Release workflow reuses existing images and adds: <service>:v1.2.3
# - No rebuilding - images already tested via CI
#
# Services included: API, Dashboard, MQTT Exporter (core user-facing services)
# Excluded: Agent, simulators, internal tools (have their own CI workflows)

on:
  push:
    tags:
      - 'v*.*.*'  # e.g., v1.2.3, v2.0.0 (semantic versioning)

jobs:
  validate-release:
    name: Validate Release Tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      api_version: ${{ steps.versions.outputs.api_version }}
      dashboard_version: ${{ steps.versions.outputs.dashboard_version }}
      mqtt_exporter_version: ${{ steps.versions.outputs.mqtt_exporter_version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"
          
          # Validate semantic versioning format
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected format: v1.2.3 (semantic versioning)"
            exit 1
          fi
          
          echo "✅ Valid semantic version: $VERSION"

      - name: Get service versions from package.json
        id: versions
        run: |
          # Get current versions from package.json files
          API_VERSION=$(jq -r '.version' api/package.json)
          DASHBOARD_VERSION=$(jq -r '.version' dashboard/package.json)
          MQTT_EXPORTER_VERSION=$(jq -r '.version' mqtt-exporter/package.json)
          
          echo "api_version=$API_VERSION" >> $GITHUB_OUTPUT
          echo "dashboard_version=$DASHBOARD_VERSION" >> $GITHUB_OUTPUT
          echo "mqtt_exporter_version=$MQTT_EXPORTER_VERSION" >> $GITHUB_OUTPUT
          
          echo "Service versions:"
          echo "  - API: $API_VERSION"
          echo "  - Dashboard: $DASHBOARD_VERSION"
          echo "  - MQTT Exporter: $MQTT_EXPORTER_VERSION"

      - name: Verify Docker images exist
        run: |
          echo "Verifying CI-built images exist on Docker Hub..."
          
          # Check if images with version tags exist
          docker manifest inspect iotistic/api:${{ steps.versions.outputs.api_version }} || {
            echo "❌ API image not found: iotistic/api:${{ steps.versions.outputs.api_version }}"
            exit 1
          }
          
          docker manifest inspect iotistic/dashboard:${{ steps.versions.outputs.dashboard_version }} || {
            echo "❌ Dashboard image not found: iotistic/dashboard:${{ steps.versions.outputs.dashboard_version }}"
            exit 1
          }
          
          docker manifest inspect iotistic/mqtt-exporter:${{ steps.versions.outputs.mqtt_exporter_version }} || {
            echo "❌ MQTT Exporter image not found: iotistic/mqtt-exporter:${{ steps.versions.outputs.mqtt_exporter_version }}"
            exit 1
          }
          
          echo "✅ All required Docker images exist"

      - name: Display release summary
        run: |
          echo "## Release Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release Tag:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services to Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Current Version | Docker Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------------|--------------|" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ steps.versions.outputs.api_version }}\` | ✅ Found |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | \`${{ steps.versions.outputs.dashboard_version }}\` | ✅ Found |" >> $GITHUB_STEP_SUMMARY
          echo "| MQTT Exporter | \`${{ steps.versions.outputs.mqtt_exporter_version }}\` | ✅ Found |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Strategy:** Retag existing CI-built images with release version" >> $GITHUB_STEP_SUMMARY

  release-api:
    name: Release API
    needs: validate-release
    runs-on: ubuntu-24.04
    
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Retag API image with release version
        run: |
          RELEASE_TAG="${{ needs.validate-release.outputs.version }}"
          SOURCE_TAG="${{ needs.validate-release.outputs.api_version }}"
          
          echo "Retagging iotistic/api:$SOURCE_TAG → iotistic/api:$RELEASE_TAG"
          
          # Pull the CI-built image
          docker pull iotistic/api:$SOURCE_TAG
          
          # Tag with release version
          docker tag iotistic/api:$SOURCE_TAG iotistic/api:$RELEASE_TAG
          
          # Push release tag
          docker push iotistic/api:$RELEASE_TAG
          
          echo "✅ API released as $RELEASE_TAG"

  release-dashboard:
    name: Release Dashboard
    needs: validate-release
    runs-on: ubuntu-24.04
    
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Retag Dashboard image with release version
        run: |
          RELEASE_TAG="${{ needs.validate-release.outputs.version }}"
          SOURCE_TAG="${{ needs.validate-release.outputs.dashboard_version }}"
          
          echo "Retagging iotistic/dashboard:$SOURCE_TAG → iotistic/dashboard:$RELEASE_TAG"
          
          # Pull the CI-built image
          docker pull iotistic/dashboard:$SOURCE_TAG
          
          # Tag with release version
          docker tag iotistic/dashboard:$SOURCE_TAG iotistic/dashboard:$RELEASE_TAG
          
          # Push release tag
          docker push iotistic/dashboard:$RELEASE_TAG
          
          echo "✅ Dashboard released as $RELEASE_TAG"

  release-mqtt-exporter:
    name: Release MQTT Exporter
    needs: validate-release
    runs-on: ubuntu-24.04
    
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Retag MQTT Exporter image with release version
        run: |
          RELEASE_TAG="${{ needs.validate-release.outputs.version }}"
          SOURCE_TAG="${{ needs.validate-release.outputs.mqtt_exporter_version }}"
          
          echo "Retagging iotistic/mqtt-exporter:$SOURCE_TAG → iotistic/mqtt-exporter:$RELEASE_TAG"
          
          # Pull the CI-built image
          docker pull iotistic/mqtt-exporter:$SOURCE_TAG
          
          # Tag with release version
          docker tag iotistic/mqtt-exporter:$SOURCE_TAG iotistic/mqtt-exporter:$RELEASE_TAG
          
          # Push release tag
          docker push iotistic/mqtt-exporter:$RELEASE_TAG
          
          echo "✅ MQTT Exporter released as $RELEASE_TAG"

  create-release:
    name: Create GitHub Release
    needs: [validate-release, release-api, release-dashboard, release-mqtt-exporter]
    runs-on: ubuntu-24.04
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "First release - including all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges | head -50)
          else
            echo "Generating changelog from $PREV_TAG to ${GITHUB_REF#refs/tags/}"
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          echo "$COMMITS" > changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate-release.outputs.version }}
          name: Release ${{ needs.validate-release.outputs.version }}
          body_path: changelog.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Release Summary
        run: |
          echo "# Release ${{ needs.validate-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Docker Images Released" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All core services tagged with \`${{ needs.validate-release.outputs.version }}\`:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Source Version | Release Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ needs.validate-release.outputs.api_version }}\` | \`${{ needs.validate-release.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | \`${{ needs.validate-release.outputs.dashboard_version }}\` | \`${{ needs.validate-release.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| MQTT Exporter | \`${{ needs.validate-release.outputs.mqtt_exporter_version }}\` | \`${{ needs.validate-release.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Changelog" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat changelog.txt | head -20 >> $GITHUB_STEP_SUMMARY
          
          TOTAL=$(wc -l < changelog.txt)
          if [ $TOTAL -gt 20 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_...and $((TOTAL - 20)) more commits (see GitHub Release for full changelog)_" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Deployment Commands" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Kubernetes" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl set image deployment/api api=iotistic/api:${{ needs.validate-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "kubectl set image deployment/dashboard dashboard=iotistic/dashboard:${{ needs.validate-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "kubectl set image deployment/mqtt-exporter mqtt-exporter=iotistic/mqtt-exporter:${{ needs.validate-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Compose" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Update image tags in docker-compose.yml to ${{ needs.validate-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker-compose pull && docker-compose up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
