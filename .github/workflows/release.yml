name: Release

on:
  push:
    tags:
      # Only trigger on final release tags (not RC tags)
      # RCs should be created via manual workflow_dispatch
      # To include RCs, add: - 'v*.*.*-rc.*'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_mode:
        description: 'Release mode'
        required: true
        type: choice
        default: final
        options:
          - rc
          - final
      deploy:
        description: 'Deploy to Kubernetes after release'
        required: false
        default: true
        type: boolean
      client_name:
        description: 'K8s client name (namespace)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  DOCKER_ORG: iotistic
  K8S_NAMESPACE: iotistic-nodeport
  CHART_PATH: ./k8s/charts/iotistic
  VALUES_FILE: ./k8s/charts/iotistic/values.yaml
  APPS: api dashboard nodered

jobs:
  validate-release:
    name: Validate release & check images
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.set_version.outputs.release_version }}
    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set release version (auto bump)
        id: set_version
        run: |
          # Fetch all tags from remote
          git fetch origin 'refs/tags/*:refs/tags/*' --force
          
          # Debug: Show top tags (all versions)
          echo "=== DEBUG: Top 10 version tags ==="
          git tag --list 'v*.*.*' --sort=-version:refname | head -10
          echo ""
          
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE="${GITHUB_REF#refs/tags/}"
            echo "Tag push detected: $RELEASE"
            echo "release_version=$RELEASE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Manual dispatch
          MODE="${{ github.event.inputs.release_mode || 'final' }}"
          TYPE="${{ github.event.inputs.release_type }}"
          
          # Find latest final (excluding RC tags)
          LATEST_FINAL=$(git tag --list 'v*.*.*' --sort=-version:refname | grep -v -E '\-rc' | head -1)
          echo "Latest final release: $LATEST_FINAL"
          
          if [ -z "$LATEST_FINAL" ]; then
            echo "No v0.0.2+ releases found, starting from v0.0.2"
            LATEST_FINAL="v0.0.2"
            MAJOR=0
            MINOR=0
            PATCH=2
          else
            echo "Latest final release: $LATEST_FINAL"
            # Strip v prefix and parse version
            BASE=${LATEST_FINAL#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            
            # Ensure we have valid numbers (fallback to 0 if parsing fails)
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}
          fi
          
          echo "Parsed version: MAJOR=$MAJOR MINOR=$MINOR PATCH=$PATCH"
          
          # === RC MODE ===
          if [ "$MODE" = "rc" ]; then
            # Step 1: Determine target base version based on release_type
            case "$TYPE" in
              patch)
                TARGET_BASE="v${MAJOR}.${MINOR}.$((PATCH + 1))"
                ;;
              minor)
                TARGET_BASE="v${MAJOR}.$((MINOR + 1)).0"
                ;;
              major)
                TARGET_BASE="v$((MAJOR + 1)).0.0"
                ;;
            esac
            
            echo "Target base version: $TARGET_BASE"
            
            # Step 2: Find latest RC for this target base version
            LATEST_RC=$(git tag -l "${TARGET_BASE}-rc.*" --sort=-version:refname | head -n1)
            
            if [ -n "$LATEST_RC" ]; then
              # Increment RC number for existing RC line
              LAST_RC_NUM=$(echo "$LATEST_RC" | sed -E 's/.*-rc\.([0-9]+)/\1/')
              RC_NUM=$((LAST_RC_NUM + 1))
              echo "Found existing RC: $LATEST_RC → incrementing to rc.${RC_NUM}"
            else
              # Start new RC line
              RC_NUM=1
              echo "Starting new RC line for ${TARGET_BASE}"
            fi
            
            RELEASE="${TARGET_BASE}-rc.${RC_NUM}"
            echo "Auto-generated RC version: $RELEASE"
            echo "release_version=$RELEASE" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # === FINAL MODE ===
          # Compute new version directly (don't auto-infer RCs)
          case "$TYPE" in
            patch)
              PATCH=$((PATCH + 1))
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
          esac
          RELEASE="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New final release: $RELEASE"
          echo "release_version=$RELEASE" >> $GITHUB_OUTPUT

      - name: Check if tag already exists (for push trigger)
        id: verify
        shell: bash
        run: |
          RELEASE="${{ steps.set_version.outputs.release_version }}"
          
          # For tag push events, tag should already exist
          if git rev-parse "$RELEASE" >/dev/null 2>&1; then
            echo "✅ Tag already exists: $RELEASE (from push trigger)"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist yet: $RELEASE (will be created in create-tag job)"
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary for step output
        run: |
          MODE="${{ github.event.inputs.release_mode || 'final' }}"
          RELEASE="${{ steps.set_version.outputs.release_version }}"
          TAG_SOURCE="push trigger (tag already exists)"
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_SOURCE="workflow_dispatch (will be created by create-tag job)"
          fi
          
          MODE_BADGE="🎯 Final Release"
          
          if [ "$MODE" = "rc" ]; then
            # Extract RC number from version tag (e.g., v1.0.134-rc.2 -> 2)
            RC_NUM=$(echo "$RELEASE" | sed -E 's/.*-rc\.([0-9]+)/\1/' || echo "1")
            MODE_BADGE="🧪 Release Candidate (RC ${RC_NUM})"
          fi
          
          echo "## Release validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** \`$RELEASE\`" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** $MODE_BADGE" >> $GITHUB_STEP_SUMMARY
          echo "**Tag Source:** $TAG_SOURCE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workflow Sequence" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ validate-release: Compute version (\`$RELEASE\`)" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "2. ⏳ create-tag: Create and push git tag" >> $GITHUB_STEP_SUMMARY
            echo "3. ⏳ promote-images: Pull SHA image and promote to release version" >> $GITHUB_STEP_SUMMARY
          else
            echo "2. ⏭️ create-tag: SKIPPED (tag from push trigger)" >> $GITHUB_STEP_SUMMARY
            echo "3. ⏳ promote-images: Pull SHA image and promote to release version" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "4. ⏳ create-release: Create GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "5. ⏳ deploy-to-k8s: Update ArgoCD values" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services to Promote" >> $GITHUB_STEP_SUMMARY
          for APP in ${{ env.APPS }}; do
            echo "- \`iotistic/${APP}\` (will find last built image from ${APP}/**)" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Searches for ci-tagged images (CI-built, last 50 commits)" >> $GITHUB_STEP_SUMMARY

  create-tag:
    name: Create git tag (for workflow_dispatch)
    runs-on: ubuntu-latest
    needs: validate-release
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push git tag
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if tag already exists
          if git rev-parse "$RELEASE" >/dev/null 2>&1; then
            echo "Tag $RELEASE already exists"
          else
            echo "Creating tag $RELEASE pointing to HEAD"
            git tag -a "$RELEASE" -m "Release $RELEASE"
            git push origin "$RELEASE"
            echo "✅ Tag $RELEASE created and pushed"
          fi

  promote-images:
    name: Promote images to release version
    runs-on: ubuntu-latest
    needs: [validate-release, create-tag]
    # create-tag only runs on workflow_dispatch; on push it's skipped
    # Skipped jobs count as satisfied dependencies, so promote-images will run
    if: always() && needs.validate-release.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Promote images per app
        shell: bash
        run: |
          set -euo pipefail
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          
          echo "Release version: $RELEASE"
          echo ""

          # Commit the release tag points to (fallback to HEAD when tag is absent)
          RELEASE_COMMIT=$(git rev-list -n 1 "$RELEASE" 2>/dev/null || git rev-parse HEAD)
          echo "Release commit: $RELEASE_COMMIT"
          echo ""

          promote_app() {
            local APP="$1"
            local PATH_FILTER="${APP}/** .github/workflows/build-${APP}-ci.yml"
            local SHA=""

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Promoting $APP"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Get last 50 commits affecting this app
            for COMMIT in $(git log --format=%H "$RELEASE_COMMIT" -n 50 -- $PATH_FILTER); do
              SHORT_SHA="${COMMIT:0:12}"
              echo -n "   Trying ci-${SHORT_SHA}... "
              if docker pull "${DOCKER_ORG}/${APP}:ci-${SHORT_SHA}" >/dev/null 2>&1; then
                echo "✅ Found"
                break
              else
                echo "⏭️  Skip"
              fi
            done

            if [ -z "$SHORT_SHA" ]; then
              echo ""
              echo "❌ No CI-built images found for $APP (searched 50 commits)"
              echo "   Run: gh workflow run build-${APP}-ci.yml"
              exit 1
            fi

            # Pull the single ci- tag and promote to release version
            docker pull "${DOCKER_ORG}/${APP}:ci-${SHORT_SHA}"
            docker tag "${DOCKER_ORG}/${APP}:ci-${SHORT_SHA}" "${DOCKER_ORG}/${APP}:${RELEASE}"
            docker push "${DOCKER_ORG}/${APP}:${RELEASE}"
            echo "✅ ${DOCKER_ORG}/${APP}:ci-${SHORT_SHA} → ${RELEASE}"
            echo ""

            # Save SHORT_SHA for later use (no full SHA needed)
            echo "$SHORT_SHA" > "/tmp/${APP}_sha.txt"
          }

          # Promote all apps
          for APP in ${{ env.APPS }}; do
            promote_app "$APP"
          done

          # Tag as 'latest' for final releases
          if [[ "$RELEASE" != *"-rc."* ]]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Tagging as 'latest'"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            for APP in ${{ env.APPS }}; do
              SHORT_SHA=$(cat /tmp/${APP}_sha.txt)
              docker tag "${DOCKER_ORG}/${APP}:ci-${SHORT_SHA}" "${DOCKER_ORG}/${APP}:latest"
              docker push "${DOCKER_ORG}/${APP}:latest"
              echo "✅ ${DOCKER_ORG}/${APP}:latest"
            done
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All images promoted"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Generate summary with actual SHAs
          echo "## Image Promotion Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** \`$RELEASE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Promoted Images" >> $GITHUB_STEP_SUMMARY
          for APP in ${{ env.APPS }}; do
            SHORT_SHA=$(cat /tmp/${APP}_sha.txt)
            echo "- **${APP}**: \`iotistic/${APP}:ci-${SHORT_SHA}\` → \`${RELEASE}\`" >> $GITHUB_STEP_SUMMARY
          done

  create-release:
    name: Create GitHub Release (changelog)
    needs: [validate-release, promote-images]
    runs-on: ubuntu-latest
    if: |
      !cancelled() &&
      needs.validate-release.result == 'success' &&
      needs.promote-images.result == 'success'
    steps:
      - name: Log execution decision
        run: |
          echo "✅ create-release job is RUNNING"
          echo ""
          echo "Previous jobs:"
          echo "  validate-release: ${{ needs.validate-release.result }}"
          echo "  promote-images: ${{ needs.promote-images.result }}"
          echo ""
          echo "✅ Images promoted and ready for release"
          echo "📝 Now creating GitHub Release object"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog (simple)
        id: changelog
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          PREV_TAG=$(git tag -l "v*.*.*" --sort=-version:refname | grep -v "^${RELEASE}$" | head -n1 || true)
          if [ -z "$PREV_TAG" ]; then
            echo "First release or no previous tag found"
            git --no-pager log --pretty=format:"- %s (%h)" --no-merges | head -50 > changelog.txt
          else
            git --no-pager log --pretty=format:"- %s (%h)" --no-merges ${PREV_TAG}..HEAD > changelog.txt
          fi

      - name: Verify git tag exists
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          
          # Tag should exist from either push trigger or create-tag job
          if git rev-parse "$RELEASE" >/dev/null 2>&1; then
            echo "✅ Tag $RELEASE verified to exist"
          else
            echo "❌ Tag $RELEASE does not exist"
            echo "This should not happen - tag should have been created by create-tag job or push trigger"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate-release.outputs.release_version }}
          name: Release ${{ needs.validate-release.outputs.release_version }}
          body_path: changelog.txt
          draft: false
          prerelease: ${{ contains(needs.validate-release.outputs.release_version, '-rc.') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-to-k8s:
    name: Deploy to Kubernetes (ArgoCD)
    needs: [validate-release, create-release]
    runs-on: ubuntu-latest
    if: github.event.inputs.deploy == 'true' && needs.validate-release.result == 'success'
    steps:
      - name: Validate deploy inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          CLIENT="${{ github.event.inputs.client_name }}"
          if [ -z "$CLIENT" ]; then
            echo "ERROR: client_name is required for deployment"
            exit 1
          fi
          echo "Deploy target client: $CLIENT"

      - name: Checkout iotistic repository
        uses: actions/checkout@v4

      - name: Checkout iot-k8s repository
        uses: actions/checkout@v4
        with:
          repository: Iotistica/iot-k8s
          ref: main
          path: iot-k8s
          token: ${{ secrets.K8S_DEPLOY_PAT || secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Update ArgoCD values.yaml
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          CLIENT="${{ github.event.inputs.client_name || 'demo' }}"
          VALUES_FILE="iot-k8s/charts/iotistica-app/values/${CLIENT}/values.yaml"
          
          echo "Updating image tags in ArgoCD values file..."
          echo "  Release: ${RELEASE}"
          echo "  Client: ${CLIENT}"
          echo "  File: ${VALUES_FILE}"
          
          # Check if the values file exists
          if [ ! -f "$VALUES_FILE" ]; then
            echo "❌ Error: Values file not found at $VALUES_FILE"
            echo "Expected path: iot-k8s/charts/iotistica-app/values/{client}/values.yaml"
            echo ""
            echo "Available clients:"
            ls -la "iot-k8s/charts/iotistica-app/values/" 2>/dev/null || echo "  Directory not found"
            exit 1
          fi
          
          # Update image tags using yq (strict, no fallback)
          yq eval ".api.image.tag = \"${RELEASE}\"" -i "$VALUES_FILE"
          yq eval ".dashboard.image.tag = \"${RELEASE}\"" -i "$VALUES_FILE"
          yq eval ".nodered.image.tag = \"${RELEASE}\"" -i "$VALUES_FILE"
          
          echo "✅ Updated image tags to ${RELEASE}"
          echo ""
          echo "Updated fields:"
          yq eval ".api.image.tag" "$VALUES_FILE" | sed 's/^/  api.image.tag: /'
          yq eval ".dashboard.image.tag" "$VALUES_FILE" | sed 's/^/  dashboard.image.tag: /'
          yq eval ".nodered.image.tag" "$VALUES_FILE" | sed 's/^/  nodered.image.tag: /'

      - name: Commit and push changes
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          CLIENT="${{ github.event.inputs.client_name || 'demo' }}"
          VALUES_FILE="iot-k8s/charts/iotistica-app/values/${CLIENT}/values.yaml"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Change to iot-k8s directory
          cd iot-k8s
          
          # Configure git for this repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes
          if git diff --quiet; then
            echo "ℹ️  No changes to commit"
            cd ..
            exit 0
          fi
          
          # Stage, commit, and push changes
          git add "charts/iotistica-app/values/${CLIENT}/values.yaml"
          git commit -m "chore: bump ${CLIENT} version to ${RELEASE}"
          git push origin main
          
          cd ..
          echo "✅ Pushed version update to ${RELEASE}"
          echo ""
          echo "ArgoCD will now automatically sync the changes to the cluster"

      - name: Deployment summary
        if: always()
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          CLIENT="${{ github.event.inputs.client_name || 'demo' }}"
          
          echo "## ArgoCD Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** \`${RELEASE}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Client:** \`${CLIENT}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** Iotistica/iot-k8s" >> $GITHUB_STEP_SUMMARY
          echo "**Values File:** \`charts/iotistica-app/values/${CLIENT}/values.yaml\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Updated Fields:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`api.image.tag\`: \`${RELEASE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`dashboard.image.tag\`: \`${RELEASE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`nodered.image.tag\`: \`${RELEASE}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Successfully updated ArgoCD values and pushed to iot-k8s repository**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will now:" >> $GITHUB_STEP_SUMMARY
          echo "1. Detect the change in the iot-k8s repository" >> $GITHUB_STEP_SUMMARY
          echo "2. Sync the new version to the cluster" >> $GITHUB_STEP_SUMMARY
          echo "3. Roll out the updated application" >> $GITHUB_STEP_SUMMARY