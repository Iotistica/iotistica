name: Release All

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Choose release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      deploy:
        description: 'Deploy to Kubernetes after release'
        required: false
        default: true
        type: boolean
      force_latest:
        description: 'Force deployment using :latest images with release tag'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  DOCKER_ORG: iotistic
  K8S_NAMESPACE: iotistic-nodeport
  CHART_PATH: ./k8s/charts/iotistic
  VALUES_FILE: ./k8s/charts/iotistic/values.yaml

jobs:
  validate-release:
    name: Validate release & check images
    runs-on: [iotistic-lab-sc]
    outputs:
      release_version: ${{ steps.set_version.outputs.release_version }}
      api_src_tag: ${{ steps.verify.outputs.api_src_tag }}
      dashboard_src_tag: ${{ steps.verify.outputs.dashboard_src_tag }}
      nodered_src_tag: ${{ steps.verify.outputs.nodered_src_tag }}
      mqtt_src_tag: ${{ steps.verify.outputs.mqtt_src_tag }}
      housekeeper_src_tag: ${{ steps.verify.outputs.housekeeper_src_tag }}
      postoffice_src_tag: ${{ steps.verify.outputs.postoffice_src_tag }}
    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set release version (auto bump)
        id: set_version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag push — use the pushed tag
            RELEASE="${GITHUB_REF#refs/tags/}"
            echo "Triggered by tag push. Release: $RELEASE"
            echo "release_version=$RELEASE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Manual dispatch → auto bump
          TYPE="${{ github.event.inputs.release_type }}"

          # Get latest semver tag
          LAST=$(git tag -l 'v*.*.*' --sort=-version:refname | head -n1)

          if [ -z "$LAST" ]; then
            echo "No previous tags found, starting at v1.0.0"
            LAST="v1.0.0"
          fi

          echo "Latest tag: $LAST"

          # strip v prefix
          BASE=${LAST#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

          case "$TYPE" in
            patch)
              PATCH=$((PATCH + 1))
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
          esac

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Auto-generated version: $NEW"
          echo "release_version=$NEW" >> $GITHUB_OUTPUT

      - name: Read service versions from package.json at this commit
        id: pkg_versions
        run: |
          # Read versions from package.json in the repo at this commit
          API_VERSION=$(jq -r '.version' api/package.json)
          DASHBOARD_VERSION=$(jq -r '.version' dashboard/package.json)
          NODERED_VERSION=$(date +%Y.%m.%d)-$(git rev-list --count HEAD)
          MQTT_MONITOR_VERSION=$(jq -r '.version' mqtt-monitor/package.json)
          HOUSEKEEPER_VERSION=$(jq -r '.version' housekeeper/package.json)
          POSTOFFICE_VERSION=$(jq -r '.version' postoffice/package.json)

          echo "api_pkg=$API_VERSION" >> $GITHUB_OUTPUT
          echo "dashboard_pkg=$DASHBOARD_VERSION" >> $GITHUB_OUTPUT
          echo "nodered_pkg=$NODERED_VERSION" >> $GITHUB_OUTPUT
          echo "mqtt_pkg=$MQTT_MONITOR_VERSION" >> $GITHUB_OUTPUT
          echo "housekeeper_pkg=$HOUSEKEEPER_VERSION" >> $GITHUB_OUTPUT
          echo "postoffice_pkg=$POSTOFFICE_VERSION" >> $GITHUB_OUTPUT

          echo "Package.json versions:"
          echo "  API: $API_VERSION"
          echo "  Dashboard: $DASHBOARD_VERSION"
          echo "  Node-RED: $NODERED_VERSION"
          echo "  MQTT Monitor: $MQTT_MONITOR_VERSION"
          echo "  Housekeeper: $HOUSEKEEPER_VERSION"
          echo "  Postoffice: $POSTOFFICE_VERSION"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Verify CI-built images exist (and determine source tags)
        id: verify
        shell: bash
        run: |
          set -euo pipefail

          # If force_latest is true, use "latest" for all services
          if [ "${{ github.event.inputs.force_latest }}" = "true" ]; then
            echo "nodered_src_tag=latest" >> $GITHUB_OUTPUT
            echo "mqtt_src_tag=latest" >> $GITHUB_OUTPUT
            echo "housekeeper_src_tag=latest" >> $GITHUB_OUTPUT
            echo "postoffice_src_tag=latest" >> $GITHUB_OUTPUT
            
            echo ""
            echo "Image verification complete (forced latest):"
            echo "  API  -> latest"
            echo "  Dashboard -> latest"
            echo "  Node-RED
            echo "Image verification complete (forced latest):"
            echo "  API  -> latest"
            echo "  Dashboard -> latest"
            echo "  MQTT Monitor -> latest"
            echo "  Housekeeper -> latest"
            echo "  Postoffice -> latest"
            exit 0
          fi

          # Helper: check image existence (returns tag to use or "skip")
          check_image() {
            local svc="$1"
            local prefer_tag="$2"
            
            # If no preferred tag provided, return skip
            if [ -z "$prefer_tag" ]; then
              echo "skip"
              return 1
            fi
            
            # Try the package.json tag first (exact match)
            if docker manifest inspect "${DOCKER_ORG}/${svc}:${prefer_tag}" >/dev/null 2>&1; then
              echo "$prefer_tag"
              return 0
            fi
            
            # If prefer_tag doesn't start with v, also try with v prefix
            if [[ "$prefer_tag" != v* ]]; then
              if docker manifest inspect "${DOCKER_ORG}/${svc}:v${prefer_tag}" >/dev/null 2>&1; then
                echo "v${prefer_tag}"
                return 0
              fi
            fi
            
            # No versioned image found
            echo "skip"
          NODERED_SRC=$(check_image "nodered" "${{ steps.pkg_versions.outputs.nodered_pkg }}" || true)
          MQTT_SRC=$(check_image "mqtt-monitor" "${{ steps.pkg_versions.outputs.mqtt_pkg }}" || true)
          HOUSEKEEPER_SRC=$(check_image "housekeeper" "${{ steps.pkg_versions.outputs.housekeeper_pkg }}" || true)
          POSTOFFICE_SRC=$(check_image "postoffice" "${{ steps.pkg_versions.outputs.postoffice_pkg }}" || true)

          echo "api_src_tag=$API_SRC" >> $GITHUB_OUTPUT
          echo "dashboard_src_tag=$DASHBOARD_SRC" >> $GITHUB_OUTPUT
          echo "nodered_src_tag=$NODERED_SRC" >> $GITHUB_OUTPUT
          echo "mqtt_src_tag=$MQTT_SRC" >> $GITHUB_OUTPUT
          echo "housekeeper_src_tag=$HOUSEKEEPER_SRC" >> $GITHUB_OUTPUT
          echo "postoffice_src_tag=$POSTOFFICE_SRC" >> $GITHUB_OUTPUT

          echo ""
          echo "Image verification complete:"
          echo "  API  -> $API_SRC"
          echo "  Dashboard -> $DASHBOARD_SRC"
          echo "  Node-RED -> $NODEREOFFICE_SRC" >> $GITHUB_OUTPUT

          echo ""
          echo "Image verification complete:"
          echo "  API  -> $API_SRC"
          echo "  Dashboard -> $DASHBOARD_SRC"
          echo "  MQTT Monitor -> $MQTT_SRC"
          echo "  Housekeeper -> $HOUSEKEEPER_SRC"
          echo "  Postoffice -> $POSTOFFICE_SRC"

      - name: Summary for step output
        run: |
          echo "##Node-RED | \`${{ steps.pkg_versions.outputs.nodered_pkg }}\` | \`${{ steps.verify.outputs.nodered_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "|  Release validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** \`${{ steps.set_version.outputs.release_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | package.json | selected image tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---:|---|" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ steps.pkg_versions.outputs.api_pkg }}\` | \`${{ steps.verify.outputs.api_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | \`${{ steps.pkg_versions.outputs.dashboard_pkg }}\` | \`${{ steps.verify.outputs.dashboard_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| MQTT Monitor | \`${{ steps.pkg_versions.outputs.mqtt_pkg }}\` | \`${{ steps.verify.outputs.mqtt_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Housekeeper | \`${{ steps.pkg_versions.outputs.housekeeper_pkg }}\` | \`${{ steps.verify.outputs.housekeeper_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Postoffice | \`${{ steps.pkg_versions.outputs.postoffice_pkg }}\` | \`${{ steps.verify.outputs.postoffice_src_tag }}\` |" >> $GITHUB_STEP_SUMMARYnodered_src_tag != 'skip' || needs.validate-release.outputs.

  retag-and-push:
    name: Retag & push release images
    runs-on: [iotistic-lab-sc]
    needs: validate-release
    if: always() && (needs.validate-release.outputs.api_src_tag != 'skip' || needs.validate-release.outputs.dashboard_src_tag != 'skip' || needs.validate-release.outputs.mqtt_src_tag != 'skip' || needs.validate-release.outputs.housekeeper_src_tag != 'skip' || needs.validate-release.outputs.postoffice_src_tag != 'skip')
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Retag & push images
        shell: bash
        run: |
          set -euo pipefail
          RELEASE="${{ needs.validate-release.outputs.release_version }}"

          retag_and_push() {
            local svc="$1"
            local src_tag="$2"
            if [ -z "$src_tag" ] || [ "$src_tag" = "skip" ]; then
              echo "Skipping $svc (no source image)"
              return 0
            fi

            echo "Processing $svc: ${DOCKER_ORG}/${svc}:${src_tag} -> ${DOCKER_ORG}/${svc}:${RELEASE}"
            docker pull "${DOCKER_ORG}/${svc}:${src_tag}"
            docker tag "${DOCKER_ORG}/${svc}:${src_tag}" "${DOCKER_ORG}/${svc}:${RELEASE}"
            docker push "$nodered" "${{ needs.validate-release.outputs.nodered_src_tag }}"
          retag_and_push "{DOCKER_ORG}/${svc}:${RELEASE}"
            echo "Retagged & pushed ${DOCKER_ORG}/${svc}:${RELEASE}"
          }

          retag_and_push "api" "${{ needs.validate-release.outputs.api_src_tag }}"
          retag_and_push "dashboard" "${{ needs.validate-release.outputs.dashboard_src_tag }}"
          retag_and_push "mqtt-monitor" "${{ needs.validate-release.outputs.mqtt_src_tag }}"
          retag_and_push "housekeeper" "${{ needs.validate-release.outputs.housekeeper_src_tag }}"
          retag_and_push "postoffice" "${{ needs.validate-release.outputs.postoffice_src_tag }}"

  create-release:
    name: Create GitHub Release (changelog)
    needs: [validate-release, retag-and-push]
    runs-on: [iotistic-lab-sc]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog (simple)
        id: changelog
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          PREV_TAG=$(git tag -l "v*.*.*" --sort=-version:refname | grep -v "^${RELEASE}$" | head -n1 || true)
          if [ -z "$PREV_TAG" ]; then
            echo "First release or no previous tag found"
            git --no-pager log --pretty=format:"- %s (%h)" --no-merges | head -50 > changelog.txt
          else
            git --no-pager log --pretty=format:"- %s (%h)" --no-merges ${PREV_TAG}..HEAD > changelog.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate-release.outputs.release_version }}
          name: Release ${{ needs.validate-release.outputs.release_version }}
          body_path: changelog.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-deployment-needed:
    name: Check if deployment is needed
    runs-on: [iotistic-lab-sc]
    needs: [validate-release, create-release]
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      changes_summary: ${{ steps.decide.outputs.changes_summary }}
    steps:
      - name: Configure kubectl (ensure KUBECONFIG)
        run: |
          kubectx nodeport
          if kubectl get namespaces >/dev/null 2>&1; then
            echo "kubectl already working"
            exit 0
          fi

          if [ -n "${{ secrets.KUBECONFIG }}" ]; then
            mkdir -p "$HOME/.kube"
            echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config" || echo "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
            kubectx nodeport || true
            kubectl get namespaces || true
          else
            echo "KUBECONFIG not configured and kubectl not accessible" >&2
            exit 1
          fi

      - name: Get currently deployed image tags
        id: current
        run: |
          set -euo pipefail
          NAMESPACE="${{ env.K8S_NAMESPACE }}"

          get_tag() {
            local deploy="$1"
            # If deployment missing, return "none"
            if ! kubectl -n "$NAMESPACE" get deployment "$deploy" >/dev/null 2>&1; then
              echo "none"
              return
            fi
            # fetch image (first container)
            img=$(kubectl -n "$NAMESPACE" get deployment "$deploy" -o jsonpath='{.spec.template.spec.containers[0].image}')
            # If image includes '@sha256:' (imageDigest) cut off digest
            img=${img%%@*}
            tag="${img##*:}"
            # if no ":" found then tag is 'latest'
            if [ "$tag" = "$img" ]; then
              tag="latest"
            fi
            echo "$tag"
          }

          API_CUR=$(get_tag "iotistic-api" || echo "none")
          DASH_CUR=$(get_tag "iotistic-dashboard" || echo "none")
          MQTT_CUR=$(get_tag "iotistic-mqtt-monitor" || echo "none")
          HOUSE_CUR=$(get_tag "iotistic-housekeeper" || echo "none")
          POST_CUR=$(get_tag "iotistic-postoffice" || echo "none")

          echo "api_current=$API_CUR" >> $GITHUB_OUTPUT
          echo "dashboard_current=$DASH_CUR" >> $GITHUB_OUTPUT
          echo "mqtt_current=$MQTT_CUR" >> $GITHUB_OUTPUT
          echo "housekeeper_current=$HOUSE_CUR" >> $GITHUB_OUTPUT
          echo "postoffice_current=$POST_CUR" >> $GITHUB_OUTPUT

          echo "Current deployed tags:"
          echo "  API: $API_CUR"
          echo "  Dashboard: $DASH_CUR"
          echo "  MQTT Monitor: $MQTT_CUR"
          echo "  Housekeeper: $HOUSE_CUR"
          echo "  Postoffice: $POST_CUR"

      - name: Check for Helm chart changes
        id: chart_check
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          PREV_TAG=$(git tag -l "v*.*.*" --sort=-version:refname | grep -v "^${RELEASE}$" | head -n1 || true)
          if [ -z "$PREV_TAG" ]; then
            echo "chart_changed=true" >> $GITHUB_OUTPUT
            echo "chart_files=First release" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff --name-only ${PREV_TAG}..HEAD -- ${CHART_PATH} || true)
          if [ -n "$CHANGED" ]; then
            # produce a short one-line list
            summary=$(echo "$CHANGED" | sed ':a;N;$!ba;s/\n/, /g')
            echo "chart_changed=true" >> $GITHUB_OUTPUT
            echo "chart_files=$summary" >> $GITHUB_OUTPUT
          else
            echo "chart_changed=false" >> $GITHUB_OUTPUT
            echo "chart_files=" >> $GITHUB_OUTPUT
          fi

      - name: Decide whether to deploy
        id: decide
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          CHANGES=""
          DEPLOY=false

          API_CUR="${{ steps.current.outputs.api_current }}"
          DASH_CUR="${{ steps.current.outputs.dashboard_current }}"
          MQTT_CUR="${{ steps.current.outputs.mqtt_current }}"
          HOUSE_CUR="${{ steps.current.outputs.housekeeper_current }}"
          POST_CUR="${{ steps.current.outputs.postoffice_current }}"

          # Check if images were actually retagged (not "skip")
          API_SRC="${{ needs.validate-release.outputs.api_src_tag }}"
          DASH_SRC="${{ needs.validate-release.outputs.dashboard_src_tag }}"
          MQTT_SRC="${{ needs.validate-release.outputs.mqtt_src_tag }}"
          HOUSE_SRC="${{ needs.validate-release.outputs.housekeeper_src_tag }}"
          POST_SRC="${{ needs.validate-release.outputs.postoffice_src_tag }}"

          # Only deploy if image was retagged AND current deployment is different
          if [ "$API_SRC" != "skip" ] && [ "$API_CUR" != "$RELEASE" ]; then
            CHANGES="${CHANGES}API: ${API_CUR} -> ${RELEASE}\n"
            DEPLOY=true
          fi
          if [ "$DASH_SRC" != "skip" ] && [ "$DASH_CUR" != "$RELEASE" ]; then
            CHANGES="${CHANGES}Dashboard: ${DASH_CUR} -> ${RELEASE}\n"
            DEPLOY=true
          fi
          if [ "$MQTT_SRC" != "skip" ] && [ "$MQTT_CUR" != "$RELEASE" ]; then
            CHANGES="${CHANGES}MQTT Monitor: ${MQTT_CUR} -> ${RELEASE}\n"
            DEPLOY=true
          fi
          if [ "$HOUSE_SRC" != "skip" ] && [ "$HOUSE_CUR" != "$RELEASE" ]; then
            CHANGES="${CHANGES}Housekeeper: ${HOUSE_CUR} -> ${RELEASE}\n"
            DEPLOY=true
          fi
          if [ "$POST_SRC" != "skip" ] && [ "$POST_CUR" != "$RELEASE" ]; then
            CHANGES="${CHANGES}Postoffice: ${POST_CUR} -> ${RELEASE}\n"
            DEPLOY=true
          fi

          CHART_CHANGED="${{ steps.chart_check.outputs.chart_changed }}"
          if [ "$CHART_CHANGED" = "true" ]; then
            CHANGES="${CHANGES}Helm chart changed: ${{ steps.chart_check.outputs.chart_files }}\n"
            DEPLOY=true
          fi

          if [ -z "$CHANGES" ]; then
            CHANGES="No changes detected; deployments already at ${RELEASE}"
          fi

          if [ "$DEPLOY" = true ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

          # multi-line output
          echo "changes_summary<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Deploy decision: $DEPLOY"
          echo -e "Changes:\n$CHANGES"

  deploy-k8s:
    name: Deploy to Kubernetes (Helm)
    needs: [validate-release, check-deployment-needed]
    runs-on: [iotistic-lab-sc]
    if: needs.check-deployment-needed.outputs.should_deploy == 'true' && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure kubectl
        run: |
          if kubectl get namespaces >/dev/null 2>&1; then
            echo "kubectl already working"
            exit 0
          fi

          if [ -n "${{ secrets.KUBECONFIG }}" ]; then
            mkdir -p "$HOME/.kube"
            echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config" || echo "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
          else
            echo "KUBECONFIG not configured" >&2
            exit 1
          fi

      - name: Deploy via Helm upgrade --install
        env:
          RELEASE: ${{ needs.validate-release.outputs.release_version }}
          NAMESPACE: ${{ env.K8S_NAMESPACE }}
        run: |
          set -euo pipefail

          # Determine tags to deploy - if retagging happened we used the release tag
          API_TAG="${{ needs.validate-release.outputs.api_src_tag }}"
          DASH_TAG="${{ needs.validate-release.outputs.dashboard_src_tag }}"
          MQTT_TAG="${{ needs.validate-release.outputs.mqtt_src_tag }}"
          HOUSE_TAG="${{ needs.validate-release.outputs.housekeeper_src_tag }}"
          POST_TAG="${{ needs.validate-release.outputs.postoffice_src_tag }}"

          # Use release tag where retagging occurred, otherwise fall back to existing tag value
          use_tag() {
            local src="$1"
            if [ -z "$src" ] || [ "$src" = "skip" ]; then
              # No retagging occurred - keep current deployment tag (don't change)
              echo "skip"
            else
              # Retagging occurred - use the release version
              echo "${{ needs.validate-release.outputs.release_version }}"
            fi
          }

          API_DEPLOY_TAG=$(use_tag "$API_TAG")
          DASH_DEPLOY_TAG=$(use_tag "$DASH_TAG")
          MQTT_DEPLOY_TAG=$(use_tag "$MQTT_TAG")
          HOUSE_DEPLOY_TAG=$(use_tag "$HOUSE_TAG")
          POST_DEPLOY_TAG=$(use_tag "$POST_TAG")

          echo "Deploying images (tags):"
          echo "  API: $API_DEPLOY_TAG"
          echo "  Dashboard: $DASH_DEPLOY_TAG"
          echo "  MQTT Monitor: $MQTT_DEPLOY_TAG"
          echo "  Housekeeper: $HOUSE_DEPLOY_TAG"
          echo "  Postoffice: $POST_DEPLOY_TAG"

          # Build Helm command with only the tags that need updating
          HELM_SETS=""
          [ "$API_DEPLOY_TAG" != "skip" ] && HELM_SETS="$HELM_SETS --set api.image.tag=$API_DEPLOY_TAG"
          [ "$DASH_DEPLOY_TAG" != "skip" ] && HELM_SETS="$HELM_SETS --set dashboard.image.tag=$DASH_DEPLOY_TAG"
          [ "$MQTT_DEPLOY_TAG" != "skip" ] && HELM_SETS="$HELM_SETS --set mqttMonitor.image.tag=$MQTT_DEPLOY_TAG"
          [ "$HOUSE_DEPLOY_TAG" != "skip" ] && HELM_SETS="$HELM_SETS --set housekeeper.image.tag=$HOUSE_DEPLOY_TAG"
          [ "$POST_DEPLOY_TAG" != "skip" ] && HELM_SETS="$HELM_SETS --set postoffice.image.tag=$POST_DEPLOY_TAG"

          echo "Helm sets: $HELM_SETS"

          kubectx nodeport

          helm upgrade --install iotistic "${{ env.CHART_PATH }}" \
            --namespace "$NAMESPACE" \
            --create-namespace \
            -f "${{ env.VALUES_FILE }}" \
            $HELM_SETS \
            --timeout 5m

          echo "Waiting for rollout status..."
          kubectl -n "$NAMESPACE" rollout status deploy/iotistic-api --timeout=180s || true
          kubectl -n "$NAMESPACE" rollout status deploy/iotistic-dashboard --timeout=180s || true
          kubectl -n "$NAMESPACE" rollout status deploy/iotistic-mqtt-monitor --timeout=180s || true
          kubectl -n "$NAMESPACE" rollout status deploy/iotistic-housekeeper --timeout=180s || true
          kubectl -n "$NAMESPACE" rollout status deploy/iotistic-postoffice --timeout=180s || true

      - name: Deployment summary
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          echo "## Kubernetes deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** \`${RELEASE}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changes" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.check-deployment-needed.outputs.changes_summary }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl -n ${{ env.K8S_NAMESPACE }} get pods -o wide >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY