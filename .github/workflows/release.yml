name: Release

on:
  push:
    tags:
      # Only trigger on final release tags (not RC tags)
      # RCs should be created via manual workflow_dispatch
      # To include RCs, add: - 'v*.*.*-rc.*'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_mode:
        description: 'Release mode'
        required: true
        type: choice
        default: final
        options:
          - rc
          - final
      deploy:
        description: 'Deploy to Kubernetes after release'
        required: false
        default: true
        type: boolean
      client_name:
        description: 'K8s client name (namespace) — required when deploy is checked'
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  DOCKER_ORG: iotistic
  K8S_NAMESPACE: iotistic-nodeport
  CHART_PATH: ./k8s/charts/iotistic
  VALUES_FILE: ./k8s/charts/iotistic/values.yaml
  APPS: api ingestion dashboard nodered

jobs:
  prepare:
    name: Validate & tag release
    runs-on: [arc-runner-set-iotistica-light-v2]
    outputs:
      release_version: ${{ steps.set_version.outputs.release_version }}
    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set release version (auto bump)
        id: set_version
        run: |
          # Fetch all tags from remote
          git fetch origin 'refs/tags/*:refs/tags/*' --force
          
          # Debug: Show top tags (all versions)
          echo "=== DEBUG: Top 10 version tags ==="
          git tag --list 'v*.*.*' --sort=-version:refname | head -10
          echo ""
          
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE="${GITHUB_REF#refs/tags/}"
            echo "Tag push detected: $RELEASE"
            echo "release_version=$RELEASE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Manual dispatch
          MODE="${{ github.event.inputs.release_mode || 'final' }}"
          TYPE="${{ github.event.inputs.release_type }}"
          
          # Find latest final (excluding RC tags)
          LATEST_FINAL=$(git tag --list 'v*.*.*' --sort=-version:refname | grep -v -E '\-rc' | head -1)
          echo "Latest final release: $LATEST_FINAL"
          
          if [ -z "$LATEST_FINAL" ]; then
            echo "No v0.0.2+ releases found, starting from v0.0.2"
            LATEST_FINAL="v0.0.2"
            MAJOR=0
            MINOR=0
            PATCH=2
          else
            echo "Latest final release: $LATEST_FINAL"
            # Strip v prefix and parse version
            BASE=${LATEST_FINAL#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            
            # Ensure we have valid numbers (fallback to 0 if parsing fails)
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}
          fi
          
          echo "Parsed version: MAJOR=$MAJOR MINOR=$MINOR PATCH=$PATCH"
          
          # === RC MODE ===
          if [ "$MODE" = "rc" ]; then
            # Step 1: Determine target base version based on release_type
            case "$TYPE" in
              patch)
                TARGET_BASE="v${MAJOR}.${MINOR}.$((PATCH + 1))"
                ;;
              minor)
                TARGET_BASE="v${MAJOR}.$((MINOR + 1)).0"
                ;;
              major)
                TARGET_BASE="v$((MAJOR + 1)).0.0"
                ;;
            esac
            
            echo "Target base version: $TARGET_BASE"
            
            # Step 2: Find latest RC for this target base version
            LATEST_RC=$(git tag -l "${TARGET_BASE}-rc.*" --sort=-version:refname | head -n1)
            
            if [ -n "$LATEST_RC" ]; then
              # Increment RC number for existing RC line
              LAST_RC_NUM=$(echo "$LATEST_RC" | sed -E 's/.*-rc\.([0-9]+)/\1/')
              RC_NUM=$((LAST_RC_NUM + 1))
              echo "Found existing RC: $LATEST_RC → incrementing to rc.${RC_NUM}"
            else
              # Start new RC line
              RC_NUM=1
              echo "Starting new RC line for ${TARGET_BASE}"
            fi
            
            RELEASE="${TARGET_BASE}-rc.${RC_NUM}"
            echo "Auto-generated RC version: $RELEASE"
            echo "release_version=$RELEASE" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # === FINAL MODE ===
          # Compute new version directly (don't auto-infer RCs)
          case "$TYPE" in
            patch)
              PATCH=$((PATCH + 1))
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
          esac
          RELEASE="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New final release: $RELEASE"
          echo "release_version=$RELEASE" >> $GITHUB_OUTPUT

      - name: Check if tag already exists (for push trigger)
        id: verify
        shell: bash
        run: |
          RELEASE="${{ steps.set_version.outputs.release_version }}"
          
          # For tag push events, tag should already exist
          if git rev-parse "$RELEASE" >/dev/null 2>&1; then
            echo "✅ Tag already exists: $RELEASE (from push trigger)"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist yet: $RELEASE (will be created by prepare job)"
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create git tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          RELEASE="${{ steps.set_version.outputs.release_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$RELEASE" >/dev/null 2>&1; then
            echo "Tag $RELEASE already exists"
          else
            git tag -a "$RELEASE" -m "Release $RELEASE"
            git push origin "$RELEASE"
            echo "✅ Tag $RELEASE created and pushed"
          fi

      - name: Summary
        run: |
          MODE="${{ github.event.inputs.release_mode || 'final' }}"
          RELEASE="${{ steps.set_version.outputs.release_version }}"
          MODE_BADGE="Final Release"
          if [ "$MODE" = "rc" ]; then
            RC_NUM=$(echo "$RELEASE" | sed -E 's/.*-rc\.([0-9]+)/\1/' || echo "1")
            MODE_BADGE="Release Candidate (RC ${RC_NUM})"
          fi
          echo "## Release: \`$RELEASE\` — $MODE_BADGE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services to Promote" >> $GITHUB_STEP_SUMMARY
          for APP in ${{ env.APPS }}; do
            echo "- \`iotistic/${APP}\`" >> $GITHUB_STEP_SUMMARY
          done

  release:
    name: Promote images, create release & deploy
    runs-on: [arc-runner-set-iotistica-light-v2]
    needs: [prepare]
    if: needs.prepare.result == 'success'
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Promote images per app
        shell: bash
        run: |
          set -euo pipefail
          RELEASE="${{ needs.prepare.outputs.release_version }}"

          echo "Release version: $RELEASE"
          echo ""

          # ── Phase 1: Freeze point ────────────────────────────────────────────
          # Resolve ALL digests before touching any registry tags.
          # This creates a consistent cross-app snapshot at a single moment in
          # time — no app can drift to a newer CI image mid-release.
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Phase 1: Resolving digests (freeze point)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          declare -A DIGESTS
          for APP in ${{ env.APPS }}; do
            CI_LATEST="${DOCKER_ORG}/${APP}:ci-latest"
            DIGEST=$(docker buildx imagetools inspect "$CI_LATEST" 2>/dev/null | grep "^Digest:" | awk '{print $2}' || true)
            if [ -z "$DIGEST" ]; then
              echo "❌ Could not resolve digest for $CI_LATEST"
              echo "   Ensure a CI build has completed and pushed ci-latest for $APP"
              exit 1
            fi
            DIGESTS[$APP]="$DIGEST"
            echo "  $APP → $DIGEST"
          done
          echo ""
          echo "✅ All digests resolved at the same moment — consistent snapshot locked"
          echo ""

          # ── Phase 2: Promote ─────────────────────────────────────────────────
          # imagetools create is a pure registry-side copy — no docker daemon needed.
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Phase 2: Promoting to $RELEASE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          for APP in ${{ env.APPS }}; do
            DIGEST="${DIGESTS[$APP]}"
            docker buildx imagetools create \
              -t "${DOCKER_ORG}/${APP}:${RELEASE}" \
              "${DOCKER_ORG}/${APP}@${DIGEST}"
            echo "✅ $APP: ${DIGEST:0:19}... → ${RELEASE}"
          done
          echo ""

          # ── Phase 3: Tag as 'latest' for final releases ───────────────────────
          if [[ "$RELEASE" != *"-rc."* ]]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Phase 3: Tagging as 'latest'"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            for APP in ${{ env.APPS }}; do
              DIGEST="${DIGESTS[$APP]}"
              docker buildx imagetools create \
                -t "${DOCKER_ORG}/${APP}:latest" \
                "${DOCKER_ORG}/${APP}@${DIGEST}"
              echo "✅ ${DOCKER_ORG}/${APP}:latest"
            done
            echo ""
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All images promoted"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # ── Summary ───────────────────────────────────────────────────────────
          echo "## Image Promotion Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** \`$RELEASE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Promoted Images" >> $GITHUB_STEP_SUMMARY
          for APP in ${{ env.APPS }}; do
            DIGEST="${DIGESTS[$APP]}"
            echo "- **${APP}**: \`iotistic/${APP}:ci-latest\` (\`${DIGEST:0:19}...\`) → \`${RELEASE}\`" >> $GITHUB_STEP_SUMMARY
          done

      - name: Checkout (for changelog + deploy)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          RELEASE="${{ needs.prepare.outputs.release_version }}"
          PREV_TAG=$(git tag -l "v*.*.*" --sort=-version:refname | grep -v "^${RELEASE}$" | head -n1 || true)
          if [ -z "$PREV_TAG" ]; then
            git --no-pager log --pretty=format:"- %s (%h)" --no-merges | head -50 > changelog.txt
          else
            git --no-pager log --pretty=format:"- %s (%h)" --no-merges ${PREV_TAG}..HEAD > changelog.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.release_version }}
          name: Release ${{ needs.prepare.outputs.release_version }}
          body_path: changelog.txt
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.release_version, '-rc.') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout iot-k8s repository
        if: github.event.inputs.deploy == 'true'
        uses: actions/checkout@v4
        with:
          repository: Iotistica/iot-k8s
          ref: main
          path: iot-k8s
          token: ${{ secrets.K8S_DEPLOY_PAT || secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Update ArgoCD values and push
        if: github.event.inputs.deploy == 'true'
        run: |
          RELEASE="${{ needs.prepare.outputs.release_version }}"
          CLIENT="${{ github.event.inputs.client_name || 'demo' }}"
          VALUES_FILE="iot-k8s/charts/iotistica/values/${CLIENT}/values.yaml"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "❌ Values file not found: $VALUES_FILE"
            echo "Available clients:"; ls -la "iot-k8s/charts/iotistica/values/" 2>/dev/null || true
            exit 1
          fi

          yq eval ".api.image.tag = \"${RELEASE}\"" -i "$VALUES_FILE"
          yq eval ".ingestion.image.repository = \"iotistic/ingestion\"" -i "$VALUES_FILE"
          yq eval ".ingestion.image.tag = \"${RELEASE}\"" -i "$VALUES_FILE"
          yq eval ".dashboard.image.tag = \"${RELEASE}\"" -i "$VALUES_FILE"
          yq eval ".nodered.image.tag = \"${RELEASE}\"" -i "$VALUES_FILE"
          yq eval ".mqttMonitor.image.tag = \"${RELEASE}\"" -i "$VALUES_FILE"

          cd iot-k8s
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add "charts/iotistica/values/${CLIENT}/values.yaml"
            git commit -m "chore: bump ${CLIENT} version to ${RELEASE}"
            git push origin main
            echo "✅ Pushed version update to ${RELEASE} for client ${CLIENT}"
          fi