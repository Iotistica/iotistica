name: Release All

on:
  push:
    tags:
      # Only trigger on final release tags (not RC tags)
      # RCs should be created via manual workflow_dispatch
      # To include RCs, add: - 'v*.*.*-rc.*'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_mode:
        description: 'Release mode'
        required: true
        type: choice
        default: final
        options:
          - rc
          - final
      rc_number:
        description: 'RC number (only for rc mode)'
        required: false
        default: '1'
      deploy:
        description: 'Deploy to Kubernetes after release'
        required: false
        default: true
        type: boolean
      force_latest:
        description: 'Force deployment using :latest images with release tag'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  DOCKER_ORG: iotistic
  K8S_NAMESPACE: iotistic-nodeport
  CHART_PATH: ./k8s/charts/iotistic
  VALUES_FILE: ./k8s/charts/iotistic/values.yaml

jobs:
  validate-release:
    name: Validate release & check images
    runs-on: [iotistic-lab-sc]
    outputs:
      release_version: ${{ steps.set_version.outputs.release_version }}
      api_src_tag: ${{ steps.verify.outputs.api_src_tag }}
      dashboard_src_tag: ${{ steps.verify.outputs.dashboard_src_tag }}
      mqtt_src_tag: ${{ steps.verify.outputs.mqtt_src_tag }}
      housekeeper_src_tag: ${{ steps.verify.outputs.housekeeper_src_tag }}
      postoffice_src_tag: ${{ steps.verify.outputs.postoffice_src_tag }}
    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set release version (auto bump)
        id: set_version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag push — use the pushed tag
            RELEASE="${GITHUB_REF#refs/tags/}"
            echo "Triggered by tag push. Release: $RELEASE"
            echo "release_version=$RELEASE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Manual dispatch → auto bump
          TYPE="${{ github.event.inputs.release_type }}"

          # Get latest semver tag
          LAST=$(git tag -l 'v*.*.*' --sort=-version:refname | head -n1)

          if [ -z "$LAST" ]; then
            echo "No previous tags found, starting at v1.0.0"
            LAST="v1.0.0"
          fi

          echo "Latest tag: $LAST"

          # strip v prefix
          BASE=${LAST#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

          case "$TYPE" in
            patch)
              PATCH=$((PATCH + 1))
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
          esac

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          
          # Apply RC mode if specified
          MODE="${{ github.event.inputs.release_mode || 'final' }}"
          RC_NUM="${{ github.event.inputs.rc_number || '1' }}"
          
          if [ "$MODE" = "rc" ]; then
            RELEASE="${NEW}-rc.${RC_NUM}"
            echo "Auto-generated RC version: $RELEASE"
          else
            RELEASE="$NEW"
            echo "Auto-generated final version: $RELEASE"
          fi
          
          echo "release_version=$RELEASE" >> $GITHUB_OUTPUT

      - name: Read service versions from package.json at this commit
        id: pkg_versions
        run: |
          # Read versions from package.json in the repo at this commit
          API_VERSION=$(jq -r '.version' api/package.json)
          DASHBOARD_VERSION=$(jq -r '.version' dashboard/package.json)
          MQTT_MONITOR_VERSION=$(jq -r '.version' mqtt-monitor/package.json)
          HOUSEKEEPER_VERSION=$(jq -r '.version' housekeeper/package.json)
          POSTOFFICE_VERSION=$(jq -r '.version' postoffice/package.json)

          echo "api_pkg=$API_VERSION" >> $GITHUB_OUTPUT
          echo "dashboard_pkg=$DASHBOARD_VERSION" >> $GITHUB_OUTPUT
          echo "mqtt_pkg=$MQTT_MONITOR_VERSION" >> $GITHUB_OUTPUT
          echo "housekeeper_pkg=$HOUSEKEEPER_VERSION" >> $GITHUB_OUTPUT
          echo "postoffice_pkg=$POSTOFFICE_VERSION" >> $GITHUB_OUTPUT

          echo "Package.json versions:"
          echo "  API: $API_VERSION"
          echo "  Dashboard: $DASHBOARD_VERSION"
          echo "  MQTT Monitor: $MQTT_MONITOR_VERSION"
          echo "  Housekeeper: $HOUSEKEEPER_VERSION"
          echo "  Postoffice: $POSTOFFICE_VERSION"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Verify CI-built images exist (and determine source tags)
        id: verify
        shell: bash
        run: |
          set -euo pipefail

          # If force_latest is true, use "latest" for all services
          if [ "${{ github.event.inputs.force_latest }}" = "true" ]; then
            echo "api_src_tag=latest" >> $GITHUB_OUTPUT
            echo "dashboard_src_tag=latest" >> $GITHUB_OUTPUT
            echo "mqtt_src_tag=latest" >> $GITHUB_OUTPUT
            echo "housekeeper_src_tag=latest" >> $GITHUB_OUTPUT
            echo "postoffice_src_tag=latest" >> $GITHUB_OUTPUT
            
            echo ""
            echo "Image verification complete (forced latest):"
            echo "  API  -> latest"
            echo "  Dashboard -> latest"
            echo "  MQTT Monitor -> latest"
            echo "  Housekeeper -> latest"
            echo "  Postoffice -> latest"
            exit 0
          fi

          # Helper: check image existence (returns tag to use or "skip")
          check_image() {
            local svc="$1"
            local prefer_tag="$2"
            
            # If no preferred tag provided, return skip
            if [ -z "$prefer_tag" ]; then
              echo "skip"
              return 1
            fi
            
            # Try the package.json tag first (exact match)
            if docker manifest inspect "${DOCKER_ORG}/${svc}:${prefer_tag}" >/dev/null 2>&1; then
              echo "$prefer_tag"
              return 0
            fi
            
            # If prefer_tag doesn't start with v, also try with v prefix
            if [[ "$prefer_tag" != v* ]]; then
              if docker manifest inspect "${DOCKER_ORG}/${svc}:v${prefer_tag}" >/dev/null 2>&1; then
                echo "v${prefer_tag}"
                return 0
              fi
            fi
            
            # No versioned image found
            echo "skip"
          }
          
          # Check each service
          API_SRC=$(check_image "api" "${{ steps.pkg_versions.outputs.api_pkg }}" || true)
          DASHBOARD_SRC=$(check_image "dashboard" "${{ steps.pkg_versions.outputs.dashboard_pkg }}" || true)
          MQTT_SRC=$(check_image "mqtt-monitor" "${{ steps.pkg_versions.outputs.mqtt_pkg }}" || true)
          HOUSEKEEPER_SRC=$(check_image "housekeeper" "${{ steps.pkg_versions.outputs.housekeeper_pkg }}" || true)
          POSTOFFICE_SRC=$(check_image "postoffice" "${{ steps.pkg_versions.outputs.postoffice_pkg }}" || true)

          echo "api_src_tag=$API_SRC" >> $GITHUB_OUTPUT
          echo "dashboard_src_tag=$DASHBOARD_SRC" >> $GITHUB_OUTPUT
          echo "mqtt_src_tag=$MQTT_SRC" >> $GITHUB_OUTPUT
          echo "housekeeper_src_tag=$HOUSEKEEPER_SRC" >> $GITHUB_OUTPUT
          echo "postoffice_src_tag=$POSTOFFICE_SRC" >> $GITHUB_OUTPUT

          echo ""
          echo "Image verification complete:"
          echo "  API  -> $API_SRC"
          echo "  Dashboard -> $DASHBOARD_SRC"
          echo "  MQTT Monitor -> $MQTT_SRC"
          echo "  Housekeeper -> $HOUSEKEEPER_SRC"
          echo "  Postoffice -> $POSTOFFICE_SRC"

      - name: Summary for step output
        run: |
          MODE="${{ github.event.inputs.release_mode || 'final' }}"
          MODE_BADGE="🎯 Final Release"
          if [ "$MODE" = "rc" ]; then
            MODE_BADGE="🧪 Release Candidate (RC ${{ github.event.inputs.rc_number || '1' }})"
          fi
          
          echo "## Release validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** \`${{ steps.set_version.outputs.release_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** $MODE_BADGE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | package.json | selected image tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---:|---|" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ steps.pkg_versions.outputs.api_pkg }}\` | \`${{ steps.verify.outputs.api_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | \`${{ steps.pkg_versions.outputs.dashboard_pkg }}\` | \`${{ steps.verify.outputs.dashboard_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| MQTT Monitor | \`${{ steps.pkg_versions.outputs.mqtt_pkg }}\` | \`${{ steps.verify.outputs.mqtt_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Housekeeper | \`${{ steps.pkg_versions.outputs.housekeeper_pkg }}\` | \`${{ steps.verify.outputs.housekeeper_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Postoffice | \`${{ steps.pkg_versions.outputs.postoffice_pkg }}\` | \`${{ steps.verify.outputs.postoffice_src_tag }}\` |" >> $GITHUB_STEP_SUMMARY

  retag-and-push:
    name: Retag & push release images
    runs-on: [iotistic-lab-sc]
    needs: validate-release
    if: always() && (needs.validate-release.outputs.api_src_tag != 'skip' || needs.validate-release.outputs.dashboard_src_tag != 'skip' || needs.validate-release.outputs.mqtt_src_tag != 'skip' || needs.validate-release.outputs.housekeeper_src_tag != 'skip' || needs.validate-release.outputs.postoffice_src_tag != 'skip')
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Retag & push images
        shell: bash
        run: |
          set -euo pipefail
          RELEASE="${{ needs.validate-release.outputs.release_version }}"

          retag_and_push() {
            local svc="$1"
            local src_tag="$2"
            if [ -z "$src_tag" ] || [ "$src_tag" = "skip" ]; then
              echo "Skipping $svc (no source image)"
              return 0
            fi

            echo "Processing $svc: ${DOCKER_ORG}/${svc}:${src_tag} -> ${DOCKER_ORG}/${svc}:${RELEASE}"
            docker pull "${DOCKER_ORG}/${svc}:${src_tag}"
            docker tag "${DOCKER_ORG}/${svc}:${src_tag}" "${DOCKER_ORG}/${svc}:${RELEASE}"
            docker push "${DOCKER_ORG}/${svc}:${RELEASE}"
            echo "Retagged & pushed ${DOCKER_ORG}/${svc}:${RELEASE}"
          }

          retag_and_push "api" "${{ needs.validate-release.outputs.api_src_tag }}"
          retag_and_push "dashboard" "${{ needs.validate-release.outputs.dashboard_src_tag }}"
          retag_and_push "mqtt-monitor" "${{ needs.validate-release.outputs.mqtt_src_tag }}"
          retag_and_push "housekeeper" "${{ needs.validate-release.outputs.housekeeper_src_tag }}"
          retag_and_push "postoffice" "${{ needs.validate-release.outputs.postoffice_src_tag }}"

  create-release:
    name: Create GitHub Release (changelog)
    needs: [validate-release, retag-and-push]
    runs-on: [iotistic-lab-sc]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog (simple)
        id: changelog
        run: |
          RELEASE="${{ needs.validate-release.outputs.release_version }}"
          PREV_TAG=$(git tag -l "v*.*.*" --sort=-version:refname | grep -v "^${RELEASE}$" | head -n1 || true)
          if [ -z "$PREV_TAG" ]; then
            echo "First release or no previous tag found"
            git --no-pager log --pretty=format:"- %s (%h)" --no-merges | head -50 > changelog.txt
          else
            git --no-pager log --pretty=format:"- %s (%h)" --no-merges ${PREV_TAG}..HEAD > changelog.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate-release.outputs.release_version }}
          name: Release ${{ needs.validate-release.outputs.release_version }}
          body_path: changelog.txt
          draft: false
          prerelease: ${{ github.event.inputs.release_mode == 'rc' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}