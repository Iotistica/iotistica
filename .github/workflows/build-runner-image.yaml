name: Build and Push Runner Image

on:
  push:
    branches:
      - master
    paths:
      - 'runners/Dockerfile'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: [arc-runner-set-iotistica-light]
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Wait for Docker daemon (DinD sidecar)
        run: |
          for i in $(seq 1 30); do
            docker info > /dev/null 2>&1 && echo "Docker ready after ${i}s" && break
            echo "Waiting for Docker daemon... ($i/30)"
            sleep 1
          done
          docker info

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: runners
          file: runners/Dockerfile
          push: true
          tags: iotistic/iotistic-gh-runner:light
          cache-from: type=registry,ref=iotistic/iotistic-gh-runner:light
          cache-to: type=inline
