# ...existing code...
name: Kubernetes Deploy Iotistic

# Trigger manually
on:
  workflow_dispatch:
    inputs:
      destroy:
        description: 'If true will destroy the deployed sample app'
        required: false
        default: 'false'
        type: boolean
      kubeconfig:
        description: 'Optional kubeconfig content (base64 or plain). If empty the runner kubeconfig will be used'
        required: false
        type: string

jobs:
  test-on-tagged-runner:
    runs-on: [iotistic-lab-sc]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show cluster nodes
        run: |
          kubectl get nodes -o wide

      - name: Deploy Iotistic NodePort (helm)
        if: ${{ inputs.destroy == false }}
        run: |
          set -e
          CHART_PATH=./k8s/charts/iotistic
          VALUES_FILE=./k8s/charts/iotistic/values.yaml
          NAMESPACE=iotistic-nodeport
          helm upgrade --install iotistic "${CHART_PATH}" --namespace "${NAMESPACE}" --create-namespace -f "${VALUES_FILE}"
          kubectl -n "${NAMESPACE}" rollout status deploy/iotistic --timeout=120s || true
          echo "Service info:"
          kubectl -n "${NAMESPACE}" get svc -o wide

      - name: Destroy deployed Iotistic NodePort (helm)
        if: ${{ inputs.destroy == true }}
        run: |
          set -e
          NAMESPACE=iotistic-nodeport
          helm uninstall iotistic -n "${NAMESPACE}" || true
          kubectl delete namespace "${NAMESPACE}" --wait --ignore-not-found

      - name: Final pods/services (debug)
        run: |
          kubectl get pods -A || true
          kubectl get svc -A || true