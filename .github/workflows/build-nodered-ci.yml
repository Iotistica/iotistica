name: CI Build, Test & Push Node-RED

on: 
  push:
    branches:
      - master
    paths:
      - 'nodered/**' 
      - '.github/workflows/build-nodered-ci.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (commit SHA, tag, or branch)'
        required: false
        default: master
        type: string

jobs:
  buildx:
    name: Build & Push Node-RED Image
    runs-on: [arc-runner-set-iotistica-light]
    permissions:
      contents: read
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Calculate commit SHA
        id: sha
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT_SHA=${SHA:0:12}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Build for commit: $SHA ($SHORT_SHA)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: nodered/data/@iotistic/nr-devices-plugin/package-lock.json

      - name: Build nr-devices-plugin
        run: |
          cd nodered/data/@iotistic/nr-devices-plugin
          npm ci
          npm run build
          echo "✅ nr-devices-plugin built successfully"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-nodered-${{ hashFiles('nodered/Dockerfile', 'nodered/data/package.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-nodered-

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Node-RED image
        uses: docker/build-push-action@v5
        with:
          context: ./nodered
          file: ./nodered/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=registry,ref=iotistic/nodered:buildcache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          tags: |
            iotistic/nodered:ci-${{ steps.sha.outputs.short_sha }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

  report:
    name: Generate Build Report
    needs: buildx
    runs-on: [arc-runner-set-iotistica-light]
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate report
        run: |
          echo "## Node-RED Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ needs.buildx.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tag:** \`iotistic/nodered:ci-${{ needs.buildx.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recent Changes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git log --oneline --no-merges -10 -- nodered/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -- nodered/)
          
          # Save to file
          echo "$COMMITS" > changelog.txt
          
          # Save first 20 lines for summary
          echo "$COMMITS" | head -20 > changelog_summary.txt

      - name: Get Docker image size
        id: image_size
        if: needs.buildx.result == 'success'
        run: |
          # Login to Docker Hub to pull the image
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Pull the image
          docker pull iotistic/nodered:ci-${{ needs.buildx.outputs.short_sha }}
          
          # Get image size
          SIZE_BYTES=$(docker image inspect iotistic/nodered:ci-${{ needs.buildx.outputs.short_sha }} --format='{{.Size}}')
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1024 / 1024" | bc)
          
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
          
          # Get layer count
          LAYERS=$(docker image inspect iotistic/nodered:ci-${{ needs.buildx.outputs.short_sha }} --format='{{len .RootFS.Layers}}')
          echo "layers=$LAYERS" >> $GITHUB_OUTPUT

      - name: Generate Summary Report
        run: |
          echo "# Build & Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Version Information" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ steps.image_size.outputs.size_mb }} MB" >> $GITHUB_STEP_SUMMARY
          echo "**Layers:** ${{ steps.image_size.outputs.layers }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/nodered:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/nodered:${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/nodered:${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Recent Changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -s changelog_summary.txt ]; then
            cat changelog_summary.txt >> $GITHUB_STEP_SUMMARY
            
            TOTAL_COMMITS=$(wc -l < changelog.txt)
            SHOWN_COMMITS=$(wc -l < changelog_summary.txt)
            if [ $TOTAL_COMMITS -gt $SHOWN_COMMITS ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "_...and $((TOTAL_COMMITS - SHOWN_COMMITS)) more commits_" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_No commits found for nodered directory_" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Workflow Status" >> $GITHUB_STEP_SUMMARY
          echo "All jobs completed successfully!" >> $GITHUB_STEP_SUMMARY
