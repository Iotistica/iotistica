name: CI Build, Test & Push Node-RED

on: 
  push:
    branches:
      - master
    paths:
      - 'nodered/**' 
      - '.github/workflows/build-nodered-ci.yml'
  workflow_dispatch:

jobs:
  version:
    name: Generate Version
    runs-on: [iotistic-lab-sc]
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_short: ${{ steps.version.outputs.sha_short }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          # Generate version from date and commit count
          VERSION=$(date +%Y.%m.%d)-$(git rev-list --count HEAD)
          SHA_SHORT=$(git rev-parse --short HEAD)
          
          echo "Generated version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Display version info
        run: |
          echo "## Version Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ steps.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY

  buildx:
    name: Build & Push to Docker
    needs: version
    runs-on: [iotistic-lab-sc]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Display Version Update
        run: |
          echo "## Building Version ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Tags:" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/nodered:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/nodered:${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/nodered:${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-nodered-${{ hashFiles('nodered/Dockerfile', 'nodered/data/package.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-nodered-

      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push final image
        id: docker_build
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: ./nodered
          file: ./nodered/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=registry,ref=iotistic/nodered:buildcache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          tags: |
            iotistic/nodered:latest
            iotistic/nodered:${{ needs.version.outputs.sha_short }}
            iotistic/nodered:${{ needs.version.outputs.version }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

  report:
    name: Generate Reports
    needs: [version, buildx]
    runs-on: [iotistic-lab-sc]
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits affecting nodered directory
          COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -- nodered/)
          
          # Save to file
          echo "$COMMITS" > changelog.txt
          
          # Save first 20 lines for summary
          echo "$COMMITS" | head -20 > changelog_summary.txt

      - name: Get Docker image size
        id: image_size
        run: |
          # Login to Docker Hub to pull the image
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Pull the image
          docker pull iotistic/nodered:${{ needs.version.outputs.version }}
          
          # Get image size1
          SIZE_BYTES=$(docker image inspect iotistic/nodered:${{ needs.version.outputs.version }} --format='{{.Size}}')
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1024 / 1024" | bc)
          
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
          
          # Get layer count
          LAYERS=$(docker image inspect iotistic/nodered:${{ needs.version.outputs.version }} --format='{{len .RootFS.Layers}}')
          echo "layers=$LAYERS" >> $GITHUB_OUTPUT

      - name: Generate Summary Report
        run: |
          echo "# Build & Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Version Information" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ steps.image_size.outputs.size_mb }} MB" >> $GITHUB_STEP_SUMMARY
          echo "**Layers:** ${{ steps.image_size.outputs.layers }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/nodered:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/nodered:${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`iotistic/nodered:${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Recent Changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -s changelog_summary.txt ]; then
            cat changelog_summary.txt >> $GITHUB_STEP_SUMMARY
            
            TOTAL_COMMITS=$(wc -l < changelog.txt)
            SHOWN_COMMITS=$(wc -l < changelog_summary.txt)
            if [ $TOTAL_COMMITS -gt $SHOWN_COMMITS ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "_...and $((TOTAL_COMMITS - SHOWN_COMMITS)) more commits_" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_No commits found for nodered directory_" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Workflow Status" >> $GITHUB_STEP_SUMMARY
          echo "All jobs completed successfully!" >> $GITHUB_STEP_SUMMARY
