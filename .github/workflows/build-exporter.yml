name: Build and Push Billing Exporter Image

on: 
  push:
    branches:
      - master
    paths:
      - 'billing-exporter/**' 
      - '.github/workflows/build-exporter.yml'

jobs:
  buildx:
    name: Build & Push Billing Exporter Image
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - board: x86
            platform: linux/amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Cache Docker layers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /tmp/.buildx-cache/${{ matrix.board }}
          key: buildx-exporter-${{ matrix.board }}-${{ github.sha }}
          restore-keys: |
            buildx-exporter-${{ matrix.board }}-

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Billing Exporter image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./billing-exporter
          file: ./billing-exporter/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          cache-from: type=local,src=/tmp/.buildx-cache/${{ matrix.board }}
          cache-to: type=local,dest=/tmp/.buildx-cache/${{ matrix.board }},mode=max
          tags: |
            iotistic/exporter:latest
