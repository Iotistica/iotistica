name: Release Node-RED

on:
  push:
    branches:
      - master
    paths:
      - 'nodered/**'
      - '.github/workflows/release-nodered.yml'
  workflow_dispatch:
    inputs:
      deploy_test:
        description: 'Deploy to test customer instance'
        required: false
        default: false
        type: boolean
      test_customer_id:
        description: 'Customer ID for test deployment'
        required: false
        default: 'customer-test'
        type: string

permissions:
  contents: write
  packages: write

env:
  DOCKER_ORG: iotistic
  IMAGE_NAME: nodered

jobs:
  version:
    name: Generate Version
    runs-on: [iotistic-lab-sc]
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_short: ${{ steps.version.outputs.sha_short }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          # Generate version from date and commit count
          VERSION=$(date +%Y.%m.%d)-$(git rev-list --count HEAD)
          SHA_SHORT=$(git rev-parse --short HEAD)
          
          echo "Generated version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Display version info
        run: |
          echo "## Version Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ steps.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY

  build-plugins:
    name: Build Node-RED Plugins
    runs-on: [iotistic-lab-sc]
    needs: version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            nodered/data/@iotistic/nr-devices-plugin/package-lock.json
            nodered/data/@iotistic/nr-auth/package-lock.json
            nodered/data/@iotistic/nr-storage/package-lock.json

      - name: Build nr-devices-plugin
        run: |
          cd nodered/data/@iotistic/nr-devices-plugin
          npm ci
          npm run build
          echo "✅ nr-devices-plugin built successfully"

      - name: Verify nr-auth
        run: |
          cd nodered/data/@iotistic/nr-auth
          npm ci --production
          echo "✅ nr-auth verified"

      - name: Verify nr-storage
        run: |
          cd nodered/data/@iotistic/nr-storage
          npm ci --production
          echo "✅ nr-storage verified"

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nodered-plugins
          path: |
            nodered/data/@iotistic/nr-devices-plugin/dist
            nodered/data/@iotistic/nr-auth/lib
            nodered/data/@iotistic/nr-storage/*.js
          retention-days: 1

  build-push:
    name: Build & Push Docker Image
    needs: [version, build-plugins]
    runs-on: [iotistic-lab-sc]
    outputs:
      image_digest: ${{ steps.docker_build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download plugin artifacts
        uses: actions/download-artifact@v4
        with:
          name: nodered-plugins
          path: .

      - name: Display Version Update
        run: |
          echo "## Building Version ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Tags:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            network=host

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-nodered-${{ hashFiles('nodered/Dockerfile', 'nodered/data/package.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-nodered-

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./nodered
          file: ./nodered/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=registry,ref=${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          tags: |
            ${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.sha_short }}
            ${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            VERSION=${{ needs.version.outputs.version }}

      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

      - name: Image scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-test:
    name: Deploy to Test Instance
    needs: [version, build-push]
    runs-on: [iotistic-lab-sc]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_test == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Upgrade customer instance with new Node-RED
        run: |
          CUSTOMER_ID="${{ github.event.inputs.test_customer_id }}"
          NAMESPACE="$CUSTOMER_ID"
          
          echo "Deploying Node-RED to customer instance: $CUSTOMER_ID"
          
          # Upgrade only Node-RED component
          helm upgrade "$CUSTOMER_ID" ./k8s/charts/customer-instance \
            --namespace "$NAMESPACE" \
            --reuse-values \
            --set nodered.enabled=true \
            --set nodered.image.tag=${{ needs.version.outputs.version }} \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          CUSTOMER_ID="${{ github.event.inputs.test_customer_id }}"
          NAMESPACE="$CUSTOMER_ID"
          
          echo "Checking Node-RED pod status..."
          kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/component=nodered
          
          echo "Checking Node-RED service..."
          kubectl get svc -n "$NAMESPACE" -l app.kubernetes.io/component=nodered
          
          echo "Node-RED logs:"
          kubectl logs -n "$NAMESPACE" -l app.kubernetes.io/component=nodered --tail=50

  report:
    name: Generate Release Report
    needs: [version, build-push]
    runs-on: [iotistic-lab-sc]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits affecting nodered directory
          COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -- nodered/)
          
          # Save to file
          echo "$COMMITS" > changelog.txt
          
          # Save first 20 lines for summary
          echo "$COMMITS" | head -20 > changelog_summary.txt

      - name: Get Docker image size
        id: image_size
        run: |
          # Login to Docker Hub
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Pull image and get size
          docker pull ${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
          SIZE=$(docker image inspect ${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }} --format='{{.Size}}' | awk '{print $1/1024/1024 " MB"}')
          
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Create release summary
        run: |
          echo "# Node-RED Release ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Image Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** \`${{ env.DOCKER_ORG }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ needs.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Git SHA:** \`${{ needs.version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Size:** \`${{ steps.image_size.outputs.size }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔌 Plugins Included" >> $GITHUB_STEP_SUMMARY
          echo "- **@iotistic/nr-devices-plugin** - Device management nodes and UI tools" >> $GITHUB_STEP_SUMMARY
          echo "- **@iotistic/nr-auth** - Authentication plugin for Iotistic platform" >> $GITHUB_STEP_SUMMARY
          echo "- **@iotistic/nr-storage** - HTTP REST storage backend" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📝 Recent Changes" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat changelog_summary.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚀 Deployment" >> $GITHUB_STEP_SUMMARY
          echo "To upgrade an existing customer instance:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "helm upgrade <customer-id> ./k8s/charts/customer-instance \\" >> $GITHUB_STEP_SUMMARY
          echo "  --namespace <customer-id> \\" >> $GITHUB_STEP_SUMMARY
          echo "  --reuse-values \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set nodered.enabled=true \\" >> $GITHUB_STEP_SUMMARY
          echo "  --set nodered.image.tag=${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-changelog
          path: changelog.txt
          retention-days: 90
