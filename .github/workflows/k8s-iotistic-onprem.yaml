name: Kubernetes - Deploy Iotistic (On-Prem)

# Trigger manually or from release workflow
on:
  workflow_dispatch:
    inputs:
      client_name:
        description: 'Client name to deploy (e.g., acme-corp).'
        required: false
        type: string

      cluster_name:
        description: 'Kubernetes cluster/context name to use (kubectx).'
        required: false
        type: string
        default: 'k3scl01'

      destroy:
        description: 'If true will destroy the deployed Iotistic app'
        required: false
        default: 'false'
        type: boolean

      clean_before_deploy:
        description: 'If true, delete Helm release + namespace before deploying'
        required: false
        default: false
        type: boolean

      release_version:
        description: 'Release version to deploy (e.g., v1.2.3). Leave empty for latest.'
        required: false
        type: string
        default: 'latest'

  workflow_call:
    inputs:
      release_version:
        description: 'Release version to deploy (e.g., v1.2.3)'
        required: true
        type: string

      clean_before_deploy:
        description: 'If true, delete Helm release + namespace before deploying'
        required: false
        default: false
        type: boolean

jobs:
  test-on-tagged-runner:
    runs-on: [iotistic-lab-sc]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------
      # OPTIONAL CLEAN BEFORE DEPLOY
      # ------------------------------------
      - name: Cleanup previous Helm release (before deploy)
        if: ${{ inputs.destroy == false && inputs.clean_before_deploy == true }}
        run: |
          set -e
          CLIENT_NAME="${{ inputs.client_name || '' }}"

          echo "Deleting previous Helm release (if exists)..."
          helm uninstall "${CLIENT_NAME}"-release -n "${CLIENT_NAME}" || true

      # ------------------------------------
      # DEPLOY
      # ------------------------------------
      - name: Deploy Iotistic (helm)
        if: ${{ inputs.destroy == false }}
        run: |
          set -e
          CLIENT_NAME="${{ inputs.client_name || '' }}"
          CHART_PATH=./charts
          VALUES_FILE="./charts/values/${CLIENT_NAME}/values.yaml"
          RELEASE_VERSION="${{ inputs.release_version || 'latest' }}"

          kubectx "${{ inputs.cluster_name || 'k3scl01' }}"

          echo "Installing Helm chart with version: $RELEASE_VERSION"
          helm upgrade --install "${CLIENT_NAME}"-release "${CHART_PATH}" \
            --namespace "${CLIENT_NAME}" \
            --create-namespace \
            -f "${VALUES_FILE}" \
            --set client.name="${CLIENT_NAME}" \
            --set api.image.tag="${RELEASE_VERSION}" \
            --set dashboard.image.tag="${RELEASE_VERSION}" \
            --wait \
            --timeout 5m

          kubectl -n "${CLIENT_NAME}" rollout status deploy/iotistic-api --timeout=180s || true
          kubectl -n "${CLIENT_NAME}" rollout status deploy/iotistic-dashboard --timeout=180s || true
          kubectl -n "${CLIENT_NAME}" get svc -o wide
          kubectl -n "${CLIENT_NAME}" get pods -o wide

      - name: Display Deployment Info
        if: ${{ inputs.destroy == false }}
        run: |
          CLIENT_NAME="${{ inputs.client_name || '' }}"
          RELEASE_VERSION="${{ inputs.release_version || 'latest' }}"

          kubectx "${{ inputs.cluster_name || 'k3scl01' }}"
          
          echo "## Kubernetes Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`$RELEASE_VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace:** \`$CLIENT_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl -n "$CLIENT_NAME" get svc >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Pods" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl -n "$CLIENT_NAME" get pods >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Access URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard:** http://localhost:30000" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** http://localhost:30002" >> $GITHUB_STEP_SUMMARY

      # ------------------------------------
      # DESTROY
      # ------------------------------------
      - name: Destroy deployed Iotistic (helm)
        if: ${{ inputs.destroy == true }}
        run: |
          set -e
          CLIENT_NAME="${{ inputs.client_name || '' }}"
          helm uninstall "${CLIENT_NAME}"-release -n "${CLIENT_NAME}" || true
          kubectl delete namespace "${CLIENT_NAME}" --wait --ignore-not-found