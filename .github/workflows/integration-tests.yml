name: Integration Tests

on:
  workflow_call:
    inputs:
      agent_version:
        description: Agent artifact version to install. Use latest or a published version.
        required: false
        type: string
        default: latest
  workflow_dispatch:
    inputs:
      agent_version:
        description: Agent artifact version to install. Use latest or a published version.
        required: false
        type: string
        default: latest

permissions:
  contents: read

env:
  COMPOSE_FILE: docker-compose.e2e.yml
  PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-systemd-agent-core-services:
    name: Test Agent Provisioning With Core Services
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: |
          chmod +x .github/scripts/setup-env.sh
          LICENSE_PUBLIC_KEY="${{ secrets.LICENSE_PUBLIC_KEY }}" \
          IOTISTIC_LICENSE_KEY="${{ secrets.IOTISTIC_LICENSE_KEY }}" \
          .github/scripts/setup-env.sh

      - name: Setup Node.js for dashboard tests
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('dashboard/package-lock.json') }}

      - name: Pull prebuilt API and dashboard images
        run: docker compose -f "$COMPOSE_FILE" pull api dashboard

      - name: Build ingestion image
        run: docker compose -f "$COMPOSE_FILE" build ingestion

      - name: Build MQTT simulator image
        run: docker build -t iotistic/mqtt-simulator:latest ./simulators/mqtt-simulator

      - name: Start database, cache, ingestion, API, and dashboard
        run: docker compose -f "$COMPOSE_FILE" up -d postgres redis ingestion api dashboard

      - name: Install dashboard test dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: dashboard
        run: npx playwright install chromium

      - name: Wait for backend readiness
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 90 bash -c '
            until docker compose -f "$COMPOSE_FILE" exec -T postgres pg_isready -U postgres > /dev/null 2>&1; do
              sleep 2
            done
          '

          echo "Waiting for Redis..."
          timeout 60 bash -c '
            until [ "$(docker inspect --format="{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" iotistic-redis-e2e 2>/dev/null)" = "healthy" ]; do
              sleep 3
            done
          '

          echo "Waiting for ingestion service..."
          timeout 180 bash -c '
            until curl -fsS http://localhost:4003/health > /dev/null; do
              sleep 3
            done
          '

          echo "Waiting for API..."
          timeout 180 bash -c '
            until curl -fsS http://localhost:4002/health > /dev/null; do
              sleep 3
            done
          '

          echo "Waiting for dashboard health endpoint..."
          timeout 180 bash -c '
            until curl -fsS http://localhost:3000/health > /dev/null; do
              sleep 3
            done
          '

          echo "Waiting for dashboard index page..."
          timeout 180 bash -c '
            until curl -fsS http://localhost:3000 | grep -q "Iotistica - Your Edge Management Platform"; do
              sleep 3
            done
          '

          echo "=== Dashboard runtime config.js ==="
          curl -fsS http://localhost:3000/config.js

          echo "=== Direct ingestion health ==="
          curl -fsS http://localhost:4003/health | jq '.'

      - name: Verify API can reach ingestion control plane
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T api node --input-type=module - <<'NODE'
          const { getRemoteIngestionHealth } = await import('./dist/services/telemetry/client.js');
          const payload = await getRemoteIngestionHealth();
          console.log(JSON.stringify(payload, null, 2));
          NODE

      - name: Seed local dashboard test user
        id: dashboard_auth
        run: |
          E2E_EMAIL="integration-$(date +%s)@example.com"
          E2E_PASSWORD="IntegrationTest123!"

          AUTH_RESPONSE=$(curl -fsS -X POST http://localhost:4002/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$E2E_EMAIL\",\"email\":\"$E2E_EMAIL\",\"password\":\"$E2E_PASSWORD\",\"fullName\":\"Integration Test User\"}")

          ACCESS_TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.data.accessToken')
          REFRESH_TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.data.refreshToken')
          USER_JSON=$(echo "$AUTH_RESPONSE" | jq -c '.data.user')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to create local dashboard test user"
            echo "$AUTH_RESPONSE"
            exit 1
          fi

          {
            echo "e2e_auth_username=$E2E_EMAIL"
            echo "e2e_auth_password=$E2E_PASSWORD"
            echo "e2e_auth_access_token=$ACCESS_TOKEN"
            echo "e2e_auth_refresh_token=$REFRESH_TOKEN"
            echo "e2e_auth_user_json<<EOF"
            echo "$USER_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Start cloud Mosquitto broker
        run: docker compose -f "$COMPOSE_FILE" up -d mosquitto

      - name: Wait for cloud Mosquitto
        run: |
          echo "Waiting for cloud Mosquitto container..."
          timeout 60 bash -c '
            until docker inspect --format="{{.State.Status}}" iotistic-mosquitto-e2e 2>/dev/null | grep -q running; do
              sleep 2
            done
          '

          echo "Waiting for Mosquitto to be reachable from the API container..."
          timeout 90 bash -c '
            until docker compose -f "$COMPOSE_FILE" exec -T api node -e "const socket = require(\"net\").createConnection({ host: \"mosquitto\", port: 1883 }); socket.setTimeout(5000); socket.on(\"connect\", () => { socket.end(); process.exit(0); }); socket.on(\"timeout\", () => { socket.destroy(); process.exit(1); }); socket.on(\"error\", () => process.exit(1));"; do
              sleep 3
            done
          '

      - name: Wait for API MQTT reconnect
        run: |
          echo "Waiting for API to reconnect to cloud Mosquitto..."
          timeout 120 bash -c '
            until docker compose -f "$COMPOSE_FILE" logs api --tail=300 2>&1 | grep -q "MQTT CLIENT CONNECTED TO BROKER"; do
              sleep 5
            done
          '

          echo "=== API MQTT reconnect log excerpt ==="
          docker compose -f "$COMPOSE_FILE" logs api --tail=120 | grep -E "MQTT CONNECTION (SUMMARY|ERROR)|MQTT CLIENT CONNECTED TO BROKER|Scheduling MQTT reconnect|MQTT reconnected successfully" || true

      - name: Seed integration fleet and provisioning key
        id: provision
        run: |
          PROVISIONING_JSON=$(docker compose -f "$COMPOSE_FILE" exec -T api node --input-type=module - <<'NODE'
          import crypto from 'crypto';
          import { query } from './dist/db/connection.js';
          import { createProvisioningKey } from './dist/utils/provisioning-keys.js';

          const fleetUuid = crypto.randomUUID();
          const customerId = '00000000-0000-0000-0000-000000000001';

          await query(
            `INSERT INTO fleets (fleet_id, fleet_name, customer_id, fleet_type, description, fleet_uuid, created_by)
             VALUES ($1, $2, $3, $4, $5, $6, $7)`,
            [
              'default-fleet',
              'Default Fleet',
              customerId,
              'mixed',
              'Auto-created by integration workflow for provisioning keys',
              fleetUuid,
              'integration-tests'
            ]
          );

          await query(
            `UPDATE mqtt_broker_config
             SET host = $1,
                 port = $2,
                 protocol = $3,
                 use_tls = $4,
                 username = $5,
                 is_active = true,
                 is_default = true,
                 updated_at = CURRENT_TIMESTAMP
             WHERE is_default = true`,
            ['localhost', 5883, 'mqtt', false, 'admin']
          );

          const created = await createProvisioningKey(
            fleetUuid,
            1,
            7,
            'Workflow-seeded single-device key',
            'integration-tests'
          );

          console.log(JSON.stringify({
            fleetUuid,
            keyId: created.id,
            key: created.key
          }));
          NODE
          )

          PROVISIONING_JSON=$(echo "$PROVISIONING_JSON" | tail -n 1)
          PROVISIONING_KEY=$(echo "$PROVISIONING_JSON" | jq -r '.key')
          FLEET_UUID=$(echo "$PROVISIONING_JSON" | jq -r '.fleetUuid')

          if [ -z "$PROVISIONING_KEY" ] || [ "$PROVISIONING_KEY" = "null" ]; then
            echo "Failed to create provisioning key"
            echo "$PROVISIONING_JSON"
            exit 1
          fi

          echo "fleet_uuid=$FLEET_UUID" >> "$GITHUB_OUTPUT"
          echo "provisioning_key=$PROVISIONING_KEY" >> "$GITHUB_OUTPUT"

      - name: Verify published installer and artifact endpoints
        run: |
          retry_curl() {
            curl --fail --show-error --silent --location \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 3 \
              --retry-max-time 90 \
              --connect-timeout 15 \
              "$@"
          }

          echo "=== Fetch published installer ==="
          retry_curl https://get.iotistica.com/agent -o /tmp/iotistica-install.sh

          echo "=== Installer artifact URL markers ==="
          grep -nE 'IOTISTICA_DOWNLOAD_BASE_URL|get\.iotistica\.com/agent/artifacts|blob\.core\.windows\.net/scripts/agent' /tmp/iotistica-install.sh || true

          echo "=== Check redirected artifact endpoint ==="
          retry_curl --head https://get.iotistica.com/agent/artifacts/agent-latest-x86_64.tar.gz

      - name: Install Mosquitto and agent with install.sh
        env:
          CI: true
          IOTISTICA_INSTALL_SOURCE: artifact
          IOTISTICA_AGENT_VERSION: ${{ inputs.agent_version }}
          IOTISTICA_DEVICE_PORT: 48484
          IOTISTICA_API: http://localhost:4002
          IOTISTICA_INSTALL_MOSQUITTO: yes
          MQTT_BROKER_HOST: localhost
          MQTT_BROKER_PORT: 1883
          MQTT_USERNAME: admin
          MQTT_PASSWORD: iotistic42!
          MQTT_USE_TLS: false
          AGENT_SHELL_HMAC_KEY: integration-test-shell-hmac-key
          PROVISIONING_KEY: ${{ steps.provision.outputs.provisioning_key }}
        run: |
          retry_curl() {
            curl --fail --show-error --silent --location \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 3 \
              --retry-max-time 90 \
              --connect-timeout 15 \
              "$@"
          }

          retry_curl https://get.iotistica.com/agent -o /tmp/iotistica-install.sh
          sudo chmod +x /tmp/iotistica-install.sh
          sudo -E bash /tmp/iotistica-install.sh

      - name: Verify system services
        run: |
          sudo systemctl status mosquitto --no-pager -l || true
          sudo systemctl status iotistica-agent --no-pager -l || true
          sudo systemctl is-active --quiet mosquitto
          sudo systemctl is-active --quiet iotistica-agent

      - name: Wait for device API readiness
        run: |
          timeout 120 bash -c '
            until curl -fsS http://localhost:48484/v1/healthy > /dev/null; do
              sleep 3
            done
          '

      - name: Verify local provisioning status
        run: |
          STATUS=$(curl -fsS http://localhost:48484/v1/provision/status)
          echo "$STATUS" | jq '.'

          test "$(echo "$STATUS" | jq -r '.provisioned')" = "true"
          test "$(echo "$STATUS" | jq -r '.apiEndpoint')" = "http://localhost:4002"
          test "$(echo "$STATUS" | jq -r '.mqttConfigured')" = "true"

      - name: Verify agent was registered in backend
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T postgres psql -U postgres -d iotistic -c \
            "SELECT uuid, fleet_uuid, provisioning_state, provisioned_at IS NOT NULL AS has_provisioned_at FROM agents ORDER BY created_at DESC LIMIT 5;"

      - name: Dump fleets table after agent registration
        run: |
          docker compose -f "$COMPOSE_FILE" exec -T postgres psql -U postgres -d iotistic -c \
            "SELECT id, fleet_id, fleet_name, customer_id, fleet_type, description, deployment_config, billing_enabled, cost_per_hour, cost_per_month, total_running_hours, current_cost, budget_limit, budget_alert_threshold, status, started_at, stopped_at, tags, environment, location, created_by, created_at, updated_at, k8s_namespace, agent_count, devices_per_agent, fleet_uuid FROM fleets ORDER BY created_at DESC;"

      - name: Capture registered agent for dashboard test
        id: registered_agent
        run: |
          AGENT_JSON=$(docker compose -f "$COMPOSE_FILE" exec -T api node --input-type=module - <<'NODE'
          import { query } from './dist/db/connection.js';

          const result = await query(
            `SELECT uuid, name, fleet_uuid, provisioning_state
             FROM agents
             ORDER BY created_at DESC
             LIMIT 1`
          );

          if (!result.rows.length) {
            throw new Error('No registered agent found after provisioning');
          }

          console.log(JSON.stringify(result.rows[0]));
          NODE
          )

          AGENT_JSON=$(echo "$AGENT_JSON" | tail -n 1)
          AGENT_UUID=$(echo "$AGENT_JSON" | jq -r '.uuid')
          AGENT_NAME=$(echo "$AGENT_JSON" | jq -r '.name // empty')

          if [ -z "$AGENT_UUID" ] || [ "$AGENT_UUID" = "null" ]; then
            echo "Failed to capture registered agent"
            echo "$AGENT_JSON"
            exit 1
          fi

          echo "agent_uuid=$AGENT_UUID" >> "$GITHUB_OUTPUT"
          echo "agent_name=$AGENT_NAME" >> "$GITHUB_OUTPUT"

      - name: Probe dashboard user agent visibility
        env:
          ACCESS_TOKEN: ${{ steps.dashboard_auth.outputs.e2e_auth_access_token }}
          EXPECTED_AGENT_UUID: ${{ steps.registered_agent.outputs.agent_uuid }}
        run: |
          echo "=== Dashboard user /auth/me ==="
          curl -fsS http://localhost:4002/api/v1/auth/me \
            -H "Authorization: Bearer $ACCESS_TOKEN" | jq '.'

          echo "=== Waiting for dashboard user /agents visibility ==="
          timeout 60 bash -c '
            until AGENTS_RESPONSE=$(curl -fsS http://localhost:4002/api/v1/agents?limit=100 \
              -H "Authorization: Bearer $ACCESS_TOKEN"); do
              sleep 2
            done

            echo "$AGENTS_RESPONSE" | jq ".count, (.agents[]? | {uuid, device_name, provisioning_state, fleet_uuid})"

            until echo "$AGENTS_RESPONSE" | jq -e --arg uuid "$EXPECTED_AGENT_UUID" ".agents | any(.uuid == \$uuid)" > /dev/null; do
              sleep 2
              AGENTS_RESPONSE=$(curl -fsS http://localhost:4002/api/v1/agents?limit=100 \
                -H "Authorization: Bearer $ACCESS_TOKEN")
              echo "$AGENTS_RESPONSE" | jq ".count, (.agents[]? | {uuid, device_name, provisioning_state, fleet_uuid})"
            done
          '

      - name: Verify authenticated ingestion health endpoint through API
        env:
          ACCESS_TOKEN: ${{ steps.dashboard_auth.outputs.e2e_auth_access_token }}
        run: |
          RESPONSE=$(curl -fsS http://localhost:4002/api/v1/metrics/ingestion-health \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          echo "$RESPONSE" | jq '.'
          test "$(echo "$RESPONSE" | jq -r '.ingestionHealthy')" = "true"

      - name: Verify dashboard sidebar and capture dashboard diagnostics
        working-directory: dashboard
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:4002
          E2E_AUTH_USERNAME: ${{ steps.dashboard_auth.outputs.e2e_auth_username }}
          E2E_AUTH_PASSWORD: ${{ steps.dashboard_auth.outputs.e2e_auth_password }}
          E2E_AUTH_ACCESS_TOKEN: ${{ steps.dashboard_auth.outputs.e2e_auth_access_token }}
          E2E_AUTH_REFRESH_TOKEN: ${{ steps.dashboard_auth.outputs.e2e_auth_refresh_token }}
          E2E_AUTH_USER_JSON: ${{ steps.dashboard_auth.outputs.e2e_auth_user_json }}
          E2E_EXPECTED_AGENT_UUID: ${{ steps.registered_agent.outputs.agent_uuid }}
          E2E_EXPECTED_AGENT_NAME: ${{ steps.registered_agent.outputs.agent_name }}
        run: npx playwright test e2e/dashboard.spec.ts --grep "should show an agent in the left sidebar|should capture the fleets page state|should show system metrics for the selected agent"

      - name: Test MQTT device management
        working-directory: dashboard
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:4002
          E2E_AUTH_USERNAME: ${{ steps.dashboard_auth.outputs.e2e_auth_username }}
          E2E_AUTH_PASSWORD: ${{ steps.dashboard_auth.outputs.e2e_auth_password }}
          E2E_AUTH_ACCESS_TOKEN: ${{ steps.dashboard_auth.outputs.e2e_auth_access_token }}
          E2E_AUTH_REFRESH_TOKEN: ${{ steps.dashboard_auth.outputs.e2e_auth_refresh_token }}
          E2E_AUTH_USER_JSON: ${{ steps.dashboard_auth.outputs.e2e_auth_user_json }}
          E2E_EXPECTED_AGENT_UUID: ${{ steps.registered_agent.outputs.agent_uuid }}
          E2E_EXPECTED_AGENT_NAME: ${{ steps.registered_agent.outputs.agent_name }}
        run: npx playwright test e2e/dashboard.spec.ts --grep "should add a new MQTT device"

      - name: Verify agent Mosquitto passwd and ACL after MQTT device reconciliation
        env:
          ACCESS_TOKEN: ${{ steps.dashboard_auth.outputs.e2e_auth_access_token }}
          AGENT_UUID: ${{ steps.registered_agent.outputs.agent_uuid }}
        run: |
          echo "Waiting 60s for agent to reconcile target state and update Mosquitto auth files..."
          sleep 60

          echo "=== Reloading Mosquitto to pick up updated auth files ==="
          # The agent writes passwd/acl files but may fail to SIGHUP Mosquitto in CI due to
          # "NoNewPrivileges" flag on ARC ephemeral runners blocking the agent's sudo call.
          # The CI runner has passwordless sudo, so we force the reload here.
          sudo systemctl reload mosquitto || sudo kill -HUP "$(pgrep -x mosquitto)" || true
          echo "Mosquitto reload triggered"

          echo ""
          echo "=== DIAGNOSTIC: Cloud sensors (what the DB has) ==="
          curl -fsS "http://localhost:4002/api/v1/agents/${AGENT_UUID}/devices" \
            -H "Authorization: Bearer $ACCESS_TOKEN" | jq '{count, devices: [.devices[]? | {name, protocol, uuid, connection: .connection}]}' || true

          echo ""
          echo "=== DIAGNOSTIC: Cloud agent_target_state (raw JSON the agent polls) ==="
          docker compose -f "$COMPOSE_FILE" exec -T postgres psql -U postgres -d iotistic -c \
            "SELECT uuid, version, updated_at, config::text FROM agent_target_state WHERE uuid = '${AGENT_UUID}';" || true

          echo ""
          echo "=== DIAGNOSTIC: Agent reported current-state (what the agent last sent back) ==="
          curl -fsS "http://localhost:4002/api/v1/agents/${AGENT_UUID}/current-state" | \
            jq '{reported_at, config: (.config | if type == "string" then . | fromjson else . end | {devices, endpoints})}' || true

          echo ""
          echo "=== DIAGNOSTIC: Agent local /v1/devices (what the agent has reconciled) ==="
          curl -fsS "http://localhost:48484/v1/devices" | jq . || true

          echo ""
          echo "=== Agent journal (subscription check) ==="
          sudo journalctl -u iotistica-agent --no-pager --since "10 minutes ago" | grep -i "Subscribed to MQTT topic" || true

          if sudo journalctl -u iotistica-agent --no-pager --since "10 minutes ago" | grep -q "Subscribed to MQTT topic"; then
            echo "PASS: agent logged MQTT subscription"
          else
            echo "FAIL: no MQTT subscription log found in agent journal"
            sudo journalctl -u iotistica-agent --no-pager --since "10 minutes ago" | tail -50 || true
            exit 1
          fi

          echo "=== /etc/mosquitto/passwd ==="
          sudo cat /etc/mosquitto/passwd || true

          echo "=== /etc/mosquitto/acl ==="
          sudo cat /etc/mosquitto/acl || true

          echo "Verifying e2e_mqtt_ user entry exists in passwd file..."
          if sudo grep -q "e2e_mqtt_" /etc/mosquitto/passwd; then
            echo "PASS: e2e_mqtt_ user found in /etc/mosquitto/passwd"
          else
            echo "FAIL: No e2e_mqtt_ user found in /etc/mosquitto/passwd"
            exit 1
          fi

          echo "Verifying e2e_mqtt_ ACL entry exists in acl file..."
          if sudo grep -q "e2e_mqtt_" /etc/mosquitto/acl; then
            echo "PASS: e2e_mqtt_ ACL entry found in /etc/mosquitto/acl"
          else
            echo "FAIL: No e2e_mqtt_ ACL entry found in /etc/mosquitto/acl"
            exit 1
          fi

          echo "Mosquitto auth files verified successfully."

      - name: Verify MQTT simulator publishes data
        id: mqtt_publish
        env:
          ACCESS_TOKEN: ${{ steps.dashboard_auth.outputs.e2e_auth_access_token }}
          AGENT_UUID: ${{ steps.registered_agent.outputs.agent_uuid }}
        run: |
          # Look up the e2e MQTT device created by the Playwright test
          SENSORS_RESP=$(curl -fsS "http://localhost:4002/api/v1/agents/${AGENT_UUID}/devices?protocol=mqtt" \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          DEVICE_NAME=$(echo "$SENSORS_RESP" | jq -r '[.devices[]? | select(.name | startswith("e2e_mqtt_"))] | first | .name // empty')
          DEVICE_UUID=$(echo "$SENSORS_RESP" | jq -r '[.devices[]? | select(.name | startswith("e2e_mqtt_"))] | first | .uuid // empty')
          BASE_TOPIC=$(echo "$SENSORS_RESP" | jq -r '[.devices[]? | select(.name | startswith("e2e_mqtt_"))] | first | .connection.topic // empty')

          if [ -z "$DEVICE_NAME" ] || [ -z "$BASE_TOPIC" ]; then
            echo "FAIL: Could not find e2e_mqtt_ device in agent sensors response"
            echo "$SENSORS_RESP" | jq .
            exit 1
          fi

          echo "Found device: $DEVICE_NAME (uuid=$DEVICE_UUID, topic=$BASE_TOPIC)"

          echo "mqtt_device_name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "mqtt_device_uuid=$DEVICE_UUID" >> "$GITHUB_OUTPUT"
          echo "mqtt_topic=$BASE_TOPIC" >> "$GITHUB_OUTPUT"

          # Clean up any leftover container from a previous run
          docker rm -f sim-mqtt-e2e 2>/dev/null || true

          docker run -d --network host --name sim-mqtt-e2e \
            -e MQTT_BROKER_URL=mqtt://localhost:1883 \
            -e MQTT_USERNAME="${DEVICE_NAME}_user" \
            -e MQTT_PASSWORD="E2eSecurePass1!" \
            -e MQTT_CLIENT_ID="sim-${DEVICE_NAME: -20}" \
            -e MQTT_DEVICE_UUID="$DEVICE_UUID" \
            -e MQTT_TOPIC="$BASE_TOPIC" \
            -e MQTT_METRIC_NAMES="temperature,humidity" \
            -e MQTT_QOS=1 \
            -e PUBLISH_INTERVAL_MS=1000 \
            -e LOG_PUBLISH_EVENTS=true \
            -e LOG_PUBLISH_EVERY=1 \
            iotistic/mqtt-simulator:latest

          echo "Waiting 8 s for broker connect and first publish cycle..."
          sleep 8

          SIM_LOGS=$(docker logs --tail 100 sim-mqtt-e2e 2>&1)
          echo "=== sim-mqtt-e2e logs ==="
          echo "$SIM_LOGS"

          docker rm -f sim-mqtt-e2e 2>/dev/null || true

          if echo "$SIM_LOGS" | grep -q "Connected to MQTT broker"; then
            echo "PASS: simulator connected to broker"
          else
            echo "FAIL: simulator did not connect to broker"
            exit 1
          fi

          if echo "$SIM_LOGS" | grep -qE "Publish confirmed|Publish queued"; then
            echo "PASS: simulator published messages"
          else
            echo "FAIL: simulator did not publish any messages"
            exit 1
          fi

      - name: Verify agent forwards MQTT data to cloud ingestion
        env:
          ACCESS_TOKEN: ${{ steps.dashboard_auth.outputs.e2e_auth_access_token }}
          AGENT_UUID: ${{ steps.registered_agent.outputs.agent_uuid }}
          DEVICE_UUID: ${{ steps.mqtt_publish.outputs.mqtt_device_uuid }}
          DEVICE_NAME: ${{ steps.mqtt_publish.outputs.mqtt_device_name }}
        run: |
          if [ -z "$DEVICE_UUID" ]; then
            echo "FAIL: mqtt device uuid output missing"
            exit 1
          fi

          echo "Waiting for forwarded MQTT readings from agent device $DEVICE_NAME ($DEVICE_UUID)..."

          read_db_counts() {
            docker compose -f "$COMPOSE_FILE" exec -T postgres \
              psql -U postgres -d iotistic -v ON_ERROR_STOP=1 -t -A -F "|" -c "
                SELECT
                  COUNT(*)::int AS reading_count,
                  COUNT(DISTINCT metric_name)::int AS metric_count
                FROM readings
                WHERE protocol = 'mqtt'
                  AND COALESCE(extra->>'device_uuid', extra->>'deviceUuid') = '$DEVICE_UUID'
                  AND time > NOW() - INTERVAL '10 minutes';"
          }

          DEADLINE=$((SECONDS + 120))
          DB_RESULT=$(read_db_counts)
          echo "DB_RESULT=$DB_RESULT"

          READING_COUNT=$(echo "$DB_RESULT" | tail -n 1 | cut -d"|" -f1 | tr -d "[:space:]")
          METRIC_COUNT=$(echo "$DB_RESULT" | tail -n 1 | cut -d"|" -f2 | tr -d "[:space:]")

          while { [ "${READING_COUNT:-0}" -lt 2 ] || [ "${METRIC_COUNT:-0}" -lt 2 ]; } && [ "$SECONDS" -lt "$DEADLINE" ]; do
            sleep 4
            DB_RESULT=$(read_db_counts)
            echo "DB_RESULT=$DB_RESULT"
            READING_COUNT=$(echo "$DB_RESULT" | tail -n 1 | cut -d"|" -f1 | tr -d "[:space:]")
            METRIC_COUNT=$(echo "$DB_RESULT" | tail -n 1 | cut -d"|" -f2 | tr -d "[:space:]")
          done

          if [ "${READING_COUNT:-0}" -lt 2 ] || [ "${METRIC_COUNT:-0}" -lt 2 ]; then
            echo "FAIL: timed out waiting for forwarded MQTT readings in raw readings table"
            exit 1
          fi

          echo "Observed $READING_COUNT MQTT readings across $METRIC_COUNT metrics in raw readings"

          echo "Refreshing latest materialized view before API assertion..."
          docker compose -f "$COMPOSE_FILE" exec -T api node --input-type=module -e "import('./dist/services/agent/metrics.service.js').then(async ({ refreshViews }) => { await refreshViews('latest'); console.log('latest view refreshed'); }).catch((error) => { console.error(error instanceof Error ? error.message : String(error)); process.exit(1); });"

          API_RESULT=$(curl -fsS "http://localhost:4002/api/v1/metrics/latest?deviceUuid=${DEVICE_UUID}" \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          echo "=== API latest readings ==="
          echo "$API_RESULT" | jq '.'

          test "$(echo "$API_RESULT" | jq -r '.count >= 2')" = "true"
          echo "$API_RESULT" | jq -e '.readings | any(.metric_name == "temperature")' > /dev/null
          echo "$API_RESULT" | jq -e '.readings | any(.metric_name == "humidity")' > /dev/null

      - name: Cleanup e2e test devices
        if: always()
        env:
          ACCESS_TOKEN: ${{ steps.dashboard_auth.outputs.e2e_auth_access_token }}
          AGENT_UUID: ${{ steps.registered_agent.outputs.agent_uuid }}
        run: |
          SENSORS_RESP=$(curl -fsS "http://localhost:4002/api/v1/agents/${AGENT_UUID}/devices?protocol=mqtt" \
            -H "Authorization: Bearer $ACCESS_TOKEN" || echo '{"devices":[]}')

          E2E_DEVICES=$(echo "$SENSORS_RESP" | jq -r '[.devices[]? | select(.name | startswith("e2e_mqtt_")) | .name] | .[]')

          if [ -z "$E2E_DEVICES" ]; then
            echo "No e2e_mqtt_ devices to clean up"
          else
            while IFS= read -r name; do
              echo "Deleting device: $name"
              curl -fsS -X DELETE \
                "http://localhost:4002/api/v1/agents/${AGENT_UUID}/devices/${name}" \
                -H "Authorization: Bearer $ACCESS_TOKEN" || echo "Warning: delete failed for $name"
            done <<< "$E2E_DEVICES"
          fi

      - name: Upload dashboard Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-playwright-artifacts
          path: |
            dashboard/playwright-report
            dashboard/test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Show diagnostics
        if: always()
        run: |
          echo "=== Mosquitto systemctl status ==="
          sudo systemctl status mosquitto --no-pager -l || true

          echo "=== Agent systemctl status ==="
          sudo systemctl status iotistica-agent --no-pager -l || true

          echo "=== Agent journal ==="
          sudo journalctl -u iotistica-agent --no-pager --since "10 minutes ago" || true

          echo "=== Mosquitto journal ==="
          sudo journalctl -u mosquitto --no-pager --since "10 minutes ago" || true

          echo "=== Mosquitto main config ==="
          sudo cat /etc/mosquitto/mosquitto.conf || true

          echo "=== Mosquitto managed config ==="
          sudo cat /etc/mosquitto/conf.d/iotistica.conf || true

          echo "=== Mosquitto auth file permissions ==="
          sudo ls -l /etc/mosquitto/passwd /etc/mosquitto/acl || true

          echo "=== Mosquitto auth file ACLs ==="
          sudo getfacl /etc/mosquitto/passwd /etc/mosquitto/acl || true

          echo "=== API logs ==="
          docker compose -f "$COMPOSE_FILE" logs api --tail=200 || true

          echo "=== Dashboard logs ==="
          docker compose -f "$COMPOSE_FILE" logs dashboard --tail=200 || true

          echo "=== Cloud Mosquitto logs ==="
          docker compose -f "$COMPOSE_FILE" logs mosquitto --tail=200 || true

      - name: Cleanup system services
        if: always()
        run: |
          sudo systemctl stop iotistica-agent || true
          sudo systemctl disable iotistica-agent || true
          sudo rm -f /etc/systemd/system/iotistica-agent.service || true
          sudo systemctl stop mosquitto || true
          sudo systemctl disable mosquitto || true
          sudo systemctl daemon-reload || true

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f sim-mqtt-e2e 2>/dev/null || true
          docker compose -f "$COMPOSE_FILE" down -v
