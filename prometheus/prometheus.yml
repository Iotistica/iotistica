# Prometheus Configuration for Iotistic Platform
# Scrapes metrics from the API's /metrics endpoint

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    cluster: 'iotistic-platform'
    environment: 'production'

# Alertmanager configuration (optional, can be uncommented when alertmanager is added)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Rule files (optional, can be uncommented when rule files are created)
# rule_files:
#   - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # Scrape Iotistic API metrics
  # Metrics include: endpoint_reading, endpoint_reading_timestamp, device_status
  # Data source: readings_hourly TimescaleDB continuous aggregate
  - job_name: 'iotistic-api'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:3002']
        labels:
          service: 'api'
          component: 'backend'

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'

  # Node exporter (optional, uncomment if you want to monitor host metrics)
  # - job_name: 'node-exporter'
  #   scrape_interval: 30s
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #       labels:
  #         service: 'node-exporter'
  #         component: 'monitoring'

  # Postgres exporter (optional, uncomment if you want to monitor PostgreSQL metrics)
  # - job_name: 'postgres-exporter'
  #   scrape_interval: 30s
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #       labels:
  #         service: 'postgres-exporter'
  #         component: 'database'

  # MQTT exporter (optional, uncomment if you want to monitor Mosquitto metrics)
  # - job_name: 'mqtt-exporter'
  #   scrape_interval: 30s
  #   static_configs:
  #     - targets: ['mqtt-exporter:9234']
  #       labels:
