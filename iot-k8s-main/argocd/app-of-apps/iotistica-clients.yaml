apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iotistica-clients
spec:
  project: default
  source:
    repoURL: https://github.com/Iotistica/iot-k8s.git
    targetRevision: main
    path: argocd/clients   # folder containing child apps
  destination:
    server: https://kubernetes.default.svc
    namespace: iotistica-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true