apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg
spec:
  project: default

  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.27.1
    helm:
      releaseName: cnpg
      values: |
        crds:
          install: true

  destination:
    server: https://kubernetes.default.svc
    namespace: iotistica-cnpg-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # https://github.com/cloudnative-pg/charts/issues/544