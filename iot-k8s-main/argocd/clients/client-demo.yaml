apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: client-demo
  namespace: argocd
  labels:
    managed-by: iotistic
    client-id: demo
    plan: professional
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Project to which this application belongs
  project: default

  # Source repository containing Helm chart
  source:
    repoURL: https://github.com/Iotistica/iotistic.git
    targetRevision: main
    path: charts/iotistica-app
    helm:
      # Client-specific values file
      valueFiles:
        - values/demo/values.yaml
      
      # You can also override specific values inline:
      # values: |
      #   api:
      #     replicas: 2

  # Destination cluster and namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  # Sync policy
  syncPolicy:
    # Automated sync configuration
    automated:
      # Automatically apply changes from Git
      prune: true
      # Automatically correct drift (if someone manually edits resources)
      selfHeal: true
      # Allow empty commits
      allowEmpty: false
    
    # Sync options
    syncOptions:
      # Automatically create namespace if it doesn't exist
      - CreateNamespace=true
      # Validate resources before applying
      - Validate=true
      # Use server-side apply (recommended for large deployments)
      - ServerSideApply=true
      # Skip schema validation (useful for CRDs)
      - SkipSchemaValidation=false
      # Replace resources instead of patching (use with caution)
      # - Replace=true
    
    # Retry configuration for failed syncs
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    
    # Sync window (optional - restrict sync to specific times)
    # syncWindow:
    #   - schedule: "0 8 * * *"  # 8 AM daily
    #     duration: 1h
    #     applications:
    #       - client-demo

  # Ignore differences in certain fields (optional)
  ignoreDifferences:
    # Ignore replicas field (allow HPA to manage)
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    
    # Ignore storage class changes
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/storageClassName

  # Resource tracking (optional - customize how Argo tracks resources)
  # revisionHistoryLimit: 10

  # Health assessment (optional - custom health checks)
  # info:
  #   - name: "Health Check"
  #     value: "Custom health logic here"
