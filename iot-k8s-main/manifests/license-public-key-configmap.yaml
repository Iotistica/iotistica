# Cluster-Wide License Public Key ConfigMap
# This ConfigMap should be applied ONCE per cluster (not per customer)
#
# Purpose:
#   Provides the RSA public key for JWT license validation across all customer instances
#
# Deployment:
#   kubectl apply -f manifests/license-public-key-configmap.yaml
#
# Benefits:
#   - Single source of truth for license validation
#   - Easy key rotation (update once, all customers get it on pod restart)
#   - No duplication across customer namespaces
#   - Reduces per-customer storage and deployment complexity
#
# Key Rotation Strategy:
#   1. Generate new key pair: cd provisioning && npm run generate-keys
#   2. Update this ConfigMap with new public key
#   3. kubectl apply -f manifests/license-public-key-configmap.yaml
#   4. Rolling restart customer API pods (they'll pick up new key on startup)

apiVersion: v1
kind: ConfigMap
metadata:
  name: iotistic-license-public-key
  namespace: iotistic-system
  labels:
    app.kubernetes.io/name: iotistic
    app.kubernetes.io/component: license-validation
    app.kubernetes.io/managed-by: iotistic-platform
  annotations:
    description: "RSA-2048 public key for JWT license signature verification"
    algorithm: "RS256"
    generated: "2026-02-27"
immutable: true  # Prevent accidental edits (create new version instead)
data:
  # RSA public key for verifying JWT license signatures
  # Generated with: cd provisioning && npm run generate-keys
  # Matches private key: provisioning/keys/private-key.pem
  public-key.pem: |
    -----BEGIN PUBLIC KEY-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAqS6oN6f88fM0YkWE1rcu
    sUDStDBOnVSFjl2jvSwsb+2jb6dFESj+HJBREmwdtFJp1J9hS8PiNXs3PcsyGJi8
    GTYUhpy5Xv7I96A5krmRUfFxJylaS3wmMl55M19f2z0mi8CayhzXgmK3CKA+rLa+
    LC+CxpVIFMc88vJxkeC14W8Hh25wxxbXCTTtS702cjtVzDZSWuM/hIqlBAPKDfKo
    Tp8otRyNJyutl1wwnF5mI/3sVyNMyEPzVG3H6y/3Kt4BYXyzt9CgMoGHCxLaQNxn
    z+kivnIY8PK2Ywii3OFkO47/+ZlV6+e6bny9hlvCkhU9DNfzoBb4YBAu4F62llLK
    lQIDAQAB
    -----END PUBLIC KEY-----
