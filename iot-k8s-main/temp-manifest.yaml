# Source: iotistic/templates/dashboard-configmap.yaml
# Dashboard Runtime Configuration ConfigMap
# 
# This ConfigMap provides runtime configuration for the React/Vite dashboard.
# It replaces the config.js file in the built assets, allowing the same
# Docker image to be deployed to multiple clients with different API URLs.
#
# How it works:
# 1. Dashboard build creates a placeholder config.js in /usr/share/nginx/html/
# 2. This ConfigMap mounts over it with client-specific values
# 3. index.html loads config.js before the React app starts
# 4. Dashboard code reads from window.env (runtime) with fallback to import.meta.env (build-time)
#
# Benefits:
# - Build once, deploy anywhere (same image for all clients)
# - No rebuild needed to change API URL
# - Follows Kubernetes best practices
# - Easy to update config without redeploying pods
apiVersion: v1
kind: ConfigMap
metadata:
  name: client-673e90cc0797-iotistic-dashboard-config
  namespace: client-673e90cc0797
  labels:
    helm.sh/chart: iotistic-1.0.1
    app.kubernetes.io/name: iotistic
    app.kubernetes.io/instance: client-673e90cc0797
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: dashboard
data:
  config.js: |
    // Runtime configuration injected by Kubernetes ConfigMap
    // All VITE_ variables are read by the dashboard at runtime
    window.env = {
      // API Configuration
      VITE_API_URL: 'https://api-client-673e90cc0797.iotistica.com',
      
      // Auth0 Configuration (set per-customer)
      VITE_AUTH0_DOMAIN: 'auth.iotistica.com',
      VITE_AUTH0_CLIENT_ID: 'Q3DgGlIAoTgIhhXC7AhtJPR1ByiLXCkR',
      VITE_AUTH0_AUDIENCE: 'https://api.iotistica.com',
      VITE_AUTH0_CALLBACK_URL: 'https://client-673e90cc0797.iotistica.com/auth/callback',
      VITE_AUTH0_SHOW_SOCIAL_LOGIN: 'true',
      
      // Provisioning API (billing service for Auth0 token exchange)
      VITE_PROVISIONING_API_URL: 'https://api.iotistica.com/provisioning',
      
      // Website URL (for signup completion)
      VITE_WEBSITE_URL: 'https://iotistica.com',
      
      // App Metadata
      NODE_ENV: 'production',
      APP_VERSION: 'v0.0.19-rc.21'
    };
---
# Source: iotistic/templates/mosquitto.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: client-673e90cc0797-iotistic-mosquitto-config
  namespace: client-673e90cc0797
  labels:
    
    helm.sh/chart: iotistic-1.0.1
    app.kubernetes.io/name: iotistic
    app.kubernetes.io/instance: client-673e90cc0797
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: mosquitto
data:
  mosquitto.conf: |
    # Mosquitto configuration with Go-Auth plugin
    # HTTP backend authentication via API service
   
    # Basic Mosquitto settings

    # Plain TCP listener (no cert)
    listener 1883 0.0.0.0
    protocol mqtt

    # TLS listener
    listener 8883 0.0.0.0
    protocol mqtt

    # TLS settings
    cafile /mosquitto/certs/tls.crt
    certfile /mosquitto/certs/tls.crt
    keyfile /mosquitto/certs/tls.key 
    require_certificate false
    
    listener 9001 0.0.0.0
    protocol websockets
    
    # Disable anonymous access (require authentication)
    allow_anonymous false
    
    # Logging
    log_dest stdout
    log_type error
    log_type warning
    log_type notice
    log_type information
    
    # System statistics publishing (required for metrics exporter)
    sys_interval 10
    
    # Load Go-Auth plugin
    auth_plugin /mosquitto/go-auth.so
    
    # Backend configuration - HTTP authentication via API
    auth_opt_backends http
    
    # HTTP backend settings (connects to API service)
    auth_opt_http_host client-673e90cc0797-iotistic-api
    auth_opt_http_port 3002
    auth_opt_http_getuser_uri /mosquitto-auth/user
    auth_opt_http_superuser_uri /mosquitto-auth/superuser
    auth_opt_http_aclcheck_uri /mosquitto-auth/acl
    
    # HTTP request configuration
    auth_opt_http_method POST
    auth_opt_http_request_type json
    auth_opt_http_response_mode status
    auth_opt_http_timeout 5
    
    # Password hashing configuration (validated by API)
    auth_opt_hasher bcrypt
    auth_opt_hasher_cost 10
    
    # Logging level
    auth_opt_log_level info
    auth_opt_log_dest stdout
    # Persistence for message queues
    persistence true
    persistence_location /mosquitto/data/
