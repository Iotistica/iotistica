apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-673e90cc0797-iotistic-api
  labels:
    helm.sh/chart: iotistic-1.0.1
    app.kubernetes.io/name: iotistic
    app.kubernetes.io/instance: client-673e90cc0797
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: iotistic
      app.kubernetes.io/instance: client-673e90cc0797
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iotistic
        app.kubernetes.io/instance: client-673e90cc0797
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: iotistic-api # Use service account with RBAC permissions
      terminationGracePeriodSeconds: 60  # Allow 60s for graceful shutdown
      containers:
        - name: api
          image: "iotistic/api:v0.0.19-rc.21"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000  # Numeric UID required for runAsNonRoot verification
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            privileged: false
          ports:
            - name: api
              containerPort: 3002
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]  # Wait 15s for connections to drain
          env:
            - name: PORT
              value: "3002"
            - name: NODE_ENV
              value: "production"

            # Namespace for discovering HTTPRoute (used to auto-discover CLOUD_API_URL)
            - name: NAMESPACE
              value: "client-673e90cc0797"
            
            # Cloud API URL for virtual agents to connect to (optional, auto-discovered from HTTPRoute if not set)
            - name: CLOUD_API_URL
              value: "http://client-673e90cc0797-iotistic-api.client-673e90cc0797.svc.cluster.local:3002"

            # Virtual agent resource requests/limits (optional overrides)
            - name: VIRTUAL_AGENT_CPU_REQUEST
              value: "50m"

            # --- AI / Azure OpenAI ---
            - name: AI_PROVIDER
              value: "openai"
            - name: OPENAI_BASE_URL
              value: "https://iotistic-openai-7307.openai.azure.com"
            - name: OPENAI_MODEL
              value: "gpt-4o-mini"
            - name: AZURE_OPENAI_API_VERSION
              value: "2024-08-01-preview"
            - name: OPENAI_API_KEY
