      serviceAccountName: default
      restartPolicy: OnFailure
      containers:
      - name: sync-fleet-namespaces
        image: postgres:15-alpine
        command:
        - sh
        - -c
        - |
          set -e
          echo "Starting fleet namespace sync..."
          
          # Connect to PostgreSQL and populate fleet_namespaces table
          psql "${DATABASE_URL}" <<'EOF'
          -- Ensure fleet_namespaces table exists (migration should have created it)
          CREATE TABLE IF NOT EXISTS fleet_namespaces (
            name VARCHAR(63) PRIMARY KEY,
            max_agents INTEGER NOT NULL,
            max_devices INTEGER NOT NULL,
            current_agents INTEGER DEFAULT 0,
            current_devices INTEGER DEFAULT 0,
            cpu_quota_request VARCHAR(20),
            memory_quota_request VARCHAR(20),
            cpu_quota_used VARCHAR(20) DEFAULT '0',
            memory_quota_used VARCHAR(20) DEFAULT '0',
            available BOOLEAN DEFAULT true,
            utilization_percent NUMERIC(5,2) DEFAULT 0,
            last_synced TIMESTAMP DEFAULT NOW(),
            created_at TIMESTAMP DEFAULT NOW()
          );
          
          -- Insert or update fleet namespaces from Helm values
          INSERT INTO fleet_namespaces (
            name, 
            max_agents, 
            max_devices, 
            cpu_quota_request, 
            memory_quota_request,
            current_agents,
            available,
            utilization_percent,
            last_synced
          ) VALUES (
            'fleet-test',
            2,
            32,
            '600m',
            '960Mi',
            0,
            true,
            0,
            NOW()
          )
          ON CONFLICT (name) DO UPDATE SET
            max_agents = EXCLUDED.max_agents,
            max_devices = EXCLUDED.max_devices,
            cpu_quota_request = EXCLUDED.cpu_quota_request,
            memory_quota_request = EXCLUDED.memory_quota_request,
            last_synced = NOW();
          INSERT INTO fleet_namespaces (
            name, 
            max_agents, 
            max_devices, 
            cpu_quota_request, 
            memory_quota_request,
            current_agents,
            available,
            utilization_percent,
            last_synced
          ) VALUES (
            'fleet-pool-01',
            2,
            32,
            '600m',
            '960Mi',
            0,
            true,
            0,
            NOW()
          )
          ON CONFLICT (name) DO UPDATE SET
            max_agents = EXCLUDED.max_agents,
            max_devices = EXCLUDED.max_devices,
            cpu_quota_request = EXCLUDED.cpu_quota_request,
            memory_quota_request = EXCLUDED.memory_quota_request,
            last_synced = NOW();
          
          -- Query and display synced namespaces
          SELECT name, max_agents, max_devices, available, utilization_percent 
          FROM fleet_namespaces 
          ORDER BY name;
          
          -- Create sample fleet instances from pre-provisioned namespaces
          -- Each namespace gets a corresponding fleet instance
          -- Uses UPSERT to safely handle concurrent execution when multiple instances share same DB
          INSERT INTO fleets (
            fleet_uuid,
            fleet_id,
            fleet_name,
            customer_id,
            fleet_type,
            description,
            agent_count,
            devices_per_agent,
            k8s_namespace,
            status,
            environment,
            created_at,
            updated_at,
            deployment_config
          ) VALUES (
            gen_random_uuid(),
            'fleet-' || SUBSTR((gen_random_uuid())::text, 1, 8),
            'Fleet Test',
            '00000000-0000-0000-0000-000000000001',
            'virtual',
            'Pre-provisioned fleet in test namespace',
            2,
            16,
            'fleet-test',
            'active',
            'demo',
            NOW(),
            NOW(),
            jsonb_build_object(
              'agent_count', 2,
              'devices_per_agent', 16,
              'total_devices', 32,
              'created_at', NOW()::text
            )
          )
          ON CONFLICT (k8s_namespace) DO UPDATE SET
            fleet_name = EXCLUDED.fleet_name,
            agent_count = EXCLUDED.agent_count,
            devices_per_agent = EXCLUDED.devices_per_agent,
            description = EXCLUDED.description,
            updated_at = NOW(),
            deployment_config = EXCLUDED.deployment_config;
          INSERT INTO fleets (
            fleet_uuid,
            fleet_id,
            fleet_name,
            customer_id,
            fleet_type,
            description,
            agent_count,
            devices_per_agent,
            k8s_namespace,
            status,
            environment,
            created_at,
            updated_at,
            deployment_config
          ) VALUES (
            gen_random_uuid(),
            'fleet-' || SUBSTR((gen_random_uuid())::text, 1, 8),
            'Fleet Pool-01',
            '00000000-0000-0000-0000-000000000001',
            'virtual',
            'Pre-provisioned fleet in pool-01 namespace',
            2,
            16,
            'fleet-pool-01',
            'active',
            'demo',
            NOW(),
            NOW(),
            jsonb_build_object(
              'agent_count', 2,
              'devices_per_agent', 16,
              'total_devices', 32,
              'created_at', NOW()::text
            )
          )
          ON CONFLICT (k8s_namespace) DO UPDATE SET
            fleet_name = EXCLUDED.fleet_name,
            agent_count = EXCLUDED.agent_count,
            devices_per_agent = EXCLUDED.devices_per_agent,
            description = EXCLUDED.description,
            updated_at = NOW(),
            deployment_config = EXCLUDED.deployment_config;
          
          -- Query and display created fleets
          SELECT fleet_name, agent_count, devices_per_agent, k8s_namespace, status
          FROM fleets
          WHERE k8s_namespace LIKE 'fleet-%'
          ORDER BY k8s_namespace;
          
          EOF
          
          echo "Fleet namespace sync and fleet instance creation completed successfully!"
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: sql-credentials-client-673e90cc0797
              key: server
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: sql-credentials-client-673e90cc0797
              key: port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: sql-credentials-client-673e90cc0797
              key: dbname
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: sql-credentials-client-673e90cc0797
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sql-credentials-client-673e90cc0797
              key: password
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: sql-credentials-client-673e90cc0797
              key: password
        - name: DATABASE_URL
          value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
