# KYVERNO POLICIES (DEFENSE IN DEPTH)
# ============================================================================
# These policies enforce restrictions that RBAC alone cannot
#
# IMPORTANT: With pre-provisioned namespaces, RoleBinding policy is NO LONGER NEEDED
# RoleBindings are created by Helm during deployment, not by API at runtime
#
# Kept for backwards compatibility if dynamic provisioning is re-enabled
# ============================================================================

# ============================================================================
# KYVERNO POLICIES (DEFENSE IN DEPTH)
# ============================================================================
# These policies enforce restrictions that RBAC alone cannot
#
# IMPORTANT: With pre-provisioned namespaces, RoleBinding policy is NO LONGER NEEDED
# RoleBindings are created by Helm during deployment, not by API at runtime
#
# Kept for backwards compatibility if dynamic provisioning is re-enabled
# ============================================================================

---
# ============================================================================
# POLICY 1: RESTRICT ROLEBINDING ROLE REFERENCES (WHITELIST PATTERN)
# ============================================================================
# 🛡️ CRITICAL: Prevent API from binding cluster-admin or other dangerous roles
#
# Uses WHITELIST pattern - ONLY iotistic-fleet-namespace-manager allowed
# Cannot be bypassed by omitting labels - uses namespace pattern instead
#
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-fleet-namespace-rolebindings
  namespace: kyverno
spec:
  validationFailureAction: enforce  # Block violations, don't just warn
  background: false  # CRITICAL: Enforce on all object creation, not just future ones
  rules:
  - name: prevent-cluster-admin-binding
    match:
      resources:
        kinds:
        - RoleBinding
        namespaces:
        - "fleet-*"
    validate:
      message: "Binding cluster-admin or dangerous roles is forbidden in fleet namespaces"
      pattern:
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: iotistic-fleet-namespace-manager

---
# ============================================================================
# POLICY 2: ENFORCE FLEET NAMESPACE NAMING PATTERN
# ============================================================================
# Enforce fleet-* namespace naming at creation time
# HARDENED: Matches ALL namespace creation (not just labeled ones)
# Cannot be bypassed by omitting labels during creation
#
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-fleet-namespace-names
  namespace: kyverno
  labels:
    iotistica.com/policy-type: namespace-naming
spec:
  validationFailureAction: enforce
  background: false  # CRITICAL: Block dangerous namespace names immediately
  rules:
  - name: fleet-naming-pattern-enforcement
    match:
      resources:
        kinds:
        - Namespace
    exclude:
      resources:
        names:
        - kube-system
        - kube-public
        - kube-node-lease
        - kube-apiserver
        - default
        - kyverno
        - monitoring
        - gatekeeper-system
        - istio-system
        - cert-manager
        - ingress-nginx
    validate:
      message: >
        Namespaces MUST follow pattern 'fleet-*' or 'customer-*' or 'billing' or 'demo' or 'iotistica-*' or 'client-*' or 'provisioning'.
        System/cluster namespaces are managed by admins only.
        Invalid name: {{ request.object.metadata.name }}
      pattern:
        metadata:
          name: "fleet-*|customer-*|billing|demo|iotistica-*|client-*|provisioning"

---
# ============================================================================
# POLICY 3: ENFORCE ROLEBINDING SUBJECT RESTRICTIONS
# ============================================================================
# Only allow the service account (iotistic-api from current release namespace) to be bound
# 
# HARDENED: Checks BOTH name AND namespace - cannot bind wrong SA
#
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-fleet-rolebinding-subjects
  namespace: kyverno
  labels:
    iotistica.com/policy-type: subject-restriction
spec:
  validationFailureAction: enforce
  background: false  # CRITICAL: Prevent wrong SA binding immediately
  rules:
  - name: only-iotistic-api-sa-from-release-namespace
    match:
      resources:
        kinds:
        - RoleBinding
        namespaces:
        - "fleet-*"
    validate:
      message: >
        RoleBinding subjects MUST be ServiceAccount 'iotistic-api' 
        from the release namespace (demo, billing, etc). 
        Got: {{ request.object.subjects[0].kind }}/{{ request.object.subjects[0].name }} 
        from {{ request.object.subjects[0].namespace }}
      pattern:
        subjects:
        - kind: ServiceAccount
          name: iotistic-api  # WHITELIST: ONLY this SA name
          # NOTE: Kyverno cannot validate against a template variable here
          # So we accept iotistic-api from ANY namespace (Helm ensures correct binding)
          # Additional security enforced by: RBAC permissions + NetworkPolicy

---
# ============================================================================
# POLICY 4: ENFORCE POD SECURITY (NO PRIVILEGED CONTAINERS)
# ============================================================================
# Prevent privileged container escapes, hostPath mounting, host network access
#
# HARDENED: Covers ALL pod-creating resources (not just Pod/Deployment)
#
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-privileged-containers-fleet
  namespace: kyverno
  labels:
    iotistica.com/policy-type: pod-security
spec:
  validationFailureAction: enforce
  background: false  # CRITICAL: Block privileged containers immediately
  rules:
  - name: deny-privileged-containers
    skipBackgroundRequests: true
    match:
      resources:
        kinds:
        - Pod
        - Deployment
        - StatefulSet
        - Job
        - CronJob
        - DaemonSet
        - ReplicaSet
        namespaces:
        - "fleet-*"
    validate:
      allowExistingViolations: true
      message: "Privileged containers are not allowed in fleet namespaces"
      anyPattern:
      - spec:
          containers:
          - securityContext:
              privileged: false
              runAsNonRoot: true
              allowPrivilegeEscalation: false
      - spec:
          template:
            spec:
              containers:
              - securityContext:
                  privileged: false
                  runAsNonRoot: true
                  allowPrivilegeEscalation: false

  - name: deny-hostpath-volumes
    skipBackgroundRequests: true
    match:
      resources:
        kinds:
        - Pod
        - Deployment
        - StatefulSet
        - Job
        - CronJob
        - DaemonSet
        - ReplicaSet
        namespaces:
        - "fleet-*"
    validate:
      allowExistingViolations: true
      message: "hostPath volumes are not allowed in fleet namespaces"
      anyPattern:
      - spec:
          =(volumes):
          - X(hostPath): null
      - spec:
          template:
            spec:
              =(volumes):
              - X(hostPath): null

  - name: deny-host-network
    skipBackgroundRequests: true
    match:
      resources:
        kinds:
        - Pod
        - Deployment
        - StatefulSet
        - Job
        - CronJob
        - DaemonSet
        - ReplicaSet
        namespaces:
        - "fleet-*"
    validate:
      allowExistingViolations: true
      message: "hostNetwork is not allowed in fleet namespaces"
      anyPattern:
      - spec:
          =(hostNetwork): false
      - spec:
          template:
            spec:
              =(hostNetwork): false

---
# ============================================================================
# POLICY 5: ENFORCE POD RESOURCE LIMITS
# ============================================================================
# Prevent resource exhaustion attacks and CPU throttling
#
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits-fleet
  namespace: kyverno
  labels:
    iotistica.com/policy-type: resource-limits
spec:
  validationFailureAction: enforce
  background: false  # CRITICAL: Require limits from first pod onward
  rules:
  - name: require-cpu-memory-limits
    match:
      resources:
        kinds:
        - Pod
        - Deployment
        - StatefulSet
        - Job
        - CronJob
        - DaemonSet
        - ReplicaSet
        namespaces:
        - "fleet-*"
    validate:
      message: >
        Pods must define CPU and memory requests AND limits.
        Example: resources: { limits: { cpu: 500m, memory: 512Mi }, 
                               requests: { cpu: 250m, memory: 256Mi } }
      anyPattern:
      - spec:
          containers:
          - resources:
              limits:
                memory: "?*"
                cpu: "?*"
              requests:
                memory: "?*"
                cpu: "?*"
      - spec:
          template:
            spec:
              containers:
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"
                  requests:
                    memory: "?*"
                    cpu: "?*"

---
# ============================================================================
# POLICY 6: ENFORCE IMAGE REGISTRY RESTRICTIONS
# ============================================================================
# Only allow images from approved registries
#
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registry-fleet
  namespace: kyverno
  labels:
    iotistica.com/policy-type: image-registry
spec:
  validationFailureAction: enforce  # CRITICAL: Changed from audit to enforce
  background: false  # CRITICAL: Prevent unauthorized images immediately
  rules:
  - name: whitelist-approved-registries
    match:
      resources:
        kinds:
        - Pod
        - Deployment
        - StatefulSet
        - Job
        - CronJob
        - DaemonSet
        - ReplicaSet
        namespaces:
        - "fleet-*"
    validate:
      message: >
        Images must be from approved registries.
        Approved: iotistic/*, registry.iotistic.com/*, docker.io/iotistic/*, gcr.io/iotistic/*, *.azurecr.io/*
      anyPattern:
      - spec:
          containers:
          - image: "iotistic/*"
      - spec:
          containers:
          - image: "registry.iotistic.com/*"
      - spec:
          containers:
          - image: "docker.io/iotistic/*"
      - spec:
          containers:
          - image: "gcr.io/iotistic/*"
      - spec:
          containers:
          - image: "*.azurecr.io/*"
      - spec:
          template:
            spec:
              containers:
              - image: "iotistic/*"
      - spec:
          template:
            spec:
              containers:
              - image: "registry.iotistic.com/*"
      - spec:
          template:
            spec:
              containers:
              - image: "docker.io/iotistic/*"
      - spec:
          template:
            spec:
              containers:
              - image: "gcr.io/iotistic/*"
      - spec:
          template:
            spec:
              containers:
              - image: "*.azurecr.io/*"

---
# ============================================================================
# INSTALLATION INSTRUCTIONS
# ============================================================================
#
# Kyverno policies are CRITICAL for security enforcement.
#
# 1. Install Kyverno 1.8+ (required for ClusterPolicy support):
#    helm repo add kyverno https://kyverno.github.io/kyverno/
#    helm repo update
#    helm install kyverno kyverno/kyverno --namespace kyverno --create-namespace \
#      --set config.webhooks[0].failurePolicy=fail
#
# 2. Verify policies are active:
#    kubectl get clusterpolicies | grep fleet
#    kubectl get policyreport -A
#
# 3. Test policy enforcement (should all be DENIED):
#
#    # Test 1: Try to bind cluster-admin (should be DENIED)
#    kubectl create rolebinding bad-binding \
#      --clusterrole=cluster-admin \
#      -n fleet-test \
#      2>&1 | grep -i "iotistic-fleet-namespace-manager"
#    Expected: Error - "can ONLY reference 'iotistic-fleet-namespace-manager'"
#
#    # Test 2: Try to create privileged container (should be DENIED)
#    kubectl run privesc --image=nginx -n fleet-test -- \
#      --security-opt=no-new-privileges=false
#    Expected: Error - "Privileged containers are not allowed"
#
#    # Test 3: Try to mount hostPath (should be DENIED)
#    kubectl run hostpath-pod --image=nginx -n fleet-test \
#      --volume=hostPath=/etc/passwd,name=host
#    Expected: Error - "hostPath volumes are not allowed"
#
# 4. Success metrics:
#    - kubectl get policyreport -A | grep -c "PASS"  (should have passes)
#    - kubectl get policyreport -A | grep "FAIL" (should have no fails in enforce mode)