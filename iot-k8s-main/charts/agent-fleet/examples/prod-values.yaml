# Example: Production Environment (100 agents)
fleet:
  name: agent-fleet-prod
  replicaCount: 100
  cloudApiEndpoint: https://api.iotistic.com
  fleetId: prod-fleet-001

agent:
  image:
    repository: iotistica/agent
    tag: "v1.2.3"  # Pin version for prod
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"  # Higher for production
  env:
    # Custom intervals for production load
    - name: DISCOVERY_INTERVAL_LIGHT_MS
      value: "300000"  # 5 minutes
    - name: POLL_INTERVAL_MS
      value: "30000"   # 30 seconds
    - name: REPORT_INTERVAL_MS
      value: "60000"   # 1 minute

simulator:
  image:
    repository: iotistica/modbus-simulator
    tag: "v1.0.0"  # Pin version
  vendor: "generic"
  slaves: 5

provisioning:
  existingSecret: "agent-provisioning-keys-prod"  # Pre-generated

persistence:
  enabled: true
  storageClass: "fast-ssd"  # Use SSD for production
  size: "2Gi"               # More space for production data

monitoring:
  serviceMonitor:
    enabled: true
    interval: "30s"
    additionalLabels:
      release: prometheus

podDisruptionBudget:
  enabled: true
  minAvailable: "80%"  # Ensure 80 agents always running

# Node affinity for dedicated nodes
nodeSelector:
  workload-type: agent-fleet

# Tolerations for dedicated nodes
tolerations:
  - key: "agent-fleet"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

# Anti-affinity to spread across nodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: agent-fleet
          topologyKey: kubernetes.io/hostname

# Deploy with:
# helm install agent-fleet-prod ./k8s/charts/agent-fleet -f examples/prod-values.yaml -n agent-fleet-prod
