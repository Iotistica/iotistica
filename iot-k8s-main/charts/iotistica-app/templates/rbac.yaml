{{- if .Values.api.enabled }}
---
# RBAC Configuration for Virtual Fleet/Agent Deployment
# This grants the API service account permissions to:
# - Create/manage namespaces for virtual fleets
# - Create/manage deployments for virtual agents
# - Create/manage resource quotas for namespace limits
# - Create/manage secrets (provisioning keys)
# - Read pod status for deployment monitoring

# ServiceAccount for API pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iotistic-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    iotistica.com/rbac-role: virtual-agent-manager

---
# ClusterRole with permissions needed for virtual fleet/agent management
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "iotistic.fullname" . }}-virtual-agent-manager
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    iotistica.com/rbac-role: virtual-agent-manager
rules:
  # Namespace management (create fleet namespaces)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]

  # Resource quotas (set CPU/memory limits per fleet)
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["get", "list", "create", "update", "delete"]

  # Secret management (provisioning keys, credentials)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "delete"]

  # Persistent volume claims (virtual agent data storage)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "delete"]

  # Deployment management (virtual agents)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "delete", "patch"]

  # StatefulSet management (for stateful virtual agents)
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "create", "update", "delete", "patch"]

  # Pod monitoring (fleet/agent status checks)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Pod logs (debugging)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

  # Service management (agent network exposure)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "delete"]

  # HTTPRoute reading (auto-discover Cloud API URL)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding to grant API service account the permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "iotistic.fullname" . }}-virtual-agent-manager
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    iotistica.com/rbac-role: virtual-agent-manager
subjects:
  - kind: ServiceAccount
    name: iotistic-api
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "iotistic.fullname" . }}-virtual-agent-manager
  apiGroup: rbac.authorization.k8s.io
{{- end }}
