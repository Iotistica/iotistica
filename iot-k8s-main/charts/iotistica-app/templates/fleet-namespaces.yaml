{{- if and .Values.fleetNamespaces .Values.fleetNamespaces.enabled }}
{{- range .Values.fleetNamespaces.namespaces }}
---
# Fleet Namespace: {{ .name }}
# Capacity: {{ .maxAgents }} agents, {{ .maxDevices }} devices
apiVersion: v1
kind: Namespace
metadata:
  name: fleet-{{ .name }}
  labels:
    app.kubernetes.io/managed-by: iotistica
    app.kubernetes.io/part-of: {{ include "iotistic.fullname" $ }}
    iotistica.com/fleet-namespace: "true"
    iotistica.com/customer-id: {{ $.Release.Namespace | quote }}
    iotistica.com/max-agents: {{ .maxAgents | quote }}
    iotistica.com/max-devices: {{ .maxDevices | quote }}
    iotistica.com/fleet-type: {{ .fleetType | default "virtual" | quote }}
  annotations:
    description: "Pre-provisioned fleet namespace for {{ .maxAgents }} virtual agents"
    created-by: "helm-chart"
    quota-policy: {{ .quotaPolicy | default "strict" | quote }}

---
# ResourceQuota: Enforce limits to prevent resource exhaustion
apiVersion: v1
kind: ResourceQuota
metadata:
  name: fleet-{{ .name }}-quota
  namespace: fleet-{{ .name }}
  labels:
    app.kubernetes.io/managed-by: iotistica
    iotistica.com/fleet-namespace: "true"
spec:
  hard:
    # Pod limits (1 pod per agent)
    pods: {{ .maxAgents | quote }}
    
    # PVC limits (1 per agent for data persistence)
    persistentvolumeclaims: {{ .maxAgents | quote }}
    
    # CPU limits
    # Per-agent-pod with 4 protocol sidecars (OPC-UA, Modbus TCP, Modbus RTU, SNMP):
    # - Agent: 100m CPU, 256Mi memory (actual usage ~100m)
    # - OPC-UA: 50m CPU, 128Mi memory
    # - Modbus TCP: 50m CPU, 32Mi memory
    # - Modbus RTU: 50m CPU, 32Mi memory
    # - SNMP: 50m CPU, 32Mi memory
    # - Total: 300m CPU, 480Mi memory per pod
    # Formula: If not explicitly set, defaults to 300m * maxAgents
    requests.cpu: {{ .cpuRequest | default (printf "%dm" (mul 300 .maxAgents | int)) | quote }}
    limits.cpu: {{ .cpuLimit | default "2000m" | quote }}
    
    # Memory limits
    # Formula: Allocate 4Gi for 2 agents with multiple sidecars each
    requests.memory: {{ .memoryRequest | default (printf "%dMi" (mul 480 .maxAgents | int)) | quote }}
    limits.memory: {{ .memoryLimit | default "4096Mi" | quote }}
    
    # Secret limits (provisioning keys, TLS certs, API tokens, etc.)
    # Formula: 5 secrets per agent (provisioning key, TLS cert, auth token, etc.)
    secrets: {{ mul .maxAgents 5 | quote }}
    
    # Service limits (optional per-agent services)
    services: {{ .maxAgents | quote }}
    
    # ConfigMap limits (agent configurations)
    configmaps: {{ mul .maxAgents 2 | quote }}

---
# RoleBinding: Grant API service account fleet management permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: iotistica-api-fleet-manager
  namespace: fleet-{{ .name }}
  labels:
    app.kubernetes.io/managed-by: iotistica
    iotistica.com/fleet-namespace: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: iotistic-fleet-namespace-manager  # Static name (matches Kyverno policy)
subjects:
  - kind: ServiceAccount
    name: iotistic-api
    namespace: {{ $.Release.Namespace }}  # Use the release namespace (e.g., demo, billing, customer-specific)

---
# LimitRange: Enforce default resource requests/limits (prevents pods without resources)
apiVersion: v1
kind: LimitRange
metadata:
  name: fleet-{{ .name }}-limits
  namespace: fleet-{{ .name }}
  labels:
    app.kubernetes.io/managed-by: iotistica
    iotistica.com/fleet-namespace: "true"
spec:
  limits:
    # Container defaults (if not specified)
    # These apply to BOTH agent and sidecar containers
    - type: Container
      default:
        cpu: 100m             # Default for agent container (actual usage ~100m)
        memory: 256Mi
      defaultRequest:
        cpu: 50m              # Conservative default (good for sidecars)
        memory: 64Mi
      max:
        cpu: 1000m            # Max per container (allow agent burst)
        memory: 1Gi
      min:
        cpu: 25m              # Min for lightweight sidecars
        memory: 32Mi
    
    # Pod aggregate limits (agent + all sidecars)
    # With 4 sidecars: 100m + (4 * 50m) = 300m base, allow burst to 800m
    - type: Pod
      max:
        cpu: 800m
        memory: 2Gi

---
# NetworkPolicy: Restrict fleet namespace traffic (optional, can be disabled)
{{- if .networkPolicy.enabled | default true }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fleet-{{ .name }}-network-policy
  namespace: fleet-{{ .name }}
  labels:
    app.kubernetes.io/managed-by: iotistica
    iotistica.com/fleet-namespace: "true"
spec:
  podSelector: {}  # Apply to all pods in namespace
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from API namespace (management traffic)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace }}
  egress:
    # Allow to API namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace }}
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Allow external MQTT broker (cloud)
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 1883
        - protocol: TCP
          port: 8883
    # Allow HTTP/HTTPS (for OPC-UA discovery, modbus, etc)
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 4840  # OPC-UA
        - protocol: TCP
          port: 502   # Modbus
{{- end }}

{{- end }}
{{- end }}
