{{- if and .Values.api .Values.api.enabled }}
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: admin-initial-password-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
spec:
  itemPath: "vaults/IOT-CLIENTS/items/admin-initial-password-{{ .Release.Name }}"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "iotistic.fullname" . }}-bootstrap-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
spec:
  ttlSecondsAfterFinished: 86400  # Clean up job after 24 hours
  backoffLimit: 5                  # Max 5 retry attempts
  template:
    metadata:
      labels:
        {{- include "iotistic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap
    spec:
      serviceAccountName: {{ include "iotistic.fullname" . }}
      restartPolicy: OnFailure
      containers:
      - name: bootstrap
        image: curlimages/curl:latest
        imagePullPolicy: IfNotPresent
        env:
        # Bootstrap token (global, shared across all deployments)
        - name: BOOTSTRAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: api-bootstrap-token-master
              key: INITIAL_ADMIN_BOOTSTRAP_TOKEN
        # Initial admin password (per-deployment, generated by provisioning)
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: admin-initial-password-{{ .Release.Name }}
              key: password
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          # Configuration
          BOOTSTRAP_TOKEN="${BOOTSTRAP_TOKEN}"
          ADMIN_PASSWORD="${ADMIN_PASSWORD}"
          API_URL="http://{{ include "iotistic.fullname" . }}-api.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.api.port }}"
          MAX_RETRIES=30
          RETRY_DELAY=10
          
          if [ -z "$BOOTSTRAP_TOKEN" ]; then
            echo "ERROR: BOOTSTRAP_TOKEN not set"
            exit 1
          fi
          
          if [ -z "$ADMIN_PASSWORD" ]; then
            echo "ERROR: ADMIN_PASSWORD not set"
            exit 1
          fi
          
          echo "=========================================="
          echo "🔐 ADMIN BOOTSTRAP JOB"
          echo "=========================================="
          echo "API URL: $API_URL"
          echo "Max retries: $MAX_RETRIES"
          echo "Retry delay: ${RETRY_DELAY}s"
          echo ""
          
          # Step 1: Wait for API to become ready
          echo "⏳ Step 1/3: Waiting for API pod to become ready..."
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "  Attempt $ATTEMPT/$MAX_RETRIES..."
            
            if curl -f --connect-timeout 5 --max-time 10 \
              "$API_URL/api/v1/health" > /dev/null 2>&1; then
              echo "  ✅ API is ready!"
              break
            fi
            
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "  ⏳ API not ready yet, waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done
          
          if [ $ATTEMPT -ge $MAX_RETRIES ]; then
            echo "❌ API failed to become ready after $MAX_RETRIES attempts"
            exit 1
          fi
          
          # Step 2: Bootstrap the initial admin password
          echo ""
          echo "⏳ Step 2/3: Bootstrapping initial admin password..."

          # Single request: capture response body + status code
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-bootstrap-token: $BOOTSTRAP_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"password\":\"$ADMIN_PASSWORD\"}" \
            "$API_URL/api/v1/auth/bootstrap-admin")

          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n1)
          RESPONSE=$(echo "$HTTP_RESPONSE" | sed '$d')
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "  ✅ Admin bootstrap successful!"
            echo "  Response: $RESPONSE"
          else
            echo "  ❌ Bootstrap failed with HTTP $HTTP_STATUS"
            echo "  Response: $RESPONSE"
            
            # Provide helpful error messages
            case $HTTP_STATUS in
              401)
                echo "  ERROR: Invalid bootstrap token"
                echo "  Check: x-bootstrap-token header doesn't match API env var"
                ;;
              503)
                echo "  ERROR: Bootstrap token not configured in API"
                echo "  Check: INITIAL_ADMIN_BOOTSTRAP_TOKEN env var in API pod"
                ;;
              400)
                echo "  ERROR: Bad request (password validation failed)"
                echo "  Check: Password requirements (≥12 chars)"
                ;;
            esac
            
            exit 1
          fi
          
          # Step 3: Success
          echo ""
          echo "=========================================="
          echo "✅ BOOTSTRAP COMPLETE"
          echo "=========================================="
          echo "Customer admin user is now configured!"
          echo ""
          echo "Next steps:"
          echo "1. Email initial password to customer"
          echo "2. Customer logs in and is prompted to change password"
          echo "3. After password change, full dashboard access"
          echo ""
        
        # Resource limits
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      
      # Only run the job if API is enabled
      {{- if .Values.api.enabled }}
      # No additional init containers needed - job will wait for API
      {{- end }}
{{- end }}
