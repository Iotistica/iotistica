{{- if and .Values.api .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iotistic.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.serviceType }}
  ports:
    - port: {{ .Values.api.port }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "iotistic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: sql-credentials-{{ .Release.Namespace }}
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/iotistica/items/sql-credentials-{{ .Release.Namespace }}"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: mqtt-credentials-{{ .Release.Namespace }}
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/iotistica/items/mqtt-credentials-{{ .Release.Namespace }}"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: redis-credentials-master
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/iotistica/items/redis-credentials-master"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: openai-credentials-master
  namespace: {{ .Release.Namespace }}
spec:
  # This item must contain a field/key named OPENAI_API_KEY
  itemPath: "vaults/iotistica/items/openai-credentials-master"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: api-jwt-{{ .Release.Namespace }}
  namespace: {{ .Release.Namespace }}
spec:
  # This item must contain a field/key named API_JWT
  itemPath: "vaults/iotistica/items/api-jwt-{{ .Release.Namespace }}"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: api-license-credentials-{{ .Release.Namespace }}
  namespace: {{ .Release.Namespace }}
spec:
  # This item must contain a field/key named API_JWT
  itemPath: "vaults/iotistica/items/api-license-credentials-{{ .Release.Namespace }}"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: api-license-public-key-master
  namespace: {{ .Release.Namespace }}
spec:
  # This item must contain a field/key named OPENAI_API_KEY
  itemPath: "vaults/iotistica/items/api-license-public-key-master"
---
# --- Admin Password Bootstrap ---
# Bootstrap token for provisioning automation to authorize initial admin account creation
# Used by provisioning service to securely initialize the first admin account
# Flow: Provisioning service generates 32-byte reset token -> hashes with bcrypt -> 
# stores in database -> queues password reset email link -> customer follows link to set password
# Token pulled from 1Password via OnePasswordItem CRD (api-bootstrap-token-master)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: api-bootstrap-token-master
  namespace: {{ .Release.Namespace }}
spec:
  # Global bootstrap token for provisioning automation
  itemPath: "vaults/iotistica/items/api-bootstrap-token-master"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: internal-auth-token-master
  namespace: {{ .Release.Namespace }}
spec:
  # Shared service-to-service auth token for internal API calls
  itemPath: "vaults/iotistica/items/internal-auth-token-master"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iotistic.fullname" . }}-api
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "iotistic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "iotistic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: iotistic-api # Use service account with RBAC permissions
      terminationGracePeriodSeconds: 60  # Allow 60s for graceful shutdown
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            runAsUser: 1000  # Numeric UID required for runAsNonRoot verification
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            privileged: false
          ports:
            - name: api
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          {{- $apiEnv := .Values.api.env | default dict }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]  # Wait 15s for connections to drain
          env:
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: NODE_ENV
              value: {{ index $apiEnv "NODE_ENV" | default "production" | quote }}
            
            # Namespace for discovering HTTPRoute (used to auto-discover CLOUD_API_URL)
            - name: NAMESPACE
              value: {{ .Release.Namespace | quote }}
            
            # Cloud API URL for virtual agents to connect to (optional, auto-discovered from HTTPRoute if not set)
            {{- if .Values.api.cloudApiUrl }}
            - name: CLOUD_API_URL
              value: {{ .Values.api.cloudApiUrl | quote }}
            {{- end }}

            # Virtual agent resource requests/limits (optional overrides)
            {{- if .Values.api.env.VIRTUAL_AGENT_CPU_REQUEST }}
            - name: VIRTUAL_AGENT_CPU_REQUEST
              value: {{ .Values.api.env.VIRTUAL_AGENT_CPU_REQUEST | quote }}
            {{- end }}
            {{- if .Values.api.env.VIRTUAL_AGENT_MEMORY_REQUEST }}
            - name: VIRTUAL_AGENT_MEMORY_REQUEST
              value: {{ .Values.api.env.VIRTUAL_AGENT_MEMORY_REQUEST | quote }}
            {{- end }}
            {{- if .Values.api.env.VIRTUAL_AGENT_CPU_LIMIT }}
            - name: VIRTUAL_AGENT_CPU_LIMIT
              value: {{ .Values.api.env.VIRTUAL_AGENT_CPU_LIMIT | quote }}
            {{- end }}
            {{- if .Values.api.env.VIRTUAL_AGENT_MEMORY_LIMIT }}
            - name: VIRTUAL_AGENT_MEMORY_LIMIT
              value: {{ .Values.api.env.VIRTUAL_AGENT_MEMORY_LIMIT | quote }}
            {{- end }}

            # --- AI / Azure OpenAI ---
            - name: AI_PROVIDER
              value: {{ .Values.api.env.AI_PROVIDER | quote }}
            - name: OPENAI_BASE_URL
              value: {{ .Values.api.env.OPENAI_BASE_URL | quote }}
            - name: OPENAI_MODEL
              value: {{ .Values.api.env.OPENAI_MODEL | quote }}
            - name: AZURE_OPENAI_API_VERSION
              value: {{ .Values.api.env.AZURE_OPENAI_API_VERSION | quote }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.openai.SecretName }}
                  key: key
                  
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.jwt.SecretName }}
                  key: token
            
            {{- if .Values.api.env.JWT_ACCESS_TOKEN_EXPIRY }}
            - name: JWT_ACCESS_TOKEN_EXPIRY
              value: {{ .Values.api.env.JWT_ACCESS_TOKEN_EXPIRY }}
            {{- end }}
            {{- if .Values.api.env.JWT_REFRESH_TOKEN_EXPIRY }}
            - name: JWT_REFRESH_TOKEN_EXPIRY
              value: {{ .Values.api.env.JWT_REFRESH_TOKEN_EXPIRY}}
            {{- end }}

            # license key 
            - name: IOTISTIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.license.SecretName }}
                  key: key
                  
            # public key
            - name: LICENSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.publicKey.SecretName }}
                  key: key
                  
            # admin password bootstrap master token
            - name: INITIAL_ADMIN_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-bootstrap-token-master
                  key: token

            - name: PROVISIONING_API_URL
              value: {{ index $apiEnv "PROVISIONING_API_URL" | default "http://provisioning-api.provisioning.svc.cluster.local:3100" | quote }}

            - name: INTERNAL_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: internal-auth-token-master
                  key: token
                  
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.sql.SecretName }}
                  key: server
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.sql.SecretName }}
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.sql.SecretName }}
                  key: dbname
            # Read SQL credentials from existing Kubernetes Secret
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.sql.SecretName }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.sql.SecretName }}
                  key: password
            - name: DB_POOL_SIZE
              value: {{ .Values.api.env.DB_POOL_SIZE | quote }}
            - name: DB_SSL
              value: {{ .Values.api.env.DB_SSL | quote }}
            - name: DB_SSL_REJECT_UNAUTHORIZED
              value: {{ .Values.api.env.DB_SSL_REJECT_UNAUTHORIZED | quote }}
            # MQTT Broker Configuration (supports local Mosquitto or cloud HiveMQ)
            # Read MQTT credentials from existing Kubernetes Secret
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.mqtt.SecretName }}
                  key: username
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.mqtt.SecretName }}
                  key: password
            - name: MQTT_BROKER_URL
              value: "{{ include "mqtt.brokerUrl" . }}"
            - name: MQTT_BROKER_HOST
              value: {{ .Values.mqttBroker.host | quote }}
            - name: MQTT_BROKER_PORT
              value: {{ .Values.mqttBroker.port | quote }}
            - name: MQTT_BROKER_PROTOCOL
              value: {{ .Values.mqttBroker.protocol | quote }}
            - name: MQTT_BROKER_USE_TLS
              value: {{ .Values.mqttBroker.useTls | quote }}
            - name: MQTT_BROKER_VERIFY_CERT
              value: {{ .Values.mqttBroker.verifyCertificate | quote }}
            - name: MQTT_PERSIST_TO_DB
              value: {{ .Values.api.env.MQTT_PERSIST_TO_DB | quote }}
            - name: MQTT_DB_SYNC_INTERVAL
              value: {{ .Values.api.env.MQTT_DB_SYNC_INTERVAL | quote }}
            - name: MQTT_MONITOR_ENABLED
              value: {{ .Values.api.env.MQTT_MONITOR_ENABLED | quote }}
            {{- if .Values.mqttMonitor.enabled }}
            - name: MQTT_MONITOR_URL
              value: "http://{{ include "iotistic.fullname" . }}-mqtt-monitor:{{ .Values.mqttMonitor.port }}"
            {{- end }}
            - name: LOG_COMPRESSION
              value: {{ .Values.api.env.LOG_COMPRESSION | quote }}
            - name: VPN_ENABLED
              value: {{ .Values.api.env.VPN_ENABLED | quote }}
            - name: FORCE_COLOR
              value: {{ .Values.api.env.FORCE_COLOR | quote }}
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.redis.SecretName | quote }}
                  key: host
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.redis.SecretName | quote }}
                  key: port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.redis.SecretName | quote }}
                  key: password
            - name: REDIS_PORT_EXT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.redis.SecretName | quote }}
                  key: port_ext
            - name: REDIS_TLS
              value: {{ .Values.redis.tls | quote }}
            - name: REDIS_CLUSTER
              value: {{ .Values.redis.cluster | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.api.corsOrigins | default "http://localhost:3001,http://localhost:3000,https://*.iotistica.com" | quote }}
            {{- if .Values.api.license.publicKey }}
            - name: LICENSE_PUBLIC_KEY
              value: {{ .Values.api.license.publicKey | quote }}
            {{- end }}
            {{- if .Values.api.license.key }}
            - name: IOTISTIC_LICENSE_KEY
              value: {{ .Values.api.license.key | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
{{- if .Values.api.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "iotistic.fullname" . }}-api
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "iotistic.fullname" . }}-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
  {{- if .Values.api.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }}
  {{- end }}
  {{- if .Values.api.autoscaling.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.api.autoscaling.targetMemoryUtilizationPercentage }}
  {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60   # Scale up faster (1 minute)
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max  # Use whichever policy allows faster scaling
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "iotistic.fullname" . }}-api-httproute
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: iotistica-gateway
      namespace: envoy-gateway-system
  hostnames:
    - {{ .Values.api.tlsCommonName }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "iotistic.fullname" . }}-api
          port: 3002
          weight: 1
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ include "iotistic.fullname" . }}-api-rate-limit
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "iotistic.fullname" . }}-api-httproute
  rateLimit:
    type: Local
    local:
      rules:
      - limit:
          requests: 1000
          unit: Minute

{{- end }}
