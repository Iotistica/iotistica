{{- if and .Values.dashboard .Values.dashboard.enabled }}
---
# Dashboard Runtime Configuration ConfigMap
# 
# This ConfigMap provides runtime configuration for the React/Vite dashboard.
# It replaces the config.js file in the built assets, allowing the same
# Docker image to be deployed to multiple clients with different API URLs.
#
# How it works:
# 1. Dashboard build creates a placeholder config.js in /usr/share/nginx/html/
# 2. This ConfigMap mounts over it with client-specific values
# 3. index.html loads config.js before the React app starts
# 4. Dashboard code reads from window.env (runtime) with fallback to import.meta.env (build-time)
#
# Benefits:
# - Build once, deploy anywhere (same image for all clients)
# - No rebuild needed to change API URL
# - Follows Kubernetes best practices
# - Easy to update config without redeploying pods
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iotistic.fullname" . }}-dashboard-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
data:
  config.js: |
    // Runtime configuration injected by Kubernetes ConfigMap
    // All VITE_ variables are read by the dashboard at runtime
    window.env = {
      // API Configuration
      VITE_API_URL: '{{ .Values.dashboard.apiUrl }}',
      
      // Auth0 Configuration (set per-customer)
      {{- if and .Values.dashboard.auth0 .Values.dashboard.auth0.domain }}
      VITE_AUTH0_DOMAIN: '{{ .Values.dashboard.auth0.domain }}',
      VITE_AUTH0_CLIENT_ID: '{{ .Values.dashboard.auth0.clientId }}',
      VITE_AUTH0_AUDIENCE: '{{ .Values.dashboard.auth0.audience }}',
      VITE_AUTH0_CALLBACK_URL: '{{ .Values.dashboard.auth0.callbackUrl }}',
      VITE_AUTH0_SHOW_SOCIAL_LOGIN: '{{ .Values.dashboard.auth0.showSocialLogin | default "false" }}',
      {{- end }}
      
      // Provisioning API (billing service for Auth0 token exchange)
      {{- if .Values.dashboard.provisioningApiUrl }}
      VITE_PROVISIONING_API_URL: '{{ .Values.dashboard.provisioningApiUrl }}',
      {{- end }}
      
      // Website URL (for signup completion)
      {{- if .Values.dashboard.websiteUrl }}
      VITE_WEBSITE_URL: '{{ .Values.dashboard.websiteUrl }}',
      {{- end }}
      
      // App Metadata
      NODE_ENV: '{{ .Values.dashboard.env.NODE_ENV }}',
      APP_VERSION: '{{ .Values.dashboard.env.APP_VERSION | default .Values.dashboard.image.tag }}'
    };
{{- end }}
