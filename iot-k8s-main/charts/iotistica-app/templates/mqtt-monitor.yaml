{{- if and .Values.mqttMonitor .Values.mqttMonitor.enabled }}
{{- $mqttMonitorEnv := .Values.mqttMonitor.env | default dict }}
{{- $mqttMonitorSql := .Values.mqttMonitor.sql | default dict }}
{{- $mqttMonitorMqtt := .Values.mqttMonitor.mqtt | default dict }}
{{- $apiValues := .Values.api | default dict }}
{{- $apiSql := $apiValues.sql | default dict }}
{{- $apiMqtt := $apiValues.mqtt | default dict }}
{{- $sqlSecretName := $mqttMonitorSql.SecretName | default $apiSql.SecretName }}
{{- $mqttSecretName := $mqttMonitorMqtt.SecretName | default $mqttMonitorMqtt.existingSecret | default $apiMqtt.SecretName }}
{{- if eq (toString .Values.mqttMonitor.image.tag) "latest" }}
{{- fail "mqttMonitor.image.tag cannot be 'latest'. Please pin a version." }}
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iotistic.fullname" . }}-mqtt-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: mqtt-monitor
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.mqttMonitor.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "iotistic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mqtt-monitor
---
{{- if and (not .Values.api.enabled) .Values.mqttMonitor.createOnePasswordItems }}
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ $sqlSecretName }}
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/iotistica/items/{{ $sqlSecretName }}"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ $mqttSecretName }}
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/iotistica/items/{{ $mqttSecretName }}"
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iotistic.fullname" . }}-mqtt-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: mqtt-monitor
spec:
  replicas: {{ .Values.mqttMonitor.replicas }}
  selector:
    matchLabels:
      {{- include "iotistic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mqtt-monitor
  template:
    metadata:
      labels:
        {{- include "iotistic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mqtt-monitor
    spec:
      containers:
        - name: mqtt-monitor
          image: "{{ .Values.mqttMonitor.image.repository }}:{{ .Values.mqttMonitor.image.tag }}"
          imagePullPolicy: {{ .Values.mqttMonitor.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mqttMonitor.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.mqttMonitor.port | quote }}
            - name: HOST
              value: {{ index $mqttMonitorEnv "HOST" | default "0.0.0.0" | quote }}
            - name: NODE_ENV
              value: {{ index $mqttMonitorEnv "NODE_ENV" | default "production" | quote }}
            - name: LOG_LEVEL
              value: {{ index $mqttMonitorEnv "LOG_LEVEL" | default "info" | quote }}
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ $sqlSecretName }}
                  key: server
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ $sqlSecretName }}
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ $sqlSecretName }}
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $sqlSecretName }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $sqlSecretName }}
                  key: password
            - name: DB_POOL_SIZE
              value: {{ index $mqttMonitorEnv "DB_POOL_SIZE" | default "10" | quote }}
            - name: DB_SSL
              value: {{ index $mqttMonitorEnv "DB_SSL" | default "true" | quote }}
            - name: MQTT_BROKER_URL
              value: "{{ include "mqtt.brokerUrl" . }}"
            - name: MQTT_TLS_REJECT_UNAUTHORIZED
              value: {{ index $mqttMonitorEnv "MQTT_TLS_REJECT_UNAUTHORIZED" | default "false" | quote }}
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $mqttSecretName }}
                  key: username
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $mqttSecretName }}
                  key: password
            - name: MQTT_PERSIST_DB
              value: {{ index $mqttMonitorEnv "MQTT_PERSIST_DB" | default "true" | quote }}
            - name: MQTT_DB_SYNC_INTERVAL
              value: {{ index $mqttMonitorEnv "MQTT_DB_SYNC_INTERVAL" | default "30000" | quote }}
            - name: MQTT_METRICS_UPDATE_INTERVAL
              value: {{ index $mqttMonitorEnv "MQTT_METRICS_UPDATE_INTERVAL" | default "5000" | quote }}
            - name: MQTT_TOPIC_TREE_UPDATE_INTERVAL
              value: {{ index $mqttMonitorEnv "MQTT_TOPIC_TREE_UPDATE_INTERVAL" | default "5000" | quote }}
            - name: MQTT_MAX_PAYLOAD_BYTES
              value: {{ index $mqttMonitorEnv "MQTT_MAX_PAYLOAD_BYTES" | default "65536" | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.mqttMonitor.resources | nindent 12 }}
{{- end }}