# Client Values Template
# This file shows the structure of auto-generated client values files
# Billing service populates these fields when provisioning new clients

# IMPORTANT: For POC, secrets are in plain YAML
# Production should use ExternalSecrets/SealedSecrets/Vault

global:
  namespace: client-XXXXXXXX  # Auto-generated: client-<8-char-id>

# License Configuration (Generated by Billing Service)
license:
  # JWT token containing plan, features, expiration
  # Generated by LicenseGenerator with RS256 signature
  licenseKey: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
  
  # RSA public key for JWT verification (matches billing private key)
  # Must include newlines and PEM formatting
  publicKey: |
    -----BEGIN PUBLIC KEY-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...
    -----END PUBLIC KEY-----

# Customer Information
customer:
  id: "cust_dc5fec42901a7b3e"  # Original Stripe customer ID
  email: "customer@example.com"
  companyName: "Example Corp"
  plan: "professional"  # starter | professional | enterprise

# Redis cache
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  port: 6379
  maxMemory: 512mb
  maxMemoryPolicy: allkeys-lru
  persistence:
    enabled: true
  storage:
    size: 5Gi
    # storageClass: "default"  # Platform-specific
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Mosquitto MQTT broker
mosquitto:
  enabled: true
  image:
    repository: iegomez/mosquitto-go-auth
    tag: "3.0.0-mosquitto_2.0.18"
  serviceType: ClusterIP
  ports:
    mqtt: 1883
    mqtts: 8883
    websocket: 9001
  # TLS configuration (if cert-manager available)
  # tlsSecret: mosquitto-tls
  # tlsCertName: mosquitto-tls
  # tlsIssuer: letsencrypt-production
  # tlsCommonName: mqtt-XXXXXXXX.iotistica.com
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  auth:
    allowAnonymous: false
    hasher: bcrypt
    hasherCost: 10
  persistence:
    enabled: true

# MQTT Broker Configuration
mqttBroker:
  protocol: mqtt
  # Internal service name (within cluster)
  host: "client-XXXXXXXX-release-iotistic-mosquitto.client-XXXXXXXX.svc.cluster.local"
  port: 1883
  useTls: false
  # External host (for devices outside cluster)
  # externalHost: "mqtt-XXXXXXXX.iotistica.com"
  # externalPort: 1883

# API service
api:
  enabled: true
  image:
    repository: iotistic/api
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 3002
  serviceType: ClusterIP
  # tlsCommonName: api-XXXXXXXX.iotistica.com
  corsOrigins: "https://XXXXXXXX.iotistica.com,http://localhost:3000"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Dashboard (React UI)
dashboard:
  enabled: true
  image:
    repository: iotistic/dashboard
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 3000
  serviceType: ClusterIP
  tlsCommonName: "client-XXXXXXXX.iotistica.com"  # Replace with actual domain
  # API URL for browser access - client-specific
  apiUrl: "https://api-XXXXXXXX.iotistica.com"  # Replace with actual API URL
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  env:
    NODE_ENV: production

# PostgreSQL database
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  port: 5432
  # POC: Plain text credentials (replace with secrets in production)
  database: iotistic
  username: postgres
  password: "RANDOM_PASSWORD_HERE"  # Generate secure password
  persistence:
    enabled: true
    size: 10Gi
    # storageClass: "default"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Ingress configuration
ingress:
  enabled: true
  className: nginx  # or traefik, depending on cluster
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # Hosts configuration
  hosts:
    - host: "XXXXXXXX.iotistica.com"
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
          port: 3000
        - path: /api
          pathType: Prefix
          service: api
          port: 3002
  tls:
    - secretName: client-XXXXXXXX-tls
      hosts:
        - "XXXXXXXX.iotistica.com"

# Monitoring configuration (plan-based)
monitoring:
  enabled: true
  # Shared Prometheus (Starter/Professional) or Dedicated (Enterprise)
  dedicated: false  # Set to true for Enterprise plan
  
  # ServiceMonitor for Prometheus scraping
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  
  # For dedicated monitoring (Enterprise only):
  # prometheus:
  #   enabled: true
  #   retention: 30d
  #   storageSize: 50Gi
  #   resources:
  #     requests:
  #       cpu: 100m
  #       memory: 512Mi
  #     limits:
  #       cpu: 1000m
  #       memory: 2Gi
  # 
  # grafana:
  #   enabled: true
  #   adminUser: admin
  #   adminPassword: "RANDOM_PASSWORD_HERE"
  #   persistence:
  #     enabled: true
  #     size: 10Gi

# Billing exporter (usage metrics)
billingExporter:
  enabled: true
  image:
    repository: iotistic/billing-exporter
    tag: latest
  # Customer ID for usage attribution
  customerId: "cust_dc5fec42901a7b3e"
  # Metrics push endpoint
  pushgatewayUrl: "http://prometheus-pushgateway.monitoring.svc.cluster.local:9091"
  interval: 300  # 5 minutes

# Resource quotas (prevent runaway resource usage)
resourceQuota:
  enabled: true
  limits:
    # Based on plan tier
    cpu: "2000m"      # 2 cores max
    memory: "4Gi"     # 4GB RAM max
    storage: "50Gi"   # 50GB storage max
    pods: "20"        # Max 20 pods

# Network policies (optional - for enhanced security)
networkPolicy:
  enabled: false
  # If enabled, restrict traffic between namespaces
