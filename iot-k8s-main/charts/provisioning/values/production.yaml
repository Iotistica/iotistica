# Production values for provisioning service

global:
  namespace: provisioning

api:
  enabled: true
  replicas: 3
  image:
    repository: iotistic/provisioning-api
    tag: latest
    pullPolicy: Always
  env:
    NODE_ENV: production
    BASE_DOMAIN: api.iotistica.com
    DEFAULT_TRIAL_DAYS: "14"
    GITOPS_ENABLED: "true"
    GITOPS_REPO_URL: https://github.com/Iotistica/iot-k8s-main
    GITOPS_BRANCH: main
    GITOPS_AUTHOR_NAME: Iotistica Provisioning Bot
    GITOPS_AUTHOR_EMAIL: info@iotistica.com
    SIMULATE_K8S_DEPLOYMENT: "false"
    SIMULATE_TIGERDATA: "false"
    SIMULATE_ONEPASSWORD: "false"
    SKIP_ARGOCD_STATUS_CHECK: "false"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

worker:
  enabled: true
  replicas: 5
  concurrency: 5
  retryAttempts: 3
  retryDelay: 60000
  image:
    repository: iotistic/provisioning-worker
    tag: latest
    pullPolicy: Always
  env:
    NODE_ENV: production
    BASE_DOMAIN: api.iotistica.com
    GITOPS_ENABLED: "true"
    GITOPS_REPO_URL: https://github.com/Iotistica/iot-k8s-main
    GITOPS_BRANCH: main
    GITOPS_AUTHOR_NAME: Iotistica Provisioning Bot
    GITOPS_AUTHOR_EMAIL: info@iotistica.com
    SIMULATE_K8S_DEPLOYMENT: "false"
    SIMULATE_TIGERDATA: "false"
    SIMULATE_ONEPASSWORD: "false"
    SKIP_ARGOCD_STATUS_CHECK: "false"
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi

postgresql:
  enabled: true
  auth:
    username: billing
    database: billing
  primary:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: managed-csi-premium
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 8Gi

# External Redis (specify external Redis cluster for production)
externalRedis:
  host: "redis.iotistica.com"  # Update to your external Redis endpoint
  port: 6379

ingress:
  enabled: true
  hostname: api.iotistica.com
  gateway: iotistica-gateway
  gatewayNamespace: envoy-gateway-system
