# Development values for provisioning service (simulated external services)

global:
  namespace: provisioning-dev

api:
  enabled: true
  replicas: 1
  image:
    repository: iotistic/provisioning-api
    tag: latest
    pullPolicy: Always
  env:
    NODE_ENV: development
    BASE_DOMAIN: dev.iotistica.local
    DEFAULT_TRIAL_DAYS: "7"
    GITOPS_ENABLED: "false"
    SIMULATE_K8S_DEPLOYMENT: "true"
    SIMULATE_TIGERDATA: "true"
    SIMULATE_ONEPASSWORD: "true"
    SKIP_ARGOCD_STATUS_CHECK: "true"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

worker:
  enabled: true
  replicas: 1
  concurrency: 2
  retryAttempts: 2
  retryDelay: 30000
  image:
    repository: iotistic/provisioning-worker
    tag: latest
    pullPolicy: Always
  env:
    NODE_ENV: development
    BASE_DOMAIN: dev.iotistica.local
    GITOPS_ENABLED: "false"
    SIMULATE_K8S_DEPLOYMENT: "true"
    SIMULATE_TIGERDATA: "true"
    SIMULATE_ONEPASSWORD: "true"
    SKIP_ARGOCD_STATUS_CHECK: "true"
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 2Gi

postgresql:
  enabled: true
  auth:
    username: billing
    database: billing
  primary:
    persistence:
      enabled: true
      size: 5Gi

ingress:
  enabled: true
  hostname: iotistica.local
  gateway: eg
  gatewayNamespace: envoy-gateway-system
