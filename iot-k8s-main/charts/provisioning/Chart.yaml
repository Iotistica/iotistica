apiVersion: v2
name: provisioning
description: Iotistic Provisioning Service - Customer signup, billing, and deployment automation
type: application
version: 1.0.0
appVersion: "1.0.13"
keywords:
  - provisioning
  - billing
  - stripe
  - auth0
  - gitops
maintainers:
  - name: Iotistic Team

dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "~19.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
