# Provisioning Service - Default Values

global:
  namespace: provisioning

# API Service
api:
  enabled: true
  image:
    repository: iotistic/provisioning-api
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 3100
  serviceType: ClusterIP
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  env:
    NODE_ENV: production
    BASE_DOMAIN: api.iotistica.com
    CLIENT_BASE_DOMAIN: iotistica.com
    WEBSITE_URL: https://www.iotistica.com
    AUTH0_SIGNUP_CALLBACK_URL: https://www.iotistica.com/auth-callback.html
    DEFAULT_TRIAL_DAYS: "14"
    GITOPS_ENABLED: "true"
    GITOPS_REPO_URL: https://github.com/Iotistica/iot-k8s-main
    GITOPS_BRANCH: main
    GITOPS_AUTHOR_NAME: Iotistica Provisioning Bot
    GITOPS_AUTHOR_EMAIL: info@iotistica.com
    SIMULATE_K8S_DEPLOYMENT: "false"
    SIMULATE_TIGERDATA: "false"
    SIMULATE_ONEPASSWORD: "false"
    SKIP_ARGOCD_STATUS_CHECK: "false"

# Worker Service  
worker:
  enabled: true
  image:
    repository: iotistic/provisioning-worker
    tag: latest
    pullPolicy: Always
  replicas: 1
  concurrency: 3
  retryAttempts: 3
  retryDelay: 60000
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  env:
    NODE_ENV: production
    BASE_DOMAIN: api.iotistica.com
    CLIENT_BASE_DOMAIN: iotistica.com
    GITOPS_ENABLED: "true"
    GITOPS_REPO_URL: https://github.com/Iotistica/iot-k8s.git
    GITOPS_BRANCH: main
    GITOPS_AUTHOR_NAME: Iotistica Provisioning Bot
    GITOPS_AUTHOR_EMAIL: info@iotistica.com
    SIMULATE_K8S_DEPLOYMENT: "false"
    SIMULATE_TIGERDATA: "false"
    SIMULATE_ONEPASSWORD: "false"
    SKIP_ARGOCD_STATUS_CHECK: "false"

# PostgreSQL (custom deployment using TimescaleDB PG16 image)
postgres:
  enabled: true
  image:
    repository: timescale/timescaledb
    tag: "latest-pg16"
  database: billing
  storage:
    size: 10Gi
    storageClass: ""  # Use default storage class
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  ingress:
    enabled: true
    # The name of the Gateway resource that will host the TLSRoute.  An empty
    # string here still causes the template to render, but the resulting
    # TLSRoute has a parentRef with no name and Kubernetes will reject it with
    # "TLSRoute.gateway.networking.k8s.io \"\" not found".  Provide a valid
    # gateway name or disable postgres.ingress entirely if not needed.
    gateway: "iotistica-gateway"
    gatewayNamespace: "envoy-gateway-system"
    hostname: "prov-postgres.iotistica.com"  # e.g., postgres.iotistica.com

# Redis connection settings (credentials from redis-credentials-master secret)
redis:
  tls: false      # Azure Redis requires TLS for external connections
  cluster: false  # Set to true if using Redis Cluster mode

# PostgreSQL Provisioning - shared server where per-client databases are created.
# Admin credentials are pulled from the 1Password item:
#   vaults/iotistica/items/provisioning-pg-admin-credentials
#   Required keys: username, password
#
# The admin role (iotistica_provisioning) must have CREATEDB and CREATEROLE
# privileges.  It is created automatically by this chart's postgres-init job
# (see postgresProvisioning.initJob below).
postgresProvisioning:
  # Database provider: 'postgres' (self-hosted) or 'tigerdata' (Timescale Cloud)
  provider: "postgres"
  # Hostname of the shared PostgreSQL server (provisioning-postgres service in same namespace)
  host: "provisioning-postgres.provisioning.svc.cluster.local"
  port: 5432
  adminDatabase: "billing"
  ssl: false
  sslRejectUnauthorized: false
  # Template database cloned for every new client (created once by the provisioning
  # API on first startup when DB_PROVIDER=postgres and this value is non-empty)
  templateDatabase: "template_iotistica"
  # Init job - runs against the shared PostgreSQL server on install/upgrade.
  # iotistica_provisioning role used by the API and worker.
  # Connects using provisioning-pg-admin-credentials (username/password keys).
  initJob:
    enabled: true

# Ingress (Envoy Gateway HTTPRoute)
ingress:
  enabled: true
  hostname: api.iotistica.com
  gateway: iotistica-gateway
  gatewayNamespace: envoy-gateway-system
