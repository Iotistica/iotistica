{{- if and .Values.api .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "provisioning.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.serviceType }}
  ports:
    - port: {{ .Values.api.port }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "provisioning.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: provisioning-db-credentials
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/provisioning-db-credentials"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: redis-credentials-master
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/redis-credentials-master"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: provisioning-stripe-credentials
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/provisioning-stripe-credentials"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: provisioning-auth0-credentials
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/provisioning-auth0-credentials"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: provisioning-tigerdata-credentials
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/provisioning-tigerdata-credentials"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: provisioning-onepassword-credentials
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/provisioning-onepassword-credentials"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: provisioning-gitops-credentials
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/provisioning-gitops-credentials"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: provisioning-argocd-credentials
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/provisioning-argocd-credentials"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: api-license-public-key-master
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/api-license-public-key-master"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: provisioning-license-private-key
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/provisioning-license-private-key"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: provisioning-jwt-secret
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/provisioning-jwt-secret"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: provisioning-pg-admin-credentials
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/provisioning-pg-admin-credentials"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "provisioning.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "provisioning.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "provisioning.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            runAsUser: 1001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            privileged: false
          ports:
            - name: api
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          env:
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: NODE_ENV
              value: {{ .Values.api.env.NODE_ENV | quote }}
            - name: BASE_DOMAIN
              value: {{ .Values.api.env.BASE_DOMAIN | quote }}
            - name: BASE_URL
              value: "https://{{ .Values.api.env.BASE_DOMAIN }}/provisioning/api"
            - name: WEBSITE_URL
              value: {{ default "https://www.iotistica.com" .Values.api.env.WEBSITE_URL | quote }}
            - name: DEFAULT_TRIAL_DAYS
              value: {{ .Values.api.env.DEFAULT_TRIAL_DAYS | quote }}
            
            # Database (PostgreSQL)
            - name: DB_HOST
              value: {{ include "provisioning.fullname" . }}-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: {{ .Values.postgres.database }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: provisioning-db-credentials
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: provisioning-db-credentials
                  key: password
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            
            # Redis
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: redis-credentials-master
                  key: host
            - name: REDIS_PORT
              {{- if .Values.redis.tls }}
              # Azure Redis with TLS requires port 6380, not 6379
              value: "6380"
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: redis-credentials-master
                  key: port_ext
              {{- end }}
            - name: REDIS_DB
              value: "0"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials-master
                  key: password
            - name: REDIS_CLUSTER
              value: {{ .Values.redis.cluster | quote }}
            - name: REDIS_TLS
              value: {{ .Values.redis.tls | quote }}
            - name: REDIS_USE_TLS
              value: {{ .Values.redis.tls | quote }}
            
            # Stripe
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: provisioning-stripe-credentials
                  key: secret-key
            - name: STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: provisioning-stripe-credentials
                  key: publishable-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: provisioning-stripe-credentials
                  key: webhook-secret
            - name: STRIPE_PRICE_STARTER
              valueFrom:
                secretKeyRef:
                  name: provisioning-stripe-credentials
                  key: price-starter
            - name: STRIPE_PRICE_PROFESSIONAL
              valueFrom:
                secretKeyRef:
                  name: provisioning-stripe-credentials
                  key: price-professional
            - name: STRIPE_PRICE_ENTERPRISE
              valueFrom:
                secretKeyRef:
                  name: provisioning-stripe-credentials
                  key: price-enterprise
            
            # Auth0
            - name: AUTH0_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: provisioning-auth0-credentials
                  key: domain
            - name: AUTH0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: provisioning-auth0-credentials
                  key: client-id
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: provisioning-auth0-credentials
                  key: client-secret
            - name: AUTH0_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: provisioning-auth0-credentials
                  key: audience
            - name: AUTH0_SIGNUP_CALLBACK_URL
              value: "{{ .Values.api.env.WEBSITE_URL }}/auth-callback.html"
            - name: AUTH0_REDIRECT_URI
              value: "https://{{ .Values.ingress.hostname }}/provisioning/api/auth/callback-auth0"
            
            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: provisioning-jwt-secret
                  key: secret
            - name: JWT_ACCESS_TOKEN_EXPIRY
              value: "15m"
            - name: JWT_REFRESH_TOKEN_EXPIRY
              value: "7d"
            
            # License Keys (paths to mounted files)
            - name: LICENSE_PRIVATE_KEY_PATH
              value: "/app/keys/private-key.pem"
            - name: LICENSE_PUBLIC_KEY_PATH
              value: "/app/keys/public-key.pem"
            - name: LICENSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: api-license-public-key-master
                  key: key
            
            # TigerData
            - name: TIGERDATA_API_URL
              value: "https://console.cloud.timescale.com/public/api/v1"
            - name: TIGERDATA_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: provisioning-tigerdata-credentials
                  key: access-key
            - name: TIGERDATA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: provisioning-tigerdata-credentials
                  key: secret-key
            - name: TIGERDATA_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: provisioning-tigerdata-credentials
                  key: project-id
            - name: TIGERDATA_DEFAULT_REGION
              value: "us-east-1"
            - name: TIGERDATA_DEFAULT_PLAN
              value: "dev"
            - name: SIMULATE_TIGERDATA
              value: {{ .Values.api.env.SIMULATE_TIGERDATA | quote }}
            
            # 1Password
            - name: ONEPASSWORD_CONNECT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: provisioning-onepassword-credentials
                  key: token
            - name: ONEPASSWORD_VAULT_ID
              valueFrom:
                secretKeyRef:
                  name: provisioning-onepassword-credentials
                  key: vault-id
            - name: SIMULATE_ONEPASSWORD
              value: {{ .Values.api.env.SIMULATE_ONEPASSWORD | quote }}
            
            # GitOps
            - name: GITOPS_ENABLED
              value: {{ .Values.api.env.GITOPS_ENABLED | quote }}
            - name: GITOPS_REPO_URL
              value: {{ .Values.api.env.GITOPS_REPO_URL | quote }}
            - name: GITOPS_BRANCH
              value: {{ .Values.api.env.GITOPS_BRANCH | quote }}
            - name: GITOPS_REPO_DIR
              value: "/tmp/iot-k8s-main"
            - name: GITOPS_PAT
              valueFrom:
                secretKeyRef:
                  name: provisioning-gitops-credentials
                  key: pat
            - name: GITOPS_AUTHOR_NAME
              value: {{ .Values.api.env.GITOPS_AUTHOR_NAME | quote }}
            - name: GITOPS_AUTHOR_EMAIL
              value: {{ .Values.api.env.GITOPS_AUTHOR_EMAIL | quote }}
            
            # Argo CD
            - name: ARGOCD_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: provisioning-argocd-credentials
                  key: url
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: provisioning-argocd-credentials
                  key: token
            - name: ARGOCD_NAMESPACE
              value: "argocd"
            - name: ARGOCD_MAX_RETRIES
              value: "10"
            - name: ARGOCD_RETRY_DELAY
              value: "5000"
            - name: SKIP_ARGOCD_STATUS_CHECK
              value: {{ .Values.api.env.SKIP_ARGOCD_STATUS_CHECK | quote }}
            
            # Legacy deployment
            - name: SIMULATE_K8S_DEPLOYMENT
              value: {{ .Values.api.env.SIMULATE_K8S_DEPLOYMENT | quote }}
            
            # PostgreSQL Provisioning (shared server for per-client databases)
            - name: DB_PROVIDER
              value: {{ .Values.postgresProvisioning.provider | default "postgres" | quote }}
            - name: PROVISIONING_PG_HOST
              value: {{ .Values.postgresProvisioning.host | quote }}
            - name: PROVISIONING_PG_PORT
              value: {{ .Values.postgresProvisioning.port | default "5432" | quote }}
            - name: PROVISIONING_PG_ADMIN_DB
              value: {{ .Values.postgresProvisioning.adminDatabase | default "postgres" | quote }}
            - name: PROVISIONING_PG_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: provisioning-pg-admin-credentials
                  key: username
            - name: PROVISIONING_PG_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: provisioning-pg-admin-credentials
                  key: password
            - name: PROVISIONING_PG_SSL
              value: {{ .Values.postgresProvisioning.ssl | quote }}
            - name: PROVISIONING_PG_SSL_REJECT_UNAUTHORIZED
              value: {{ .Values.postgresProvisioning.sslRejectUnauthorized | quote }}
            - name: PROVISIONING_PG_TEMPLATE_DB
              value: {{ .Values.postgresProvisioning.templateDatabase | default "template_iotistica" | quote }}
          
          volumeMounts:
            - name: license-keys
              mountPath: /app/keys
              readOnly: true
          
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
      
      volumes:
        - name: license-keys
          projected:
            defaultMode: 0444
            sources:
              - secret:
                  name: provisioning-license-private-key
                  items:
                    - key: key
                      path: private-key.pem
              - secret:
                  name: api-license-public-key-master
                  items:
                    - key: key
                      path: public-key.pem
{{- end }}
