{{- if and .Values.api .Values.api.enabled .Values.ingress.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "provisioning.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.ingress.gateway }}
      namespace: {{ .Values.ingress.gatewayNamespace }}
  hostnames:
    - {{ .Values.ingress.hostname }}
  rules:
    # Health check endpoint (public, unauthenticated)
    - matches:
        - path:
            type: Exact
            value: /provisioning/api/health
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
      backendRefs:
        - name: {{ include "provisioning.fullname" . }}-api
          port: {{ .Values.api.port }}
    
    # Bull admin dashboard exposed at /admin/queues
    # IP filtering happens via load balancer X-Forwarded-For header
    # Only accessible from: 99.240.230.189
    - matches:
        - path:
            type: PathPrefix
            value: /admin/queues
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /admin/queues
      backendRefs:
        - name: {{ include "provisioning.fullname" . }}-api
          port: {{ .Values.api.port }}
    
    # API endpoints (webhooks, queue management endpoints)
    - matches:
        - path:
            type: PathPrefix
            value: /provisioning/api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api
      backendRefs:
        - name: {{ include "provisioning.fullname" . }}-api
          port: {{ .Values.api.port }}
{{- end }}
