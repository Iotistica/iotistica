{{- if and .Values.api .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "provisioning.fullname" . }}-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.serviceType }}
  ports:
    - port: {{ .Values.api.port }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "provisioning.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
# 1Password secret references
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: redis-credentials-client-{{ .Values.global.namespace }}
  namespace: {{ .Values.global.namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/redis-credentials-client-{{ .Values.global.namespace }}"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: postgres-credentials-client-provisioning
  namespace: {{ .Values.global.namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/postgres-credentials-client-provisioning"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: stripe-credentials-client-provisioning
  namespace: {{ .Values.global.namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/stripe-credentials-client-provisioning"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: git-credentials-client-provisioning
  namespace: {{ .Values.global.namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/git-credentials-client-provisioning"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: license-keys-client-provisioning
  namespace: {{ .Values.global.namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/license-keys-client-provisioning"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: onepassword-credentials-client-provisioning
  namespace: {{ .Values.global.namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/onepassword-credentials-client-provisioning"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: tigerdata-credentials-client-provisioning
  namespace: {{ .Values.global.namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/tigerdata-credentials-client-provisioning"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: argocd-credentials-client-provisioning
  namespace: {{ .Values.global.namespace }}
spec:
  itemPath: "vaults/IOT-CLIENTS/items/argocd-credentials-client-provisioning"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "provisioning.fullname" . }}-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "provisioning.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "provisioning.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "provisioning.serviceAccountName" . }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            runAsUser: 1001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            privileged: false
          ports:
            - name: api
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "{{ .Values.api.port }}"
            
            # PostgreSQL connection
            - name: DB_HOST
              value: "{{ .Values.postgres.host }}"
            - name: DB_PORT
              value: "{{ .Values.postgres.port }}"
            - name: DB_NAME
              value: "{{ .Values.postgres.database }}"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.postgres.SecretName | quote }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.postgres.SecretName | quote }}
                  key: password
            
            # Redis connection
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.redis.SecretName | quote }}
                  key: host
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.redis.SecretName | quote }}
                  key: port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.redis.SecretName | quote }}
                  key: password
            - name: REDIS_PORT_EXT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.redis.SecretName | quote }}
                  key: port_ext
            - name: REDIS_TLS
              value: {{ .Values.redis.tls | quote }}
            - name: REDIS_CLUSTER
              value: {{ .Values.redis.cluster | quote }}
            
            # Stripe configuration
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.stripe.SecretName | quote }}
                  key: secret_key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.stripe.SecretName | quote }}
                  key: webhook_secret
            
            # Git configuration (for GitOps)
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.git.SecretName | quote }}
                  key: username
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.git.SecretName | quote }}
                  key: token
            - name: GITOPS_REPO_URL
              value: "{{ .Values.gitops.repoUrl }}"
            - name: GITOPS_REPO_BRANCH
              value: "{{ .Values.gitops.branch }}"
            - name: GITOPS_REPO_DIR
              value: "/tmp/iot-k8s-main"
            
            # License keys (RSA keypair for JWT signing)
            - name: LICENSE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.licenseKeys.SecretName | quote }}
                  key: private_key
            - name: LICENSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.licenseKeys.SecretName | quote }}
                  key: public_key
            
            # 1Password integration
            - name: ONEPASSWORD_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.onepassword.SecretName | quote }}
                  key: service_account_token
            - name: ONEPASSWORD_VAULT_ID
              value: "{{ .Values.onepassword.vaultId }}"
            
            # TigerData integration
            - name: TIGERDATA_BASE_URL
              value: "{{ .Values.tigerdata.baseUrl }}"
            - name: TIGERDATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.tigerdata.SecretName | quote }}
                  key: api_key
            
            # Argo CD integration
            - name: ARGOCD_SERVER
              value: "{{ .Values.argocd.server }}"
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.argocd.SecretName | quote }}
                  key: token
            - name: ARGOCD_NAMESPACE
              value: "{{ .Values.argocd.namespace }}"
            
            # K8s deployment settings
            - name: SIMULATE_K8S_DEPLOYMENT
              value: "{{ .Values.deployment.simulate }}"
            - name: HELM_CHART_PATH
              value: "{{ .Values.deployment.helmChartPath }}"
            - name: HELM_VALUES_DIR
              value: "{{ .Values.deployment.helmValuesDir }}"
            
            # CORS configuration
            - name: CORS_ORIGINS
              value: {{ .Values.api.corsOrigins | quote }}
          
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          
          volumeMounts:
            - name: git-repos
              mountPath: /tmp/iot-k8s-main
      
      volumes:
        - name: git-repos
          emptyDir: {}
---
# Envoy Gateway HTTPRoute for external access (Stripe webhooks, customer portal, etc.)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "provisioning.fullname" . }}-api-httproute
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: iotistica-gateway
      namespace: envoy-gateway-system
  hostnames:
    - {{ .Values.api.tlsCommonName }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "provisioning.fullname" . }}-api
          port: {{ .Values.api.port }}
          weight: 1
{{- end }}
