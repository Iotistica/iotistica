{{- if and .Values.postgresProvisioning.host .Values.postgresProvisioning.initJob.enabled }}
# PostgreSQL Initialization Job
# 
# This Helm hook runs after installation/upgrade to:
#
# 1. Create the iotistica_provisioning application role
#    - Used by provisioning API and worker services
#    - Privileges: CREATEDB, CREATEROLE (needed to create per-customer databases)
#    - Credentials: From provisioning-db-credentials secret
#
# 2. Grant necessary permissions on admin and application databases
#    - Allows role to create objects and perform migrations
#    - Uses superuser credentials from provisioning-pg-admin-credentials secret
#
# IMPORTANT: The provisioning-pg-admin-credentials secret contains the
# PostgreSQL admin credentials (username/password) used by this job to
# bootstrap the database setup. These credentials MUST be for a user with
# CREATEDB and CREATEROLE privileges (but NOT superuser - principle of
# least privilege).
#
# If this job fails with "permission denied" or "role cannot create databases",
# verify that the admin user has correct privileges:
#   SELECT usecreatedb, usecreaterole, usesuper FROM pg_user WHERE usename='your-admin-user';
#   Expected: (t, t, f) = (true, true, false)
#
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "provisioning.fullname" . }}-postgres-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: postgres-init
        image: "postgres:16.6-alpine"
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h "${PG_HOST}" -p "${PG_PORT}" -U "${PGUSER}" -d "${PG_DB}"; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

          echo "Creating provisioning admin role..."
          ROLE_EXISTS=$(psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PGUSER}" -d "${PG_DB}" \
            -t -c "SELECT 1 FROM pg_roles WHERE rolname='iotistica_provisioning'" | xargs)
          if [ "$ROLE_EXISTS" != "1" ]; then
            PGPASSWORD_ESCAPED=$(echo "$PROVISIONING_APP_PASSWORD" | sed "s/'/''/g")
            psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PGUSER}" -d "${PG_DB}" \
              -c "CREATE ROLE iotistica_provisioning WITH LOGIN PASSWORD '${PGPASSWORD_ESCAPED}' CREATEDB CREATEROLE;"
            echo "Created role: iotistica_provisioning"
            
            echo "Granting permissions to iotistica_provisioning..."
            psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PGUSER}" -d "${PG_DB}" <<EOF
            -- Grant usage on public schema
            GRANT USAGE ON SCHEMA public TO iotistica_provisioning;
            
            -- Allow role to create objects in public schema (for migrations)
            GRANT CREATE ON SCHEMA public TO iotistica_provisioning;
            
            -- Grant all privileges on existing tables/sequences in public schema to role
            GRANT ALL ON ALL TABLES IN SCHEMA public TO iotistica_provisioning;
            GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO iotistica_provisioning;
            
            -- Set default privileges for future tables/sequences
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO iotistica_provisioning;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO iotistica_provisioning;
            
            -- Allow role to connect to databases
            ALTER DEFAULT PRIVILEGES GRANT CONNECT ON DATABASES TO iotistica_provisioning;
            
            -- Log success
            SELECT 'Permissions granted on admin database';
            EOF
            
            echo "Granting permissions on application database ({{ .Values.postgres.database }})..."
            psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PGUSER}" -d "{{ .Values.postgres.database }}" <<EOF
            -- Grant usage on public schema in application database
            GRANT USAGE ON SCHEMA public TO iotistica_provisioning;
            
            -- Allow role to create objects in public schema (for migrations)
            GRANT CREATE ON SCHEMA public TO iotistica_provisioning;
            
            -- Grant all privileges on existing tables/sequences
            GRANT ALL ON ALL TABLES IN SCHEMA public TO iotistica_provisioning;
            GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO iotistica_provisioning;
            
            -- Set default privileges for future tables/sequences (migrations)
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO iotistica_provisioning;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO iotistica_provisioning;
            
            -- Log success
            SELECT 'Application database permissions granted';
            EOF
            
            echo "PostgreSQL initialization complete"
          else
            echo "Role iotistica_provisioning already exists - skipping initialization (permissions already set)"
          fi
        env:
        - name: PG_HOST
          value: {{ .Values.postgresProvisioning.host | quote }}
        - name: PG_PORT
          value: {{ .Values.postgresProvisioning.port | default "5432" | quote }}
        - name: PG_DB
          value: {{ .Values.postgresProvisioning.adminDatabase | default "postgres" | quote }}
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: provisioning-pg-admin-credentials
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: provisioning-pg-admin-credentials
              key: password
        - name: PROVISIONING_APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: provisioning-db-credentials
              key: password
{{- end }}