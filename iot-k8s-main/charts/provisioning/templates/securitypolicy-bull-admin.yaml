{{- if and .Values.api .Values.api.enabled .Values.ingress.enabled }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: SecurityPolicy
metadata:
  name: {{ include "provisioning.fullname" . }}-bull-admin-access
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ include "provisioning.fullname" . }}
  
  # RBAC Authorization: Allow list for /admin/queues endpoint
  authorization:
    # Default: deny all access to restricted paths
    defaultAction: Deny
    rules:
      # Rule 1: Allow Bull admin dashboard only from whitelisted IPs
      - name: bull-admin-ip-whitelist
        action: Allow
        matches:
          # Match requests to Bull Board
          - request:
              http:
                pathRegex: "^/admin/queues(/.*)?$"
          # Whitelist source IPs
          sourceIPAddresses:
            # Your IP
            - 99.240.230.189/32
            # Localhost (for port-forward)
            - 127.0.0.1/32
            # Internal K8s pod network
            - 10.0.0.0/8
            # IPv6 variants
            - ::1/128
      
      # Rule 2: Allow health check (public, no auth required)
      - name: health-check-public
        action: Allow
        matches:
          - request:
              http:
                pathRegex: "^/provisioning/api/health$"
      
      # Rule 3: Allow API endpoints (webhooks, subscriptions, etc.)
      - name: api-endpoints-public
        action: Allow
        matches:
          - request:
              http:
                pathRegex: "^/provisioning/api/.*"
              # Exclude /admin/queues from this rule
              # (handled separately above)
{{- end }}

