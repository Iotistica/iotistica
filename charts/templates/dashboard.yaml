{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iotistic.fullname" . }}-dashboard
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.serviceType }}
  ports:
    - port: {{ .Values.dashboard.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.dashboard.serviceType "NodePort") .Values.dashboard.nodePort }}
      nodePort: {{ .Values.dashboard.nodePort }}
      {{- end }}
  selector:
    {{- include "iotistic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iotistic.fullname" . }}-dashboard
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "iotistic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "iotistic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      nodeSelector:
        role: worker
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          env:
            - name: VITE_API_URL
              value: {{ .Values.dashboard.apiUrl | quote }}
            - name: NODE_ENV
              value: {{ .Values.dashboard.env.NODE_ENV | quote }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "iotistic.fullname" . }}-dash-httproute
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: iotistica-gateway
      namespace: envoy-gateway-system
  hostnames:
    - {{ .Values.dashboard.tlsCommonName }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "iotistic.fullname" . }}-dashboard
          port: 80
          weight: 1