{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iotistic.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.serviceType }}
  ports:
    - port: {{ .Values.api.port }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "iotistic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
# Certificate for API
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.api.tlsCertName }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.api.tlsSecret }}
  issuerRef:
    name: {{ .Values.api.tlsIssuer }}
    kind: ClusterIssuer
  commonName: {{ .Values.api.tlsCommonName }}
  dnsNames:
{{- range .Values.api.sniHosts }}
    - {{ . }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iotistic.fullname" . }}-api
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "iotistic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "iotistic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 60  # Allow 60s for graceful shutdown
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: api
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]  # Wait 15s for connections to drain
          env:
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: NODE_ENV
              value: {{ .Values.api.env.NODE_ENV | quote }}
            - name: DB_HOST
              value: timescaledb-cluster-rw.io-cluster-tsdb.svc #{{ include "iotistic.fullname" . }}-postgres
            - name: DB_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: DB_NAME
              value: {{ .Values.postgres.database | quote }}
            # Read SQL credentials from existing Kubernetes Secret
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.sql.SecretName }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.sql.SecretName }}
                  key: password
            - name: DB_POOL_SIZE
              value: {{ .Values.api.env.DB_POOL_SIZE | quote }}
            - name: DB_SSL
              value: {{ .Values.api.env.DB_SSL | quote }}
            - name: DB_SSL_REJECT_UNAUTHORIZED
              value: {{ .Values.api.env.DB_SSL_REJECT_UNAUTHORIZED | quote }}
            # MQTT Broker Configuration (supports local Mosquitto or cloud HiveMQ)
            {{- if eq .Values.mqttBroker.type "cloud" }}
            # Cloud broker configuration (HiveMQ, AWS IoT Core, etc.)
            - name: MQTT_BROKER_TYPE
              value: "cloud"
            - name: MQTT_BROKER_URL
              value: "{{ .Values.mqttBroker.cloud.protocol }}://{{ .Values.mqttBroker.cloud.host }}:{{ .Values.mqttBroker.cloud.port }}"
            - name: MQTT_BROKER_HOST
              value: {{ .Values.mqttBroker.cloud.host | quote }}
            - name: MQTT_BROKER_EXTERNAL_HOST
              value: {{ .Values.mqttBroker.cloud.host | quote }}
            - name: MQTT_BROKER_PORT
              value: {{ .Values.mqttBroker.cloud.port | quote }}
            - name: MQTT_BROKER_EXTERNAL_PORT
              value: {{ .Values.mqttBroker.cloud.port | quote }}
            - name: MQTT_BROKER_PROTOCOL
              value: {{ .Values.mqttBroker.cloud.protocol | quote }}
            - name: MQTT_BROKER_USE_TLS
              value: {{ .Values.mqttBroker.cloud.useTls | quote }}
            - name: MQTT_USERNAME
              value: {{ .Values.mqttBroker.cloud.username | quote }}
            - name: MQTT_PASSWORD
              value: {{ .Values.mqttBroker.cloud.password | quote }}
            {{- if .Values.mqttBroker.cloud.caCert }}
            - name: MQTT_BROKER_CA_CERT
              value: {{ .Values.mqttBroker.cloud.caCert | quote }}
            {{- end }}
            - name: MQTT_BROKER_VERIFY_CERT
              value: {{ .Values.mqttBroker.cloud.verifyCertificate | quote }}
            - name: MQTT_KEEP_ALIVE
              value: {{ .Values.mqttBroker.cloud.keepAlive | quote }}
            - name: MQTT_CLEAN_SESSION
              value: {{ .Values.mqttBroker.cloud.cleanSession | quote }}
            - name: MQTT_RECONNECT_PERIOD
              value: {{ .Values.mqttBroker.cloud.reconnectPeriod | quote }}
            - name: MQTT_CONNECT_TIMEOUT
              value: {{ .Values.mqttBroker.cloud.connectTimeout | quote }}
            {{- else }}
            # Local Mosquitto broker configuration
            - name: MQTT_BROKER_TYPE
              value: "local"
            - name: MQTT_BROKER_URL
              value: {{ include "iotistic.mosquitto.url" . }}
            - name: MQTT_BROKER_HOST
              value: {{ include "iotistic.mosquitto.host" . }}
            - name: MQTT_BROKER_EXTERNAL_HOST
              value: {{ .Values.mosquitto.externalHost | default (printf "%s-mosquitto" (include "iotistic.fullname" .)) }}
            - name: MQTT_BROKER_EXTERNAL_PORT
              value: {{ ternary (.Values.mosquitto.ports.mqtts | toString) (.Values.mosquitto.ports.mqtts | default .Values.mosquitto.ports.mqtts | toString) (eq .Values.mosquitto.serviceType "LoadBalancer") | quote }}
            - name: MQTT_BROKER_PORT
              value: {{ .Values.mosquitto.ports.mqtts | quote }}
            - name: MQTT_BROKER_USE_TLS
              value: "true"
            - name: MQTT_BROKER_PROTOCOL
              value: "mqtts"
            {{- end }}
            {{- if .Values.api.mqtt.SecretName }}
            # Read MQTT credentials from existing Kubernetes Secret
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.mqtt.SecretName }}
                  key: username
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.mqtt.SecretName }}
                  key: password
            {{- else }}
            # Use credentials from values.yaml (not recommended for production)
            - name: MQTT_USERNAME
              value: {{ .Values.api.mqtt.username | quote }}
            - name: MQTT_PASSWORD
              value: {{ .Values.api.mqtt.password | quote }}
            {{- end }}
            - name: MQTT_PERSIST_TO_DB
              value: {{ .Values.api.env.MQTT_PERSIST_TO_DB | quote }}
            - name: MQTT_DB_SYNC_INTERVAL
              value: {{ .Values.api.env.MQTT_DB_SYNC_INTERVAL | quote }}
            - name: MQTT_MONITOR_ENABLED
              value: {{ .Values.api.env.MQTT_MONITOR_ENABLED | quote }}
            {{- if .Values.mqttMonitor.enabled }}
            - name: MQTT_MONITOR_URL
              value: "http://{{ include "iotistic.fullname" . }}-mqtt-monitor:{{ .Values.mqttMonitor.port }}"
            {{- end }}
            - name: LOG_COMPRESSION
              value: {{ .Values.api.env.LOG_COMPRESSION | quote }}
            - name: VPN_ENABLED
              value: {{ .Values.api.env.VPN_ENABLED | quote }}
            - name: FORCE_COLOR
              value: {{ .Values.api.env.FORCE_COLOR | quote }}
            - name: REDIS_HOST
              value: {{ include "iotistic.redis.host" . }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.api.corsOrigins | default "http://localhost:5173,http://localhost:3001,http://localhost:3000,http://*:30000" | quote }}
            {{- if .Values.api.license.publicKey }}
            - name: LICENSE_PUBLIC_KEY
              value: {{ .Values.api.license.publicKey | quote }}
            {{- end }}
            {{- if .Values.api.license.key }}
            - name: IOTISTIC_LICENSE_KEY
              value: {{ .Values.api.license.key | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
{{- if .Values.api.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "iotistic.fullname" . }}-api
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "iotistic.fullname" . }}-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
  {{- if .Values.api.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }}
  {{- end }}
  {{- if .Values.api.autoscaling.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.api.autoscaling.targetMemoryUtilizationPercentage }}
  {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60   # Scale up faster (1 minute)
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max  # Use whichever policy allows faster scaling
{{- end }}
{{- end }}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "iotistic.fullname" . }}-api-httproute
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: iotistica-gateway
      namespace: envoy-gateway-system
  hostnames:
    - {{ .Values.api.tlsCommonName }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "iotistic.fullname" . }}-api
          port: 3002
          weight: 1