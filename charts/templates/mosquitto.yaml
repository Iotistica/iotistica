{{- if .Values.mosquitto.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iotistic.fullname" . }}-mosquitto-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
data:
  mosquitto.conf: |
    # Mosquitto configuration with Go-Auth plugin
    # HTTP backend authentication via API service
   
    # Basic Mosquitto settings

    # Plain TCP listener (no cert)
    listener {{ .Values.mosquitto.ports.mqtt }} 0.0.0.0
    protocol mqtt

    # TLS listener
    listener {{ .Values.mosquitto.ports.mqtts }} 0.0.0.0
    protocol mqtt

    # TLS settings
    cafile /mosquitto/certs/ca.crt
    certfile /mosquitto/certs/tls.crt
    keyfile /mosquitto/certs/tls.key
    require_certificate false
    
    listener {{ .Values.mosquitto.ports.websocket }} 0.0.0.0
    protocol websockets
    
    # Disable anonymous access (require authentication)
    allow_anonymous {{ .Values.mosquitto.auth.allowAnonymous }}
    
    # Logging
    log_dest stdout
    log_type error
    log_type warning
    log_type notice
    log_type information
    
    # System statistics publishing (required for metrics exporter)
    sys_interval 10
    
    # Load Go-Auth plugin
    auth_plugin /mosquitto/go-auth.so
    
    # Backend configuration - HTTP authentication via API
    auth_opt_backends http
    
    # HTTP backend settings (connects to API service)
    auth_opt_http_host {{ include "iotistic.fullname" . }}-api
    auth_opt_http_port {{ .Values.api.port }}
    auth_opt_http_getuser_uri /mosquitto-auth/user
    auth_opt_http_superuser_uri /mosquitto-auth/superuser
    auth_opt_http_aclcheck_uri /mosquitto-auth/acl
    
    # HTTP request configuration
    auth_opt_http_method POST
    auth_opt_http_request_type json
    auth_opt_http_response_mode status
    auth_opt_http_timeout 5
    
    # Password hashing configuration (validated by API)
    auth_opt_hasher {{ .Values.mosquitto.auth.hasher }}
    auth_opt_hasher_cost {{ .Values.mosquitto.auth.hasherCost }}
    
    {{- if .Values.redis.enabled }}
    # Redis cache configuration
    auth_opt_cache true
    auth_opt_cache_type redis
    auth_opt_cache_host {{ include "iotistic.fullname" . }}-redis
    auth_opt_cache_port {{ .Values.redis.port }}
    auth_opt_cache_db 1
    auth_opt_auth_cache_seconds 300
    auth_opt_acl_cache_seconds 300
    auth_opt_auth_jitter_seconds 10
    auth_opt_cache_reset true
    {{- end }}
    
    # Logging level
    auth_opt_log_level {{ .Values.mosquitto.auth.logLevel }}
    auth_opt_log_dest stdout
    
    {{- if .Values.mosquitto.persistence.enabled }}
    # Persistence for message queues
    persistence true
    persistence_location /mosquitto/data/
    {{- end }}
---
# Certificate for Mosquitto
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.mosquitto.tlsCertName }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.mosquitto.tlsSecret }}
  issuerRef:
    name: {{ .Values.mosquitto.tlsIssuer }}
    kind: ClusterIssuer
  commonName: {{ .Values.mosquitto.tlsCommonName }}
{{- if .Values.mosquitto.sniHosts }}
  dnsNames:
{{- range .Values.mosquitto.sniHosts }}
    - {{ . }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iotistic.fullname" . }}-mosquitto
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
spec:
  type: {{ .Values.mosquitto.serviceType }}
  ports:
    - name: mqtt
      port: {{ .Values.mosquitto.ports.mqtt }}
      targetPort: {{ .Values.mosquitto.ports.mqtt }}
      protocol: TCP
    - name: mqtts-tls
      port: {{ .Values.mosquitto.ports.mqtts }}
      targetPort: {{ .Values.mosquitto.ports.mqtts }}
      protocol: TCP
    - name: websocket
      port: {{ .Values.mosquitto.ports.websocket }}
      targetPort: {{ .Values.mosquitto.ports.websocket }}
      protocol: TCP
  selector:
    {{- include "iotistic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iotistic.fullname" . }}-mosquitto
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "iotistic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mosquitto
  template:
    metadata:
      labels:
        {{- include "iotistic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mosquitto
    spec:
      nodeSelector:
        role: worker
      containers:
        - name: mosquitto
          image: {{ printf "%s:%s" .Values.mosquitto.image.repository (.Values.mosquitto.image.tag | default "3.0.0-mosquitto_2.0.18") | quote }}
          imagePullPolicy: {{ .Values.mosquitto.image.pullPolicy }}
          ports:
            - name: mqtt
              containerPort: {{ .Values.mosquitto.ports.mqtt }}
              protocol: TCP
            - name: mqtts
              containerPort: {{ .Values.mosquitto.ports.mqtts }}
              protocol: TCP
            - name: websocket
              containerPort: {{ .Values.mosquitto.ports.websocket }}
              protocol: TCP
          volumeMounts:
            - name: mosquitto-config
              mountPath: /etc/mosquitto/mosquitto.conf
              subPath: mosquitto.conf
              readOnly: true
            - name: tls-certs
              mountPath: /mosquitto/certs
              readOnly: true
            {{- if .Values.mosquitto.persistence.enabled }}
            - name: data
              mountPath: /mosquitto/data
            {{- end }}
          resources:
            {{- toYaml .Values.mosquitto.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.mosquitto.ports.mqtt }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mosquitto.ports.mqtt }}
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: mosquitto-config
          configMap:
            name: {{ include "iotistic.fullname" . }}-mosquitto-config
        - name: tls-certs
          secret:
            secretName: {{ .Values.mosquitto.tlsSecret }}
        {{- if .Values.mosquitto.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: {{ include "iotistic.fullname" . }}-tcproute
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: iotistica-gateway
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "iotistic.fullname" . }}-mosquitto
          port: 1883
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: {{ include "iotistic.fullname" . }}-tlsroute
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: iotistica-gateway
      namespace: envoy-gateway-system
  hostnames:
    - {{ .Values.mosquitto.tlsCommonName }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "iotistic.fullname" . }}-mosquitto
          port: 8883
          weight: 1