{{- if .Values.mosquitto.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iotistic.fullname" . }}-mosquitto-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
data:
  mosquitto.conf: |
    # Mosquitto configuration with TLS/SSL (MQTTS)
    # Self-signed certificate configuration with no client certificate validation
    # PostgreSQL backend for authentication and ACL

    # MQTT over TLS (port 8883)
    listener 8883 0.0.0.0
    protocol mqtt

    # TLS Configuration for self-signed certificates
    # Note: For self-signed certs, clients should use insecure/skip-verification mode
    certfile /mosquitto/certs/server.crt
    keyfile /mosquitto/certs/server.key

    # Client certificate validation disabled (suitable for self-signed scenario)
    # Clients authenticate via username/password only
    require_certificate false

    # For additional security with self-signed certs, optionally include CA file
    # (clients can still skip verification)
    # cafile /mosquitto/certs/ca.crt

    # TLS version - 1.2 minimum recommended
    tls_version tlsv1.2

    # TLS Ciphers (optional: restrict to modern ciphers only)
    # tls_ciphers DEFAULT:!aNULL:!eNULL:!MD5:!3DES:!DES:!RC4:!IDEA:!SEED:!aDSS:!SRP:!PSK

    # WebSockets over TLS (port 9002)
    listener 9002 0.0.0.0
    protocol websockets

    # TLS for WebSockets (same self-signed cert)
    certfile /mosquitto/certs/server.crt
    keyfile /mosquitto/certs/server.key
    require_certificate false
    tls_version tlsv1.2

    # Optional: Keep non-TLS listeners for local/testing
    # listener 1883 127.0.0.1
    # protocol mqtt

    # Disable anonymous access (require authentication)
    allow_anonymous false

    # Logging
    log_dest stdout
    log_type error
    log_type warning
    log_type notice
    log_type information

    # Load Go-Auth plugin
    auth_plugin /mosquitto/go-auth.so

    # Backend configuration - HTTP authentication
    auth_opt_backends http

    # HTTP backend settings
    auth_opt_http_host host.docker.internal
    auth_opt_http_port 4002
    auth_opt_http_getuser_uri /mosquitto-auth/user
    auth_opt_http_superuser_uri /mosquitto-auth/superuser
    auth_opt_http_aclcheck_uri /mosquitto-auth/acl

    # HTTP request configuration
    auth_opt_http_method POST
    auth_opt_http_request_type json
    auth_opt_http_response_mode status
    auth_opt_http_timeout 5

    # Password hashing configuration
    auth_opt_hasher bcrypt
    auth_opt_hasher_cost 10

    # Redis cache configuration
    auth_opt_cache true
    auth_opt_cache_type redis
    auth_opt_cache_host redis
    auth_opt_cache_port 6379
    auth_opt_cache_db 1
    auth_opt_auth_cache_seconds 300
    auth_opt_acl_cache_seconds 300
    auth_opt_auth_jitter_seconds 10
    auth_opt_cache_reset true

    # Logging
    auth_opt_log_level info
    auth_opt_log_dest stdout
---
# Certificate for Mosquitto
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.mosquitto.tlsCertName }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.mosquitto.tlsSecret }}
  issuerRef:
    name: {{ .Values.mosquitto.tlsIssuer }}
    kind: ClusterIssuer
  commonName: {{ .Values.mosquitto.tlsCommonName }}
  dnsNames:
{{- range .Values.mosquitto.sniHosts }}
    - {{ . }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iotistic.fullname" . }}-mosquitto
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
spec:
  type: {{ .Values.mosquitto.serviceType }}
  ports:
    - name: mqtt
      port: {{ .Values.mosquitto.ports.mqtt }}
      targetPort: {{ .Values.mosquitto.ports.mqtt }}
      protocol: TCP
    - name: mqtts-tls
      port: {{ .Values.mosquitto.ports.mqtts }}
      targetPort: {{ .Values.mosquitto.ports.mqtts }}
      protocol: TCP
    - name: websocket
      port: {{ .Values.mosquitto.ports.websocket }}
      targetPort: {{ .Values.mosquitto.ports.websocket }}
      protocol: TCP
  selector:
    {{- include "iotistic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iotistic.fullname" . }}-mosquitto
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "iotistic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mosquitto
  template:
    metadata:
      labels:
        {{- include "iotistic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: {{ printf "%s:%s" .Values.mosquitto.image.repository (.Values.mosquitto.image.tag | default "3.0.0-mosquitto_2.0.18") | quote }}
          imagePullPolicy: {{ .Values.mosquitto.image.pullPolicy }}
          ports:
            - name: mqtt
              containerPort: {{ .Values.mosquitto.ports.mqtt }}
              protocol: TCP
            - name: mqtts
              containerPort: {{ .Values.mosquitto.ports.mqtts }}
              protocol: TCP
            - name: websocket
              containerPort: {{ .Values.mosquitto.ports.websocket }}
              protocol: TCP
          volumeMounts:
            - name: mosquitto-config
              mountPath: /etc/mosquitto/mosquitto.conf
              subPath: mosquitto.conf
              readOnly: true
            - name: tls-certs
              mountPath: /mosquitto/certs
              readOnly: true
            {{- if .Values.mosquitto.persistence.enabled }}
            - name: data
              mountPath: /mosquitto/data
            {{- end }}
          resources:
            {{- toYaml .Values.mosquitto.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.mosquitto.ports.mqtt }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mosquitto.ports.mqtt }}
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: mosquitto-config
          configMap:
            name: {{ include "iotistic.fullname" . }}-mosquitto-config
        - name: tls-certs
          secret:
            secretName: {{ .Values.mosquitto.tlsSecret }}
        {{- if .Values.mosquitto.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: {{ include "iotistic.fullname" . }}-tcproute
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: iotistica-gateway
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "iotistic.fullname" . }}-mosquitto
          port: 1883
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: {{ include "iotistic.fullname" . }}-tlsroute
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: iotistica-gateway
      namespace: envoy-gateway-system
  hostnames:
    - {{ .Values.mosquitto.tlsCommonName }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "iotistic.fullname" . }}-mosquitto
          port: 8883
          weight: 1