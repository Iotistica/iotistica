      - REQUIRE_PROVISIONING=false
      - PROVISIONING_KEY=4de9b6ca125d7c2f832872e827fdf9a1c750f7b27d0a90fc615c90180307f295
      - API_SECURITY_MODE=LOCALHOST_ONLY
      - FIREWALL_ENABLED=true
      - FIREWALL_MODE=auto
      # Testing & Development (not dashboard-controlled)
      - SIMULATION_MODE=false
      - SIMULATION_PROFILE=disabled
