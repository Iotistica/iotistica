# Auto-generated docker-compose file for 1 agents
# Generated: 2026-05-24 11:40:37
# Agents: 72 to 72
# Ports: 48552 to 48552

services:
  agent-72:
    container_name: local-agent-72
    build:
      context: .
      dockerfile: agent/Dockerfile
    restart: always
    mem_limit: 512m
    mem_reservation: 256m
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-72-data:/app/data
      - ./certs/ca.crt:/app/certs/ca.crt:ro
      - ./mosquitto-agent/auth:/app/data/mosquitto-auth  # shared with iotistic-mosquitto-agent for file auth
    environment:
      - DEVICE_API_PORT=48552
      - IOTISTICA_API=http://localhost:4002
      - NODE_ENV=development
      - MQTT_AUTH_DIR=/app/data/mosquitto-auth
      - MQTT_BROKER_URL=mqtt://localhost:5884
      - MQTT_USERNAME=admin
      - MQTT_PASSWORD=iotistic42!
      # Bootstrap & Security (not dashboard-controlled)
      - REQUIRE_PROVISIONING=false
      - PROVISIONING_KEY=ce13de5af8fc37c2bf6ff5cdae21869618df12e07e324e7ae1f6b76696513847
      - API_SECURITY_MODE=LOCALHOST_ONLY
      - FIREWALL_ENABLED=true
      - FIREWALL_MODE=auto
      # Testing & Development (not dashboard-controlled)
      - SIMULATION_MODE=false
      - SIMULATION_PROFILE=disabled
      - SIMULATION_CONFIG='{}'
      - USE_MSGPACK_POC=false
      - USE_KEY_COMPACTION_POC=false
      - USE_DEFLATE_COMPRESSION=false
      - ENABLE_HEAP_PROFILING=false
      - PIPELINE_FLOWS_FILE=/app/data/flows/opcua-transform.flows.json
      # Shell security (HMAC signature verification)
      - AGENT_SHELL_HMAC_KEY=${AGENT_SHELL_HMAC_KEY}
      - AGENT_SHELL_MAX_SESSION_MS=3600000
  agent-cli:
    build:
      context: ./agent-cli
      dockerfile: Dockerfile
    image: iotistic/agent-cli:dev
    container_name: iotistic-agent-cli
    network_mode: host
    entrypoint: ["/bin/sh", "-c"]
    command: ["tail -f /dev/null"]
    tty: true
    environment:
      - DEVICE_API_PORT=48552
      - DEVICE_API_URL=http://localhost:48552
      - CONFIG_DIR=/app/data
      - DEBUG=false
    volumes:
      - agent-cli-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
volumes:
  agent-72-data:
    driver: local
  agent-cli-data:
    driver: local
networks:
  iotistic-net:
    driver: bridge
