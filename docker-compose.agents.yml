      - ./mosquitto-agent/auth:/app/data/mosquitto-auth  # shared with iotistic-mosquitto-agent for file auth
    environment:
      - DEVICE_API_PORT=48555
      - DEVICE_API_HOST=0.0.0.0
      - IOTISTICA_API=http://localhost:4002
      - NODE_ENV=development
      - MQTT_AUTH_DIR=/app/data/mosquitto-auth
      - MQTT_BROKER_URL=mqtt://localhost:5884
      - MQTT_USERNAME=admin
      - MQTT_PASSWORD=iotistic42!
      # Bootstrap & Security (not dashboard-controlled)
      - REQUIRE_PROVISIONING=false
      - PROVISIONING_KEY=87e8b0dd03111e98a93d73c3397ae4531895cfa84011dc204f910813ef59b50e
      - API_SECURITY_MODE=LOCAL_NETWORK
      - FIREWALL_ENABLED=false
      - FIREWALL_MODE=off
      # Testing & Development (not dashboard-controlled)
      - SIMULATION_MODE=false
      - SIMULATION_PROFILE=disabled
      - SIMULATION_CONFIG='{}'
      - USE_MSGPACK_POC=false
      - USE_KEY_COMPACTION_POC=false
      - USE_DEFLATE_COMPRESSION=false
      - ENABLE_HEAP_PROFILING=false
      - PIPELINE_FLOWS_FILE=/app/data/flows/opcua-transform.flows.json
      # Shell security (HMAC signature verification)
      - AGENT_SHELL_HMAC_KEY=${AGENT_SHELL_HMAC_KEY}
      - AGENT_SHELL_MAX_SESSION_MS=3600000
    networks:
      - iotistic-net
  agent-cli:
    build:
      context: ./agent-cli
      dockerfile: Dockerfile
    image: iotistic/agent-cli:dev
    container_name: iotistic-agent-cli
    entrypoint: ["/bin/sh", "-c"]
    command: ["tail -f /dev/null"]
    tty: true
    environment:
      - DEVICE_API_PORT=48555
      - DEVICE_API_URL=http://agent-75:48555
      - CONFIG_DIR=/app/data
      - DEBUG=false
    volumes:
      - agent-cli-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - iotistic-net
volumes:
  agent-75-data:
    driver: local
  agent-cli-data:
    driver: local
networks:
  iotistic-net:
    driver: bridge
