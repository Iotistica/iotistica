# Agents: 75 to 75
# Ports: 48555 to 48555

services:
  agent-75:
    container_name: local-agent-75
    build:
      context: .
      dockerfile: agent/Dockerfile
    restart: always
    mem_limit: 512m
    mem_reservation: 256m
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "48555:48555"
