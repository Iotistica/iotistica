# Auto-generated docker-compose file for 1 agents
# Generated: 2026-06-13 14:28:51
# Agents: 1 to 1
# Ports: 48481 to 48481

services:
  agent-1:
    container_name: local-agent-1
    build:
      context: .
      dockerfile: agent/Dockerfile
    restart: always
    mem_limit: 512m
    mem_reservation: 256m
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "0.0.0.0:48481:48481"
    networks:
      - iotistica-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-1-data:/app/data
      - ./certs/ca.crt:/app/certs/ca.crt:ro
      - ./mosquitto-agent/auth:/app/data/mosquitto-auth  # shared with iotistic-mosquitto-agent for file auth
    environment:
      - DEVICE_API_PORT=48481
      - NODE_ENV=development
      - MQTT_AUTH_DIR=/app/data/mosquitto-auth
      - MQTT_BROKER_URL=mqtt://iotistic-mosquitto-agent:1883
      - MQTT_USERNAME=admin
      - MQTT_PASSWORD=iotistic42!
      # Bootstrap & Security (not dashboard-controlled)
      - STANDALONE=false
      - IOTISTICA_API=http://host.docker.internal:4003
      - API_SECURITY_MODE=LOCAL_NETWORK
      - FIREWALL_ENABLED=false
      - FIREWALL_MODE=off
      # Testing & Development (not dashboard-controlled)
      - SIMULATION_MODE=false
      - SIMULATION_PROFILE=disabled
      - SIMULATION_CONFIG='{}'
      - USE_MSGPACK_POC=false
      - USE_KEY_COMPACTION_POC=false
      - USE_DEFLATE_COMPRESSION=false
      - ENABLE_HEAP_PROFILING=false
      - PIPELINE_FLOWS_FILE=/app/data/flows/opcua-transform.flows.json
      # Shell security (HMAC signature verification)
      - AGENT_SHELL_HMAC_KEY=${AGENT_SHELL_HMAC_KEY}
      - AGENT_SHELL_MAX_SESSION_MS=3600000
  agent-cli:
    build:
      context: ./agent-cli
      dockerfile: Dockerfile
    image: iotistic/agent-cli:dev
    container_name: iotistic-agent-cli
    entrypoint: ["/bin/sh", "-c"]
    command: ["tail -f /dev/null"]
    tty: true
    environment:
      - DEVICE_API_PORT=48481
      - DEVICE_API_URL=http://agent-1:48481
      - CONFIG_DIR=/app/data
      - DEBUG=false
    volumes:
      - agent-cli-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - iotistica-net
volumes:
  agent-1-data:
    driver: local
  agent-cli-data:
    driver: local
networks:
  iotistica-net:
    external: true
    name: iotistica-net
