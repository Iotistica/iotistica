# Combined Playwright pipeline for feature branch testing
# Optimized with shallow + sparse checkout (only SmokeTests folder)

name: $(Date:yyyyMMdd)$(Rev:.r)

# Feature branch only triggers
trigger:
  branches:
    include:
    - feature/playwright-web-site-tests
  paths:
    include:
    - Website/src/IICWeb.SmokeTests/*

# Feature branch development scheduling
schedules:
- cron: "0 12 * * 1"  # weekly monday at 7 am ET
  displayName: Weekly Playwright Smoke Tests (Mon 7 AM ET)
  branches:
    include:
    - feature/playwright-web-site-tests
  always: true

variables:
  buildConfiguration: 'Release'

stages:
- stage: AllClasses
  displayName: 'Build and Run Tests'
  jobs:
  - job: AllTests
    displayName: 'Run Tests'
    pool:
      name: 'default'  
    timeoutInMinutes: 60
    steps:

    # Shallow + sparse checkout
    - checkout: self
      fetchDepth: 1
      persistCredentials: true

    - script: |
        git sparse-checkout init --cone
        git sparse-checkout set Website/src/IICWeb.SmokeTests
      displayName: 'Enable Sparse Checkout (SmokeTests only)'

    - task: PowerShell@2
      displayName: "Show repo folder sizes"
      inputs:
        targetType: 'inline'
        script: |
          Function Get-DirSize($path) {
              if (Test-Path $path) {
                  $size = (Get-ChildItem -Path $path -Recurse -ErrorAction SilentlyContinue |
                           Measure-Object -Property Length -Sum).Sum
                  if ($size -gt 1GB) { return "{0:N2} GB" -f ($size / 1GB) }
                  elseif ($size -gt 1MB) { return "{0:N2} MB" -f ($size / 1MB) }
                  elseif ($size -gt 1KB) { return "{0:N2} KB" -f ($size / 1KB) }
                  else { return "$size bytes" }
              } else {
                  return "Not found"
              }
          }

          $sourcesDir = "$(Build.SourcesDirectory)"
          $gitDir     = Join-Path $sourcesDir ".git"

          Write-Host "Sources Directory: $sourcesDir"
          Write-Host "Size of working directory (excluding .git): $(Get-DirSize $sourcesDir)"
          Write-Host "Size of .git object store: $(Get-DirSize $gitDir)"


    # Build project
    - task: DotNetCoreCLI@2
      displayName: 'Build Test Project'
      inputs:
        command: 'build'
        projects: 'Website/src/IICWeb.SmokeTests/IICWeb.SmokeTests.csproj'
        arguments: '--configuration $(buildConfiguration)'

    # Install Playwright
    - task: PowerShell@2
      displayName: 'Install Playwright'
      inputs:
        targetType: 'inline'
        workingDirectory: 'Website/src/IICWeb.SmokeTests'
        script: |
          ./bin/$(buildConfiguration)/net5.0/playwright.ps1 install --with-deps

    # Run tests
    - task: DotNetCoreCLI@2
      displayName: 'Run Courses Tests'
      timeoutInMinutes: 45
      continueOnError: true
      inputs:
        command: 'test'
        projects: 'Website/src/IICWeb.SmokeTests/IICWeb.SmokeTests.csproj'
        arguments: '--configuration $(buildConfiguration) --no-build --results-directory "$(Agent.TempDirectory)/TestResults/Class" --logger "trx;LogFileName=ClassCollection.trx;Verbosity=normal" --settings "Website/src/IICWeb.SmokeTests/Settings/classes.runsettings"'

     # Run tests
    - task: DotNetCoreCLI@2
      displayName: 'Run Events Tests'
      timeoutInMinutes: 45
      continueOnError: true
      inputs:
        command: 'test'
        projects: 'Website/src/IICWeb.SmokeTests/IICWeb.SmokeTests.csproj'
        arguments: '--configuration $(buildConfiguration) --no-build --logger "trx;LogFileName=EventCollection.trx;Verbosity=normal" --settings "Website/src/IICWeb.SmokeTests/Settings/events.runsettings"'


    # Copy artifacts
    - task: PowerShell@2
      displayName: 'Copy Artifacts'
      condition: always()
      inputs:
        targetType: 'inline'
        script: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $artifactsDir = "$(Agent.TempDirectory)/Artifacts"
          New-Item -Path $artifactsDir -ItemType Directory -Force

          # Paths where results may be located
          $sources = @(
            "$(Agent.TempDirectory)/**/*.trx",  # TRX results
            "$(Build.SourcesDirectory)/Website/src/IICWeb.SmokeTests/bin/Release/**/*.png", # Screenshots
            "$(Build.SourcesDirectory)/Website/src/IICWeb.SmokeTests/bin/Release/**/*.json" # JSON exports
          )

          foreach ($source in $sources) {
            Get-ChildItem -Path $source -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination $artifactsDir -Force -ErrorAction SilentlyContinue
            }
          }

          $files = Get-ChildItem $artifactsDir -Recurse -File -ErrorAction SilentlyContinue
          Write-Host "Artifacts collected: $($files.Count)"

    # Publish test results
    - task: PublishTestResults@2
      displayName: 'Publish Results'
      condition: always()
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: |
          $(Agent.TempDirectory)/**/ClassCollection.trx
          $(Agent.TempDirectory)/**/EventCollection.trx
        mergeTestResults: true
        failTaskOnFailedTests: false
        testRunTitle: 'Class Collection - Production'

    # Publish artifacts
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifacts'
      condition: always()
      inputs:
        pathtoPublish: '$(Agent.TempDirectory)/Artifacts'
        artifactName: 'playwright-collection-artifacts'
        publishLocation: 'Container'

    # Generate Summary
    - task: PowerShell@2
      displayName: 'Generate Summary'
      condition: always()
      inputs:
        targetType: 'inline'
        script: |
          $summaryFile = "$(Build.ArtifactStagingDirectory)/Summary.md"
          New-Item -Path $summaryFile -ItemType File -Force | Out-Null

          function Add-Line {
              param([string]$Text)

              Add-Content -Path $summaryFile -Value $Text
              Write-Host $Text
          }

          # Header
          Add-Line "## PLAYWRIGHT COLLECTION SUMMARY"
          Add-Line ""
          Add-Line "**Build:** $(Build.BuildNumber)"
          Add-Line "**Branch:** $(Build.SourceBranchName)"
          Add-Line "**Trigger:** $(Build.Reason)"
          Add-Line "**Commit:** $(Build.SourceVersion)"
          Add-Line ""

          # Collections to process
          $collections = @(
              @{
                  Name = "CLASS COLLECTION"
                  File = "ClassCollection.trx"
              },
              @{
                  Name = "EVENT COLLECTION"
                  File = "EventCollection.trx"
              }
          )

          foreach ($collection in $collections) {

              Add-Line "---"
              Add-Line ""
              Add-Line "## $($collection.Name)"
              Add-Line ""

              $trxFile = Get-ChildItem "$(Agent.TempDirectory)" `
                          -Recurse `
                          -Filter $collection.File `
                          -ErrorAction SilentlyContinue |
                          Sort-Object LastWriteTime -Descending |
                          Select-Object -First 1

              if (-not $trxFile) {
                  Add-Line "No TRX results found for $($collection.Name)"
                  Add-Line ""
                  continue
              }

              Add-Line "TRX Test Results ($($trxFile.Name))"
              Add-Line ""

              [xml]$trxXml = Get-Content $trxFile.FullName

              $total   = 0
              $passed  = 0
              $failed  = 0
              $skipped = 0

              foreach ($test in $trxXml.TestRun.Results.UnitTestResult) {

                  $total++

                  switch ($test.outcome) {
                      "Passed" { $passed++ }
                      "Failed" { $failed++ }
                      "NotExecuted" { $skipped++ }
                  }

                  $testName = $test.testName
                  $outcome  = $test.outcome
                  $duration = $test.duration

                  Add-Line "- $testName : $outcome ($duration)"

                  if ($test.Output -and $test.Output.StdOut) {
                      $stdout = $test.Output.StdOut.Trim()
                      if ($stdout) {
                          Add-Line "  StdOut: $stdout"
                      }
                  }

                  if ($test.Output -and $test.Output.ErrorInfo) {

                      $msg = $test.Output.ErrorInfo.Message
                      $stack = $test.Output.ErrorInfo.StackTrace

                      if ($msg) {
                          Add-Line "  Error Message: $msg"
                      }

                      if ($stack) {
                          Add-Line "  Stack Trace: $stack"
                      }
                  }
              }

              Add-Line ""
              Add-Line "### Summary"
              Add-Line "- Total: $total"
              Add-Line "- Passed: $passed"
              Add-Line "- Failed: $failed"
              Add-Line "- Skipped: $skipped"
              Add-Line ""
          }

          # Screenshots
          $screenshots = Get-ChildItem `
              "$(Build.SourcesDirectory)/Website/src/IICWeb.SmokeTests/bin/Release" `
              -Filter "*.png" `
              -Recurse `
              -ErrorAction SilentlyContinue

          Add-Line "---"
          Add-Line ""

          if ($screenshots) {
              Add-Line "### Screenshots"
              Add-Line "- Screenshots captured: $($screenshots.Count)"
          }
          else {
              Add-Line "### Screenshots"
              Add-Line "- No screenshots captured"
          }

          Add-Line ""
          Add-Line "### Status"
          Add-Line "- Playwright automation testing completed"

          Write-Host "##vso[task.uploadsummary]$summaryFile"

    - task: DeleteFiles@1
      displayName: 'Clean up build outputs'
      condition: always()
      inputs:
         SourceFolder: '$(Build.SourcesDirectory)/Website/src/IICWeb.SmokeTests'
         Contents: |
            bin/**
            obj/**
