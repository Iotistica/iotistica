<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Iotistica</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            padding: 1rem 0;
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .nav-brand .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Page Container */
        .form-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 8rem 2rem 4rem;
            background: var(--bg-primary);
        }

        .form-wrapper {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .form-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Selected Plan Display */
        .selected-plan-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .plan-info h3 {
            color: var(--text-primary);
            font-size: 1.1rem;
            margin: 0 0 0.25rem 0;
        }

        .plan-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 0;
        }

        .plan-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        /* Form Card */
        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
        }

        .form-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 0.875rem 1.5rem;
            margin-top: 1.5rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .terms {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 1rem;
            line-height: 1.5;
        }

        .terms a {
            color: var(--accent-primary);
            text-decoration: none;
            transition: var(--transition);
        }

        .terms a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-link:hover {
            gap: 0.5rem;
        }

        .change-plan-btn {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .change-plan-btn:hover {
            background: var(--accent-primary);
            color: white;
        }

        .error-message {
            padding: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #ef4444;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 6rem 1rem 2rem;
            }

            .form-title {
                font-size: 1.6rem;
            }

            .form-card {
                padding: 1.5rem;
            }

            .selected-plan-section {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <span class="logo">Iotistica</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="form-container">
        <div class="form-wrapper">
            <div class="form-header">
                <div class="form-logo">Iotistica</div>
                <h1 class="form-title">Create Your Account</h1>
                <p class="form-subtitle">Complete the form below to get started</p>
            </div>

            <!-- Selected Plan Display -->
            <div class="selected-plan-section" id="selectedPlanSection" style="display: none;">
                <div class="plan-info">
                    <h3 id="planName">Free Trial</h3>
                    <p id="planDetails">14-day free trial</p>
                </div>
                <div style="text-align: right;">
                    <div class="plan-price" id="planPrice">14 days</div>
                    <button class="change-plan-btn" onclick="window.location.href='signup.html'">Change Plan</button>
                </div>
            </div>

            <!-- Form Card -->
            <div class="form-card">
                <h2 class="form-section-title">Account Information</h2>

                <div class="error-message" id="errorMessage"></div>

                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label" for="email">Work Email Address *</label>
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            placeholder="you@company.com"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="companyName">Company Name *</label>
                        <input 
                            type="text" 
                            id="companyName" 
                            class="form-input" 
                            placeholder="Your company name"
                            required
                            autocomplete="organization"
                            maxlength="255"
                        >
                    </div>

                    <input type="hidden" id="selectedPlan" name="plan" value="trial">

                    <button type="submit" class="btn-submit" id="submitBtn">
                        Start Your Free Trial
                    </button>

                    <p class="terms">
                        By signing up, you agree to our 
                        <a href="#">Terms of Service</a> and 
                        <a href="#">Privacy Policy</a>
                    </p>
                </form>

                <a href="signup.html" class="back-link">Back to Plans</a>
            </div>
        </div>
    </div>

    <script>
        // Provisioning API configuration
        const PROVISIONING_API_URL = 'https://api.iotistica.com/provisioning';

        // Load selected plan from sessionStorage
        function loadSelectedPlan() {
            const selectedPlan = sessionStorage.getItem('selected_plan');
            
            if (selectedPlan) {
                const plan = JSON.parse(selectedPlan);
                document.getElementById('selectedPlan').value = plan.id;
                document.getElementById('planName').textContent = plan.name;
                document.getElementById('planPrice').textContent = plan.price;
                document.getElementById('planDetails').textContent = `${plan.period}`;
                document.getElementById('selectedPlanSection').style.display = 'flex';
            }
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Hide error message
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        // Handle form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = document.getElementById('email').value;
            const companyName = document.getElementById('companyName').value;
            const plan = document.getElementById('selectedPlan').value;
            const submitBtn = document.getElementById('submitBtn');

            console.log('Signup form submitted:', { email, company: companyName, plan });

            // Disable button during submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                console.log(`Calling: ${PROVISIONING_API_URL}/api/auth/start-signup`);
                const response = await fetch(`${PROVISIONING_API_URL}/api/auth/start-signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        company: companyName,
                        plan
                    })
                });

                console.log(`Response status: ${response.status} ${response.statusText}`);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: response.statusText }));
                    console.error('Server error:', errorData);
                    throw new Error(errorData.error || `Server error: ${response.status}`);
                }

                const data = await response.json();
                console.log('Received auth0Url:', !!data.auth0Url);
                
                if (!data.auth0Url) {
                    throw new Error('Missing Auth0 redirect URL in response');
                }

                console.log('Redirecting to Auth0...');
                window.location.href = data.auth0Url;
            } catch (error) {
                console.error('Signup failed:', error);
                showError(error.message || 'Unable to start signup. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Start Your Free Trial';
            }
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadSelectedPlan();
        });
    </script>
</body>
</html>
