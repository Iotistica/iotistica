{{- if .Values.postoffice.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iotistic.fullname" . }}-postoffice
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: postoffice
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postoffice.port }}
      targetPort: postoffice
      protocol: TCP
      name: http
  selector:
    {{- include "iotistic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postoffice
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iotistic.fullname" . }}-postoffice
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: postoffice
spec:
  replicas: {{ .Values.postoffice.replicas }}
  selector:
    matchLabels:
      {{- include "iotistic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postoffice
  template:
    metadata:
      labels:
        {{- include "iotistic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postoffice
    spec:
      containers:
        - name: postoffice
          image: "{{ .Values.postoffice.image.repository }}:{{ .Values.postoffice.image.tag }}"
          imagePullPolicy: {{ .Values.postoffice.image.pullPolicy }}
          ports:
            - name: postoffice
              containerPort: {{ .Values.postoffice.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.postoffice.port | quote }}
            - name: HOST
              value: "0.0.0.0"
            - name: NODE_ENV
              value: {{ .Values.postoffice.env.NODE_ENV | quote }}
            # Redis connection
            - name: REDIS_HOST
              value: {{ include "iotistic.fullname" . }}-redis
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: REDIS_DB
              value: {{ .Values.postoffice.env.REDIS_DB | quote }}
            # Database connection for audit logging
            - name: DB_HOST
              value: {{ include "iotistic.fullname" . }}-postgres
            - name: DB_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: DB_NAME
              value: {{ .Values.postgres.database | quote }}
            - name: DB_USER
              value: {{ .Values.postgres.username | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            # Email transport configuration
            - name: EMAIL_TRANSPORT
              value: {{ .Values.postoffice.email.transport | quote }}
            {{- if eq .Values.postoffice.email.transport "smtp" }}
            # SMTP configuration
            - name: SMTP_HOST
              value: {{ .Values.postoffice.email.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.postoffice.email.smtp.port | quote }}
            - name: SMTP_SECURE
              value: {{ .Values.postoffice.email.smtp.secure | quote }}
            {{- if .Values.postoffice.email.smtp.existingSecret }}
            # Read SMTP credentials from existing Kubernetes Secret
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postoffice.email.smtp.existingSecret }}
                  key: username
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postoffice.email.smtp.existingSecret }}
                  key: password
            {{- else }}
            # Use credentials from values.yaml (not recommended for production)
            - name: SMTP_USER
              value: {{ .Values.postoffice.email.smtp.username | quote }}
            - name: SMTP_PASS
              value: {{ .Values.postoffice.email.smtp.password | quote }}
            {{- end }}
            {{- else if eq .Values.postoffice.email.transport "ses" }}
            # AWS SES configuration
            - name: AWS_REGION
              value: {{ .Values.postoffice.email.ses.region | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postoffice.email.ses.existingSecret | default (printf "%s-postoffice-ses" (include "iotistic.fullname" .)) }}
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postoffice.email.ses.existingSecret | default (printf "%s-postoffice-ses" (include "iotistic.fullname" .)) }}
                  key: secret-access-key
            {{- end }}
            # Email defaults
            - name: EMAIL_FROM
              value: {{ .Values.postoffice.email.from | quote }}
            - name: EMAIL_FROM_NAME
              value: {{ .Values.postoffice.email.fromName | quote }}
            # Queue configuration
            - name: QUEUE_CONCURRENCY
              value: {{ .Values.postoffice.queue.concurrency | quote }}
            - name: QUEUE_MAX_RETRY
              value: {{ .Values.postoffice.queue.maxRetry | quote }}
            - name: QUEUE_RETRY_DELAY
              value: {{ .Values.postoffice.queue.retryDelay | quote }}
            # Bull Board (queue monitoring)
            - name: BULL_BOARD_ENABLED
              value: {{ .Values.postoffice.bullBoard.enabled | quote }}
            - name: BULL_BOARD_PATH
              value: {{ .Values.postoffice.bullBoard.path | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: postoffice
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: postoffice
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.postoffice.resources | nindent 12 }}
{{- end }}
