{{- if .Values.housekeeper.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iotistic.fullname" . }}-housekeeper
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: housekeeper
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.housekeeper.port }}
      targetPort: housekeeper
      protocol: TCP
      name: http
  selector:
    {{- include "iotistic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: housekeeper
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iotistic.fullname" . }}-housekeeper
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
    app.kubernetes.io/component: housekeeper
spec:
  replicas: {{ .Values.housekeeper.replicas }}
  selector:
    matchLabels:
      {{- include "iotistic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: housekeeper
  template:
    metadata:
      labels:
        {{- include "iotistic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: housekeeper
    spec:
      containers:
        - name: housekeeper
          image: "{{ .Values.housekeeper.image.repository }}:{{ .Values.housekeeper.image.tag }}"
          imagePullPolicy: {{ .Values.housekeeper.image.pullPolicy }}
          ports:
            - name: housekeeper
              containerPort: {{ .Values.housekeeper.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.housekeeper.port | quote }}
            - name: HOST
              value: "0.0.0.0"
            - name: NODE_ENV
              value: {{ .Values.housekeeper.env.NODE_ENV | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.housekeeper.env.LOG_LEVEL | quote }}
            - name: DB_HOST
              value: {{ include "iotistic.fullname" . }}-postgres
            - name: DB_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: DB_NAME
              value: {{ .Values.postgres.database | quote }}
            - name: DB_USER
              value: {{ .Values.postgres.username | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: DB_POOL_MAX
              value: {{ .Values.housekeeper.env.DB_POOL_MAX | quote }}
            - name: DB_IDLE_TIMEOUT
              value: {{ .Values.housekeeper.env.DB_IDLE_TIMEOUT | quote }}
            - name: DB_CONNECT_TIMEOUT
              value: {{ .Values.housekeeper.env.DB_CONNECT_TIMEOUT | quote }}
            # Task scheduling configuration
            - name: ENABLE_VACUUM
              value: {{ .Values.housekeeper.tasks.vacuum.enabled | quote }}
            - name: VACUUM_SCHEDULE
              value: {{ .Values.housekeeper.tasks.vacuum.schedule | quote }}
            - name: ENABLE_PARTITION_MAINTENANCE
              value: {{ .Values.housekeeper.tasks.partitionMaintenance.enabled | quote }}
            - name: PARTITION_MAINTENANCE_SCHEDULE
              value: {{ .Values.housekeeper.tasks.partitionMaintenance.schedule | quote }}
            - name: ENABLE_LOG_CLEANUP
              value: {{ .Values.housekeeper.tasks.logCleanup.enabled | quote }}
            - name: LOG_CLEANUP_SCHEDULE
              value: {{ .Values.housekeeper.tasks.logCleanup.schedule | quote }}
            - name: LOG_RETENTION_DAYS
              value: {{ .Values.housekeeper.tasks.logCleanup.retentionDays | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: housekeeper
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: housekeeper
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.housekeeper.resources | nindent 12 }}
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
{{- end }}
