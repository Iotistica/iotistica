{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "iotistic.fullname" . }}
  labels:
    {{- include "iotistic.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ include "iotistic.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "iotistic.fullname" . }}-dashboard
                port:
                  number: {{ .Values.dashboard.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "iotistic.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
{{- end }}
