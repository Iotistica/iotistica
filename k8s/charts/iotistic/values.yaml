# Default values for iotistic integration stack
# This is a YAML-formatted file for development and testing

# Global configuration
global:
  namespace: iotistic

# PostgreSQL database
postgres:
  enabled: true
  image:
    repository: timescale/timescaledb
    tag: "latest-pg16"  # TimescaleDB with PostgreSQL 16
  database: iotistic
  username: postgres
  password: postgres
  port: 5432
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true

# Redis cache
# RESOURCE TIERS - Choose based on your server capacity:
# 
# MINIMAL (Dev server, 25-50 agents) - CURRENT:
#   requests: cpu 200m, memory 512Mi
#   limits: cpu 500m, memory 768Mi
#   maxMemory: 512mb
#
# BALANCED (Production, 4-8GB RAM, 50-100 agents):
#   requests: cpu 300m, memory 768Mi
#   limits: cpu 1000m, memory 1Gi
#   maxMemory: 768mb

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  port: 6379
  # MINIMAL tier: Dev server with limited resources
  maxMemory: 512mb
  maxMemoryPolicy: allkeys-lru  # Evict any key when memory full
  persistence:
    enabled: false  # Disabled for dev (less disk I/O, faster restarts)
  storage:
    size: 2Gi  # Minimal for dev environment
    storageClass: ""
  # MINIMAL tier resources for dev server
  resources:
    requests:
      cpu: 200m       # Light baseline
      memory: 512Mi
    limits:
      cpu: 500m       # Modest burst allowance
      memory: 768Mi
  # Simplified config for dev environment
  config:
    maxclients: "5000"            # Sufficient for dev testing
    timeout: "300"                # Close idle connections after 5min
    save: ""                      # No RDB snapshots (dev only)
    appendonly: "no"              # No AOF for dev (faster)

# Mosquitto MQTT broker
mosquitto:
  enabled: true
  image:
    repository: iegomez/mosquitto-go-auth
    tag: "3.0.0-mosquitto_2.0.18"  # Pinned to stable version
    pullPolicy: IfNotPresent  # Don't pull on every deployment
  ports:
    mqtt: 1883
    websocket: 9001
  # Service type: LoadBalancer (cloud) or NodePort (local dev)
  # LoadBalancer will automatically get external IP from cloud provider
  # NodePort requires manual externalHost configuration
  serviceType: NodePort
  nodePorts:
    mqtt: 30883
    websocket: 30901
  # External host for device connections
  # - If serviceType is LoadBalancer: leave empty, will use LoadBalancer external IP
  # - If serviceType is NodePort: set to your K8s node IP (e.g., "10.27.27.160")
  # - If empty with NodePort: falls back to internal service name (devices won't connect)
  externalHost: "10.27.27.160"  # Set to your K8s node IP
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Authentication configuration
  auth:
    allowAnonymous: false
    hasher: bcrypt
    hasherCost: 10
    logLevel: info
  # Persistence for message queues
  persistence:
    enabled: true

# MQTT Broker Configuration
# Choose between local (self-hosted Mosquitto) or cloud (HiveMQ, AWS IoT Core)
mqttBroker:
  # Broker type: 'local' or 'cloud'
  # - local: Uses Mosquitto deployment (above)
  # - cloud: Uses external managed MQTT service (HiveMQ Cloud, AWS IoT Core, etc.)
  type: local
  
  # Local broker configuration (uses Mosquitto deployment)
  local:
    # Credentials for API and services to connect to local broker
    username: admin
    password: iotistic42!  # Change in production
    # Internal service connection
    host: "{{ include \"iotistic.fullname\" . }}-mosquitto"
    port: 1883
    protocol: mqtt
    useTls: false
    
  # Cloud broker configuration (HiveMQ Cloud, AWS IoT Core, etc.)
  cloud:
    # Enable cloud broker (requires configuration)
    enabled: false
    # Provider: 'hivemq', 'aws-iot', 'azure-iot', 'custom'
    provider: hivemq
    # Connection details (must be configured if enabled)
    host: ""  # e.g., abc123.s1.eu.hivemq.cloud
    port: 8883
    protocol: mqtts
    username: ""
    password: ""
    # Cloud brokers always use TLS
    useTls: true
    verifyCertificate: true
    # CA certificate (optional - most cloud providers use public CAs)
    caCert: ""
    # Connection options
    keepAlive: 60
    cleanSession: true
    reconnectPeriod: 5000
    connectTimeout: 30000

# API service
api:
  enabled: true
  image:
    repository: iotistic/api
    tag: latest
    pullPolicy: IfNotPresent  # Use local images only (prevents pulling from registry)
  replicas: 1  # Single replica for now
  port: 3002
  serviceType: NodePort
  nodePort: 30002
  # CORS configuration for cross-origin requests from dashboard
  # Use wildcard pattern like "http://*:30000" to allow any IP on NodePort 30000
  corsOrigins: "http://localhost:5173,http://localhost:3001,http://localhost:3000,http://*:30000"
  resources:
    requests:
      cpu: 250m        # Reduced for single-node clusters
      memory: 512Mi    # Increased for connection pool
    limits:
      cpu: 1000m       # Increased for fleet load
      memory: 1Gi      # Increased for connection pool (200 connections)
  # Horizontal Pod Autoscaling for dynamic fleet scaling
  autoscaling:
    enabled: false     # Disabled for now
    minReplicas: 3     # Minimum pods for large fleet (100+ agents)
    maxReplicas: 10    # Scale up to 10 pods under heavy load
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    NODE_ENV: development
    LOG_LEVEL: info
    DB_POOL_SIZE: "200"  # Increased for large fleet deployments (100+ agents)
    MQTT_PERSIST_TO_DB: "true"
    MQTT_DB_SYNC_INTERVAL: "10000"
    MQTT_MONITOR_ENABLED: "true"
    LOG_COMPRESSION: "true"
    VPN_ENABLED: "false"
    FORCE_COLOR: "1"
  # MQTT credentials
  # SECURITY: For production, use Kubernetes Secrets instead of hardcoding here
  # Option 1 (Recommended): Create secret manually:
  #   kubectl create secret generic iotistic-mqtt-credentials \
  #     --from-literal=username=admin \
  #     --from-literal=password='your-secure-password' \
  #     -n iotistic-nodeport
  #   Then set mqtt.existingSecret=iotistic-mqtt-credentials
  #
  # Option 2: Use separate values-secret.yaml (add to .gitignore):
  #   helm install -f values.yaml -f values-secret.yaml
  #
  # Option 3: Pass via --set flag:
  #   helm install --set mqtt.username=admin --set mqtt.password=secret
  mqtt:
    # Reference existing Kubernetes secret (recommended for production)
    existingSecret: "iotistic-mqtt-credentials"
  # License configuration (optional)
  license:
    publicKey: ""
    key: ""

# Dashboard UI
dashboard:
  enabled: true
  image:
    repository: iotistic/dashboard
    tag: latest
    pullPolicy: IfNotPresent  # Use local images only (prevents pulling from registry)
  replicas: 1
  port: 80
  serviceType: NodePort
  nodePort: 30000
  # API URL for browser access
  # Options:
  # 1. Use node IP with NodePort: "http://<NODE_IP>:30002" (replace <NODE_IP> with your K8s node IP)
  # 2. Use service name for internal access: "http://iotistic-api:3002" (works only from within cluster)
  # 3. Use empty string "" to auto-detect from browser (uses window.location.host with API port)
  # 4. Use ingress hostname: "https://api.iotistic.local" (requires ingress configuration)
  #
  # For local K8s (minikube, kind, k3d):
  #   - Get node IP: kubectl get nodes -o wide
  #   - Set to: "http://<NODE_IP>:30002"
  # For production with ingress:
  #   - Set to your API ingress URL
  apiUrl: ""  # Empty = auto-detect from browser
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  env:
    NODE_ENV: development

# MQTT Monitor service
mqttMonitor:
  enabled: true
  image:
    repository: iotistic/mqtt-monitor
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3500
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  env:
    NODE_ENV: development
    LOG_LEVEL: info
    DB_POOL_SIZE: "10"
    MQTT_PERSIST_DB: "true"
    MQTT_DB_SYNC_INTERVAL: "30000"
    MQTT_METRICS_UPDATE_INTERVAL: "5000"
    MQTT_TOPIC_TREE_UPDATE_INTERVAL: "5000"
  # MQTT credentials (should match mosquitto credentials)
  # SECURITY: For production, reference the same secret as API service
  # See api.mqtt configuration above for security options
  mqtt:
    # Reference existing Kubernetes secret (recommended for production)
    existingSecret: "iotistic-mqtt-credentials"

# Housekeeper service - Database maintenance and cleanup
housekeeper:
  enabled: true
  image:
    repository: iotistic/housekeeper
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3400
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  env:
    NODE_ENV: development
    LOG_LEVEL: info
    DB_POOL_MAX: "10"
    DB_IDLE_TIMEOUT: "30000"
    DB_CONNECT_TIMEOUT: "10000"
  # Scheduled task configuration
  tasks:
    # Database VACUUM - reclaim storage and update statistics
    vacuum:
      enabled: true
      schedule: "0 2 * * *"  # Daily at 2 AM
    # Partition maintenance - create/drop partitions for time-series data
    partitionMaintenance:
      enabled: true
      schedule: "0 3 * * *"  # Daily at 3 AM
    # Log cleanup - delete old logs based on retention policy
    logCleanup:
      enabled: true
      schedule: "0 4 * * *"  # Daily at 4 AM
      retentionDays: 30

# Postoffice service - Email delivery service
postoffice:
  enabled: true
  image:
    repository: iotistic/postoffice
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3600
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    NODE_ENV: development
    REDIS_DB: "2"  # Use separate Redis DB for email queue
  # Email configuration
  email:
    transport: smtp  # Options: smtp, ses
    from: "noreply@iotistic.com"
    fromName: "Iotistic Platform"
    # SMTP configuration (if transport=smtp)
    smtp:
      host: "smtp.gmail.com"
      port: "587"
      secure: "false"  # Use TLS
      # Credentials should be stored in Kubernetes Secret
      existingSecret: ""  # Leave empty to use values below (not recommended for production)
      username: ""
      password: ""
    # AWS SES configuration (if transport=ses)
    ses:
      region: "us-east-1"
      # Credentials should be stored in Kubernetes Secret
      existingSecret: ""  # Leave empty to use values below (not recommended for production)
      accessKeyId: ""
      secretAccessKey: ""
  # Queue configuration
  queue:
    concurrency: "5"  # Number of concurrent email processing jobs
    maxRetry: "3"     # Maximum retry attempts for failed emails
    retryDelay: "60000"  # Delay between retries (ms)
  # Bull Board UI (queue monitoring)
  bullBoard:
    enabled: true
    path: "/admin/queues"

# Ingress configuration (optional for local dev)
ingress:
  enabled: false
  className: nginx
  host: iotistic.local
  tls:
    enabled: false

# Network policies
networkPolicy:
  enabled: false  # Disabled for easier local development

# Resource quotas
resourceQuota:
  enabled: false  # Disabled for local development
