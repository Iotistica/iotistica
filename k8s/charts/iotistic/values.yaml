# Default values for iotistic integration stack
# This is a YAML-formatted file for development and testing

# Global configuration
global:
  namespace: iotistic

# PostgreSQL database
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  database: iotistic
  username: postgres
  password: postgres
  port: 5432
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true

# Redis cache
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  port: 6379
  maxMemory: 256mb
  maxMemoryPolicy: volatile-lru
  persistence:
    enabled: true
  storage:
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Mosquitto MQTT broker
mosquitto:
  enabled: true
  image:
    repository: iegomez/mosquitto-go-auth
    tag: "2.0.5"  # Pinned to stable version
    pullPolicy: IfNotPresent  # Don't pull on every deployment
  ports:
    mqtt: 1883
    websocket: 9001
  # Expose ports for local development (NodePort)
  serviceType: NodePort
  nodePorts:
    mqtt: 30883
    websocket: 30901
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Authentication configuration
  auth:
    allowAnonymous: false
    hasher: bcrypt
    hasherCost: 10
    logLevel: info
  # Persistence for message queues
  persistence:
    enabled: true

# API service
api:
  enabled: true
  image:
    repository: iotistic/api
    tag: latest
    pullPolicy: IfNotPresent  # Use local images only (prevents pulling from registry)
  replicas: 1
  port: 3002
  serviceType: NodePort
  nodePort: 30002
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    NODE_ENV: development
    LOG_LEVEL: info
    DB_POOL_SIZE: "20"
    MQTT_PERSIST_TO_DB: "true"
    MQTT_DB_SYNC_INTERVAL: "10000"
    MQTT_MONITOR_ENABLED: "true"
    LOG_COMPRESSION: "true"
    VPN_ENABLED: "false"
    FORCE_COLOR: "1"
  # MQTT credentials
  mqtt:
    username: admin
    password: iotistic42!
  # License configuration (optional)
  license:
    publicKey: ""
    key: ""

# Dashboard UI
dashboard:
  enabled: true
  image:
    repository: iotistic/dashboard
    tag: latest
    pullPolicy: IfNotPresent  # Use local images only (prevents pulling from registry)
  replicas: 1
  port: 80
  serviceType: NodePort
  nodePort: 30000
  # API URL for browser access - use localhost for local dev, internal service name for production
  # NOTE: This is a BUILD-TIME variable. After changing this value, rebuild the dashboard image:
  #   cd dashboard && docker build --build-arg VITE_API_URL=<value> -t iotistic/dashboard:local-k8s .
  #   Then upgrade: helm upgrade iotistic . --namespace iotistic
  apiUrl: "http://localhost:30002"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  env:
    NODE_ENV: development

# Ingress configuration (optional for local dev)
ingress:
  enabled: false
  className: nginx
  host: iotistic.local
  tls:
    enabled: false

# Network policies
networkPolicy:
  enabled: false  # Disabled for easier local development

# Resource quotas
resourceQuota:
  enabled: false  # Disabled for local development
