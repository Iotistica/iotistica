# Default values for agent-fleet
# Deploy multiple agent pods with Modbus simulator sidecars for load testing

# Fleet configuration
fleet:
  # Name of the agent fleet (for labels and identification)
  name: "test-fleet-1"
  
  # Number of agent pods to deploy
  replicaCount: 5
  
  # Cloud API endpoint
  cloudApiEndpoint: "https://api1.iotistica.com:443"
  
  # Fleet ID for provisioning
  fleetId: "default-fleet"

# Agent container configuration
agent:
  image:
    repository: iotistic/agent
    tag: latest
    pullPolicy: Always
  
  # Resource limits per agent
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi
  
  # Agent environment variables
  env:
    # CloudSync intervals (increased to reduce API load with large fleets)
    POLL_INTERVAL_MS: "300000"       # 5 minutes (check for target state changes)
    REPORT_INTERVAL_MS: "300000"     # 5 minutes (report current state)
    METRICS_INTERVAL_MS: "600000"    # 10 minutes (send metrics)
    
    # Discovery intervals
    DISCOVERY_LIGHT_INTERVAL_MS: "14400000"  # 4 hours
    DISCOVERY_FULL_INTERVAL_MS: "86400000"   # 24 hours
    
    # Protocol adapters
    ENABLE_PROTOCOL_ADAPTERS: "true"
    ENABLE_SENSOR_PUBLISH: "false"  # Disabled - no OPC-UA server in K8s fleet
    ENABLE_FIRST_BOOT_DISCOVERY: "true"
    
    # Modbus configuration (sidecar)
    MODBUS_ENABLED: "true"
    MODBUS_TCP_HOST: "localhost"     # Sidecar on same pod
    MODBUS_TCP_PORT: "502"
    MODBUS_SLAVE_RANGE_START: "1"
    MODBUS_SLAVE_RANGE_END: "5"
    MODBUS_TIMEOUT: "2000"
    MODBUS_VENDOR: "Generic"
    
    # OPC-UA configuration (sidecar)
    OPCUA_ENABLED: "true"
    OPCUA_DISCOVERY_URLS: "opc.tcp://localhost:4840"  # OPC-UA simulator sidecar
    
    # MQTT configuration (cloud broker)
    MQTT_BROKER_URL: "mqtts://mqtt1.iotistica.com:1883"
    MQTT_CLIENT_ID_PREFIX: "agent-fleet"
    MQTT_RECONNECT_PERIOD: "5000"
    MQTT_CONNECT_TIMEOUT: "30000"
    MQTT_KEEPALIVE: "60"
    
    # Logging
    LOG_LEVEL: "info"
    LOG_COMPRESSION: "true"
    LOG_FILE_PERSISTENCE: "false"    # Disable file logging in K8s
    
    # Performance
    MEMORY_CHECK_INTERVAL_MS: "30000"
    MEMORY_THRESHOLD_MB: "30"
    
    # Security
    REQUIRE_PROVISIONING: "false"    # Pre-provisioned keys
    API_SECURITY_MODE: "OPEN"  # Allow K8s probes in cluster
    FIREWALL_ENABLED: "false"
    
    # Disable anomaly detection for testing (resource-intensive)
    ANOMALY_DETECTION_ENABLED: "false"

# Modbus simulator sidecar configuration
simulator:
  # Number of Modbus simulators per agent (0-3)
  # Multiple simulators run on different ports to avoid conflicts
  modbusCount: 1
  
  image:
    repository: iotistic/modbus-simulator
    tag: latest
    pullPolicy: Always
  
  # Resource limits per simulator
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  
  # Simulator environment variables
  # Base configuration - port will be incremented for multiple instances
  env:
    MODBUS_HOST: "127.0.0.1"         # Bind to localhost (shared with agent container)
    MODBUS_PORT: "502"
    MODBUS_SLAVES: "5"               # Number of slave IDs to simulate
    MODBUS_VENDOR: "Generic"         # Vendor to simulate
    MODBUS_VENDOR_JSON: "/app/vendors/dataPoints.json"

# OPC-UA simulator sidecar configuration
opcuaSimulator:
  enabled: true  # Backward-compat: if true and count not set, defaults to 1
  count: 1       # Number of OPC-UA simulators per agent (0-3). If 0, disables OPC-UA.
  image:
    repository: iotistic/opcua-simulator
    tag: latest
    pullPolicy: Always
  
  # Resource limits per OPC-UA simulator
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  
  # Simulator environment variables
  env:
    OPCUA_PORT: "4840"                   # Base port; instances will use 4840 + index
    OPCUA_ENDPOINT_URL: "opc.tcp://0.0.0.0:4840"
    # Add any OPC-UA specific config here

# Sensor simulator configuration (optional)
sensorSimulator:
  enabled: false  # Disabled by default (resource-intensive)
  image:
    repository: iotistic/sensor-simulator
    tag: latest
    pullPolicy: Always
  
  # Resource limits per sensor simulator
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  
  # Simulator environment variables
  env:
    SENSOR_COUNT: "3"                # Number of simulated sensors
    MQTT_PUBLISH_INTERVAL: "5000"   # Publish interval (ms)

# Provisioning configuration
provisioning:
  # API endpoint for provisioning key generation
  apiUrl: "https://api.iotistic.com"
  
  # Fleet ID for all agents in this deployment
  fleetId: "k8s-fleet-default"
  
  # Existing secret containing pre-generated provisioning keys
  # Keys should be named: PROVISIONING_KEY_0, PROVISIONING_KEY_1, etc.
  # Generate with: ./scripts/generate-provisioning-keys.sh or .ps1
  existingSecret: ""
  
  # Secret name to create (if existingSecret not provided)
  secretName: "agent-fleet-provisioning-keys"
  
  # Require provisioning (agents won't start without valid key)
  required: true
  
  # Key file name in secret
  keyFileName: "keys.txt"

# Persistent storage configuration
persistence:
  enabled: true
  
  # Storage class (leave empty for default)
  storageClass: "longhorn"
  
  # Storage size per agent (SQLite database + logs)
  size: 100Mi
  
  # Access mode
  accessMode: ReadWriteOnce

# Service configuration (for agent API exposure)
service:
  # ClusterIP service for each agent
  type: ClusterIP
  
  # Agent API port
  port: 48484
  
  # Create headless service for StatefulSet
  headless: true

# Monitoring configuration
monitoring:
  enabled: true
  
  # Prometheus ServiceMonitor (requires Prometheus Operator CRD)
  serviceMonitor:
    enabled: false  # Set to true if Prometheus Operator is installed
    interval: 30s
    scrapeTimeout: 10s
  
  # Metrics port
  metricsPort: 48484

# Node selection
nodeSelector:
  # Example: workload: agent-fleet
  role: workers

# Tolerations for dedicated node pools
tolerations: []
  # Example:
  # - key: "workload"
  #   operator: "Equal"
  #   value: "agent-fleet"
  #   effect: "NoSchedule"

# Affinity rules
affinity: {}
  # Example: Spread agents across nodes
  # podAntiAffinity:
  #   preferredDuringSchedulingIgnoredDuringExecution:
  #     - weight: 100
  #       podAffinityTerm:
  #         labelSelector:
  #           matchLabels:
  #             app: agent-fleet
  #         topologyKey: kubernetes.io/hostname

# Security context
securityContext:
  runAsNonRoot: false  # Agent may need root for certain operations
  runAsUser: 0
  fsGroup: 0

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 80%  # Keep 80% of agents running during disruptions
