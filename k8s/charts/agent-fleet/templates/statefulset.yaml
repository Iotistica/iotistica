apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "agent-fleet.fullname" . }}
  labels:
    {{- include "agent-fleet.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.fleet.replicaCount }}
  serviceName: {{ include "agent-fleet.fullname" . }}-headless
  selector:
    matchLabels:
      {{- include "agent-fleet.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-fleet.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      # Init container to generate fresh provisioning key on demand
      initContainers:
        - name: generate-provisioning-key
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              # Extract index from pod name (agent-fleet-test-0 -> 0)
              INDEX=$(echo $POD_NAME | grep -o '[0-9]*$')
              echo "Pod index: $INDEX"
              echo "Generating fresh provisioning key from API..."
              
              # Generate new key via API
              RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "$CLOUD_API_ENDPOINT/api/v1/provisioning-keys/generate" \
                -H "Content-Type: application/json" \
                -d "{\"fleetId\":\"$FLEET_ID\",\"newKey\":false,\"metadata\":{\"index\":$INDEX,\"podName\":\"$POD_NAME\"}}")
              
              HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
              BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
              
              echo "HTTP Status: $HTTP_CODE"
              echo "Response body: $BODY"
              
              # Extract key from response (supports both .key and .provisioningKey)
              KEY=$(echo "$BODY" | grep -o '"key":"[^"]*' | cut -d'"' -f4)
              if [ -z "$KEY" ]; then
                KEY=$(echo "$BODY" | grep -o '"provisioningKey":"[^"]*' | cut -d'"' -f4)
              fi
              
              if [ -z "$KEY" ]; then
                echo "ERROR: Failed to extract key from API response"
                echo "Response: $RESPONSE"
                exit 1
              fi
              
              # Write provisioning key to shared volume
              echo "$KEY" > /provisioning/PROVISIONING_KEY
              echo "Provisioning key generated successfully (${#KEY} chars)"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CLOUD_API_ENDPOINT
              value: {{ .Values.fleet.cloudApiEndpoint | quote }}
            - name: FLEET_ID
              value: {{ .Values.fleet.fleetId | quote }}
          volumeMounts:
            - name: provisioning
              mountPath: /provisioning
      containers:
        # Main agent container
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              # Extract pod index from pod name (agent-fleet-test-N)
              POD_INDEX=$(echo $POD_NAME | grep -o '[0-9]*$')
              # Calculate unique API port: 48484 + pod_index
              API_PORT=$((48484 + POD_INDEX))
              echo "Pod index: $POD_INDEX, API port: $API_PORT"
              
              # Load provisioning key from file and pass to node
              if [ -f /provisioning/PROVISIONING_KEY ]; then
                PROVISIONING_KEY=$(cat /provisioning/PROVISIONING_KEY)
                echo "Loaded provisioning key from file"
                exec env PROVISIONING_KEY="$PROVISIONING_KEY" DEVICE_API_PORT="$API_PORT" node dist/app.js
              else
                echo "WARNING: No provisioning key file found"
                exec env DEVICE_API_PORT="$API_PORT" node dist/app.js
              fi
          # Port definition removed to prevent hostPort conflicts on single-node clusters
          # Agent API accessed via localhost:$DEVICE_API_PORT inside pod only
          # For external access, use kubectl port-forward
          env:
            # API_PORT set dynamically in command based on pod index
            - name: CLOUD_API_ENDPOINT
              value: {{ .Values.fleet.cloudApiEndpoint | quote }}
            - name: FLEET_ID
              value: {{ .Values.fleet.fleetId | quote }}
            - name: NODE_ENV
              value: "production"
            # Get pod name from Downward API
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Get pod ordinal index (0, 1, 2, etc.)
            - name: POD_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['statefulset.kubernetes.io/pod-name']
            {{- range $key, $value := .Values.agent.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: REQUIRE_PROVISIONING
              value: {{ .Values.provisioning.required | quote }}
          volumeMounts:
            - name: agent-data
              mountPath: /app/data
            - name: provisioning
              mountPath: /provisioning
              readOnly: true
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  POD_INDEX=$(echo $POD_NAME | grep -o '[0-9]*$')
                  API_PORT=$((48484 + POD_INDEX))
                  wget -q -O- http://127.0.0.1:$API_PORT/ping || exit 1
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  POD_INDEX=$(echo $POD_NAME | grep -o '[0-9]*$')
                  API_PORT=$((48484 + POD_INDEX))
                  wget -q -O- http://127.0.0.1:$API_PORT/ping || exit 1
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
        
        # Modbus simulator sidecar
        - name: modbus-simulator
          image: "{{ .Values.simulator.image.repository }}:{{ .Values.simulator.image.tag }}"
          imagePullPolicy: {{ .Values.simulator.image.pullPolicy }}
          # Port definition removed to prevent hostPort conflicts on single-node clusters
          # Modbus simulator accessed via localhost:502 by agent only
          env:
            {{- range $key, $value := .Values.simulator.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.simulator.resources | nindent 12 }}
#          livenessProbe:
#            tcpSocket:
#              port: 502
#            initialDelaySeconds: 5
#            periodSeconds: 10
#            timeoutSeconds: 3
#            failureThreshold: 3
          # Readiness probe disabled - simulator may generate errors
          # when agent queries addresses not defined in vendor config
          # readinessProbe:
          #   tcpSocket:
          #     port: 502  # Use fixed port number since containerPort is removed
          #   initialDelaySeconds: 2
          #   periodSeconds: 5
          #   timeoutSeconds: 3
          #   failureThreshold: 3
        
        {{- if .Values.opcuaSimulator.enabled }}
        # OPC-UA simulator sidecar
        - name: opcua-simulator
          image: "{{ .Values.opcuaSimulator.image.repository }}:{{ .Values.opcuaSimulator.image.tag }}"
          imagePullPolicy: {{ .Values.opcuaSimulator.image.pullPolicy }}
          # OPC-UA port 4840 accessed via localhost by agent only
          env:
            {{- range $key, $value := .Values.opcuaSimulator.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.opcuaSimulator.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 4840
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 4840
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
        {{- end }}
      
      # Provisioning volume (emptyDir shared between init container and agent)
      volumes:
        - name: provisioning
          emptyDir: {}
  
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: agent-data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
