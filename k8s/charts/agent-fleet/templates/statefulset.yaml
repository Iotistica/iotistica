apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "agent-fleet.fullname" . }}
  labels:
    {{- include "agent-fleet.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.fleet.replicaCount }}
  serviceName: {{ include "agent-fleet.fullname" . }}-headless
  selector:
    matchLabels:
      {{- include "agent-fleet.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-fleet.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        # Main agent container
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          ports:
            - name: api
              containerPort: 48484
              protocol: TCP
            - name: metrics
              containerPort: 48484
              protocol: TCP
          env:
            - name: DEVICE_API_PORT
              value: "48484"
            - name: CLOUD_API_ENDPOINT
              value: {{ .Values.fleet.cloudApiEndpoint | quote }}
            - name: FLEET_ID
              value: {{ .Values.fleet.fleetId | quote }}
            - name: NODE_ENV
              value: "production"
            - name: REQUIRE_PROVISIONING
              value: {{ .Values.provisioning.required | quote }}
            # Get pod name from Downward API
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Get pod ordinal index (0, 1, 2, etc.)
            - name: POD_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['statefulset.kubernetes.io/pod-name']
            {{- range $key, $value := .Values.agent.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          # Use envFrom to load all keys from secret, agent will select based on POD_INDEX
          envFrom:
            - secretRef:
                name: {{ .Values.provisioning.existingSecret | default (printf "%s-provisioning-keys" (include "agent-fleet.fullname" .)) }}
          volumeMounts:
            - name: agent-data
              mountPath: /app/data
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /v2/ping
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v2/ping
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
        
        # Modbus simulator sidecar
        - name: modbus-simulator
          image: "{{ .Values.simulator.image.repository }}:{{ .Values.simulator.image.tag }}"
          imagePullPolicy: {{ .Values.simulator.image.pullPolicy }}
          ports:
            - name: modbus
              containerPort: 502
              protocol: TCP
          env:
            {{- range $key, $value := .Values.simulator.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.simulator.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: modbus
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: modbus
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: agent-data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
