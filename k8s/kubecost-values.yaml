# Production Kubecost Configuration for Azure AKS
# Cluster: dev-iotistica-aks-cluster

global:
  prometheus:
    enabled: true
    fqdn: http://kubecost-prometheus-server.kubecost.svc
  clusterId: "dev-iotistica-aks-cluster"

kubecostProductConfigs:
  clusterName: "dev-iotistica-aks-cluster"
  cloudProvider: "azure"
  cloudIntegrationSecret: "kubecost-cloud-integration"

# Basic Authentication - configured via environment variables
kubecostFrontend:
  extraEnv:
    - name: BASIC_AUTH_USERNAME
      valueFrom:
        secretKeyRef:
          name: kubecost-basic-auth
          key: username
    - name: BASIC_AUTH_PASSWORD
      valueFrom:
        secretKeyRef:
          name: kubecost-basic-auth
          key: password

kubecostModel:
  extraEnv:
    - name: BASIC_AUTH_USERNAME
      valueFrom:
        secretKeyRef:
          name: kubecost-basic-auth
          key: username
    - name: BASIC_AUTH_PASSWORD
      valueFrom:
        secretKeyRef:
          name: kubecost-basic-auth
          key: password
  
# Persistent storage for cost data (30 days retention)
persistentVolume:
  enabled: true
  size: 32Gi
  storageClass: managed-premium  # Azure Premium SSD

# Service exposed via Envoy Gateway (HTTPRoute: kubecost.iotistica.com)
# Previous LoadBalancer IP: 20.200.115.208 (no longer needed)
service:
  type: ClusterIP
  annotations:
    # Exposed via Envoy Gateway at kubecost.iotistica.com
    gateway.envoyproxy.io/exposed: "true"

# Prometheus storage (metrics retention)
prometheus:
  server:
    persistentVolume:
      enabled: true
      size: 32Gi
      storageClass: managed-premium
    retention: 15d
  
# Resource limits
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Enable network costs (requires Azure integration)
networkCosts:
  enabled: true
