# RBAC Configuration for Virtual Agent Deployment
# Required when API is deployed in Kubernetes cluster
#
# This grants the API service account permissions to:
# - Create/manage namespaces for virtual agents
# - Create/manage deployments for virtual agents
# - Create/manage secrets (provisioning keys)
# - Read pod status for deployment monitoring
#
# Deploy before API deployment:
#   kubectl apply -f k8s/virtual-agent-rbac.yaml

---
# ServiceAccount for API pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iotistic-api
  namespace: demo  # API namespace
  labels:
    app: iotistic-api
    component: virtual-agent-deployer

---
# ClusterRole with permissions needed for virtual agent management
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: virtual-agent-manager
  labels:
    app: iotistic-api
    component: virtual-agent-deployer
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]

  # Resource quotas (namespace limits)
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["get", "list", "create", "update", "delete"]

  # Secret management (provisioning keys)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "delete"]

  # Deployment management
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "delete", "patch"]

  # Pod monitoring (for status checks)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Pod logs (for debugging)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding to grant API service account the permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: iotistic-api-virtual-agent-manager
  labels:
    app: iotistic-api
    component: virtual-agent-deployer
subjects:
  - kind: ServiceAccount
    name: iotistic-api
    namespace: demo  # API namespace
roleRef:
  kind: ClusterRole
  name: virtual-agent-manager
  apiGroup: rbac.authorization.k8s.io

---
# Optional: Namespace-scoped role for virtual-agents namespace only
# Use this instead of ClusterRole if you want to restrict permissions
# to only the virtual-agents namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: virtual-agent-manager
  namespace: virtual-agents
  labels:
    app: iotistic-api
    component: virtual-agent-deployer
rules:
  # Secret management
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "delete"]

  # Deployment management
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "delete", "patch"]

  # Pod monitoring
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

---
# RoleBinding for namespace-scoped permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: iotistic-api-virtual-agent-manager
  namespace: virtual-agents
  labels:
    app: iotistic-api
    component: virtual-agent-deployer
subjects:
  - kind: ServiceAccount
    name: iotistic-api
    namespace: demo  # API's namespace
roleRef:
  kind: Role
  name: virtual-agent-manager
  apiGroup: rbac.authorization.k8s.io
