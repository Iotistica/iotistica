# API Deployment for Production Kubernetes
# Includes service account configuration for virtual agent deployment
#
# Prerequisites:
# - Apply k8s/virtual-agent-rbac.yaml first
# - Update registry URLs and environment variables
#
# Deploy:
#   kubectl apply -f k8s/api-deployment-production.yaml

---
apiVersion: v1
kind: Service
metadata:
  name: iotistic-api
  namespace: default
  labels:
    app: iotistic-api
spec:
  type: ClusterIP
  ports:
  - port: 3002
    targetPort: 3002
    protocol: TCP
    name: http
  - port: 3443
    targetPort: 3443
    protocol: TCP
    name: https
  selector:
    app: iotistic-api

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iotistic-api
  namespace: default
  labels:
    app: iotistic-api
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iotistic-api
  template:
    metadata:
      labels:
        app: iotistic-api
        version: v1
    spec:
      # CRITICAL: Use service account with RBAC permissions
      serviceAccountName: iotistic-api
      
      containers:
      - name: api
        image: your-registry.com/iotistic/api:latest  # UPDATE THIS
        imagePullPolicy: Always
        
        ports:
        - containerPort: 3002
          name: http
          protocol: TCP
        - containerPort: 3443
          name: https
          protocol: TCP
        
        env:
        # API Configuration
        - name: PORT
          value: "3002"
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        
        # Database Configuration
        - name: DB_HOST
          value: "postgres-service"  # UPDATE THIS
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "iotistic"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
        - name: DB_POOL_SIZE
          value: "20"
        - name: DB_SSL
          value: "true"
        
        # Redis Configuration
        - name: REDIS_HOST
          value: "redis-service"  # UPDATE THIS
        - name: REDIS_PORT
          value: "6379"
        
        # MQTT Configuration
        - name: MQTT_BROKER_URL
          value: "mqtts://mqtt-service:8883"  # UPDATE THIS
        - name: MQTT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mqtt-credentials
              key: username
        - name: MQTT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mqtt-credentials
              key: password
        
        # Virtual Agent Configuration (PRODUCTION)
        - name: VIRTUAL_AGENT_NAMESPACE
          value: "virtual-agents"
        - name: AGENT_IMAGE
          value: "your-registry.com/iotistic/agent:v1.0.0"  # UPDATE THIS - use specific version tag
        - name: AGENT_IMAGE_PULL_POLICY
          value: "IfNotPresent"  # Use "Always" for :latest tag
        - name: CLOUD_API_URL
          value: "https://api.yourdomain.com"  # UPDATE THIS - your production API URL
        - name: MQTT_BROKER_URL_VIRTUAL
          value: "mqtts://mqtt.yourdomain.com:8883"  # UPDATE THIS - your production MQTT URL
        
        # Virtual Agent Resource Limits
        - name: VIRTUAL_AGENT_CPU_REQUEST
          value: "200m"
        - name: VIRTUAL_AGENT_CPU_LIMIT
          value: "1000m"
        - name: VIRTUAL_AGENT_MEMORY_REQUEST
          value: "512Mi"
        - name: VIRTUAL_AGENT_MEMORY_LIMIT
          value: "2Gi"
        
        # JWT/Auth Configuration
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: jwt-secret
        
        # Neo4j Configuration (if using Digital Twin)
        - name: NEO4J_URI
          value: "bolt://neo4j-service:7687"  # UPDATE THIS
        - name: NEO4J_USERNAME
          valueFrom:
            secretKeyRef:
              name: neo4j-credentials
              key: username
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: neo4j-credentials
              key: password
        
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Security context (restricted)
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false  # Set to true if app doesn't need write access
      
      # Image pull secrets (if using private registry)
      imagePullSecrets:
      - name: regcred
      
      # Pod security context
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
      
      # Pod anti-affinity (spread across nodes)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: iotistic-api
              topologyKey: kubernetes.io/hostname

---
# Horizontal Pod Autoscaler (optional)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iotistic-api-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iotistic-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Pod Disruption Budget (for high availability)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: iotistic-api-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: iotistic-api
